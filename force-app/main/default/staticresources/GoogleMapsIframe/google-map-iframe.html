<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Maps Iframe</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        #map {
            width: 100vw;
            height: 100vh;
        }
        .search-container {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: white;
            padding: 10px;
            border-radius: 4px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
            width: 300px;
        }
        .search-input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .info-box {
            position: absolute;
            bottom: 30px;
            left: 20px;
            z-index: 1000;
            background: white;
            padding: 12px;
            border-radius: 4px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
            max-width: 300px;
            display: none;
        }
        .info-box.visible {
            display: block;
        }
        .marker-list {
            position: absolute;
            top: 80px;
            right: 20px;
            z-index: 1000;
            background: white;
            padding: 10px;
            border-radius: 4px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
            max-height: 300px;
            overflow-y: auto;
            display: none;
            min-width: 200px;
        }
        .marker-list.visible {
            display: block;
        }
        .marker-item {
            padding: 8px 10px;
            margin: 2px 0;
            cursor: pointer;
            border-radius: 2px;
            border-bottom: 1px solid #eee;
        }
        .marker-item:hover {
            background: #f0f0f0;
        }
        .marker-item.selected {
            background: #e3f2fd;
            font-weight: bold;
        }
        .button-bar {
            position: absolute;
            top: 80px;
            left: 20px;
            z-index: 1000;
            background: white;
            padding: 10px;
            border-radius: 4px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }
        .button {
            margin: 0 5px;
            padding: 5px 10px;
            cursor: pointer;
            border: 1px solid #ccc;
            border-radius: 4px;
            background: #f8f9fa;
        }
        .button:hover {
            background: #e9ecef;
        }
    </style>
</head>
<body>
    <div class="search-container">
        <input type="text" class="search-input" id="searchInput" placeholder="搜索地点...">
    </div>

    <div class="button-bar">
        <button class="button" onclick="getCurrentLocation()">📍 当前位置</button>
        <button class="button" onclick="clearAllMarkers()">🗑️ 清除标记</button>
    </div>

    <div class="marker-list" id="markerList"></div>
    <div class="info-box" id="infoBox"></div>
    
    <div id="map"></div>

    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAevReUCBK5ntbBf525M-O31NcDc_Q-130&libraries=places,geometry,drawing"></script>
    <script>
        let map;
        let markers = [];
        let geocoder;
        let infoWindow;
        let searchInput;

        function initMap() {
            const defaultLocation = { lat: 31.2304, lng: 121.4737 };
            
            map = new google.maps.Map(document.getElementById('map'), {
                center: defaultLocation,
                zoom: 12,
                mapTypeControl: true,
                fullscreenControl: true,
                streetViewControl: true,
                zoomControl: true,
                mapTypeId: google.maps.MapTypeId.ROADMAP
            });

            geocoder = new google.maps.Geocoder();
            infoWindow = new google.maps.InfoWindow();

            // 添加点击事件
            map.addListener('click', (event) => {
                addMarker(event.latLng, '新标记');
            });

            // 初始化搜索
            initSearch();

            // 添加默认标记
            addMarker(defaultLocation, '当前位置');

            // 设置消息监听，接收来自父页面的命令
            window.addEventListener('message', (event) => {
                // 验证消息来源（可选）
                const data = event.data;
                if (data.type === 'search') {
                    searchLocation(data.query);
                } else if (data.type === 'getCurrentLocation') {
                    getCurrentLocation();
                } else if (data.type === 'clearMarkers') {
                    clearAllMarkers();
                } else if (data.type === 'getMarkers') {
                    sendMarkersToParent();
                }
            });

            // 通知父页面地图已加载完成
            window.parent.postMessage({ type: 'mapLoaded' }, '*');
        }

        function initSearch() {
            searchInput = document.getElementById('searchInput');
            
            // 添加输入事件
            searchInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    searchLocation(searchInput.value);
                }
            });

            // 添加自动完成
            const autocomplete = new google.maps.places.Autocomplete(searchInput);
            autocomplete.addListener('place_changed', () => {
                const place = autocomplete.getPlace();
                if (place.geometry) {
                    const location = place.geometry.location;
                    map.setCenter(location);
                    map.setZoom(15);
                    addMarker(location, place.name || '搜索地点');
                    updateInfoBox(place);
                }
            });
        }

        function searchLocation(query) {
            if (!query || !geocoder) return;
            
            geocoder.geocode({ address: query }, (results, status) => {
                if (status === 'OK' && results[0]) {
                    const location = results[0].geometry.location;
                    map.setCenter(location);
                    map.setZoom(15);
                    addMarker(location, results[0].formatted_address);
                    updateInfoBox({
                        name: results[0].formatted_address,
                        formatted_address: results[0].formatted_address
                    });
                }
            });
        }

        /**
         * 安全地获取坐标值
         * 处理 location 可能是 LatLng 对象或普通对象的情况
         */
        function getLat(location) {
            if (!location) return 0;
            return typeof location.lat === 'function' ? location.lat() : location.lat;
        }

        function getLng(location) {
            if (!location) return 0;
            return typeof location.lng === 'function' ? location.lng() : location.lng;
        }

        function addMarker(location, title) {
            // 安全地获取坐标
            const lat = getLat(location);
            const lng = getLng(location);
            
            // 创建 LatLng 对象用于标记
            const markerPosition = new google.maps.LatLng(lat, lng);
            
            const marker = new google.maps.Marker({
                position: markerPosition,
                map: map,
                title: title,
                animation: google.maps.Animation.DROP,
                draggable: true
            });

            const markerId = 'marker_' + Date.now() + '_' + Math.random();
            
            const markerData = {
                id: markerId,
                lat: lat,
                lng: lng,
                title: title,
                marker: marker
            };

            markers.push(markerData);

            // 添加点击事件
            marker.addListener('click', () => {
                infoWindow.setContent(`
                    <div style="padding: 8px;">
                        <h3 style="margin:0 0 5px 0;">${title}</h3>
                        <p style="margin:2px 0;">纬度: ${lat.toFixed(6)}</p>
                        <p style="margin:2px 0;">经度: ${lng.toFixed(6)}</p>
                    </div>
                `);
                infoWindow.open(map, marker);
                
                // 通知父页面标记被选中
                window.parent.postMessage({ 
                    type: 'markerSelected', 
                    data: {
                        id: markerId,
                        lat: lat,
                        lng: lng,
                        title: title
                    }
                }, '*');
            });

            // 添加拖动事件
            marker.addListener('dragend', () => {
                const newPos = marker.getPosition();
                const newLat = newPos.lat();
                const newLng = newPos.lng();
                
                markerData.lat = newLat;
                markerData.lng = newLng;
                
                // 更新标记列表
                updateMarkerList();
                
                // 通知父页面标记更新
                window.parent.postMessage({ 
                    type: 'markerUpdated', 
                    data: {
                        id: markerId,
                        lat: newLat,
                        lng: newLng,
                        title: title
                    }
                }, '*');
            });

            updateMarkerList();
            return markerData;
        }

        function updateMarkerList() {
            const markerListDiv = document.getElementById('markerList');
            let html = '<h3 style="margin-top:0;">📍 标记列表</h3>';
            
            markers.forEach((marker, index) => {
                html += `
                    <div class="marker-item" onclick="selectMarker(${index})">
                        📍 ${marker.title || '标记' + (index+1)}<br>
                        <small style="color:#666;">(${marker.lat.toFixed(4)}, ${marker.lng.toFixed(4)})</small>
                    </div>
                `;
            });

            if (markers.length === 0) {
                html += '<p style="color:#666; text-align:center;">暂无标记，点击地图添加</p>';
            }

            markerListDiv.innerHTML = html;
            markerListDiv.classList.add('visible');
        }

        function selectMarker(index) {
            if (markers[index] && markers[index].marker) {
                google.maps.event.trigger(markers[index].marker, 'click');
            }
        }

        function updateInfoBox(place) {
            const infoBox = document.getElementById('infoBox');
            infoBox.innerHTML = `
                <h3 style="margin-top:0;">📍 ${place.name || '位置信息'}</h3>
                <p style="margin:5px 0;">${place.formatted_address || ''}</p>
            `;
            infoBox.classList.add('visible');
        }

        function getCurrentLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const pos = {
                            lat: position.coords.latitude,
                            lng: position.coords.longitude
                        };
                        map.setCenter(pos);
                        map.setZoom(15);
                        addMarker(pos, '我的位置');
                        
                        // 反向地理编码获取地址
                        geocoder.geocode({ location: pos }, (results, status) => {
                            if (status === 'OK' && results[0]) {
                                updateInfoBox({
                                    name: '我的位置',
                                    formatted_address: results[0].formatted_address
                                });
                            }
                        });
                    },
                    (error) => {
                        alert('无法获取当前位置：' + error.message);
                    }
                );
            } else {
                alert('浏览器不支持地理位置功能');
            }
        }

        function clearAllMarkers() {
            markers.forEach(m => {
                if (m.marker) m.marker.setMap(null);
            });
            markers = [];
            updateMarkerList();
            
            const infoBox = document.getElementById('infoBox');
            infoBox.classList.remove('visible');
            
            window.parent.postMessage({ type: 'markersCleared' }, '*');
        }

        function sendMarkersToParent() {
            const markersData = markers.map(m => ({
                id: m.id,
                lat: m.lat,
                lng: m.lng,
                title: m.title
            }));
            
            window.parent.postMessage({ 
                type: 'markersData', 
                data: markersData 
            }, '*');
        }

        // 初始化地图
        initMap();
    </script>
</body>
</html>
