<template>
    <div class="slds-card slds-card_boundary slds-grid slds-grid_vertical forceListViewManager">
        <article class="slds-page-header slds-card">
            <div class="slds-grid">
                <header class="slds-media slds-media_center slds-has-flexi-truncate">
                <div class="slds-media__figure">
                    <lightning-icon icon-name='standard:report' alternative-text='自定义报表' size='medium' title='自定义报表'></lightning-icon>
                </div>
                <div class="slds-media__body">
                    <h2 class="slds-card__header-title">
                        <span>自定义报表</span>
                    </h2>
                    </div>
                </header>
            </div>
            </article>

        <div class="slds-grid safari-workaround-anchor slds-var-m-top_xx-small slds-border_top">
            <div class="slds-grid">
                <div class="slds-col slds-no-space">
                    <lightning-datatable
                        key-field="Id"
                        show-row-number-column
                        hide-checkbox-column
                        column-widths-mode = 'auto'
                        data={data}
                        columns={columns}
                        onrowaction={handleRowAction}
                        errors={rowErrorShow}
                    ></lightning-datatable>
                </div>
            </div>
        </div>
    </div>
</template>
