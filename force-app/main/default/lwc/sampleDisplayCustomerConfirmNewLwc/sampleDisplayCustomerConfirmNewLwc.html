<template>
    <div class="slds-clearfix">
        <div class="slds-float_right">
            <lightning-button label="New" onclick={openModal}></lightning-button>
        </div>
    </div>

    <template if:true={isModalOpen}>
        <div>
            <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
                <template if:true={showLoadingSpinner}>
                    <lightning-spinner alternative-text="Uploading now"></lightning-spinner>
                </template>
                <div class="slds-modal__container">
                    <!-- Modal/Popup Header -->
                    <div class="slds-modal__header">
                        <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
                                title="Close" onclick={closeModal}>
                            <lightning-icon icon-name="utility:close" alternative-text="close" size="small"></lightning-icon>
                            <span class="slds-assistive-text">Close</span>
                        </button>
                        <h2 class="slds-text-heading_medium">New Customer Detail</h2>
                    </div>

                    <!-- Modal/Popup Body -->
                    <div class="slds-modal__content slds-var-p-around_large">
                        <!-- 在这里添加您需要的输入字段 -->
                        <lightning-record-edit-form object-api-name="Sample_Display_Customer_Confirm__c" layout-type="Compact">
                            <template if:true={sampleDisplayIsStore}>
                                <lightning-input-field
                                    class="slds-var-m-top_small"
                                    field-name="Customer__c" 
                                    data-field-name="Customer__c"
                                    value={sampleDisplayStoreCustomer}
                                    disabled>
                                </lightning-input-field>
                            </template>
                            <template if:false={sampleDisplayIsStore}>
                                <lightning-input-field
                                    class="slds-var-m-top_small"
                                    field-name="Customer__c" 
                                    data-field-name="Customer__c"
                                    onchange={handleCustomerChange}
                                    value={customerId}
                                    required>
                                </lightning-input-field>
                            </template>
                            <lightning-input 
                                class="slds-var-m-top_small slds-var-m-left_x-small"
                                type="text" 
                                label="Product Model" 
                                value={productModel}
                                readonly>
                            </lightning-input>
                            <lightning-input-field 
                                class="slds-var-m-top_small"
                                field-name="Number__c" 
                                data-field-name="Number__c"
                                onchange={handleNumberChange}
                                value={numberData}
                                required>
                            </lightning-input-field>
                            <div>
                                <lightning-input 
                                    label="PO" 
                                    name="file uploader" 
                                    onclick={handleFilesClick} 
                                    onchange={handleFilesChange} 
                                    type="file" 
                                    accept={acceptedType}
                                    required>
                                </lightning-input>
                                <div class="star-container slds-var-m-top_x-small" >
                                    <template if:true={isHaveFile}>
                                        <div> 
                                            <template if:true={imageUrl}>
                                                <img src={imageUrl} alt="Uploaded Image" style="max-width: 100%; max-height: 400px;"/>
                                            </template>
                                        </div>
                                        <div class="slds-text-color_success">{fileName}</div>
                                    </template>
                                </div>
                            </div>
                        </lightning-record-edit-form>
                    </div>

                    <!-- Modal/Popup Footer -->
                    <div class="slds-modal__footer">
                        <div style="text-align: center;">
                            <lightning-button class="slds-var-p-right_medium" label="Cancel" onclick={closeModal}></lightning-button>
                            <lightning-button class="slds-var-p-right_medium" label="Save & New" onclick={handleSaveAndNew}></lightning-button>
                            <lightning-button variant="brand" label="Save" onclick={handleSave}></lightning-button>
                        </div>
                    </div>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </div>
    </template>
</template>
