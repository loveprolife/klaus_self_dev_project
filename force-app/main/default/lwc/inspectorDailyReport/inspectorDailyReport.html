<template>
    <div class="slds-is-relative">
    <template if:true={isShowSpinner} >
       <lightning-spinner size="medium" variant="brand"></lightning-spinner>
    </template>
    <!-- <template if:false={isPc}>
        <lightning-card>
            <span title="" style="color: red;"> {label.Mobiletip} </span>
        </lightning-card>
    </template> -->
    <template if:false={showDuplecation}>
        <lightning-card title={label.DailyInspectionReport} icon-name="standard:article">
            <lightning-button variant="neutral" label={label.Return} onclick={cancel} slot="actions"></lightning-button>
            <template if:false={isCanNotCreate}>
                <template if:true={isCanEdit}>
                    <lightning-button variant="brand" label={label.Save} onclick={saveReport}  slot="actions"></lightning-button>
                </template>
                <!-- 加油量30天内的值可编辑，显示保存按钮 wfc -->
                <template if:false={isCanEdit}>
                    <template if:true={isCanEditAmountTo}>
                        <lightning-button variant="brand" label={label.Save} onclick={saveReport}  slot="actions"></lightning-button>
                    </template>
                    <template if:false={isCanEditAmountTo}>
                        <template if:true={isCanEditSpecialUser}>
                            <lightning-button variant="brand" label={label.Save} onclick={saveReport}  slot="actions"></lightning-button>
                        </template>
                    </template>
                </template>
            </template>
            <!-- <lightning-button variant="brand" label="测试" onclick={canEditMethon}  slot="actions"></lightning-button> -->
        </lightning-card>
    </template>
    <div style="height: auto;margin-top: 1rem;padding-bottom: 2rem;">
        <template if:false={showDuplecation}>
            <lightning-card>
                <template if:true={showSaveError}>
                    <template for:each={saveErrorMsg} for:item="error" for:index="indexError">
                        <span key={error} style="color: red;margin-left: 20px;">{error}<br></span>
                    </template>
                </template>
                <template if:true={dailyInspectionReport}>
                    <div class="slds-p-around_medium slds-grid slds-wrap" >
                        <template if:false={recordId}>
                            <div class="slds-col slds-size_1-of-2 slds-p-horizontal_x-small">
                                <lightning-input type="date" label={label.ReportDate} value={dailyInspectionReport.Report_Date__c}   onchange={dateChange} data-record="Report_Date__c" required data-id="dateInput"></lightning-input>
                            </div>
                        </template>
                        <template if:true={recordId}>
                            <div class="slds-col slds-size_1-of-2 slds-p-horizontal_x-small">
                                <lightning-input type="text" name="inputDate" label={label.ReportDate} value={dailyInspectionReport.Report_Date__c} disabled></lightning-input> 
                            </div>  
                        </template>
                        <div class="slds-col slds-size_1-of-2 slds-p-horizontal_x-small">
                            <lightning-input type="text" label={label.Floorwalker} value={owner} read-only="true"></lightning-input>
                        </div>
                        <template if:true={showPage}>
                            <template if:false={isCanNotCreate}>
                                <div class="slds-col slds-size_1-of-1 slds-p-horizontal_x-small detailHeight">
                                    <lightning-textarea max-length="131072" label={label.ReportSummary} data-record="Report_Detail__c" value={dailyInspectionReport.Report_Detail__c} required onchange={reportDataChange}></lightning-textarea>
                                </div>
                            </template>
                        </template>
                    </div>
                    <template if:true={isCanNotCreate}>
                        <span style="color: red;margin-left: 20px;">{createMsg}<br></span>    
                    </template>

                    <template if:false={isCanNotCreate}>
                        <template if:true={showPage}>
                            <!-- <lightning-button variant="brand" label="添加门店" onclick={addShop} style="margin-left: 10px;
                            margin-top: 10px;">
                                
                            </lightning-button> -->
                            <lightning-accordion allow-multiple-sections-open="true" active-section-name="AA">
                                <template if:true={isExist}>
                                    <lightning-accordion-section name="C" label={label.Evaluate} >
                                        <template if:true={isShowAddEvaluation}>
                                            <a onclick={addEvaluation} id={index} name={index} slot="actions">
                                                <lightning-icon variant="success" icon-name="utility:add" class="slds-icon slds-icon_small"
                                                    size="small" alternative-text="large" title={label.AddEvaluate} style="margin-right: 0.75rem;"></lightning-icon>
                                                <span class="slds-assistive-text">Copy Icon</span>
                                            </a>
                                        </template>
                                        <lightning-accordion allow-multiple-sections-open="true">
                                            <template for:each={evaluationDatas} for:index="indexEvaluation" for:item="evaluationData">
                                                <lightning-accordion-section label={evaluationData.evaluation.Comment__c} key={evaluationData.evaluationIndex}
                                                class="slds-theme--shade slds-accordion__list-item">
                                                    <lightning-icon variant="success" icon-name="utility:edit_form" class="slds-icon slds-icon_small"
                                                    size="x-small" onclick={addResponse} data-record={indexEvaluation}  alternative-text="icon" title={label.Responde} slot="actions"></lightning-icon>
                                                    <template if:true={evaluationData.isCanDeleteEvaluation}>
                                                        <lightning-icon variant="success" icon-name="utility:delete" class="slds-icon slds-icon_small"
                                                        size="x-small" data-record={indexEvaluation} alternative-text="icon" title={label.DeleteEvaluate} onclick={deleteEvaluationMethod} slot="actions"></lightning-icon>
                                                    </template>
                                                    <table class="slds-table slds-table_bordered">
                                                        <tr class="slds-hint-parent" for:index="indexResponde">
                                                            <td style="width: 5%;">
                                                                
                                                            </td>
                                                            <td style="width: 10%;">
                                                                {evaluationData.evaluation.User__r.Name} 
                                                                    
                                                            </td>
                                                            <td style="width: 65%;">
                                                                <lightning-textarea value={evaluationData.evaluation.Comment__c} name='Responde' max-length="131072" disabled onchange={reportDataChange}></lightning-textarea>
                                                            </td>

                                                            <td style="width: 10%;" class="slds-cell-wrap">
                                                                {evaluationData.createTime}    
                                                            </td>
                                                            
                                                            <td style="width: 10%;" class="slds-cell-wrap">
                                                                
                                                            </td>
                                                        </tr>
                                                        <template for:each={evaluationData.responde} for:item="respondeDate" for:index="indexResponde">
                                                            <tr key={evaluationData.respondeIndex} class="slds-hint-parent" >
                                                                <td style="width: 5%;">
                                                                    {respondeDate.indexNumber}
                                                                </td>
                                                                <td style="width: 10%;">
                                                                    {respondeDate.responde.Name}
                                                                </td>
                                                                <td style="width: 65%;">
                                                                    <lightning-textarea max-length="131072" value={respondeDate.responde.Responde__c} name='Responde' disabled onchange={reportDataChange}></lightning-textarea>
                                                                           
                                                                </td>

                                                                <td style="width: 10%;" class="slds-cell-wrap">
                                                                    {respondeDate.createTime}    
                                                                </td>
                                                                
                                                                <td style="width: 10%;" class="slds-cell-wrap">
                                                                    <template if:true={respondeDate.isCanDeleteResponde}>
                                                                        <a onclick={deleteResponde} data-record={respondeDate.respondeIndex}>
                                                                            <lightning-icon icon-name="utility:delete" size="small"
                                                                                alternative-text="Delete" label={label.Action}></lightning-icon>
                                                                            <span class="slds-assistive-text">Delete</span>
                                                                        </a>
                                                                    </template>
                                                                </td>
                                                            </tr>
                                                        </template>    
                                                    </table>
                                                </lightning-accordion-section>
                                            </template>
                                        </lightning-accordion>
                                    </lightning-accordion-section>
                                </template>
                                <lightning-accordion-section name="D" label={label.PromoterAttendance} >
                                    <template if:true={supplementary}>

                                    <lightning-record-edit-form object-api-name="Promoter_Attendance__c" >
                                        <div class="minSection">
                                            {label.PromoterAttendance}
                                        </div>
                                        <div class="slds-grid slds-wrap slds-m-vertical_medium" >
                                            <div class="slds-col slds-size_1-of-2 slds-p-horizontal_x-small">
                                                <lightning-input-field field-name="CheckInStatus__c" name="CheckInStatus__c" data-id="CheckInStatus__c"  value={supplementary.CheckInStatus__c} disabled> 
                                                </lightning-input-field>
                                            </div>

                                            <div class="slds-col slds-size_1-of-2 slds-p-horizontal_x-small">
                                                <lightning-input-field field-name="SignInTime__c" name="SignInTime__c"  value={supplementary.SignInTime__c} data-id="SignIn_Time__c" disabled> 
                                                </lightning-input-field>
                                                <!-- <lightning-input type="time" name="SignInTime__c"  value={supplementary.SignInTime__c} data-id="SignIn_Time__c" disabled></lightning-input> -->
                                            </div>

                                            <div class="slds-col slds-size_1-of-2 slds-p-horizontal_x-small">
                                                <lightning-input-field field-name="Shop__c" name="Shop__c"  value={supplementary.Shop__c} data-id="Shop__c" disabled> 
                                                </lightning-input-field>
                                            </div>
                                           
                                            <div class="slds-col slds-size_1-of-2 slds-p-horizontal_x-small">
                                                <lightning-input-field field-name="SignOutTime__c" name="SignOutTime__c"  value={supplementary.SignOutTime__c} data-id="SignOut_Time__c" disabled> 
                                                </lightning-input-field>
                                                <div class="minSection" style="color: red;">
                                                    {label.SignOutRemind}
                                                </div>
                                            </div>
                                        </div>
                                        <!-- 隐藏补签信息 wfc-->
                                        <div hidden>
                                            <div class="minSection">
                                                {label.SupplementaryInformation}
                                            </div>
                                            <div class="slds-grid slds-wrap slds-m-vertical_medium" >
                                                <div class="slds-col slds-size_1-of-2 slds-p-horizontal_x-small">
                                                    <lightning-input-field field-name="ApprovalStatus__c" name="ApprovalStatus__c" data-id="ApprovalStatus__c"  value={supplementary.ApprovalStatus__c} disabled> 
                                                    </lightning-input-field>
                                                </div>

                                                <div class="slds-col slds-size_1-of-2 slds-p-horizontal_x-small">
                                                </div>
                                            </div>
                                            <div class="minSection">
                                                {label.SignInRetroactive}
                                            </div>
                                            <div class="slds-grid slds-wrap slds-m-vertical_medium" >
                                                <div class="slds-col slds-size_1-of-2 slds-p-horizontal_x-small">
                                                    <template if:true={notification}>
                                                        <div class="minSection" style="color: red;">
                                                        {notification}
                                                    </div>
                                                    </template>
                                                    <template if:true={isCanAdd}>
                                                        <lightning-input-field field-name="AddCheckSignInTime__c" name="AddCheckSignInTime__c" data-record={index}  value={supplementary.AddCheckSignInTime__c} onchange={supplementaryChange}> 
                                                        </lightning-input-field>
                                                    </template>
                                                    <template if:false={isCanAdd}>
                                                        <lightning-input-field field-name="AddCheckSignInTime__c" name="AddCheckSignInTime__c" data-record={index} data-id="AddCheckSignInTime__c" disabled  value={supplementary.AddCheckSignInTime__c} > 
                                                        </lightning-input-field>
                                                    </template>
                                                </div>
                                                <div class="slds-col slds-size_1-of-2 slds-p-horizontal_x-small">
                                                    <template if:true={isCanAdd}>
                                                        <lightning-input-field field-name="Add_Check_Shop__c" name="Add_Check_Shop__c" data-record={index}  value={supplementary.Add_Check_Shop__c} onchange={supplementaryChange} > 
                                                        </lightning-input-field>
                                                    </template>
                                                    <template if:false={isCanAdd}>
                                                        <lightning-input-field field-name="Add_Check_Shop__c" name="Add_Check_Shop__c"  value={supplementary.Add_Check_Shop__c} disabled data-id="Add_Check_Shop__c"> 
                                                        </lightning-input-field>
                                                    </template>
                                                </div>
                                                <div class="slds-col slds-size_1-of-2 slds-p-horizontal_x-small">
                                                    <template if:true={isCanAdd}>
                                                        <lightning-input-field field-name="AddCheckInReason__c" name="AddCheckInReason__c" data-record={index}  value={supplementary.AddCheckInReason__c} onchange={supplementaryChange} > 
                                                        </lightning-input-field>
                                                    </template>
                                                    <template if:false={isCanAdd}>
                                                        <lightning-input-field field-name="AddCheckInReason__c" name="AddCheckInReason__c" data-record={index}  value={supplementary.AddCheckInReason__c} disabled data-id="AddCheckInReason__c"> 
                                                        </lightning-input-field>
                                                    </template>
                                                </div>
                                            </div>
                                        </div>
                                    </lightning-record-edit-form>
                                    </template>
                                </lightning-accordion-section>
                                <lightning-accordion-section name="A" label={label.ReportDetail} >
                                    <!-- <h3 class="slds-section__title slds-theme_shade" style="width: 98%;margin:12px;">
                                        <span class="slds-truncate slds-p-horizontal_small" title="Section Title">
                                            巡店日报明细
                                        </span>
                                    </h3> -->
                                    <template if:true={isCanEdit}>
                                        <a onclick={addShop} slot="actions" style="margin-right: 0.75rem;" >
                                            <lightning-icon variant="success" icon-name="utility:add" 
                                                size="small"  title={label.AddRow}></lightning-icon>
                                            <span class="slds-assistive-text">Copy Icon</span>
                                        </a>
                                        
                                    </template>

                                    <div class="slds-col slds-size_1-of-1 slds-p-horizontal_x-small">
                                        <lightning-accordion allow-multiple-sections-open="true">
                                            <lightning-record-edit-form object-api-name="Sampling_Inspection__c" >
                                                <template for:each={stores}  for:item="store" for:index="index">
                                                    <lightning-accordion-section name="A" label={store.storeLabel} key={store.storeId} >
                                                        <template if:true={isCanEdit}>
                                                            <template if:true={store.isShowDelete}>
                                                                <lightning-icon onclick={deleteShop} data-record={index} slot="actions" variant="success" icon-name="utility:delete" class="slds-icon slds-icon_small"
                                                                    size="small" alternative-text="large" title={label.DeleteShop}></lightning-icon>
                                                                <span class="slds-assistive-text">Copy Icon</span>
                                                            </template>
                                                        </template>
                                                        <template if:false={store.taskStatus}>
                                                            <template if:true={isCanEdit}>
                                                                
                                                                <template if:true={store.isCanChangeStatus}>
                                                                    <!-- <lightning-icon slot="actions" icon-name="utility:success" alternative-text="large" variant="success"
                                                                    title="已到访" data-record={index} size="small" onclick={statusChange}></lightning-icon> -->
                                                                    <div class="slds-form-element" slot="actions"  >
                                                                        <label class="slds-checkbox_toggle slds-grid">
                                                                            <input type="checkbox" name="checkbox-toggle-32" value="checkbox-toggle-32" aria-describedby="checkbox-toggle-32" onclick={statusChange} data-record={index}  checked />
                                                                            <span  class="slds-checkbox_faux_container" aria-live="assertive">
                                                                              <span class="slds-checkbox_faux"></span>
                                                                              <span class="slds-checkbox_on">{label.HasVisited}</span>  
                                                                              <span class="slds-checkbox_off">{label.NotVisit}</span>
                                                                            </span>
                                                                        </label>
                                                                    </div>
                                                                </template>
                                                                <template if:false={store.isCanChangeStatus}>
                                                                    <!-- <lightning-icon slot="actions" icon-name="utility:success" alternative-text="large" variant="success"
                                                                    title="已到访" size="small"></lightning-icon> -->
                                                                    <div class="slds-form-element" slot="actions">
                                                                        <label class="slds-checkbox_toggle slds-grid">
                                                                            <input type="checkbox" name="checkbox-toggle-32" value="checkbox-toggle-32" aria-describedby="checkbox-toggle-32" checked disabled />
                                                                            <span  class="slds-checkbox_faux_container" aria-live="assertive">
                                                                              <span style="background-color: #25665e;" class="slds-checkbox_faux"></span>
                                                                              <span class="slds-checkbox_on">{label.HasVisited}</span>
                                                                              <span class="slds-checkbox_off">{label.NotVisit}</span>
                                                                            </span>
                                                                        </label>
                                                                    </div>
                                                                </template>
                                                            </template>
                                                            <template if:false={isCanEdit}>
                                                                <!-- <lightning-icon slot="actions" icon-name="utility:success" alternative-text="large" variant="success"
                                                                    title="已到访" size="small"></lightning-icon> -->
                                                                <div class="slds-form-element" slot="actions">
                                                                    <label class="slds-checkbox_toggle slds-grid">
                                                                        <input type="checkbox" name="checkbox-toggle-32" value="checkbox-toggle-32" aria-describedby="checkbox-toggle-32" checked disabled />
                                                                        <span  class="slds-checkbox_faux_container" aria-live="assertive">
                                                                          <span style="background-color: #25665e;"  class="slds-checkbox_faux"></span>
                                                                          <span class="slds-checkbox_on">{label.HasVisited}</span>
                                                                          <span class="slds-checkbox_off">{label.NotVisit}</span>
                                                                        </span>
                                                                    </label>
                                                                </div>
                                                            </template>
                                                        </template>

                                                        <template if:true={store.taskStatus}>
                                                            <template if:true={isCanEdit}>
                                                                <!-- <lightning-icon slot="actions" icon-name="utility:success" alternative-text="Success!"
                                                                title="未到访" data-record={index} onclick={statusChange} size="small"></lightning-icon> -->
                                                                <div class="slds-form-element" slot="actions">
                                                                    <label class="slds-checkbox_toggle slds-grid">
                                                                        <input type="checkbox" onclick={statusChange} data-record={index} name="checkbox-toggle-32" value="checkbox-toggle-32" aria-describedby="checkbox-toggle-32" />
                                                                        <span  class="slds-checkbox_faux_container" aria-live="assertive">
                                                                          <span class="slds-checkbox_faux"></span>
                                                                          <span class="slds-checkbox_on">{label.HasVisited}</span>
                                                                          <span class="slds-checkbox_off">{label.NotVisit}</span>
                                                                        </span>
                                                                    </label>
                                                                </div>
                                                            </template>
                                                            <template if:false={isCanEdit}>
                                                                <!-- <lightning-icon slot="actions" icon-name="utility:success" alternative-text="Success!"
                                                                title="未到访" data-record={index} size="small"></lightning-icon> -->
                                                                <div class="slds-form-element" slot="actions">
                                                                    <label class="slds-checkbox_toggle slds-grid">
                                                                        <input type="checkbox" name="checkbox-toggle-32" value="checkbox-toggle-32" aria-describedby="checkbox-toggle-32" disabled />
                                                                        <span  class="slds-checkbox_faux_container" aria-live="assertive">
                                                                          <span class="slds-checkbox_faux"></span>
                                                                          <span class="slds-checkbox_on">{label.HasVisited}</span>
                                                                          <span class="slds-checkbox_off">{label.NotVisit}</span>
                                                                        </span>
                                                                    </label>
                                                                </div>
                                                            </template>
                                                        </template>
                                                        <template if:false={store.taskStatus}>
                                                            <p class="slds-m-around_small" style="font-weight: bold;text-decoration: underline;color: rgb(0, 161, 224);">
                                                                {label.RegularVisit}
                                                            </p>
                                                            <div class="slds-p-around_medium slds-grid slds-wrap" >
                                                                <div class="slds-col slds-size_1-of-2 slds-p-horizontal_x-small">
                                                                    <lightning-combobox
                                                                        name="productCatalogConfirm"
                                                                        label={label.ProductCatalogConfirm}
                                                                        placeholder={label.Pick}
                                                                        value={store.productCatalogConfirm}
                                                                        options={catalogOptions} dropdown-alignment="auto" required="true" onchange={taskChange}
                                                                        data-record={index}></lightning-combobox>        
                                                                </div>
                                                                <div class="slds-col slds-size_1-of-2 slds-p-horizontal_x-small">
                                                                    <lightning-combobox
                                                                        name="storeMaintain"
                                                                        label={label.StoreMaintain}
                                                                        placeholder={label.Pick}
                                                                        value={store.storeMaintain}
                                                                        options={storeMaintainOptions} dropdown-alignment="auto" required="true" onchange={taskChange}
                                                                        data-record={index}></lightning-combobox>        
                                                                </div>
                                                            </div>

                                                            <p class="slds-m-around_small" style="font-weight: bold;text-decoration: underline;color: rgb(0, 161, 224);">
                                                                {label.IntelligenceGathering}
                                                            </p>
                                                            <div class="slds-p-around_medium slds-grid slds-wrap" >
                                                                <div class="slds-col slds-size_1-of-2 slds-p-horizontal_x-small">
                                                                    <lightning-textarea max-length="131072" label={label.CorporateInformation} data-record={index} value={store.corporateInformation} name="corporateInformation" onchange={taskChange}></lightning-textarea>
                                                                </div>
                                                                <div class="slds-col slds-size_1-of-2 slds-p-horizontal_x-small">
                                                                    <lightning-textarea max-length="131072" label={label.StoreInformation} data-record={index} value={store.storeInformation} name="storeInformation" onchange={taskChange}></lightning-textarea>
                                                                </div>
                                                                <div class="slds-col slds-size_1-of-2 slds-p-horizontal_x-small">
                                                                    <lightning-textarea max-length="131072" label={label.CompetitiveInformation} data-record={index} value={store.competitiveInformation} name="competitiveInformation" onchange={taskChange}></lightning-textarea>
                                                                </div>
                                                            </div>
                                                                <p class="slds-m-around_small" style="font-weight: bold;text-decoration: underline;color: rgb(0, 161, 224);">
                                                                    {label.SamplingInspection}
                                                                    <template if:true={isCanEdit}>
                                                                        <lightning-button variant="brand" label={label.AddSamplingInspection} onclick={addHisenseData} style="margin-left: 10px;
                                                                        margin-top: 10px;" value={store.storeId}>
                                                                        
                                                                        </lightning-button>
                                                                    </template>
                                                                    <template if:false={isCanEdit}>
                                                                        <template if:true={isCanEditSpecialUser}>
                                                                            <lightning-button variant="brand" label={label.AddSamplingInspection} onclick={addHisenseData} style="margin-left: 10px;
                                                                            margin-top: 10px;" value={store.storeId}>
                                                                            
                                                                            </lightning-button>
                                                                        </template>
                                                                    </template>
                                                                </p>
                                                                <lightning-accordion allow-multiple-sections-open="true">
                                                                <lightning-accordion-section name="AA" label={label.SamplingInspection}>
                                                                    
                                                                    <table class="slds-table slds-table_bordered">
                                                                        <tr>
                                                                            <td style="width: 5%;">{label.Order}</td>
                                                                            <td style="width:10%;" class="customRequired">{label.PlacementStatus}</td>
                                                                            <!-- <td>出样标准编号</td> -->
                                                                            <td style="width:20%;">{label.Product}</td>
                                                                            <td style="width:20%;">{label.ProductSeries}</td>
                                                                            
                                                                            <!-- <td>标签价格</td> -->
                                                                            <!-- <td>point(%)</td> -->
                                                                            <td style="width:15%;">{label.ReRe}</td>
                                                                            <td style="width:15%;">{label.SampleImages}</td>
                                                                            <td style="width:5%;">{label.GraphicalCounter}</td>
                                                                            <td style="width:10%;">{label.Action}</td>
                                                                        </tr>
                                                                        <tbody>
                                                                        <template for:each={store.samplingInspectionDataList} for:item="cxjl" for:index="indexSampling">
                                                                            <tr key={cxjl.index}>
                                                                                <!-- 展示情况不为空 有背景颜色 wfc -->
                                                                                <template if:true={cxjl.placementStatusShow}>

                                <select required class="selectInput" onchange={channelChange} style="width: 100%;

                                <lightning-input label={label.CheckInCheckOut_QUERY_STORE} type="search" value={searchInfo} onchange={handleSearchInput} ></lightning-input>

                                </lightning-button>
                            </div>

                        <!-- 出样明细图片特殊权限修改 wfc -->

                                </tr>
                            </table>

                                                    <template if:false={isCanEditSpecialUser}>

                                                    </template>
                                                <!-- </template> -->
                                            </template>

                                            <template if:true={isCanEdit}>
                                                <template if:false={images.sampleImages.Sample_Images__c}>
                                                    <lightning-file-upload
                                                        data-record={index}
                                                        label=""
                                                        name="fileUploader"
                                                        accept={acceptedFormats}
                                                        onuploadfinished={handleUploadFinished}
                                                        style="color: rgba(255,255,255,0);"
                                                        onclick={showPhoto}
                                                        >  
                                                    </lightning-file-upload>
                                                </template>
                                                <template if:true={images.sampleImages.Sample_Images__c}>
                                                    <img src={images.sampleImages.Sample_Images__c} onclick={viewImag} name={images.sampleImages.Sample_Images__c} data-record={index}>
                                                </template>
                                            </template>    
                                        </td>
                                        
                                        <td style="width: 10%;">

                                                margin-top: 10px;" data-record={index}>
                                
                                                </lightning-button>

                                                    </lightning-button>

                                </template>
                                </tbody>

                        </div>
                    </div>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
