<template>
    <lightning-card title="Google Maps Iframe 集成" icon-name="standard:location">
        <div class="slds-p-around_medium">
            <!-- 控制面板 -->
            <div class="slds-grid slds-gutters slds-m-bottom_medium">
                <div class="slds-col slds-size_1-of-3">
                    <lightning-input 
                        type="text" 
                        label="搜索位置" 
                        placeholder="输入地址搜索"
                        value={searchQuery}
                        onchange={handleSearchInput}
                        onkeyup={handleSearchKeyup}>
                    </lightning-input>
                </div>
                <div class="slds-col slds-size_1-of-6">
                    <lightning-button 
                        label="搜索" 
                        variant="brand"
                        onclick={handleSearch}>
                    </lightning-button>
                </div>
                <div class="slds-col slds-size_1-of-6">
                    <lightning-button 
                        label="获取位置" 
                        variant="neutral"
                        onclick={getCurrentLocation}>
                    </lightning-button>
                </div>
                <div class="slds-col slds-size_1-of-6">
                    <lightning-button 
                        label="清除标记" 
                        variant="destructive"
                        onclick={clearAllMarkers}>
                    </lightning-button>
                </div>
            </div>

            <!-- Iframe 容器 -->
            <div class="iframe-container">
                <iframe 
                    src={iframeUrl}
                    class="maps-iframe"
                    frameborder="0"
                    allow="geolocation"
                    sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals">
                </iframe>
            </div>

            <!-- 加载状态 -->
            <template if:true={isLoading}>
                <div class="loading-overlay">
                    <lightning-spinner alternative-text="加载中" size="medium"></lightning-spinner>
                    <p>正在加载地图，请稍候...</p>
                </div>
            </template>

            <!-- 标记列表 -->
            <template if:true={markers.length}>
                <div class="slds-m-top_medium">
                    <h3 class="slds-text-heading_small">📍 标记列表</h3>
                    <div class="slds-grid slds-wrap">
                        <template for:each={markers} for:item="marker" for:index="index">
                            <div key={marker.id} class="slds-col slds-size_1-of-3 slds-p-around_xx-small">
                                <div class="slds-box slds-box_x-small marker-item {index == selectedMarkerIndex ? 'slds-theme_success' : ''}">
                                    <div class="slds-grid slds-gutters">
                                        <div class="slds-col slds-size_4-5">
                                            <strong>{marker.title ? marker.title : '标记' + (index+1)}</strong><br/>
                                            <small>{marker.lat ? marker.lat.toFixed(4) : ''}, {marker.lng ? marker.lng.toFixed(4) : ''}</small>
                                        </div>
                                        <div class="slds-col slds-size_1-5 slds-text-align_right">
                                            <lightning-button-icon 
                                                icon-name="utility:delete"
                                                alternative-text="删除"
                                                title="删除"
                                                data-id={marker.id}
                                                onclick={handleDeleteMarker}>
                                            </lightning-button-icon>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
            </template>
        </div>
    </lightning-card>
</template>
