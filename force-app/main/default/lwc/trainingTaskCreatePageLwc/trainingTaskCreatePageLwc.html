<template>
    <lightning-card variant="Narrow"  title="Training Task" icon-name="standard:task">
        <div style="padding-left: 20px; padding-right: 20px;">
            <div class="slds-grid slds-wrap">
                <template if:true={isPc}>
                    <div class="slds-col slds-size_3-of-8 slds-var-p-right_medium">
                        <lightning-combobox
                            name="Year"
                            label="Year"
                            value={valueYear}
                            placeholder="Select Year"
                            options={optionsYear.data}
                            onchange={handleChangeYear} >
                        </lightning-combobox>
                    </div>
                    <div class="slds-col slds-size_3-of-8 slds-var-p-right_medium">
                        <lightning-combobox
                            name="Month"
                            label="Month"
                            value={valueMonth}
                            placeholder="Select Month"
                            options={optionsMonth.data}
                            onchange={handleChangeMonth} >
                        </lightning-combobox>
                    </div>
                    <div class="slds-col slds-size_2-of-8 slds-var-p-right_medium">
                        <lightning-button 
                            class="slds-float_right slds-var-p-right_large slds-var-p-top_large" 
                            variant="brand" 
                            label="Search" 
                            onclick={handleSearch}>
                        </lightning-button>

                        <lightning-button 
                            class="slds-float_right slds-var-p-right_large slds-var-p-top_large"
                            variant="Neutral" 
                            label="Back" 
                            onclick={handleCancel}>
                        </lightning-button>
                    </div>
                </template>

                <template if:false={isPc}>
                    <div class="slds-col slds-size_1-of-2 slds-var-p-right_medium">
                        <lightning-combobox
                            name="Year"
                            label="Year"
                            value={valueYear}
                            placeholder="Select Year"
                            options={optionsYear.data}
                            onchange={handleChangeYear} >
                        </lightning-combobox>
                    </div>
                    <div class="slds-col slds-size_1-of-2 slds-var-p-right_medium">
                        <lightning-combobox
                            name="Month"
                            label="Month"
                            value={valueMonth}
                            placeholder="Select Month"
                            options={optionsMonth.data}
                            onchange={handleChangeMonth} >
                        </lightning-combobox>
                    </div>
                    <div class="slds-col slds-size_2-of-2 slds-var-p-right_medium">
                        <lightning-button 
                            class="slds-float_right slds-var-p-left_medium lds-var-p-right_medium slds-var-p-top_large" 
                            variant="brand" 
                            label="Search" 
                            onclick={handleSearch}>
                        </lightning-button>
                        <lightning-button 
                            class="slds-float_right slds-var-p-top_large"
                            variant="Neutral" 
                            label="Back" 
                            onclick={handleCancel}>
                        </lightning-button>
                    </div>
                </template>
            </div>
            <h1 class="slds-var-p-top_large slds-var-p-bottom_small" style="font-weight: bold;">Search Results</h1>
            <div class="slds-var-m-bottom_large safari-workaround-anchor">
                <template if:true={isShowSpinner} >
                    <lightning-spinner class="slds-is-fixed" size="medium" variant="brand"></lightning-spinner>
                </template>
                <lightning-datatable
                    class="slds-text-title"
                    key-field="Id"
                    data={trainingData}
                    max-row-selection='1'
                    columns={columns}
                    onrowselection={handleChangeTraining}
                    default-sort-direction={defaultSortDirection}
                    sorted-direction={sortDirection}
                    sorted-by={sortedBy}
                    onsort={onHandleSort}
                >
                </lightning-datatable>
            </div>

            <div class="modal-footer slds-modal__footer">
                <lightning-button class="slds-var-p-around_x-small" disabled={showButton} variant="brand" label="Next" onclick={handleNext}>
                </lightning-button>
            </div>
        </div>
    </lightning-card>
</template>
