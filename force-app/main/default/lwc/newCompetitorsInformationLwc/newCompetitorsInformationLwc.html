<template>
    <template if:true={recordId}>
        <template if:true={isShowSpinner}>
            <lightning-spinner size="medium" variant="brand"></lightning-spinner>
        </template>
        <c-modal-lwc data-id="product selection" static-mode=true title="" show-ok=true show-close=true
            hidden-close-icon=false onok={handleOk}>
            <h1>{label.PromoterDailyReport_DeleteReminder}</h1>
        </c-modal-lwc>
        <template if:true={fields}>
            <template for:each={recordList} for:item="task" for:index="index">
                <lightning-record-edit-form object-api-name="Competitors_Information__c" key={task.index}>
                    <table class="slds-table slds-table_bordered slds-table_fixed-layout slds-resizable marketInsightTable"
                        key={task.index}>
                        
                        <tbody>
                            <!-- <template lwc:if={task.Id}>
                                <tr>
                                    <td class="tdOne">
                                        <span>{fields.Name}</span>
                                    </td>
                                    <td class="tdTwo" colspan="3">
                                        <span>{task.Name}</span>
                                    </td>
                                </tr>
                            </template> -->
                            <tr>
                                <td class="tdOne" style="width: 42%">
                                    <span>{fields.Product_line__c}</span>
                                </td>
                                <td style="width: 58%" colspan="3" class="tdTwo">
                                    <template lwc:if={viewMode}>
                                        <lightning-input variant="label-hidden" value={task.Product_line__c} readonly>
                                        </lightning-input>
                                    </template>
                                    <template lwc:else>
                                            <lightning-input-field variant="label-hidden" field-name='Product_line__c'
                                                data-field-name="Product_line__c" data-index={index} name={index}
                                                value={task.Product_line__c} onchange={handleFieldChange}
                                                onkeydown={handleKeyDown}>
                                            </lightning-input-field>
                                    </template>
                                </td>
                            </tr>
                            
                            <tr>
                                <td class="tdOne" style="width: 42%">
                                    <span>{fields.Brand__c}</span>
                                </td>
                                
                                <td style="width: 58%" colspan="3" class="tdTwo">
                                    
                                    <template lwc:if={viewMode}>
                                        <lightning-input variant="label-hidden" value={task.Brand__c} readonly>
                                        </lightning-input>
                                    </template>
                                    <template lwc:else>
                                        
                                            <lightning-input-field variant="label-hidden" field-name='Brand__c'
                                                data-field-name="Brand__c" data-index={index} name={index}
                                                value={task.Brand__c} onchange={handleFieldChange}
                                                onkeydown={handleKeyDown} read-only={viewMode}>
                                            </lightning-input-field>
                                        
                                    </template>
                                </td>
                            </tr>
                            <tr if:true={task.Display_Status__c}>
                                <td style="width: 35%;">
                                    <span>{fields.Display_Status__c}</span>
                                </td>
                                <td style="width: 20%;">
                                        <lightning-input 
                                        variant="label-hidden"
                                        field-name='Display_Status__c'
                                        data-field-name="Display_Status__c"
                                        data-index={index}
                                        name={index}
                                        checked={task.Display_Status__c}
                                        onchange={handleFieldChange}
                                        onkeydown={handleKeyDown}
                                        type="toggle"
                                        message-toggle-inactive="No"
                                        message-toggle-active="Yes"
                                        disabled={viewMode}>
                                    </lightning-input>
                                </td>
                                <td style="width: 35%;">
                                    <span>{fields.Quantity_Of_Exhibits__c}</span>
                                </td>
                                <td style="width: 20%;">
                                    <template lwc:if={viewMode}>
                                        <lightning-input variant="label-hidden" value={task.Quantity_Of_Exhibits__c} readonly>
                                        </lightning-input>
                                    </template>
                                    <template lwc:else>
                                            <lightning-input-field variant="label-hidden" field-name='Quantity_Of_Exhibits__c'
                                                data-field-name="Quantity_Of_Exhibits__c" data-index={index} name={index}
                                                value={task.Quantity_Of_Exhibits__c} onchange={handleFieldChange}
                                                onkeydown={handleKeyDown}>
                                            </lightning-input-field>
                                    </template>
                                </td>
                            </tr>
                            <tr if:false={task.Display_Status__c}>
                                <td class="tdOne" style="width: 30%;">
                                    <span>{fields.Display_Status__c}</span>
                                </td>
                                <td style="width: 70%;" class="tdTwo" colspan="3">
                                        <lightning-input 
                                        variant="label-hidden"
                                        field-name='Display_Status__c'
                                        data-field-name="Display_Status__c"
                                        data-index={index}
                                        name={index}
                                        value={task.Display_Status__c}
                                        onchange={handleFieldChange}
                                        onkeydown={handleKeyDown}
                                        type="toggle"
                                        message-toggle-inactive="No"
                                        message-toggle-active="Yes"
                                        disabled={viewMode}>
                                    </lightning-input>
                                    <!-- checked={item.Placement_Status__c} -->
                                </td>
                            </tr>
                            <tr>
                                <td class="tdOne" style="width: 30%;">
                                    <span>{fields.Display_Stand__c}</span>
                                </td>
                                <td style="width: 70%;" class="tdTwo" colspan="3">
                                        <lightning-input 
                                        variant="label-hidden"
                                        field-name='Display_Stand__c'
                                        data-field-name="Display_Stand__c"
                                        data-index={index}
                                        name={index}
                                        checked={task.Display_Stand__c}
                                        onchange={handleFieldChange}
                                        onkeydown={handleKeyDown}
                                        type="toggle"
                                        message-toggle-inactive="No"
                                        message-toggle-active="Yes"
                                        disabled={viewMode}>
                                    </lightning-input>
                                    <!-- checked={item.Placement_Status__c} -->
                                </td>
                            </tr>
                            <tr>
                                <td class="tdOne" style="width: 30%;">
                                    <span>{fields.Demo_Video__c}</span>
                                </td>
                                <td style="width: 70%;" class="tdTwo" colspan="3">
                                        <lightning-input 
                                        variant="label-hidden"
                                        field-name='Demo_Video__c'
                                        data-field-name="Demo_Video__c"
                                        data-index={index}
                                        name={index}
                                        checked={task.Demo_Video__c}
                                        onchange={handleFieldChange}
                                        onkeydown={handleKeyDown}
                                        type="toggle"
                                        message-toggle-inactive="No"
                                        message-toggle-active="Yes"
                                        disabled={viewMode}>
                                    </lightning-input>
                                    <!-- checked={item.Placement_Status__c} -->
                                </td>
                            </tr>
                            <tr>
                                <td class="tdOne" style="width: 30%;">
                                    <span>{fields.POP__c}</span>
                                </td>
                                <td style="width: 70%;" class="tdTwo" colspan="3">
                                        <lightning-input 
                                        variant="label-hidden"
                                        field-name='POP__c'
                                        data-field-name="POP__c"
                                        data-index={index}
                                        name={index}
                                        checked={task.POP__c}
                                        onchange={handleFieldChange}
                                        onkeydown={handleKeyDown}
                                        type="toggle"
                                        message-toggle-inactive="No"
                                        message-toggle-active="Yes"
                                        disabled={viewMode}>
                                    </lightning-input>
                                    <!-- checked={item.Placement_Status__c} -->
                                </td>
                            </tr>
                            <!-- Attachment -->
                            <tr>
                                <td class="tdOne">
                                    <span>{label.INSPECTION_REPORT_ATTACHMENT}</span>
                                </td>
                                <td class="tdTwo" colspan="3">
                                    <c-upload-files2-lwc parent-id={recordId} record-id={task.Id} data-index={task.index}
                                        onselectfiles={handleSelectFiles} disabled-delete={viewMode}
                                        disabled-upload={viewMode}></c-upload-files2-lwc>
                                </td>
                            </tr>

                            <!-- Action -->
                            <template if:false={viewMode}>
                                <tr>
                                    <td class="tdOne">
                                        <span>Action</span>
                                    </td>
                                    <td class="tdTwo" colspan="3">

                                        <a style="margin-right: 3rem;">
                                            <lightning-icon variant="success" icon-name="utility:dash" size="x-small"
                                                title="" data-index={index} onclick={deleteCompetitorsInformation}>
                                            </lightning-icon>
                                            <span class="slds-assistive-text"></span>
                                        </a>
                                        <a style="margin-right: 3rem;">
                                            <lightning-icon variant="success" icon-name="utility:add" size="x-small"
                                                title="" data-index={index} onclick={addCompetitorsInformation}>
                                            </lightning-icon>
                                            <span class="slds-assistive-text"></span>
                                        </a>
                                    </td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </lightning-record-edit-form>
            </template>
        </template>

    </template>
</template>
