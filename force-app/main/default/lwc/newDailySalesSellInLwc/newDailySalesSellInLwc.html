<template>
    <template if:true={recordId}>
        <template if:true={isShowSpinner}>
            <lightning-spinner size="medium" variant="brand"></lightning-spinner>
        </template>
        <c-modal-lwc data-id="product selection" static-mode=true title="" show-ok=true show-close=true
            hidden-close-icon=false onok={handleOk}>
            <h1>{label.PromoterDailyReport_DAILY_SALES}</h1>
        </c-modal-lwc>
        <template if:true={fields}>
            <template for:each={recordList} for:item="item" for:index="index">
                <lightning-record-edit-form object-api-name="Daily_Sales_Sell_In__c" key={item.index}>
                    <table class="slds-table slds-table_bordered slds-table_fixed-layout slds-resizable marketInsightTable"
                        key={item.index}>
                        
                        <tbody>
                            <template lwc:if={item.Id}>
                                <tr>
                                    <td class="tdOne">
                                        <span>{label.PromoterDailyReport_NO}</span>
                                    </td>
                                    <td class="tdTwo">
                                        <span>{item.Name}</span>
                                    </td>
                                </tr>
                            </template>
                            <tr>
                                <td class="tdOne">
                                    <span style="color:red">*</span>
                                    <!-- {label.PromoterDailyReport_PRODUCT} -->
                                    {fields.Product__c}
                                </td>
                                <td class="tdTwo">
                                    <!-- <lightning-input-field field-name="Product__c" variant="label-hidden"
                                        value={item.Product__c} onchange={handleReportChange2}
                                        data-recordid={index} required
                                        disabled={recordDisabled}>
                                    </lightning-input-field> -->
                                    <template if:true={viewMode}>
                                        <lightning-input-field data-field-name="Product__c" field-name="Product__c" variant="label-hidden"
                                        value={item.Product__c} onchange={handleFieldChange}
                                        data-index={index} required
                                        read-only={viewMode}></lightning-input-field>
                                    </template>
                                    <template if:false={viewMode}>
                                        <template if:true={item.Product__r}>
                                            <c-lookup-lwc 
                                                data-field-name="Product__c"
                                                obj-name="Product__c" 
                                                op={lookupFilter} 
                                                data-index={index}
                                                search-key={item.Product__r.Name}
                                                required 
                                                onlookupupdate={handleChangeProductOption}
                                                read-only={viewMode}>
                                            </c-lookup-lwc>
                                        </template>
                                        <template if:false={item.Product__r}>
                                            <c-lookup-lwc 
                                                data-field-name="Product__c"
                                                obj-name="Product__c" 
                                                op={lookupFilter} 
                                                data-index={index}
                                                required 
                                                onlookupupdate={handleChangeProductOption}
                                                read-only={viewMode}>
                                            </c-lookup-lwc>
                                        </template>
                                    </template>
                                </td>
                            </tr>

                            <!-- <tr>
                                <td class="tdOne">
                                    <span style="color:red">*</span>
                                    {label.PromoterDailyReport_UNIT_PRICE}
                                </td>
                                <td class="tdTwo">
                                    <lightning-input-field data-field-name="Price__c" field-name="Price__c" variant="label-hidden"
                                    value={item.Price__c} onchange={handleFieldChange}
                                    data-index={index} required
                                    read-only={viewMode}></lightning-input-field>
                                </td>
                            </tr> -->

                            <tr>
                                <td class="tdOne">
                                    <span style="color:red">*</span>
                                    {label.PromoterDailyReport_QUANTITY}
                                    <!-- {retailNumberInfo.Number__c} -->
                                </td>
                                <td class="tdTwo">
                                    <lightning-input-field data-field-name="Number__c" field-name="Number__c" variant="label-hidden"
                                        value={item.Number__c} onchange={handleFieldChange}
                                        data-index={index} required
                                        read-only={viewMode}>
                                    </lightning-input-field>
                                </td>
                            </tr>

                            <tr>
                                <td class="tdOne">
                                    <span style="color:red">*</span>
                                    {fields.TotalPrice__c}
                                </td>
                                <td class="tdTwo">
                                    <lightning-input-field data-field-name="TotalPrice__c" field-name="TotalPrice__c" variant="label-hidden"
                                    value={item.TotalPrice__c} onchange={handleFieldChange}
                                    data-index={index} required
                                    read-only={viewMode}></lightning-input-field>
                                </td>
                            </tr>

                            <!-- <tr>
                                <td class="tdOne">
                                    {fields.TotalPrice__c}
                                </td>
                                <td class="tdTwo">
                                    <lightning-input-field data-field-name="TotalPrice__c" field-name="TotalPrice__c" variant="label-hidden"
                                        value={item.TotalPrice__c} 
                                        data-index={index}
                                        read-only=true>
                                    </lightning-input-field>
                                </td>
                            </tr> -->

                            <!-- Attachment -->
                            <tr>
                                <td class="tdOne">
                                    <span>{label.INSPECTION_REPORT_ATTACHMENT}</span>
                                </td>
                                <td class="tdTwo">
                                    <c-upload-files2-lwc parent-id={recordId} record-id={item.Id} data-index={item.index}
                                        onselectfiles={handleSelectFiles} disabled-delete={viewMode}
                                        disabled-upload={viewMode}></c-upload-files2-lwc>
                                </td>
                            </tr>

                            <!-- Action -->
                            <template if:false={viewMode}>
                                <tr>
                                    <td class="tdOne">
                                        <span>Action</span>
                                    </td>
                                    <td class="tdTwo">

                                        <a style="margin-right: 3rem;">
                                            <lightning-icon variant="success" icon-name="utility:dash" size="x-small"
                                                title="" data-index={index} onclick={deleteCompetitorsInformation}>
                                            </lightning-icon>
                                            <span class="slds-assistive-text"></span>
                                        </a>
                                        <a style="margin-right: 3rem;">
                                            <lightning-icon variant="success" icon-name="utility:add" size="x-small"
                                                title="" data-index={index} onclick={addDssi}>
                                            </lightning-icon>
                                            <span class="slds-assistive-text"></span>
                                        </a>
                                    </td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </lightning-record-edit-form>
            </template>
        </template>

    </template>
</template>
