<template>

    <template if:true={isShowSpinner}>
        <lightning-spinner size="medium" variant="brand"></lightning-spinner>
    </template>
    <template for:each={recordList} for:item="item" for:index="index">
        <table class="slds-table slds-table_bordered slds-table_fixed-layout slds-resizable marketInsightTable"
            key={item.index}>
            <tbody>
                <template if:false={isNew}>
                    <!-- Foot Count Inquiry No. -->
                    <tr>
                        <td class="tdOne">
                            <span>{fields.Name}</span>
                        </td>
                        <td class="tdTwo">
                            <lightning-input variant="label-hidden" value={item.Name} readonly>
                            </lightning-input>
                        </td>
                    </tr>
                </template>

                <!--1 How many customers walk through your store’s doors today? -->
                <tr>
                    <td class="tdOne">
                        <span>{label.question1}</span>
                    </td>
                    <td class="tdTwo">
                        <template lwc:if={viewMode}>
                            <lightning-input variant="label-hidden" value={item.Question1__c} readonly>
                            </lightning-input>
                        </template>
                        <template lwc:else>
                            <lightning-record-edit-form object-api-name="FootCountInquiry__c" density="Compact">
                                <lightning-input-field variant="label-hidden" field-name='Question1__c'
                                    data-field-name="Question1__c" data-id={index} data-index={index} name={index}
                                    value={item.Question1__c} onchange={inputChangeHandler}>
                                </lightning-input-field>
                            </lightning-record-edit-form>
                        </template>
                    </td>
                </tr>

                <!--2 How many customers have you interacted with, more or less? -->
                <tr>
                    <td class="tdOne">
                        <span>{label.question2}</span>
                    </td>
                    <td class="tdTwo">
                        <lightning-input variant="label-hidden" field-name='Question2__c' data-field-name="Question2__c"
                            data-id={index} data-index={index} name={index} value={item.Question2__c}
                            onchange={inputChangeHandler} type="number" read-only={viewMode}>
                        </lightning-input>
                    </td>
                </tr>

                <!--3 How many of the customers that you have interacted with bought your products? -->
                <tr>
                    <td class="tdOne">
                        <span>{label.question3}</span>
                    </td>
                    <td class="tdTwo">
                        <lightning-input variant="label-hidden" field-name='Question3__c' data-field-name="Question3__c"
                            data-id={index} data-index={index} name={index} value={item.Question3__c}
                            onchange={inputChangeHandler} type="number" read-only={viewMode}>
                        </lightning-input>
                    </td>
                </tr>
                <!--4 How many of those you interacted with bought competitor product? -->
                <tr>
                    <td class="tdOne">
                        <span>{label.question4}</span>
                    </td>
                    <td class="tdTwo">
                        <lightning-input variant="label-hidden" field-name='Question4__c' data-field-name="Question4__c"
                            data-id={index} data-index={index} name={index} value={item.Question4__c}
                            onchange={inputChangeHandler} type="number" read-only={viewMode}>
                        </lightning-input>
                    </td>
                </tr>
                <!--5 Of all those who walked into store, how many bought competitor product?? -->
                <tr>
                    <td class="tdOne">
                        <span>{label.question5}</span>
                    </td>
                    <td class="tdTwo">
                        <lightning-input variant="label-hidden" field-name='Question5__c' data-field-name="Question5__c"
                            data-id={index} data-index={index} name={index} value={item.Question5__c}
                            onchange={inputChangeHandler} type="number" read-only={viewMode}>
                        </lightning-input>
                    </td>
                </tr>
                <!--6 What was the best selling competitor product today? -->
                <tr>
                    <td class="tdOne">
                        <span>{label.question6}</span>
                    </td>
                    <td class="tdTwo">
                        <lightning-input variant="label-hidden" field-name='Question6__c' data-field-name="Question6__c"
                            data-id={index} data-index={index} name={index} value={item.Question6__c}
                            onchange={inputChangeHandler} type="text" read-only={viewMode}>
                        </lightning-input>
                    </td>
                </tr>



            </tbody>
        </table>
    </template>


</template>
