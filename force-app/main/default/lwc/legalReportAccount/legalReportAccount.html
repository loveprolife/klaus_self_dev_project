<template>
    <div class="slds-modal__container">
        <template if:true={isShowDifferencesSpinner}>
            <lightning-spinner alternative-text="Loading" size="medium" variant="brand" style="z-index: 99;"></lightning-spinner>
        </template>
        <div class="slds-modal__header">
            <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
                    title="Close" onclick={handleCancel}>
                <lightning-icon icon-name="utility:close" alternative-text="close" size="small"></lightning-icon>
                <span class="slds-assistive-text">Close</span>
            </button>
            <h2 class="slds-text-heading--medium">
                File Upload
            </h2>
        </div>

        <div class="slds-modal__content slds-var-p-around_medium">
            <lightning-file-upload class="slds-align_absolute-center slds-text-heading_medium"
                label=""
                name="fileUploader"
                accept={acceptedFormats}
                record-id={recordId}
                onuploadfinished={handleUploadFinishedEvent}
                multiple>
            </lightning-file-upload>

            <div class="slds-var-p-around_large">
                <a href={label.Legal_Report_Template_Download_URL} target="_blank">
                    <lightning-icon variant="success" icon-name="utility:download" class="slds-icon slds-icon_small"
                        size="small" alternative-text="large" style="margin-right: 0.75rem;">
                    </lightning-icon>
                    {label.Legal_Report_Template_Download}
                </a>
                <div class="slds-var-m-top_small slds-text-color_error">{label.Legal_Report_Template_Download_Tips}</div>
            </div>
        </div>

        <div class="modal-footer slds-modal__footer">
            <lightning-button
                variant="brand-outline"
                label="Cancel"
                onclick={handleCancel}
                class="slds-var-m-left_x-small"
            ></lightning-button>
        </div>
    </div>
    
</template>
