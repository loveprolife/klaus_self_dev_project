<template>
    <section class="slds-card slds-p-around_medium">
        <header class="slds-m-bottom_small">
            <h2 class="slds-text-heading_medium">Get SSO Login Token</h2>
            <p class="slds-text-body_small slds-text-color_weak">通过嵌入外部站点并使用 postMessage 接收 ssoLoginToken</p>
        </header>

        <template if:true={error}>
            <div class="slds-notify slds-notify_alert slds-theme_error slds-m-bottom_small" role="alert">
                <span class="slds-assistive-text">error</span>
                <h3>{error}</h3>
            </div>
        </template>

        <template if:true={token}>
            <div class="slds-notify slds-notify_alert slds-theme_success slds-m-bottom_small" role="status">
                <span class="slds-assistive-text">success</span>
                <h3>已获取 ssoLoginToken</h3>
            </div>
            <div class="slds-box slds-theme_default slds-m-bottom_medium">
                <div class="slds-text-title_caps slds-m-bottom_xx-small">ssoLoginToken</div>
                <code class="token">{token}</code>
            </div>
        </template>

        <template if:true={isLoading}>
            <div class="slds-m-bottom_small slds-text-color_weak">正在加载外部页面...</div>
        </template>

        <div class="iframe-wrapper slds-m-top_small">
            <iframe src="https://mail.hisense.com" title="mail.hisense.com" onload={handleIframeLoad}></iframe>
        </div>

        <footer class="slds-m-top_small slds-text-body_small slds-text-color_weak">
            注意：由于浏览器同源策略，父页面无法直接读取 iframe 的 cookie。需要对方页面通过 window.postMessage 主动回传 token。
        </footer>
    </section>
</template>
