<template>
    <div class=" slds-grid slds-grid_reverse">
        <template if:true={showLoadingSpinner}>
            <lightning-spinner alternative-text="Uploading now"></lightning-spinner>
        </template>
        <div class="slds-col">
            <lightning-button label="Import" onclick={handleImport} ></lightning-button>
        </div>
        <div class="slds-col">
            <lightning-button label="New" onclick={handleNew} class="slds-var-m-right_small"></lightning-button>
        </div>
        <template if:true={showSubmit}>
            <div class="slds-col">
                <lightning-button label="Submit" onclick={handleSubmit} class="slds-var-m-right_small"></lightning-button>
            </div>
        </template>
        <template if:true={showSubmit}>
            <div class="slds-col">
                <span>{label.Store_Detail_Submit_Tips}</span>
            </div>
        </template>


        <!-- <div class="slds-col slds-size_2-of-4">
            <template if:true={showSubmit}>
                <span>{label.Store_Detail_Submit_Tips}</span>
            </template>
        </div>
        <div class="slds-col slds-size_2-of-4 slds-clearfix">
            <div class="slds-float_right">
                <template if:true={showSubmit}>
                    <lightning-button label="Submit" onclick={handleSubmit} class="slds-var-m-right_small"></lightning-button>
                </template>
                <lightning-button label="New" onclick={handleNew} class="slds-var-m-right_small"></lightning-button>
                <lightning-button label="Import" onclick={handleImport} ></lightning-button>
            </div>
        </div> -->
    </div>
    <!-- 导入页面 -->
    <template if:true={showImport}>
        <section role="dialog" tabindex="-1" aria-labelledby="modal-heading-01" aria-modal="true" aria-describedby="modal-content-id-1" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <div class="slds-clearfix">
                    <div class="slds-float_right slds-var-p-bottom_small">
                        <lightning-icon 
                            icon-name='utility:close' 
                            alternative-text='close' 
                            size='small' 
                            title='close'
                            class="my-icon"
                            onclick={handleCloseDialog}
                        ></lightning-icon>
                    </div>
                </div>
                <template if:true={showLoadingSpinner}>
                    <lightning-spinner alternative-text="Uploading now"></lightning-spinner>
                </template>
                <div class="slds-modal__header">
                    <h2 class="slds-text-heading_medium">
                        {objectLoad} Import
                    </h2>
                </div>
                <div class="slds-modal__content">
                    <div class="slds-align_absolute-center slds-var-m-around_large">
                        <lightning-input 
                            type="file"
                            name="file uploader" 
                            onclick={handleFilesClick} 
                            onchange={handleFilesChange} 
                            accept={acceptedType}
                            ></lightning-input>
                    </div>
                    <div class="star-container slds-dl_horizontal slds-media_center slds-grid_align-center" >
                        <template if:true={isHaveFile}>
                            <div class="slds-text-color_success slds-var-p-top_small slds-var-p-bottom_small">{fileName}</div>
                        </template>
                        <template if:false={isHaveFile}>
                            <div class="slds-text-color_error slds-var-p-top_small slds-var-p-bottom_small">{fileName}</div>
                        </template>
                    </div>
                </div>
                <div class="slds-modal__footer">
                    <div class="slds-align_absolute-center">
                        <lightning-button 
                            label='Cancel' 
                            onclick={back} 
                            variant="brand-outline"
                            class="slds-var-p-left_small"
                            >
                        </lightning-button>
                        <lightning-button 
                            label='Import File' 
                            onclick={handleSave} 
                            variant="brand"
                            class="slds-var-p-left_small"
                            >
                        </lightning-button>
                    </div>
                </div>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

    <!-- 新建页面 -->
    <template if:true={showNew}>
        <div>
            <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
                <template if:true={showLoadingSpinner}>
                    <lightning-spinner alternative-text="Uploading now"></lightning-spinner>
                </template>
                <div class="slds-modal__container">
                    <!-- Modal/Popup Header -->
                    <div class="slds-modal__header">
                        <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
                                title="Close" onclick={closeNewModal}>
                            <lightning-icon icon-name="utility:close" alternative-text="close" size="small"></lightning-icon>
                            <span class="slds-assistive-text">Close</span>
                        </button>
                        <h2 class="slds-text-heading_medium">New Store Detail</h2>
                    </div>

                    <!-- Modal/Popup Body -->
                    <div class="slds-modal__content slds-var-p-around_large">
                        <!-- 在这里添加您需要的输入字段 -->
                        <lightning-record-edit-form object-api-name="Store_Detail__c" layout-type="Comfy">
                            <lightning-input-field
                                class="slds-var-m-top_small"
                                field-name="Store__c" 
                                data-field-name="Store__c"
                                onchange={handleStoreChange}
                                value={storeId}
                                required>
                            </lightning-input-field>
                            <lightning-input 
                                class="slds-var-m-top_small slds-var-m-left_x-small"
                                type="text"
                                min="0"
                                label="Product Model" 
                                value={productModel}
                                required
                                readonly>
                            </lightning-input>
                            <lightning-input-field 
                                class="slds-var-m-top_small"
                                field-name="Number__c" 
                                data-field-name="Number__c"
                                onchange={handleNumberChange}
                                value={numberData}
                                required>
                            </lightning-input-field>
                            <lightning-input-field 
                                class="slds-var-m-top_small"
                                field-name="Priority__c" 
                                data-field-name="Priority__c"
                                onchange={handlePriorityChange}
                                value={priorityData}
                                >
                            </lightning-input-field>
                        </lightning-record-edit-form>
                    </div>

                    <!-- Modal/Popup Footer -->
                    <div class="slds-modal__footer">
                        <div style="text-align: center;">
                            <lightning-button class="slds-var-p-right_medium" label="Cancel" onclick={closeNewModal}></lightning-button>
                            <lightning-button class="slds-var-p-right_medium" label="Save & New" onclick={handleSaveAndNew}></lightning-button>
                            <lightning-button variant="brand" label="Save" onclick={handleSaveStoreDetail}></lightning-button>
                        </div>
                    </div>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </div>
    </template>
</template>
