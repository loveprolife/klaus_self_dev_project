        <h1>{modalMsg}</h1>

                            <span class="slds-truncate slds-text-heading_medium"></span>
                        </h2>
                    </div>
                    <div class="slds-no-flex" part="actions">
                        <slot name="actions">
                            <div slot="actions">

                                    <button class="slds-button slds-button_brand" onclick={handleSubmit}>{label.INSPECTION_REPORT_SUBMIT}</button> -->

                                    <template if:true={showSubmit}>

                                        </lightning-button>
                                    </template>
                                </div>
                            </div>
                        </slot>
                    </div>
