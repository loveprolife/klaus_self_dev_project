                                                                <template if:true={day.isWeekend}>
                                                                    <td class="slds-border_right slds-border_bottom" style="border-color: rgb(217, 219, 221);width: 1.7%;text-align: center; background-color: rgb(217 219 221 / 48%);" 
                                                                        name={day.taskAndDate}  data-status={day.status1} abbr ={plans.isBackup} key={day.index} 
                                                                        data-task={day.taskId}
                                                                        data-isplan={day.isPlan}
                                                                        onclick={createInspectionShopTask}
                                                                        data-col={day.index}
                                                                        data-tempid={day.tempId}
                                                                        onmouseover={handleMouseOver}
                                                                        >
                                                                        <!-- {day.status1} -->
                                                                        <template if:true={day.isPlan}>
                                                                            <img src={IconGreen} width="20px" name={day.taskAndDate}  data-status={day.status1} abbr ={plans.isBackup} key={day.index} 
                                                                                data-task={day.taskId}
                                                                                data-isplan={day.isPlan}
                                                                                onclick={createInspectionShopTask}
                                                                                ondblclick={showTooltipViw}
                                                                                data-col={day.index}
                                                                                data-tempid={day.tempId}
                                                                                onmouseover={handleMouseOver}
                                                                            >
                                                                        </template>
                                                                        <template if:true={day.isActual}>
                                                                            <img src={IconBlue} width="20px" name={day.taskAndDate}  data-status={day.status1} abbr ={plans.isBackup} key={day.index}
                                                                                data-task={day.taskId}
                                                                                data-isplan={day.isPlan}
                                                                                onclick={createInspectionShopTask}
                                                                                ondblclick={showTooltipViw}
                                                                                data-col={day.index}
                                                                                data-tempid={day.tempId}
                                                                                onmouseover={handleMouseOver}
                                                                            >
                                                                        </template>
                                                                        <template if:true={day.isUnscheduled}>
                                                                            <img src={IconOrange} width="20px" name={day.taskAndDate}  data-status={day.status1} abbr ={plans.isBackup} key={day.index}
                                                                                data-task={day.taskId}
                                                                                data-isplan={day.isPlan}
                                                                                onclick={createInspectionShopTask}
                                                                                ondblclick={showTooltipViw}
                                                                                data-col={day.index}
                                                                                data-tempid={day.tempId}
                                                                                onmouseover={handleMouseOver}
                                                                            >
                                                                        </template>
                                                                    </td>
                                                                </template>  
                                                            </template>
                                                            
                                                        </template>
                                                        <td class="slds-border_right slds-border_bottom slds-var-p-left_xx-small" style="width: 6%;border-color: rgb(217, 219, 221);text-align: center;" >
                                                            {plans.plannedQuantity}
                                                        </td>
                                                        <td class="slds-border_right slds-border_bottom slds-var-p-left_xx-small" style="width: 5%;border-color: rgb(217, 219, 221);text-align: center;" >
                                                            {plans.actualQuantity}/{plans.unscheduledQuantity}
                                                        </td>
                                                    </tr>
                                                </template>
                                            </tbody>
                                        </table>
                                    </div>
                                </template>
                            </div>
                        </template>
                    </div>
                </div>
            </div>
        </template>
    </div>

     <!-- 图片预览 -->
    <template if:true={isViewImgOpen}>
        <section role="dialog" tabindex="-1" aria-labelledby="modal-heading-01" aria-modal="true" aria-describedby="modal-content-id-1" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container ">
                <div class="slds-modal__header">
                    <h2 class="slds-text-heading--medium">
                        {label.ViewImage}
                    </h2>
                </div>
                <div class="slds-modal__content modalBody menu">
                        <!-- <lightning-formatted-rich-text value={viewImg}></lightning-formatted-rich-text>  -->
                        <div style="border: 1px solid rgb(221, 219, 218);margin-left: 10px;margin-right: 10px;margin-top: 10px;">
                        <lightning-card title={label.Preview} icon-name="utility:image">
                            <img src={viewImg}> 
                        </lightning-card>
                    </div>
                </div>
                <div class="modal-footer slds-modal__footer slds-size_1-of-1">
                    <lightning-button slot="action" label={label.Return} onclick={closeViewModal} class="slds-p-around_x-small"></lightning-button>
                </div>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

    <!-- 查看/编辑图片 -->
    <template if:true={showPhotoPage}>
        <section role="dialog" tabindex="-1" aria-labelledby="modal-heading-01" aria-modal="true" aria-describedby="modal-content-id-1" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container ">
                
                <div class="slds-modal__header">
                    <h2 class="slds-text-heading--medium">
                        {label.ViewImage}
                    </h2>
                </div>

                <div class="slds-modal__content modalBody menu">
                    <div class="slds-scrollable slds-col slds-size_2-of-2 slds-var-p-horizontal_x-small" style="width: 100%;overflow-y: scroll;margin-top: 10px;">
                        <table class="slds-table slds-table_bordered">
                            <tr>
                                <td style="width: 5%;">{label.Order}</td>
                                <td style="width:65%;">{label.Description}</td>
                                <td style="width:30%;">{label.Picture}</td>
                            </tr>
                        </table>
                    </div>    
                    <div class="slds-scrollable slds-col slds-size_2-of-2 slds-var-p-horizontal_x-small" style={heightTable}>
                        <table class="slds-table slds-table_bordered">
                            <tbody>
                            <template for:each={sampleImages} for:item="images" for:index="index">
                                <tr key={images.index}>
                                    <td style="width: 5%;">
                                        {images.index}    
                                    </td>

                                    <td style="width: 65%;">
                                        <lightning-textarea max-length="131072" data-record="ReRe__c" value={images.sampleImages.ReRe__c} disabled></lightning-textarea>  
                                    </td>

                                    <td style="width: 30%;">
                                        <img src={images.sampleImages.Sample_Images__c} onclick={viewImag} name={images.sampleImages.Sample_Images__c} data-record={index}>  
                                    </td>
                                </tr>
                            </template>
                            </tbody>
                        </table>
                    </div>    
                </div>
                <div class="modal-footer slds-modal__footer slds-size_1-of-1">
                    <lightning-button slot="action" label={label.Return} onclick={closeviewImgMethod} class="slds-p-around_x-small"></lightning-button>
                </div>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

    <!-- 是否保存确认页面 -->
    <template if:true={showCheckSave}>
        <section role="dialog" tabindex="-1" aria-labelledby="modal-heading-01" aria-modal="true" aria-describedby="modal-content-id-1" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container ">
                <template if:true={isShowSpinner} >
                    <lightning-spinner alternative-text="Loading" size="medium" variant="brand"></lightning-spinner>
                </template>
                <div class="slds-modal__header">
                    <h2 class="slds-text-heading--medium">
                        {label.SaveTheChanges}
                    </h2>
                </div>
                <div class="slds-modal__content modalBody menu">
                    <div class="slds-align_absolute-center slds-text-heading_medium" style="height:100px;">
                        {label.IsSaveTheChanges}
                    </div>   
                </div>
                <div class="modal-footer slds-modal__footer slds-size_1-of-1">
                    <lightning-button slot="action" label={label.AbortSavingJump} onclick={notSave} class="slds-p-around_x-small"></lightning-button>
                    <lightning-button slot="action" variant="brand" label={label.SavingJump} onclick={saveAndJump} class="slds-p-around_x-small"></lightning-button>
                </div>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

    <!-- 创建任务页面 -->
    <div if:true={showTooltipFlag} class="custom-tooltip" style={modalOpenStyle}>
        <template if:true={isShowNoteSpinner} >
            <lightning-spinner alternative-text="Loading" size="xx-small"></lightning-spinner>
        </template>
        <button title="Close" onclick={closeModal} style="position: absolute; top: 0px; right: 0px; z-index: 1;">
                <lightning-icon icon-name="utility:close" alternative-text="close" size="small"></lightning-icon>
                <span class="slds-assistive-text">Close</span>
        </button>
        <div class="slds-modal__header">
            <h2 class="slds-text-heading_medium">{label.Add_Note}</h2>
        </div>
        <div class="slds-modal__content slds-var-p-around_small">
            <lightning-record-edit-form object-api-name="Inspection_Shop_Task__c" layout-type="Compact">
                <div class="slds-grid slds-grid_vertical" id="modal-content-id-2">
                    <div class="slds-col">
                        <lightning-input-field field-name="Shop__c" data-id="disableData" onchange={handleFiledChange} value={task.Shop__c} disabled> </lightning-input-field>   
                    </div> 
                    <div class="slds-col">
                        <lightning-input-field field-name="Inspection_Date__c" data-id="disableData" onchange={handleFiledChange} value={task.Inspection_Date__c} disabled> </lightning-input-field>   
                    </div>
                    <div class="slds-col">
                        <lightning-input-field field-name="Note__c" data-id="disableData" onchange={handleFiledChange} value={task.Note__c} disabled={showDisable}> </lightning-input-field>   
                    </div>
                </div>
            </lightning-record-edit-form>
        </div>
        <template if:true={showButton}>
            <div class="modal-footer slds-modal__footer slds-size_1-of-1">
                <lightning-button slot="action" variant="brand" label={label.Save} onclick={saveNote} class="slds-p-around_x-small"></lightning-button>
            </div>
        </template>
    </div>
</template>
