<template>
    <!-- Body Card -->
    <template if:true={showAllPage}>
        <!-- Loading -->
        <template if:true={isShowSpinner} >
            <lightning-spinner size="medium" variant="brand"></lightning-spinner>
        </template>
         <div style="margin-bottom: 15px;"></div>
        <div class="container full-height">
            <div class="slds-modal__header" style="padding: 0px;">
                <lightning-card class="pageHeader" title={label.INSPECTION_REPORT_TITLE} icon-name="standard:article">
                    <div slot="actions">
                        <template if:true={isShowSubmit}>
                            <div style="margin-left:5px;display:inline-block;">
                                <button class="slds-button slds-button_brand"
                                    onclick={handleSubmit}>{label.INSPECTION_REPORT_SUBMIT}</button>
                            </div>
                        </template>
                        <!-- <template if:false={isShowSubmit}> -->
                            <!-- <div style="margin-left:5px;display:inline-block;">
                                <button class="slds-button slds-button_brand"
                                    onclick={handleDownLoadPDF}>PDF</button>
                            </div> -->
                        <!-- </template> -->
                    </div>
                </lightning-card>
            </div>
            <div class="slds-modal__content slds-scrollable_y" style={styleContent}>
                <lightning-card>
                    <!-- Report Information -->
                    <div class="slds-var-m-right_small slds-var-m-left_small">
                        <lightning-record-edit-form object-api-name="Daily_Inspection_Report__c" layout-type="Comfy">
                            <table class="slds-table_fixed-layout slds-resizable report-head"
                                style="width: 100%; table-layout:fixed; word-wrap:break-word; position: relative; z-index: 1;">
                                <!-- <tr>
                                    <td style="width: 33%;"></td>
                                    <td></td>
                                </tr> -->
                                <tr>
                                    <td  colspan="2">
                                        <span style="color:red">*</span>
                                        <span>
                                            {label.Inspection_Date}
                                        </span>
                                    </td>
                                </tr>
                                <tr class="slds-border_bottom">
                                    <td colspan="2">
                                        <lightning-input-field 
                                            data-field-name="Report_Date__c" 
                                            field-name="Report_Date__c"
                                            value={record.Report_Date__c}
                                            variant="label-hidden" 
                                            required 
                                            onchange={handleChangeReportDate}
                                            class={recordDateClass}
                                            read-only={recordDatereadonly}>
                                        </lightning-input-field>
                                    </td>
                                </tr>
                                <tr>
                                    <td  colspan="2">
                                        <span style="color:red">*</span>
                                        <span>  
                                            {label.Inspection_Store}
                                        </span>
                                    </td>
                                </tr>
                                <tr class="slds-border_bottom">
                                    <td colspan="2">
                                        <template if:true={isEditPage}>
                                            <c-input-read-only-lwc
                                                label={dailyInspectionReportInfo.Store__c}
                                                value={storeLabel}>
                                            </c-input-read-only-lwc>
                                        </template>
                                        <template if:false={isEditPage}>
                                            <lightning-input-field 
                                                data-field-name="Store__c"
                                                variant="label-hidden" 
                                                field-name="Store__c" 
                                                value={record.Store__c} 
                                                required 
                                                class={recordDateClass}
                                                read-only={recordDatereadonly}
                                                onchange={handleChangeShopOption}>
                                            </lightning-input-field>
                                        </template>
                                    </td>
                                </tr>
                                <tr style = "border-collapse: collapse;">
                                    <td colspan="2" style="white-space: pre-wrap; word-break: break-all; border-color: transparent;"> 
                                        <span >{storeAddress1}</span>
                                    </td>  
                                </tr>   
                                <tr style = "border-collapse: collapse;">
                                   <td colspan="2" style="text-align: left; border-color: transparent;">
                                        <span style="color:rgba(255, 123, 0, 0.939);"> {label.Distance} {distanceInfo} Km</span>
                                    <hr style="margin-top: 5px; margin-bottom: 5px;">
                                    </td>
                                </tr>
                                <tr class="slds-border_bottom">
                                    <td colspan="2">
                                    <c-input-read-only-lwc
                                        label={label.Inspection_Type}
                                        value={inspectType}
                                        ></c-input-read-only-lwc>
                                    </td>
                                </tr>
                                <tr class="slds-border_bottom">
                                    <td colspan="2">
                                    <c-input-read-only-lwc
                                        label={label.Inspection_Created_By}
                                        value={ownerName}
                                        ></c-input-read-only-lwc>
                                    </td>
                                </tr>
                                <template if:true={record.NeedCheckIn__c}>
                                    <tr class="slds-border_bottom">
                                        <td colspan="2">
                                            <c-input-read-only-lwc
                                                label={label.CheckInCheckOut_RECORDED}
                                                value={recordedInfo}
                                                ></c-input-read-only-lwc>
                                        </td>
                                    </tr>
                                    <!-- <tr class="slds-border_bottom">
                                        <td colspan="2">
                                            <c-input-read-only-lwc
                                                label={label.INSPECTION_REPORT_DISTANCE}
                                                value={distanceInfo}
                                                ></c-input-read-only-lwc>
                                        </td>
                                    </tr> -->
                                    <!-- <tr class="slds-border_bottom">
                                        <td colspan="2">
                                            <c-input-read-only-lwc
                                                label={label.CheckInCheckOut_REMARK}
                                                value={noteInfo}
                                                ></c-input-read-only-lwc>
                                        </td>
                                    </tr> -->
                                    <tr>
                                        <td colspan="2">
                                            {label.CheckInCheckOut_PHOTO}
                                        </td>                                        
                                    </tr>
                                    <template if:true={phoneInfo}>
                                        <tr>
                                            <td colspan="2">
                                                <!-- <template if:true={phoneInfo}> -->
                                                    <div  style="width:100%;">
                                                        <img id="viewPhoto" name="viewPhoto" style="width: 10%;" src={phoneInfo} alt="photo" onclick={handleViewPhotoClick}/>                                               
                                                    </div>                                         
                                                <!-- </template>                                             -->
                                           </td> 
                                        </tr>
                                    </template>
                                    
                                </template>
                                <!-- <tr>
                                    <td style="width: 33%;">
                                    {label.CheckInCheckOut_REMARK}
                                    </td>
                                    <td>
                                    {record.Note__c}
                                    </td>
                                </tr> -->
                                <!-- <tr>
                                    <td colspan="2">
                                        <c-input-read-only-lwc
                                        label={dailyInspectionReportInfo.Status__c}
                                        value={statusLabel}
                                        ></c-input-read-only-lwc>
                                    </td>
                                </tr> -->
                            </table>
                            <!-- <lightning-tabset variant="vertical">
                                <template for:each={storeProductLines} for:item="item" for:index="index">
                                    <lightning-tab key={item.Id} label={item.Product_Line__c}>
                                    </lightning-tab>
                                </template>
                            </lightning-tabset> -->
                            <div style="margin-bottom: 30px;"></div>

                            <!-- 新增复选框显示展示展品线 -->
                            <div style="text-align: left">
                                <span>{label.Product_Line_Checked}</span>
                            </div>
                            <div style="margin-bottom: 15px;"></div>
                            <div class="slds-col slds-var-m-bottom_medium">
                                <div style="display: flex;flex-wrap:wrap;">
                                    <template for:each={storeProductLines} for:item="item" for:index="index">
                                        <template if:true={isShowSubmit}>
                                            <lightning-input 
                                                class="slds-var-m-right_medium"
                                                data-id={item.Id} 
                                                data-index={index}
                                                key={item.Id} 
                                                type="checkbox" 
                                                label={item.Type__c}
                                                value={item.Type__c}
                                                onchange={handleChangeCheckbox}
                                                checked={item.Product_Line_Checked__c}
                                                disabled={item.disable}>
                                            </lightning-input>
                                        </template>
                                        <template if:false={isShowSubmit}>
                                            <lightning-input 
                                                class="slds-var-m-right_medium"
                                                key={item.Id} 
                                                type="checkbox" 
                                                label={item.Type__c}
                                                value={item.Type__c}
                                                checked={item.Product_Line_Checked__c}
                                                disabled>
                                            </lightning-input>
                                        </template>
                                    </template>
                                </div>
                            </div>
                            
                            <lightning-accordion allow-multiple-sections-open>
                                <template for:each={storeProductLines} for:item="item" for:index="index">
                                    <div class="slds-grid slds-var-m-bottom_x-small" key={item.Id}>
                                        <template if:true={item.checked}>
                                            <template if:true={item.isSubmitted}>
                                                <!-- style="height: 36px; background-color: rgb(201, 234, 232);cursor: pointer;" 
                                                    style="height: 36px; background-color: rgb(4, 166, 166);cursor: pointer;"-->
                                                <div class="slds-col slds-size_4-of-4 slds-clearfix" 
                                                     style="height: 36px; background-color: #EFF6F6;cursor: pointer;"
                                                     data-id={item.Id}    
                                                     data-index={index}
                                                     data-patrolmode={item.Patrol_Mode__c}
                                                     data-productline={item.Product_Lines__c}
                                                     data-status={item.Status__c}
                                                     onclick={handleShowItemIssues}>
                                                    <div class="slds-var-m-left_small slds-float_left centered-text" style="color:black;font-weight: bold;"
                                                        data-id={item.Id}    
                                                        data-index={index}
                                                        data-patrolmode={item.Patrol_Mode__c}
                                                        data-productline={item.Product_Lines__c}
                                                        data-status={item.Status__c}
                                                    >
                                                        {item.Type__c}
                                                    </div>
                                                    <div class="slds-var-m-right_small slds-float_right centered-text"
                                                        data-id={item.Id}    
                                                        data-index={index}
                                                        data-patrolmode={item.Patrol_Mode__c}
                                                        data-productline={item.Product_Lines__c}
                                                        data-status={item.Status__c}
                                                    >
                                                        <lightning-button 
                                                            label={item.StatusLabel}
                                                            class="my-brand"
                                                            data-id={item.Id}    
                                                            data-index={index}
                                                            data-patrolmode={item.Patrol_Mode__c}
                                                            data-productline={item.Product_Lines__c}
                                                            data-status={item.Status__c}
                                                        >
                                                        </lightning-button>
                                                        <!-- <span class="submited">{item.StatusShow}</span> -->
                                                    </div>
                                                    <!-- <div class="slds-float_right centered-text">
                                                        <lightning-icon icon-name="utility:chevronright" class="my-icon" size='small'></lightning-icon>                                
                                                    </div> -->
                                                    <!-- <lightning-accordion-section 
                                                        name={item.Product_Line__c} 
                                                        label={item.Product_Line__c} 
                                                        data-id={item.Id}
                                                        data-index={index} 
                                                        value={item} 
                                                        onclick={handleShowItemIssues}>
                                                    </lightning-accordion-section> -->
                                                </div>
                                            </template>
                                            <template if:true={item.isContinue}>
                                                <div class="slds-col slds-size_4-of-4 slds-clearfix" 
                                                     style="height: 36px; background-color: #EFF6F6;cursor: pointer;" 
                                                     data-id={item.Id}    
                                                     data-index={index}
                                                     data-patrolmode={item.Patrol_Mode__c}
                                                     data-productline={item.Product_Lines__c}
                                                     data-status={item.Status__c}
                                                     onclick={handleShowItemIssues}>
                                                    <div class="slds-var-m-left_small slds-float_left centered-text" style="color:black;font-weight: bold;"
                                                        data-id={item.Id}    
                                                        data-index={index}
                                                        data-patrolmode={item.Patrol_Mode__c}
                                                        data-productline={item.Product_Lines__c}
                                                        data-status={item.Status__c}
                                                    >{item.Type__c}</div>
                                                    <div class="slds-var-m-right_small slds-float_right centered-text"
                                                        data-id={item.Id}    
                                                        data-index={index}
                                                        data-patrolmode={item.Patrol_Mode__c}
                                                        data-productline={item.Product_Lines__c}
                                                        data-status={item.Status__c}>
                                                        <lightning-icon icon-name="utility:forward" class="my-icon-continue" size='small'
                                                            data-id={item.Id}    
                                                            data-index={index}
                                                            data-patrolmode={item.Patrol_Mode__c}
                                                            data-productline={item.Product_Lines__c}
                                                            data-status={item.Status__c}
                                                        ></lightning-icon>                                
                                                    </div>
                                                    <div class="slds-var-m-right_small slds-float_right centered-text" style="color:#E8BE18;font-weight: bold;"
                                                        data-id={item.Id}    
                                                        data-index={index}
                                                        data-patrolmode={item.Patrol_Mode__c}
                                                        data-productline={item.Product_Lines__c}
                                                        data-status={item.Status__c}
                                                    >{item.StatusLabel}</div>
                                                    <!-- <lightning-accordion-section 
                                                        name={item.Product_Line__c} 
                                                        label={item.Product_Line__c} 
                                                        data-id={item.Id}
                                                        data-index={index} 
                                                        value={item} 
                                                        onclick={handleShowItemIssues}>
                                                    </lightning-accordion-section> -->
                                                </div>
                                            </template>
                                            <template if:true={item.isStart}>
                                                <div class="slds-col slds-size_4-of-4 slds-clearfix" 
                                                       style="height: 36px; background-color: #EFF6F6;cursor: pointer;" 
                                                       data-id={item.Id}    
                                                       data-index={index}
                                                       data-patrolmode={item.Patrol_Mode__c}
                                                       data-productline={item.Product_Lines__c}
                                                       data-status={item.Status__c}
                                                       onclick={handleShowItemIssues}>
                                                      <div class="slds-var-m-left_small slds-float_left centered-text" style="color:black;font-weight: bold;"
                                                          data-id={item.Id}    
                                                          data-index={index}
                                                          data-patrolmode={item.Patrol_Mode__c}
                                                          data-productline={item.Product_Lines__c}
                                                          data-status={item.Status__c}
                                                      >{item.Type__c}</div>
                                                      <div class="slds-var-m-right_small slds-float_right centered-text"  
                                                          data-id={item.Id}    
                                                          data-index={index}
                                                          data-patrolmode={item.Patrol_Mode__c}
                                                          data-productline={item.Product_Lines__c}
                                                          data-status={item.Status__c}
                                                      >
                                                          <lightning-icon icon-name="utility:forward" class="my-icon-start" size='small'
                                                              data-id={item.Id}    
                                                              data-index={index}
                                                              data-patrolmode={item.Patrol_Mode__c}
                                                              data-productline={item.Product_Lines__c}
                                                              data-status={item.Status__c}
                                                          ></lightning-icon>                                
                                                      </div>
                                                      <div class="slds-var-m-right_small slds-float_right centered-text" style="color:#19DFCD;font-weight: bold;"
                                                          data-id={item.Id}    
                                                          data-index={index}
                                                          data-patrolmode={item.Patrol_Mode__c}
                                                          data-productline={item.Product_Lines__c}
                                                          data-status={item.Status__c}
                                                      >{item.StatusLabel}</div>
                                                  </div>
                                              </template>
                                            <!-- <div class="slds-col slds-size_1-of-4 slds-var-m-left_small centered-text" style="text-align: left">
                                                <span class="slds-text-title">
                                                    {item.StatusShow}
                                                </span>
                                            </div> -->
                                        </template>
                                    </div>
                                </template>
                            </lightning-accordion>

                            <!-- Ticket -->
                             <template if:true={isNotAustralia}>
                                <lightning-accordion allow-multiple-sections-open onsectiontoggle={handleSectionToggle} active-section-name={activeSections}>
                                    <lightning-accordion-section name="ticket" label={label.PromoterDailyReport_TICKET}>
                                    <lightning-accordion allow-multiple-sections-open
                                    onsectiontoggle={handleTicketSectionToggle}
                                    active-section-name={activeTicketSections}>
                                    <!-- Closed -->
                                    <lightning-accordion-section name="closed"
                                        label={label.INSPECTION_REPORT_TICKET_HISTORY}>
                                        <template for:each={ticketClosedInfo} for:item="ticketClosed"
                                            for:index="index">
                                            <table class={ticketClosed.className} style="width: 100%;"
                                                key={ticketClosed.key}>
                                                <tbody>
                                                <template if:true={ticketClosed.Name}>
                                                    <tr>
                                                        <td colspan="2" class="slds-color__background_gray-4">
                                                            <c-input-read-only-lwc label={TicketInfo.Name}
                                                            value={ticketClosed.Name}></c-input-read-only-lwc>
                                                            <!-- Ticket Number -->
                                                        </td>
                                                    </tr>
                                                    <tr>
                                                        <td colspan="2">
                                                            <template if:false={isEditTicket}>
                                                            <c-input-read-only-lwc label={TicketInfo.Status__c}
                                                                value={ticketClosed.Status__c}></c-input-read-only-lwc>
                                                            </template>
                                                            <template if:true={isEditTicket}>
                                                                <lightning-combobox variant="label-hidden"
                                                                    data-field-name="Status__c" data-index={index}
                                                                    data-type="closed" name="progress"
                                                                    label={TicketInfo.Status__c}
                                                                    value={ticketClosed.Status__c}
                                                                    placeholder="Select Progress"
                                                                    onchange={handleTicketConfirmChange}
                                                                    options={confirmTaskOptions.data}
                                                                    read-only={isFieldReadOnly}>
                                                                </lightning-combobox>
                                                            </template>
                                                        </td>
                                                    </tr>
                                                </template>
                                                <template if:true={ticketClosed.ClosedDailyInspectionReport__c}>
                                                    <tr>
                                                        <td colspan="2">
                                                            <lightning-record-edit-form object-api-name="Ticket__c">
                                                            <lightning-input-field
                                                                field-name="ClosedDailyInspectionReport__c"
                                                                label={TicketInfo.ClosedDailyInspectionReport__c}
                                                                data-field-name="ClosedDailyInspectionReport__c"
                                                                data-index={index}
                                                                value={ticketClosed.ClosedDailyInspectionReport__c}
                                                                disabled="true">
                                                            </lightning-input-field>
                                                            </lightning-record-edit-form>
                                                        </td>
                                                    </tr>
                                                </template>
                                                <tr>
                                                    <td colspan="2">
                                                        <c-input-read-only-lwc label={TicketInfo.Subject__c}
                                                            value={ticketClosed.Subject__c}></c-input-read-only-lwc>
                                                    </td>
                                                </tr>
                                                <tr>
                                                    <td colspan="2">
                                                        <c-input-read-only-lwc label={TicketInfo.Priority__c}
                                                            value={ticketClosed.Priority__c}></c-input-read-only-lwc>
                                                    </td>
                                                </tr>
                                                <!--  BY lizunxing 20240102 -->
                                                <template if:true={isSouthAfrica}>
                                                    <tr>
                                                        <td colspan="2">
                                                            <c-input-read-only-lwc label={TicketInfo.Category__c}
                                                            value={ticketClosed.Category__c}></c-input-read-only-lwc>
                                                        </td>
                                                    </tr>
                                                    <template if:true={ticketClosed.isShowProduct}>
                                                        <tr>
                                                            <td colspan="2">
                                                            <c-input-read-only-lwc label={TicketInfo.Product__c}
                                                                value={ticketClosed.Product__c}></c-input-read-only-lwc>
                                                            </td>
                                                        </tr>
                                                    </template>
                                                </template>
                                                <tr>
                                                    <td colspan="2">
                                                        <c-input-read-only-lwc label={TicketInfo.Description__c}
                                                            value={ticketClosed.Description__c}></c-input-read-only-lwc>
                                                    </td>
                                                </tr>
                                                <tr>
                                                    <td colspan="2">
                                                        <c-input-read-only-lwc label={TicketInfo.DueDate__c}
                                                            value={ticketClosed.DueDate__c}></c-input-read-only-lwc>
                                                    </td>
                                                </tr>
                                                <!-- added by Sunny about chile department start-[20231026] -->
                                                <template if:true={isShowDepartment}>
                                                    <tr>
                                                        <td colspan="2">
                                                            <c-input-read-only-lwc label={TicketInfo.Department__c}
                                                            value={ticketClosed.Department__c}></c-input-read-only-lwc>
                                                        </td>
                                                    </tr>
                                                </template>
                                                <!-- added by Sunny about chile department end-[20231026] -->
                                                <tr>
                                                    <td colspan="2">
                                                        <template if:true={ticketClosed.AssignedTo__c}>
                                                            <span>{TicketInfo.AssignedTo__c}</span>
                                                            <br />
                                                            <c-lookup-lwc name="AssignedTo__c" data-index={index}
                                                            obj-name="Ticket__c" label={TicketInfo.AssignedTo__c}
                                                            record-id={ticketClosed.AssignedTo__c}
                                                            read-only="true">
                                                            </c-lookup-lwc>
                                                        </template>
                                                    </td>
                                                </tr>
                                                <tr>
                                                    <td colspan="2">
                                                        <span>{label.INSPECTION_REPORT_ATTACHMENT}</span>
                                                        <br />
                                                        <c-upload-files2-lwc parent-id={record.Id}
                                                            data-recordid={index} data-type='ticketClosed'
                                                            record-id={ticketClosed.Id}
                                                            onselectfiles={handleSelectFiles} disabled-delete="true"
                                                            disabled-upload="true">
                                                        </c-upload-files2-lwc>
                                                    </td>
                                                </tr>
                                                <!-- <tr>
                                                    <td colspan="2">
                                                        {label.INSPECTION_REPORT_ACTION}
                                                    </td>
                                                </tr> -->
                                                <tr>
                                                    <td colspan="2">
                                                        <a>
                                                            <lightning-button 
                                                                label={label.INSPECTION_REPORT_SAVE} 
                                                                class="my-brand" 
                                                                variant="brand" 
                                                                size="xx-small"
                                                                data-index={index}
                                                                onclick={saveHistoryTicket}>
                                                            </lightning-button>
                                                        </a>
                                                    </td>
                                                </tr>
                                                </tbody>
                                            </table>
                                        </template>
                                    </lightning-accordion-section>
                                    <!-- Open -->
                                    <lightning-accordion-section name="open"
                                        label={label.INSPECTION_REPORT_TICKET_NEW}>
                                        <template if:true={isEditTicket}>
                                            <a onclick={addTicket} slot="actions" style="margin-right: 0.5rem;">
                                                <!-- <lightning-icon variant="success" icon-name="utility:add"
                                                size="small" title=""></lightning-icon> -->
                                                <lightning-button-icon icon-name="utility:add" alternative-text="Add" title="Add"></lightning-button-icon>
                                                <!-- <lightning-button label={label.Inspection_Add} class="my-brand" variant="brand" size="xx-small"></lightning-button> -->
                                                <span class="slds-assistive-text"></span>
                                            </a>
                                        </template>

                                        <!--  BY lizunxing 20241218 输入框占满屏幕 -->
                                        <template for:each={ticketOpenInfo} for:item="ticketOpen"
                                            for:index="index">
                                            <table
                                                class="slds-table slds-table_bordered slds-table_fixed-layout slds-resizable marketInsightTable ticketTable table-even slds-var-m-top_small slds-border_left slds-border_right"
                                                style="width: 100%;" key={ticketOpen.key}>
                                                <template if:true={ticketOpen.Name}>
                                                <tr>
                                                    <td colspan="2" class="slds-color__background_gray-4">
                                                        <c-input-read-only-lwc label={TicketInfo.Name}
                                                            value={ticketOpen.Name}></c-input-read-only-lwc>
                                                    </td>
                                                </tr>
                                                <tr>
                                                    <template if:false={ticketOpen.disabled}>
                                                        <td colspan="2">
                                                            <c-input-read-only-lwc label={TicketInfo.Status__c}
                                                            value={ticketOpen.Status__c}></c-input-read-only-lwc>
                                                        </td>
                                                    </template>
                                                    <template if:true={ticketOpen.disabled}>
