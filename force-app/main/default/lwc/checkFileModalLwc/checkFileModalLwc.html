<template>
    <!-- 模态框的背景遮罩 -->
    <div class="slds-backdrop slds-backdrop_open" onclick={handleClose}></div>
    <!-- 模态框的容器 -->
    <div class="slds-modal slds-fade-in-open custom-modal">
        <div class="slds-modal__container custom-modal-container">
            <!-- 模态框的头部 -->
            <header class="slds-modal__header">
                <h2 class="slds-text-heading_medium slds-hyphenate">{label.Ai_Title}</h2>
                <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" onclick={handleClose}>
                    <svg class="slds-button__icon slds-button__icon_large" aria-hidden="true" style="color:#747474">
                        <use xlink:href="/apexpages/slds/latest/assets/icons/utility-sprite/svg/symbols.svg#close"></use>
                    </svg>
                    <span class="slds-assistive-text">Cancel and close</span>
                </button>
            </header>
            <!-- 模态框的内容区域 -->
            <div class="slds-modal__content slds-var-p-around_medium custom-modal-content">
                <template for:each={resultData} for:item="item" for:index="index">
                    <div key={item.Id} style="width: 100%;" class="slds-var-p-bottom_xx-small">
                        <div class="slds-text-heading_medium slds-var-p-bottom_xx-small">
                            {item.productLine}
                        </div>
                        <template for:each={item.typeList} for:item="type" for:index="indexType">
                            <div key={type.Id} class="slds-var-p-bottom_small">
                                <div class="slds-text-title_bold" style="background-color: rgb(255, 240, 63);">
                                    {type.type}
                                </div>
                               <div if:true={type.isOverallDisplay} class="slds-clearfix slds-grid slds-gutters">
                                    <div class="slds-col slds-size_5-of-6">· {label.Check_Samples}</div>
                                    <div class="slds-col slds-size_1-of-6">
                                        <template if:true={type.emptySample}>
                                            <lightning-icon class="slds-float_right" icon-name='utility:success' alternative-text='success' size='xx-small' title='success'></lightning-icon>
                                        </template>
                                        <template if:false={type.emptySample}>
                                            <lightning-icon class="slds-float_right" icon-name='utility:error' alternative-text='error' size='xx-small' title='error'></lightning-icon>
                                        </template>
                                    </div>
                                </div>
                                <div if:true={type.isOverallDisplay} class="slds-clearfix slds-grid slds-gutters">
                                    <div class="slds-col slds-size_5-of-6">· {label.Check_Logo}</div>
                                    <div class="slds-col slds-size_1-of-6">
                                        <template if:true={type.storeLogo}>
                                            <lightning-icon class="slds-float_right" icon-name='utility:success' alternative-text='success' size='xx-small' title='success'></lightning-icon>
                                        </template>
                                        <template if:false={type.storeLogo}>
                                            <lightning-icon class="slds-float_right" icon-name='utility:error' alternative-text='error' size='xx-small' title='error'></lightning-icon>
                                        </template>
                                    </div>
                                </div>
                                <div if:true={type.isOverallDisplay} class="slds-clearfix slds-grid slds-gutters">
                                    <div class="slds-col slds-size_5-of-6">· {label.Check_TV_Screen}</div>
                                    <div class="slds-col slds-size_1-of-6">
                                        <template if:true={type.TVScreen}>
                                            <lightning-icon class="slds-float_right" icon-name='utility:success' alternative-text='success' size='xx-small' title='success'></lightning-icon>
                                        </template>
                                        <template if:false={type.TVScreen}>
                                            <lightning-icon class="slds-float_right" icon-name='utility:error' alternative-text='error' size='xx-small' title='error'></lightning-icon>
                                        </template>
                                    </div>
                                </div>
                            </div>
                        </template>
                    </div>
                </template>
            </div>
            <!-- 模态框的底部 -->
            <footer class="slds-modal__footer">
                <template if:false={isPass}>
                    <lightning-button class="slds-var-m-right_small" label={label.Create_Ticket} onclick={handleCreateTicket}></lightning-button>
                </template>
                <lightning-button variant="brand" label={label.Inspection_Continue} onclick={handleContinue}></lightning-button>
            </footer>
        </div>
    </div>
</template>
