<template>
    <template if:true={spinnerFlag}>
        <lightning-spinner alternative-text="Loading" size="large"></lightning-spinner>
    </template>
    <div class="container full-height">
        <lightning-card class="slds-color__background_gray-4 pageHeader" title="Inventory" icon-name="standard:article">
            <span style="font-weight: bold;font-size:16px">{checkLabel}</span>
            <div slot="actions">
                <div style="margin-left:5px;display:inline-block;">
                    <!-- <button class="slds-button slds-button_brand" onclick={handleSave}>{label.INSPECTION_REPORT_SAVE}</button> -->
                    <lightning-button class="slds-var-p-right_x-small backButton" variant="Neutral" label={label.INSPECTION_REPORT_BACK} onclick={handleBack}>
                    </lightning-button>
                    <template if:true={showSave}>
                        <lightning-button class="my-brand" variant="brand" label={label.INSPECTION_REPORT_SAVE} onclick={handleSave}>
                        </lightning-button>
                    </template>
                </div>
            </div>
        </lightning-card>
    <!-- </div> -->
    <!-- <lightning-card style="text-align: left;">  -->
        <!-- Report Information -->
               <!-- 标准的水平线 -->
      <!-- <hr class="thin-line" style="margin: 0;"/> -->
        <!-- Report Information -->
        <template if:true={showPage}>
            <div class="slds-grid slds-gutters">
                <div class="slds-col slds-size_1-of-1">
                    <div class="slds-modal__content slds-scrollable_y" style={styleContent}>
                        <div style="padding-left: 10px; padding-right: 10px; text-align: left;">
                            <lightning-record-edit-form object-api-name="Inventory__c">
                
                                <!-- FloorBox -->
                                <div class="slds-col" style="text-align: left;">
                                    <!-- <div class="slds-var-m-top_small" style="margin-bottom: 15px;"> -->
                                        <span style="color:red">*</span>
                                        <template if:true={submit}>
                                            <template if:false={floorBoxTotal}>
                                                <span style="color:red">{label.Floor_Box}</span>
                                            </template>
                                            <template if:true={floorBoxTotal}>
                                                <span>{label.Floor_Box}</span>
                                            </template>
                                        </template>
                                        <template if:false={submit}>
                                            <span>{label.Floor_Box}</span>
                                        </template>
                                    <!-- </div> -->
                                </div>
                                <div class="slds-col" style="text-align: left;">
                                    <div style="margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center;">
                                        <lightning-button
                                            name="Floor_Box"
                                            variant="brand"
                                            class="slds-var-m-left_x-small"
                                            icon-name="utility:scan"
                                            label="Scan"
                                            title="Start Scanning"
                                            onclick={beginScanning}
                                            disabled={disabled}
                                        ></lightning-button>
                                        <span style="padding-left: 20px;">Sum:</span>
                                        <lightning-input
                                            style="display:inline-block;margin-left: 10px;width:50px"
                                            type="number"
                                            message-when-step-mismatch="Please enter an integer"
                                            message-when-bad-input="Please enter an integer"
                                            variant="label-hidden"
                                            value={floorBoxTotal}
                                            onblur={handleChangeFloorBoxTotal}
                                            disabled={disabled}>
                                        </lightning-input>
                                        <!-- 查验参数 -->
                                        <div style="display: flex; margin-left: auto;">
                                            <lightning-button
                                                label="-1"
                                                variant="brand"
                                                class="slds-var-m-left_x-small"
                                                style="margin-left: 10px;"
                                                onclick={handleDecrement}
                                                disabled={delDisabled}>
                                            </lightning-button>

                                            <lightning-button
                                                label="+1"
                                                variant="brand"
                                                class="slds-var-m-left_x-small"
                                                style="margin-left: 15px;"
                                                onclick={handleIncrement}
                                                disabled={disabled}>
                                            </lightning-button>
                                        </div>
                                        <!-- <template for:each={barcodeFloorBox} for:item="item" for:index="index">
                                            <div style="margin-top: 10px" key={item.Id}>
                                                <span>{item.Value__c}</span>
                                                <lightning-button
                                                    style="padding-left: 50px;"
                                                    data-index={index}
                                                    variant="Neutral"
                                                    icon-name="utility:delete"
                                                    title="Delete"
                                                    onclick={delFloorBox}
                                                    disabled={disabled}
                                                ></lightning-button>
                                            </div>
                                        </template> -->
                                    </div>
                                </div>
                
                                <!-- Boxes_on_Floor -->
                                <div class="slds-col" style="text-align: left;">
                                    <!-- <div style="margin-bottom: 15px;width:95%"> -->
                                        <span style="color:red">*</span>
                                        <!-- <span>{label.Boxes_on_Floor}</span> -->
                                        <template if:true={submit}>
                                            <template if:false={inventoryInfo.BoxesFloor__c}>
                                                <span style="color:red">{label.Boxes_on_Floor}</span>
                                            </template>
                                            <template if:true={inventoryInfo.BoxesFloor__c}>
                                                <span>{label.Boxes_on_Floor}</span>
                                            </template>
                                        </template>
                                        <template if:false={submit}>
                                            <span>{label.Boxes_on_Floor}</span>
                                        </template>
                                    <!-- </div> -->
                                </div>
                                <div class="slds-col">
                                    <div style="margin-bottom: 15px;">
                                        <lightning-radio-group 
                                            data-index={index}
                                            variant="label-hidden"
                                            type="button"
                                            options={yesNo} 
                                            value={inventoryInfo.BoxesFloor__c}  
                                            disabled={disabled}
                                            onchange={handleBoxesFloor}>
                                        </lightning-radio-group>
                                    </div>
                                </div>
                
                                <!-- Add_Boxed -->
                                <template if:true={addBoxedFlag}>
                                    <div class="slds-col" style="text-align: left;">
                                        <!-- <div style="margin-bottom: 15px;width:95%"> -->
                                            <span style="color:red">*</span>
                                            <!-- <span>{label.Add_Boxed}</span> -->
                                            <template if:true={submit}>
                                                <template if:false={addBoxedTotal}>
                                                    <span style="color:red">{label.Add_Boxed}</span>
                                                </template>
                                                <template if:true={addBoxedTotal}>
                                                    <span>{label.Add_Boxed}</span>
                                                </template>
                                            </template>
                                            <template if:false={submit}>
                                                <span>{label.Add_Boxed}</span>
                                            </template>
                                        <!-- </div> -->
                                    </div>
                                    
                                    <div class="slds-col" style="text-align: left;">
                                        <div style="margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center;">
                                            <lightning-button
                                                name="Add_Boxed"
                                                variant="brand"
                                                class="slds-var-m-left_x-small"
                                                icon-name="utility:scan"
                                                label="Scan"
                                                title="Start Scanning"
                                                onclick={beginScanning}
                                                disabled={disabled}
                                            ></lightning-button>
                                            <span style="padding-left: 20px;">Sum:</span>
                                            <lightning-input
                                                style="display:inline-block;margin-left: 10px;width:50px"   
                                                type="number"
                                                message-when-step-mismatch="Please enter an integer"
                                                message-when-bad-input="Please enter an integer"
                                                variant="label-hidden"
                                                value={addBoxedTotal}
                                                onblur={handleChangeAddBoxedTotal}
                                                disabled={disabled}>
                                            </lightning-input>
                                            <div style="display: flex; margin-left: auto;">
                                                <lightning-button
                                                    label="-1"
                                                    variant="brand"
                                                    class="slds-var-m-left_x-small"
                                                    style="margin-left: 10px;"
                                                    onclick={handleBoxedDecrement}
                                                    disabled={delBoxedDisabled}>
                                                </lightning-button>
    
                                                <lightning-button
                                                    label="+1"
                                                    variant="brand"
                                                    class="slds-var-m-left_x-small"
                                                    style="margin-left: 15px;"
                                                    onclick={handleBoxedIncrement}
                                                    disabled={disabled}>
                                                </lightning-button>
                                            </div>
                                            <!-- <template for:each={barcodeAddBoxed} for:item="item" for:index="index">
                                                <div style="margin-top: 10px" key={item.Id}>
                                                    <span>{item.Value__c}</span>
                                                    <lightning-button 
                                                        style="padding-left: 50px;"
                                                        icon-name="utility:delete"
                                                        title="Delete"
                                                        variant="Neutral"
                                                        data-index={index}
                                                        onclick={delAddBoxed}
                                                        disabled={disabled}>
                                                    </lightning-button>
                                                </div>
                                            </template> -->
                                        </div>
                                    </div>
                                </template>
                
                                <!-- BOF_Photo -->
                                <div class="slds-col" style="text-align: left;">
                                    <!-- <div style="margin-bottom: 15px;width:95%"> -->
                                        <span style="color:red">*</span>
                                        <!-- <span>{label.BOF_Photo}</span> -->
                                        <template if:true={submit}>
                                            <template if:false={imgBof}>
                                                <span style="color:red">{label.BOF_Photo}</span>
                                            </template>
                                            <template if:true={imgBof}>
                                                <span>{label.BOF_Photo}</span>
                                            </template>
                                        </template>
                                        <template if:false={submit}>
                                            <span>{label.BOF_Photo}</span>
                                        </template>
                                    <!-- </div> -->
                                </div>
                                <div class="slds-col" style="margin-bottom: 15px;">
                                    <c-new-upload-files-lwc
                                        data-index="0"
                                        data-type="Bof"
                                        record-id={inventoryInfo.Id}
                                        record-item-id={recordId}
                                        disabled-delete={disabled}
                                        disabled-upload={disabled}>
                                    </c-new-upload-files-lwc> 
                                </div>
                
                                <!-- Inventory_Today_Visit -->
                                <div class="slds-col" style="text-align: left;">
                                    <!-- <div style="margin-bottom: 15px;width:95%"> -->
                                        <span style="color:red">*</span>
                                        <!-- <span>{label.Inventory_Today_Visit}</span> -->
                                        <template if:true={submit}>
                                            <template if:false={inventoryInfo.InventoryTodayVisit__c}>
                                                <span style="color:red">{label.Inventory_Today_Visit}</span>
                                            </template>
                                            <template if:true={inventoryInfo.InventoryTodayVisit__c}>
                                                <span>{label.Inventory_Today_Visit}</span>
                                            </template>
                                        </template>
                                        <template if:false={submit}>
                                            <span>{label.Inventory_Today_Visit}</span>
                                        </template>
                                    <!-- </div> -->
                                </div>
                                <div class="slds-col" style="text-align: left;">
                                    <div style="margin-bottom: 15px;">
                                        <lightning-radio-group 
                                            data-index={index}
                                            variant="label-hidden"
                                            type="button"
                                            options={yesNo} 
                                            value={inventoryInfo.InventoryTodayVisit__c}  
                                            disabled={disabled}
                                            onchange={handleInventoryTodayVisit} 
                                            class="slds-radio_button__label">
                                        </lightning-radio-group>
                                    </div>
                                </div>
                
                                <!-- Boxed_Photo -->
                                <template if:true={boxedPhotoFlag}>
                                    <div class="slds-col" style="text-align: left;">
                                        <!-- <div style="margin-bottom: 15px;width:95%"> -->
                                            <span style="color:red">*</span>
                                            <!-- <span>{label.Boxed_Photo}</span> -->
                                            <template if:true={submit}>
                                                <template if:false={imgBoxed}>
                                                    <span style="color:red">{label.Boxed_Photo}</span>
                                                </template>
                                                <template if:true={imgBoxed}>
                                                    <span>{label.Boxed_Photo}</span>
                                                </template>
                                            </template>
                                            <template if:false={submit}>
                                                <span>{label.Boxed_Photo}</span>
                                            </template>
                                        <!-- </div> -->
                                    </div>
                                    <div class="slds-col" style="margin-bottom: 15px;">
                                        <c-new-upload-files-lwc
                                            data-index="1"
                                            data-type="Boxed"
                                            record-item-id={recordId}
                                            record-id={inventoryInfo.Inspection_Product_Item__c}
                                            disabled-delete={disabled}
                                            disabled-upload={disabled}>
                                        </c-new-upload-files-lwc> 
                                    </div>
                                </template>
                                
                
                            </lightning-record-edit-form>
                        </div>
                    </div>
                </div>
            </div>
        </template>
    <!-- </lightning-card> -->
    </div>
</template>
