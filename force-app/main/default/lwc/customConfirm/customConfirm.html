<template>
    <lightning-modal label={modalTitle} onclose={handleClose}>
        <div class="slds-modal__content slds-p-around_medium" slot="body">
            <p>{message}</p>
        </div>
        <div class="slds-modal__footer" slot="footer">
            <lightning-button 
                label={confirmLabel} 
                variant="brand" 
                onclick={handleConfirm}>
            </lightning-button>
            <lightning-button 
                label={cancelLabel} 
                variant="neutral" 
                onclick={handleCancel}>
            </lightning-button>
        </div>
    </lightning-modal>
</template>
