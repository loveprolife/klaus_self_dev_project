<template>
    <div class="modal-header slds-modal__header">
        <h2 class="slds-text-heading--medium">
            {label.Restore_Customer}
        </h2>
    </div>
    <div class="modal-body scrollable slds-modal__content slds-p-around--medium">
        <lightning-card>
            <template if:true={isShowSpinner}>
                <lightning-spinner alternative-text="Loading" size="medium"  variant="brand"></lightning-spinner>
            </template>
            <lightning-textarea max-length="131072" label={label.Restore_Customer_Comments}  name="input1" onchange={reportDataChange} required ></lightning-textarea>
        </lightning-card>
    </div>

    <div class="modal-footer slds-modal__footer">
        <lightning-button
            variant="brand-outline"
            label="Cancel"
            onclick={cancel}
            class="slds-m-left_x-small"
        > </lightning-button>
        
        <template if:true={isShowSubmit}>
            <lightning-button
                variant="brand"
                label="Submit"
                onclick={submit}
                class="slds-m-left_x-small"
            ></lightning-button>
        </template>
    </div>
     
</template>
