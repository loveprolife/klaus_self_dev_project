<template>

    <template if:false={isEmpty}>
        <template if:true={isShowSpinner}>
            <lightning-spinner size="medium" variant="brand"></lightning-spinner>
        </template>

        <!-- <c-modal-lwc data-id="product selection" static-mode=true title="" show-ok=true show-close=true
            hidden-close-icon=false onok={handleOk}>
            <h1>{label.PromoterDailyReport_DeleteReminder}</h1>
        </c-modal-lwc> -->

        <table class="slds-table slds-table_bordered slds-table_fixed-layout slds-resizable promoCourtTable"
            style="width: 100%; table-layout:fixed; word-wrap:break-word;">

            <!-- Hisense's Share -->
            <tr>
                <td class="tdOne">
                    <span>{label.PromoterDailyReport_SHARE}</span>
                </td>
                <td class="tdTwo">
                    <lightning-formatted-text value={hisensShare} readonly></lightning-formatted-text>
                </td>
            </tr>
            <tr class="greyBackground">
                <td class="tdOne">
                    <!-- <span>Brand</span> -->
                    <span>{fields.Brands__c}</span>
                </td>
                <td class="tdTwo">
                    <!-- <span>Promo Court Bulk</span> -->
                    <span>{fields.PromoCourtBulk__c}</span>
                </td>
            </tr>


            <template for:each={recordList} for:item="item" for:index="index">

                <!-- Brand & Promo Court Bulk -->
                <tr key={item.index}>
                    <td class="tdOne">
                        <template lwc:if={item.HisenseFlag__c}>
                            <!-- <lightning-input variant="label-hidden" value="Hisense" readonly>
                                </lightning-input> -->
                            <lightning-formatted-text value="Hisense"></lightning-formatted-text>
                        </template>
                        <template lwc:else>
                            <!-- <lightning-record-edit-form object-api-name="PromoCourt__c" density="Compact">
                                    <lightning-input-field variant="label-hidden" field-name='Brand__c'
                                        data-field-name="Brand__c" data-index={index} name={index} value={item.Brand__c}
                                        onchange={inputChangeHandler} required>
                                    </lightning-input-field>
                                </lightning-record-edit-form> -->

                            <!-- 自定义组件 -->
                            <c-lookup-lwc data-index={index} data-field-name="Brands__c" obj-name="Brand__C"
                                op={lookupBrandFilter} record-id={item.Brands__c} read-only={viewMode}
                                onlookupupdate={lookUpChangeHandler} drop-down-style="max-height: 5rem;"></c-lookup-lwc>
                        </template>
                    </td>
                    <td class="tdTwo">
                        <lightning-input variant="label-hidden" field-name='PromoCourtBulk__c'
                            data-field-name="PromoCourtBulk__c" data-index={index} name={index}
                            value={item.PromoCourtBulk__c} onchange={inputChangeHandler} type="number" required
                            read-only={viewMode}>
                        </lightning-input>

                    </td>
                </tr>


            </template>


            <!-- Action -->
            <template if:false={viewMode}>
                <tr>
                    <td class="tdOne">
                        <span>{label.PromoterDailyReport_ACTIONS}</span>
                    </td>
                    <td class="tdTwo">
                        <div>
                            <div style="float: left;">
                                <a>
                                    <lightning-icon variant="success" icon-name="utility:dash" size="x-small" title=""
                                        onclick={itemRemoveHandler}>
                                    </lightning-icon>
                                    <span class="slds-assistive-text"></span>
                                </a>
                            </div>
                            <div style="float: right;">
                                <a>
                                    <lightning-icon variant="success" icon-name="utility:add" size="x-small" title=""
                                        onclick={brandItemAdd}>
                                    </lightning-icon>
                                    <span class="slds-assistive-text"></span>
                                </a>
                            </div>
                        </div>
                    </td>
                </tr>
            </template>


            <!-- Comment -->
            <tr>
                <td class="tdOne">
                    <span>{fields.Comment__c}</span>
                </td>
                <td class="tdTwo">
                    <!-- <lightning-record-edit-form object-api-name="PromoCourt__c" density="Compact">
                            <lightning-input-field variant="label-hidden" field-name='Comment__c'
                                data-field-name="Comment__c" data-index={index} name={index}
                                value={item.Comment__c} onchange={inputChangeHandler} onkeydown={handleKeyDown}>
                            </lightning-input-field>
                        </lightning-record-edit-form> -->
                    <lightning-input variant="label-hidden" field-name='Comment__c' data-field-name="Comment__c"
                        data-index='0' value={hisense.Comment__c} onchange={inputChangeHandler} type="text"
                        read-only={viewMode}>
                    </lightning-input>
                </td>
            </tr>

            <!-- Attachment -->
            <tr>
                <td class="tdOne">
                    <span>{label.PromoterDailyReport_ATTACHMENT}</span>
                </td>
                <td class="tdTwo">
                    <c-upload-files-lwc parent-id={recordId} record-id={fileId} data-index={fileIndex}
                        onselectfiles={handleSelectFiles} disabled-delete={viewMode} disabled-upload={viewMode}>
                    </c-upload-files-lwc>
                </td>
            </tr>
        </table>

    </template>

</template>
