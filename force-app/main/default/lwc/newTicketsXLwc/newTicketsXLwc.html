<template>
    <template if:true={recordId}>
        <template if:true={isShowSpinner}>
            <lightning-spinner size="medium" variant="brand"></lightning-spinner>
        </template>
        <c-modal-lwc data-id="product selection" static-mode=true title="" show-ok=true show-close=true
            hidden-close-icon=false onok={handleOk}>
            <h1>{label.PromoterDailyReport_DeleteReminder}</h1>
        </c-modal-lwc>
        <template if:true={fields}>
            <template for:each={recordList} for:item="task" for:index="index">
                <table class="slds-table slds-table_bordered slds-table_fixed-layout slds-resizable marketInsightTable"
                    key={task.index}>
                    <tbody>
                        <template lwc:if={task.Id}>
                            <tr>
                                <td class="tdOne">
                                    <span>{fields.Name}</span>
                                </td>
                                <td class="tdTwo">
                                    <span>{task.Name}</span>
                                </td>
                            </tr>
                        </template>
                        <!-- Subject -->
                        <tr>
                            <td class="tdOne">
                                <span style="color:red">*</span>
                                <span>{fields.Subject__c}</span>
                            </td>
                            <td class="tdTwo">
                                <lightning-record-edit-form object-api-name="Ticket__c" density="Compact">
                                    <lightning-input-field variant="label-hidden" field-name='Subject__c'
                                        data-field-name="Subject__c" data-index={index} name={index}
                                        value={task.Subject__c} onchange={handleFieldChange} onkeydown={handleKeyDown}
                                        read-only={viewMode}>
                                    </lightning-input-field>
                                </lightning-record-edit-form>
                            </td>
                        </tr>
                        <!-- Description -->
                        <tr>
                            <td class="tdOne">
                                <span style="color:red">*</span>
                                <span>{fields.Description__c}</span>
                            </td>
                            <td class="tdTwo">
                                <template lwc:if={viewMode}>
                                    <lightning-input variant="label-hidden" value={task.Description__c} readonly>
                                    </lightning-input>
                                </template>
                                <template lwc:else>
                                    <lightning-record-edit-form object-api-name="Ticket__c" density="Compact">
                                        <lightning-input-field variant="label-hidden" field-name='Description__c'
                                            data-field-name="Description__c" data-index={index} name={index}
                                            value={task.Description__c} onchange={handleFieldChange}
                                            onkeydown={handleKeyDown} read-only={viewMode}>
                                        </lightning-input-field>
                                    </lightning-record-edit-form>
                                </template>
                            </td>
                        </tr>
                        <!-- Status -->
                        <tr>
                            <td class="tdOne">
                                <span>{fields.Status__c}</span>
                            </td>
                            <td class="tdTwo">
                                <template lwc:if={viewMode}>
                                    <lightning-input variant="label-hidden" value={task.Status__c} readonly>
                                    </lightning-input>
                                </template>
                                <template lwc:else>
                                    <lightning-record-edit-form object-api-name="Ticket__c" density="Compact">
                                        <lightning-input-field variant="label-hidden" field-name='Status__c'
                                            data-field-name="Status__c" data-index={index} name={index}
                                            value={task.Status__c} onchange={handleFieldChange}
                                            onkeydown={handleKeyDown}>
                                        </lightning-input-field>
                                    </lightning-record-edit-form>
                                </template>
                            </td>
                        </tr>
                        <!-- Priority -->
                        <tr>
                            <td class="tdOne">
                                <span>{fields.Priority__c}</span>
                            </td>
                            <td class="tdTwo">
                                <template lwc:if={viewMode}>
                                    <lightning-input variant="label-hidden" value={task.Priority__c} readonly>
                                    </lightning-input>
                                </template>
                                <template lwc:else>
                                    <lightning-record-edit-form object-api-name="Ticket__c" density="Compact">
                                        <lightning-input-field variant="label-hidden" field-name='Priority__c'
                                            data-field-name="Priority__c" data-index={index} name={index}
                                            value={task.Priority__c} onchange={handleFieldChange}
                                            onkeydown={handleKeyDown}>
                                        </lightning-input-field>
                                    </lightning-record-edit-form>
                                </template>
                            </td>
                        </tr>
                        <template if:true={isSouthAfrica}>
                            <!-- Category -->
                            <tr>
                                <td class="tdOne">
                                    <span>{fields.Category__c}</span>
                                </td>
                                <td class="tdTwo">
                                    <template lwc:if={viewMode}>
                                        <lightning-input variant="label-hidden" value={task.Category__c} readonly>
                                        </lightning-input>
                                    </template>
                                    <template lwc:else>
                                        <lightning-record-edit-form object-api-name="Ticket__c" density="Compact">
                                            <lightning-input-field variant="label-hidden" field-name='Category__c'
                                                data-field-name="Category__c" data-index={index} name={index}
                                                value={task.Category__c} onchange={handleFieldChange}
                                                onkeydown={handleKeyDown}>
                                            </lightning-input-field>
                                        </lightning-record-edit-form>
                                    </template>
                                </td>
                            </tr>

                            <!-- Product -->
                            <template if:true={task.isShowProduct}>
                                <tr>
                                    <td class="tdOne">
                                        <span style="color:red">*</span>
                                        <span>{fields.Product__c}</span>
                                        &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
                                        <a style="margin-right: 3rem;">
                                            <lightning-icon variant="success" icon-name="utility:dash" size="x-small"
                                                title="" data-index={index} onclick={deleteProductValue}>
                                            </lightning-icon>
                                            <span class="slds-assistive-text"></span>
                                        </a>
                                    </td>
                                    <td class="tdTwo">
                                        <lightning-record-edit-form object-api-name="Ticket__c" density="Compact">
                                            <lightning-input-field variant="label-hidden" field-name='Product__c'
                                                data-field-name="Product__c" data-index={index} name={index}
                                                value={task.Product__c} onchange={handleFieldChange} onkeydown={handleKeyDown}
                                                readonly>
                                            </lightning-input-field>
                                        </lightning-record-edit-form>
                                    </td>
                                </tr>
                                <tr>
                                    <td style="width: 100%;" class="tdOne" colspan="2">
                                        <c-lookup-lwc name="onProduct" data-index={index} obj-name="Product__c"
                                            op={lookupFilter}  read-only={viewMode}
                                            onlookupupdate={handleChangeProductOption}></c-lookup-lwc>
                                    </td>
                                </tr>
                            </template>
                        </template>
                        <!-- Due Date -->
                        <tr>
                            <td class="tdOne">
                                <span style="color:red">*</span>
                                <span>{fields.DueDate__c}</span>
                            </td>
                            <td class="tdTwo">
                                <lightning-record-edit-form object-api-name="Ticket__c">
                                    <lightning-input-field field-name="DueDate__c" variant="label-hidden"
                                        data-field-name="DueDate__c" data-index={index} value={task.DueDate__c}
                                        onchange={handleFieldChange} read-only={viewMode}>
                                    </lightning-input-field>
                                </lightning-record-edit-form>
                            </td>
                        </tr>

                        <!--chile Department -->
                        <template if:true={isShowDepartment}>
                            <!-- Department -->
                            <tr>
                                <td>
                                    <span>{fields.Department__c}</span>
                                    <lightning-helptext content={label.INSPECTION_REPORT_MSG_DEPARTMENT_USER} class="slds-m-left_xx-small">
                                    </lightning-helptext>
                                </td>
                                <td class="tdTwo">
                                    <template lwc:if={viewMode}>
                                        <lightning-input variant="label-hidden" value={task.Department__c} readonly>
                                        </lightning-input>
                                    </template>
                                    <template lwc:else>
                                        <lightning-record-edit-form object-api-name="Ticket__c">
                                            <lightning-input-field field-name='Department__c' variant="label-hidden"
                                                data-field-name="Department__c" data-index={index} name={index}
                                                value={task.Department__c} onchange={handleFieldChange}
                                                onkeydown={handleKeyDown}>
                                            </lightning-input-field>
                                        </lightning-record-edit-form>
                                    </template>
                                </td>
                            </tr>
                            <!-- Assigned to -->
                            <tr>
                                <td class="tdOne">
                                    <span>{fields.AssignedTo__c}</span>
                                </td>
                                <td class="tdTwo">
                                    <!-- 自定义组件 -->
                                    <c-lookup-lwc name="userLookup" data-index={index} data-field-name="AssignedTo__c" obj-name="User"
                                        op={lookupUserFilter} record-id={task.AssignedTo__c} read-only={viewMode}
                                        onlookupupdate={lookUpChangeHandler}></c-lookup-lwc>
                                </td>
                            </tr>
                        </template>

                        <template if:false={isShowDepartment}>
                            <!-- Assigned to -->
                            <tr>
                                <td class="tdOne">
                                    <span style="color:red">*</span>
                                    <span>{fields.AssignedTo__c}</span>
                                </td>
                                <td class="tdTwo">
                                    <!-- <lightning-record-edit-form object-api-name="Ticket__c">
                                        <lightning-input-field field-name="AssignedTo__c" variant="label-hidden"
                                            data-field-name="AssignedTo__c" data-index={index} value={task.AssignedTo__c}
                                            onchange={handleFieldChange} required></lightning-input-field>
                                    </lightning-record-edit-form> -->

                                    <!-- 自定义组件 -->
                                    <c-lookup-lwc name="userLookup" data-index={index} data-field-name="AssignedTo__c" obj-name="User"
                                        op={lookupUserFilter} record-id={task.AssignedTo__c} read-only={viewMode}
                                        onlookupupdate={lookUpChangeHandler}></c-lookup-lwc>
                                </td>
                            </tr>
                        </template>

                        <!-- Attachment -->
                        <tr>
                            <td class="tdOne">
                                <span>Attachment</span>
                            </td>
                            <td class="tdTwo">
                                <c-upload-files-lwc parent-id={recordId} record-id={task.Id} data-index={task.index}
                                    onselectfiles={handleSelectFiles} disabled-delete={viewMode}
                                    disabled-upload={viewMode}></c-upload-files-lwc>
                            </td>
                        </tr>

                        <!-- Action -->
                        <template if:false={viewMode}>
                            <tr>
                                <td class="tdOne">
                                    <span>Action</span>
                                </td>
                                <td class="tdTwo">

                                    <a style="margin-right: 3rem;">
                                        <lightning-icon variant="success" icon-name="utility:dash" size="x-small"
                                            title="" data-index={index} onclick={deleteTicket}>
                                        </lightning-icon>
                                        <span class="slds-assistive-text"></span>
                                    </a>
                                    <a style="margin-right: 3rem;">
                                        <lightning-icon variant="success" icon-name="utility:add" size="x-small"
                                            title="" data-index={index} onclick={addTicket}>
                                        </lightning-icon>
                                        <span class="slds-assistive-text"></span>
                                    </a>
                                </td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </template>
        </template>
    </template>
</template>
