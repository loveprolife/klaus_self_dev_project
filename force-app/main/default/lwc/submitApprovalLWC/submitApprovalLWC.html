<template>

    <div class="modal-header slds-modal__header">
        <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
                title="Close" onclick={cancel}>
            <lightning-icon icon-name="utility:close" alternative-text="close" size="small"></lightning-icon>
            <span class="slds-assistive-text">Close</span>
        </button>
        <h2 class="slds-text-heading--medium">
            {label.Submit_For_approval}
        </h2>
    </div>

    <!-- <template lwc:if={isShowWarning}>
        <lightning-card class="alertMessage">
            <template lwc:if={isShowSpinner}>
                 <lightning-spinner alternative-text="Loading" size="medium"  variant="brand"></lightning-spinner>
            </template>
            <lightning-icon icon-name="utility:warning"></lightning-icon>
            {label.Customer_Score_Pass_60}
       </lightning-card>
    </template> -->

    <div class="modal-body scrollable slds-modal__content slds-var-p-around_medium">
        <template if:true={isShowSpinner}>
            <lightning-spinner alternative-text="Loading" size="medium"  variant="brand"></lightning-spinner>
        </template>
        <lightning-card>
            <lightning-textarea class="slds-var-m-around_small" max-length="131072" label="Comments" name="input1" onchange={reportDataChange}></lightning-textarea>
        </lightning-card>
    </div>

    <div class="modal-footer slds-modal__footer">
        <template if:true={isShowSubmit}>
            <lightning-button
                variant="brand-outline"
                label="Cancel"
                onclick={cancel}
                class="slds-m-left_x-small"
            > </lightning-button>
            <lightning-button
                variant="brand"
                label="Submit"
                onclick={submit}
                class="slds-m-left_x-small"
            ></lightning-button>
        </template>
    </div>
</template>
