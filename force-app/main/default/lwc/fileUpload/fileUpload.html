<template>
    <div class="slds-card slds-p-around_medium">
        <div class="slds-grid slds-wrap slds-m-bottom_small">
            <div class="slds-col slds-size_1-of-1">
                <h2 class="slds-text-heading_medium">{label}</h2>
            </div>
        </div>

        <template if:true={showUploader}>
            <lightning-file-upload
                class="uploader"
                label={uploadButtonLabel}
                name="imageUploader"
                accept={acceptedFormats}
                record-id={recordId}
                multiple={multiple}
                disabled={disabled}
                onuploadfinished={handleUploadFinished}
                data-test="file-upload"
            >
            </lightning-file-upload>
        </template>

        <template if:true={isLoading}>
            <div class="slds-m-top_medium slds-align_absolute-center">
                <lightning-spinner size="small" alternative-text="Loading"></lightning-spinner>
            </div>
        </template>

        <template if:true={hasFiles}>
            <div class="slds-m-top_medium gallery">
                <template for:each={files} for:item="f">
                    <div key={f.contentDocumentLinkId} class="thumb slds-card__footer">
                        <div class="thumb-img" onclick={handlePreview}
                            data-version-id={f.contentVersionId} 
                            data-content-body-id={f.contentBodyId}
                            data-file-type={f.fileType}>
                            <img src={f.smallUrl} alt={f.title} />
                        </div>
                        <div class="thumb-title slds-truncate" title={f.title}>{f.title}</div>
                        <template if:true={f.deletable}>
                            <lightning-button-icon
                                icon-name="utility:delete"
                                alternative-text="Delete"
                                variant="bare"
                                onclick={handleDelete}
                                data-link-id={f.contentDocumentLinkId}
                                data-doc-id={f.contentDocumentId}
                                class="delete-btn"
                            ></lightning-button-icon>
                        </template>
                    </div>
                </template>
            </div>
        </template>

        <template if:false={hasFiles}>
            <p class="slds-text-color_weak slds-m-top_small">暂未上传图片</p>
        </template>
    </div>

    <template if:true={showPreview}>
        <section role="dialog" tabindex="-1" aria-modal="true" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
                            title="Close" onclick={closePreview}>
                        <lightning-icon icon-name="utility:close" alternative-text="close" size="small"></lightning-icon>
                        <span class="slds-assistive-text">Close</span>
                    </button>
                    <h2 class="slds-text-heading_medium">预览</h2>
                </header>
                <div class="slds-modal__content slds-p-around_medium">
                    <img class="preview-img" src={previewUrl} alt="preview" />
                </div>
                <footer class="slds-modal__footer">
                    <lightning-button variant="neutral" label="关闭" onclick={closePreview}></lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
