<template>
    <!-- 模态框的背景遮罩 -->
    <div if:true={message} class="slds-backdrop slds-backdrop_open" onclick={handleClose}></div>
    <!-- 模态框的容器 -->
    <div if:true={message} class="slds-modal slds-fade-in-open custom-modal">
        <div class="slds-modal__container custom-modal-container">
            <!-- 模态框的头部 -->
            <header class="slds-modal__header">
                <h2 class="slds-text-heading_medium slds-hyphenate">{title}</h2>
            </header>
            <!-- 模态框的内容区域 -->
            <div class="slds-modal__content slds-p-around_medium custom-modal-content">
                <template for:each={lines} for:item="line">
                    <div key={line} class="slds-grid slds-grid_align-spread slds-m-bottom_small custom-modal-line">
                        <!-- <span class="slds-icon_container" title={iconInfo.link}>
                            <svg class={iconInfo.class} aria-hidden="true">
                                <use xlink:href="/_slds/icons/utility-sprite/svg/symbols.svg#{iconInfo.link}"></use>
                            </svg>
                        </span> -->
                        <p class="slds-m-left_small">{line}</p>
                    </div>
                </template>
            </div>
            <!-- 模态框的底部 -->
            <footer class="slds-modal__footer">
                <lightning-button variant="brand" label="OK" onclick={handleClose}></lightning-button>
            </footer>
        </div>
    </div>
</template>
