<template>
    <template if:true={isMobile}>
        <div class="slds-var-m-around_xx-small">
            <button class="slds-button slds-button_neutral slds-button_stretch" onclick={openModal}>New</button>
        </div>
    </template>
    <template if:false={isMobile}>
        <div class="slds-clearfix">
            <div class="slds-float_right">
                <lightning-button label="New" onclick={openModal}></lightning-button>
            </div>
        </div>
    </template>

    <template if:true={isModalOpen}>
        <div>
            <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
                <template if:true={isShowSpinner}>
                    <lightning-spinner alternative-text="Uploading now"></lightning-spinner>
                </template>
                <div class="slds-modal__container">
                    <!-- Modal/Popup Header -->
                    <div class="slds-modal__header">
                        <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
                                title="Close" onclick={closeModal}>
                            <lightning-icon icon-name="utility:close" alternative-text="close" size="small"></lightning-icon>
                            <span class="slds-assistive-text">Close</span>
                        </button>
                        <h2 class="slds-text-heading_medium">{label.New_Event_Sales_Title}</h2>
                    </div>

                    <!-- Modal/Popup Body -->
                    <div class="slds-modal__content slds-var-p-around_large">
                        <div class="slds-float_right">
                            <span style="color: red">*</span>
                            = Required Information
                        </div>
                        
                        <lightning-record-edit-form class="slds-var-m-top_small" object-api-name="Event_Sales__c" layout-type="Comfy">
                            <lightning-input-field
                                class="slds-var-m-top_small"
                                field-name="Record_Type__c"
                                data-field-name="Record_Type__c" 
                                onchange={handleTypeChange}
                                value={type}
                                required
                                >
                            </lightning-input-field>
                        </lightning-record-edit-form>

                        <!-- Product类型 -->
                        <template if:true={isProductType}>
                            <!-- 在这里添加您需要的输入字段 -->
                            <lightning-record-edit-form class="slds-var-m-top_small" object-api-name="Event_Receipt__c" layout-type="Comfy" record-id={recordId}>
                                <!-- Sales_Region__c -->
                                <lightning-input-field
                                    style="display: none;"
                                    class="slds-var-m-top_small"
                                    field-name="Sales_Region__c"
                                    value={eventReceipt.Sales_Region__c}
                                    >
                                </lightning-input-field>
                                <!-- Product__c -->
                                <lightning-input-field 
                                    class="slds-var-m-top_small"
                                    field-name="Product__c"
                                    data-field-name="Product__c" 
                                    onchange={handleFieldChange}
                                    value={eventSales.Product__c}
                                    required>
                                </lightning-input-field>
                                <!-- Product Info -->
                                <template if:true={isHavePorduct}>
                                    <div class="slds-grid slds-text-title">
                                        <div class="slds-var-m-left_small">
                                            <span>Suggested Price : </span>
                                            <span style="color: green">{productInfo.Guiding_Price__c}</span>
                                        </div>
                                        <div class="slds-var-m-left_large">
                                            <span>Currency : </span>
                                            <span style="color: green">{productInfo.CurrencyIsoCode}</span>
                                        </div>
                                    </div>
                                </template>
                            </lightning-record-edit-form>

                            <lightning-record-edit-form object-api-name="Event_Sales__c" layout-type="Comfy">
                                <!-- Unit_Price__c -->
                                <lightning-input-field 
                                    class="slds-var-m-top_small"
                                    field-name="Unit_Price__c" 
                                    data-field-name="Unit_Price__c" 
                                    onchange={handleFieldChange}
                                    value={eventSales.Unit_Price__c}
                                    required>
                                </lightning-input-field>
                                <!-- CurrencyIsoCode -->
                                <!-- <lightning-input-field 
                                    class="slds-var-m-top_small"
                                    field-name="CurrencyIsoCode" 
                                    data-field-name="CurrencyIsoCode" 
                                    onchange={handleFieldChange}
                                    value={productCurrencyIsoCode}
                                    required>
                                </lightning-input-field> -->
                                <!-- Quantity__c -->
                                <lightning-input-field 
                                    class="slds-var-m-top_small"
                                    field-name="Quantity__c" 
                                    data-field-name="Quantity__c" 
                                    onchange={handleFieldChange}
                                    value={eventSales.Quantity__c}
                                    required>
                                </lightning-input-field>
                                <!-- Discount__c -->
                                <lightning-input-field 
                                    class="slds-var-m-top_small"
                                    field-name="Discount__c" 
                                    data-field-name="Discount__c" 
                                    onchange={handleFieldChange}
                                    value={eventSales.Discount__c}
                                    >
                                </lightning-input-field>
                                <!-- 保修是否显示checkbox -->
                                <div class="slds-var-m-left_xx-small slds-var-m-top_large" style="background-color: rgb(248, 248, 248);">
                                    <div class="slds-grid">
                                        <div>
                                            Warranty period increase
                                        </div>
                                        <div class="slds-col_bump-left" style="width:fit-content">
                                            <lightning-input 
                                                type="toggle" 
                                                label="Warranty period increase" 
                                                onchange={handleWarrantyChange}
                                                variant="label-hidden"
                                                checked={isShowWarranty}
                                                >
                                            </lightning-input>
                                        </div>
                                    </div>
                                    <!-- 显示保修 -->
                                    <template if:true={isShowWarranty}>
                                        <!-- Warranty_price_increase__c -->
                                        <lightning-input-field 
                                            field-name="Warranty_period_increase__c" 
                                            data-field-name="Warranty_period_increase__c" 
                                            onchange={handleFieldChange}
                                            value={eventSales.Warranty_period_increase__c}
                                            required>
                                        </lightning-input-field>
                                        <!-- Warranty_period_increase__c -->
                                        <lightning-input-field 
                                            class="slds-var-m-top_small"
                                            field-name="Warranty_price_increase__c" 
                                            data-field-name="Warranty_price_increase__c" 
                                            onchange={handleFieldChange}
                                            value={eventSales.Warranty_price_increase__c}
                                            required>
                                        </lightning-input-field>
                                    </template>
                                </div>
                            </lightning-record-edit-form>
                            
                            <!-- 配件是否显示checkbox -->
                            <div class="slds-var-m-left_xx-small slds-var-m-top_large" style="background-color: rgb(248, 248, 248);">
                                <div class="slds-grid">
                                    <div>
                                        Add Fix Wall Mount
                                    </div>
                                    <div class="slds-col_bump-left" style="width:fit-content">
                                        <lightning-input 
                                            type="toggle" 
                                            label="Add Fix Wall Mount" 
                                            onchange={handleAccessoriesChange}
                                            variant="label-hidden"
                                            checked={isShowAccessories}
                                            >
                                        </lightning-input>
                                    </div>
                                </div>
                                <!-- 显示配件 -->
                                <template if:true={isShowAccessories}>
                                    <lightning-record-edit-form object-api-name="Event_Receipt__c" layout-type="Comfy" record-id={recordId}>
                                        <!-- Sales_Region__c -->
                                        <lightning-input-field
                                            style="display: none;"
                                            field-name="Sales_Region__c"
                                            value={eventReceipt.Sales_Region__c}
                                            >
                                        </lightning-input-field>
                                        <!-- Accessories__c -->
                                        <lightning-input-field 
                                            class="slds-var-m-top_small"
                                            field-name="Accessories__c"
                                            data-field-name="Accessories__c" 
                                            onchange={handleAccessoriesFieldChange}
                                            value={eventSalesAccessories.Accessories__c}
                                            required>
                                        </lightning-input-field>
                                        <!-- Accessories Info -->
                                        <template if:true={isHaveAccessories}>
                                            <div class="slds-grid slds-text-title">
                                                <div class="slds-var-m-left_small">
                                                    <span>Suggested Price : </span>
                                                    <span style="color: green">{accessoriesInfo.Guiding_Price__c}</span>
                                                </div>
                                                <div class="slds-var-m-left_large">
                                                    <span>Currency : </span>
                                                    <span style="color: green">{accessoriesInfo.CurrencyIsoCode}</span>
                                                </div>
                                            </div>
                                        </template>
                                    </lightning-record-edit-form>
                                    <lightning-record-edit-form object-api-name="Event_Sales__c" layout-type="Comfy">
                                        <!-- Unit_Price__c -->
                                        <lightning-input-field 
                                            class="slds-var-m-top_small"
                                            field-name="Unit_Price__c" 
                                            data-field-name="Unit_Price__c" 
                                            onchange={handleAccessoriesFieldChange}
                                            value={eventSalesAccessories.Unit_Price__c}
                                            required>
                                        </lightning-input-field>
                                        <!-- CurrencyIsoCode -->
                                        <!-- <lightning-input-field 
                                            class="slds-var-m-top_small"
                                            field-name="CurrencyIsoCode" 
                                            data-field-name="CurrencyIsoCode" 
                                            onchange={handleAccessoriesFieldChange}
                                            value={accessoriesCurrencyIsoCode}
                                            required>
                                        </lightning-input-field> -->
                                        <!-- Quantity__c -->
                                        <lightning-input-field 
                                            class="slds-var-m-top_small"
                                            field-name="Quantity__c" 
                                            data-field-name="Quantity__c" 
                                            onchange={handleAccessoriesFieldChange}
                                            value={eventSalesAccessories.Quantity__c}
                                            required>
                                        </lightning-input-field>
                                    </lightning-record-edit-form>
                                </template>
                            </div> 
                        </template>
                        <!-- Discount类型 -->
                        <template if:true={isDiscountType}>
                            <lightning-record-edit-form object-api-name="Event_Sales__c" layout-type="Comfy">
                                <!-- Discount__c -->
                                <lightning-input-field 
                                    class="slds-var-m-top_small"
                                    field-name="Discount__c" 
                                    data-field-name="Discount__c" 
                                    onchange={handleFieldChange}
                                    value={eventSales.Discount__c}
                                    required
                                >
                                </lightning-input-field>
                                <!-- Description__c -->
                                <lightning-input-field 
                                    class="slds-var-m-top_small"
                                    field-name="Description__c" 
                                    data-field-name="Description__c" 
                                    onchange={handleFieldChange}
                                    value={eventSales.Description__c}
                                    required
                                >
                                </lightning-input-field>
                            </lightning-record-edit-form>
                        </template>
                       
                    </div>

                    <!-- Modal/Popup Footer -->
                    <div class="slds-modal__footer">
                        <div style="text-align: center;">
                            <lightning-button class="slds-var-p-right_medium" label="Cancel" onclick={closeModal}></lightning-button>
                            <lightning-button class="slds-var-p-right_medium" label="Save & New" onclick={handleSaveAndNew}></lightning-button>
                            <lightning-button variant="brand" label="Save" onclick={handleSave}></lightning-button>
                        </div>
                    </div>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </div>
    </template>
</template>
