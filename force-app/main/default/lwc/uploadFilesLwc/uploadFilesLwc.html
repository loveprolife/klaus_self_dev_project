<template>
     <div class="slds-box" style="border: 0px; padding: 0px;">
        <template if:true={isShowSpinner} >
            <lightning-spinner size="medium" variant="brand"></lightning-spinner>
         </template>
        <div class="slds-grid slds-wrap">
            <template for:each={records} for:item="record" for:index="index">
                <template lwc:if={record.isImage}>
                    <div class={colClass} key={record.Id} style="margin-bottom: 20px;">
                        <img src={record.src} alt={spinnerAlt} onerror={handleError} onload={handleLoad} style={record.style} data-id={record.ContentDocumentId} data-index={index} onclick={preview}/>
                        <img src={spinnerSrc} alt={spinnerAlt} onclick={handleSpinner} style={record.spinnerStyle}/>
                      </div>
                      <div class="slds-col slds-large-size_1-of-12 slds-medium-size_1-of-12 slds-size_1-of-12" key={record.Id} style="margin-bottom: 20px;">
                        <template if:false={disabledDelete}>
                            <lightning-icon variant="success" icon-name="utility:close" lwc:if={record.isSuccess}
                                size="x-small" title="" data-id={record.ContentDocumentId} data-index={index}
                                onclick={handleDeleteFile}>
                            </lightning-icon>
                        </template>
                      </div>
                </template>
                <template lwc:else>
                    <div class={colClass} key={record.Id} style="margin-bottom: 20px;">
                        <!-- <c-static-lookup-lwc data-id={record.ContentDocumentId} data-index={index} text={record.Title} icon-name={record.iconName} onclicktext={preview} onclear={handleDeleteFile}></c-static-lookup-lwc> -->
                        <div class="slds-file slds-file_card slds-has-title">
                            <figure>
                                <figcaption class="slds-file__title slds-file__title_card">
                                    <div class="slds-media slds-media_small slds-media_center">
                                        <div class="slds-media__figure slds-line-height_reset">
                                            <lightning-icon icon-name={record.iconName} size="x-small"
                                                        alternative-text="icon"></lightning-icon>
                                        </div>
                                        <div class="slds-media__body">
                                            <span class="slds-file__text slds-truncate" title={record.Title}>{record.Title}</span>
                                        </div>
                                    </div>
                                </figcaption>
                                <span class="slds-file__crop"  data-id={record.ContentDocumentId} data-index={index} onclick={preview}>
                                    <span class="slds-file__icon slds-icon_container" title="image">
                                        <lightning-icon icon-name={record.iconName} size="x-large"
                                                        alternative-text="icon"></lightning-icon>
                                    </span>
                                </span>
                            </figure>
                        </div>
                    </div>
                    <div class="slds-col slds-large-size_1-of-12 slds-medium-size_1-of-12 slds-size_1-of-12" key={record.Id} style="margin-bottom: 20px;">
                        <lightning-icon variant="success" icon-name="utility:close"
                            size="x-small" title="" data-id={record.ContentDocumentId} data-index={index}
                            onclick={handleDeleteFile}>
                        </lightning-icon>
                      </div>
                </template>
            </template>
        </div>
        <template if:false={disabledUpload}>
            <div class="slds-grid slds-wrap">
                <div class="slds-col slds-large-size_12-of-12 slds-medium-size_12-of-12 slds-size_12-of-12">
                    <lightning-file-upload
                        class="uploadFilesLwc-upload"
                        variant="label-hidden"
                        name="fileUploader"
                        record-id={attachId}
                        onuploadfinished={handleUploadFinished}
                        multiple
                    ></lightning-file-upload>                        
                </div>
            </div>
        </template>
        <c-modal-lwc hide-close-icon=true onok={handleOk} onclose={handleClose}>
            Are you sure delete the attachment?
        </c-modal-lwc>
    </div>
</template>
