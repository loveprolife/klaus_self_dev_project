<template>

    <template if:true={showCapture}>
        <c-capture-photo-lwc is-compress={captureCompress} onselect={handleCaptureComplete}></c-capture-photo-lwc>
    </template>

    <template if:true={showAllPage}>
        <div class="slds-is-relative">
            <!-- <div class="slds-modal__header" style="padding: 0px;"> -->
            <div class="slds-modal__header" style={styletest}>
                <template if:true={isTitlePage}>
                    <lightning-card class="slds-color__background_gray-4 pageHeader" title={label.CheckInCheckOut_Title} icon-name="standard:article">
                        <!-- <div slot="actions">
                            <div>
                                <div style="margin-left:5px;display:inline-block;">
                                    <template if:true={isCheckIn}>
                                        <lightning-button variant="brand" label={label.CheckInCheckOut_CHECK_IN} disabled></lightning-button>
                                    </template>
                                    <template if:false={isCheckIn}>
                                        <lightning-button variant="brand" label={label.CheckInCheckOut_CHECK_IN} onclick={handleCheckIn} ></lightning-button>
                                    </template>
                                </div>
                                <div style="margin-left:5px;display:inline-block;">
                                    <template if:true={isCheckOut}>
                                        <lightning-button variant="brand" label={label.CheckInCheckOut_CHECK_OUT} disabled></lightning-button>
                                    </template>
                                    <template if:false={isCheckOut}>
                                        <lightning-button variant="brand" label={label.CheckInCheckOut_CHECK_OUT} onclick={handleCheckOut}></lightning-button>
                                    </template>
                                </div>
                            </div>
                        </div> -->
                        <div slot="actions">
                            <div style="margin-left:5px;display:inline-block;">
                                <template if:true={isCheckIn}>
                                    <button class="slds-button slds-button_brand" disabled>{label.CheckInCheckOut_CHECK_IN}</button>
                                </template>
                                <template if:false={isCheckIn}>
                                    <button class="slds-button slds-button_brand" onclick={handleCheckIn}>{label.CheckInCheckOut_CHECK_IN}</button>
                                </template>
                            </div>
                            <div style="margin-left:5px;display:inline-block;">
                                <template if:true={isCheckOut}>
                                    <button class="slds-button slds-button_brand" disabled>{label.CheckInCheckOut_CHECK_OUT}</button>
                                </template>
                                <template if:false={isCheckOut}>
                                    <button class="slds-button slds-button_brand" onclick={handleCheckOut}>{label.CheckInCheckOut_CHECK_OUT}</button>
                                </template>
                                <!-- <lightning-button variant="brand" label="hehe" onclick={handle1}></lightning-button> -->
                            </div>
                        </div>
                        <div style="margin-bottom: 15px;" ></div>
                    </lightning-card>
                </template>
            </div>
            <div class="slds-modal__content" style={style}>
                <lightning-card>
                    <div class="slds-modal__content" style="padding-top:0px;">
                        <!-- test<br/>
                        {styletest}<br/>
                        {style} -->
                        <template if:true={isShowSpinner}>
                            <lightning-spinner alternative-text="Loading" size="medium"  variant="brand"></lightning-spinner>
                        </template>    
                        <template if:true={isDetailsPage}>
                            <div class="slds-grid slds-wrap slds-m-vertical_medium" style="width:100%;margin-top:0px;">
                                <div class="slds-col slds-size_12-of-12 slds-small-size_12-of-12 slds-large-size_6-of-12 slds-p-horizontal_small" style="width:100%;">
                                    <span><strong>{thisDay} {thisTime}</strong></span>
                                </div>

                                <div class="top_spacing" style="width:100%;">

                                </div>
                                
                                <div class="slds-col slds-size_12-of-12 slds-small-size_12-of-12 slds-large-size_6-of-12 slds-p-horizontal_small" style="width:60%;">
                                    <span><strong>{storeNameStr}</strong>&nbsp;&nbsp;&nbsp;</span><span style="color:red">{storeDistance}</span>
                                </div>

                                <div class="slds-col slds-size_12-of-12 slds-small-size_12-of-12 slds-large-size_6-of-12 slds-p-horizontal_small" style="width:40%; text-align: right;">
                                    <span style="color:#1A73E8;" onclick={handleShift}><strong>{label.CheckInCheckOut_SHIFT}</strong></span>
                                </div>
                                
                                <div class="top_spacing" style="width:100%;">

                                </div>
                                
                                <div class="slds-col slds-size_12-of-12 slds-small-size_12-of-12 slds-large-size_6-of-12 slds-p-horizontal_small" style="width:50%;">
                                    <strong style="color:grey;">{label.CheckInCheckOut_START_TIME}&nbsp;&nbsp;{startTime}</strong>
                                </div>

                                <div class="slds-col slds-size_12-of-12 slds-small-size_12-of-12 slds-large-size_6-of-12 slds-p-horizontal_small" style="width:50%; text-align: right;">
                                    <strong style="color:grey;">{label.CheckInCheckOut_END_TIME}&nbsp;&nbsp;{endTime}</strong>
                                </div>
                                
                                <div class="top_spacing" style="width:100%;">

                                </div>
                            </div>
                        </template> 

                        <div class="slds-col slds-size_12-of-12 slds-small-size_12-of-12 slds-large-size_6-of-12 slds-p-horizontal_small" style="width:100%;">
                            <iframe name='googleMap' src={googleMapVFUrl} width="100%" height="250px"></iframe>
                        </div>
                        
                        <template if:true={isDetailsPage}>
                            <div class="slds-grid slds-wrap slds-m-vertical_medium" style="width:100%;margin-top:0px;">
                                
                                <div class="slds-col slds-size_12-of-12 slds-small-size_12-of-12 slds-large-size_6-of-12 slds-p-horizontal_small" style="width:50%;">
                                    <strong style="color:grey;">{label.CheckInCheckOut_CURRENT_ADDR}</strong>
                                </div>

                                <div class="slds-col slds-size_12-of-12 slds-small-size_12-of-12 slds-large-size_6-of-12 slds-p-horizontal_small" style="width:50%; text-align: right;">
                                    <span style="color:#1A73E8;" onclick={getHighAccuracyPosition}><strong>{label.CheckInCheckOut_LOCATION}</strong></span>
                                </div>
                                
                                <hr style="margin-top: 5px; margin-bottom: 5px;">

                                <div class="slds-col slds-size_12-of-12 slds-small-size_12-of-12 slds-large-size_6-of-12 slds-p-horizontal_small" style="width:100%;">
                                    <div style="justify-content: space-between; display: flex;">
                                        <div style="justify-content: center; display: flex; align-items: center;">
                                            <template if:true={attendanceIsOnseit}>{label.CheckInCheckOut_PHOTO}</template>
                                            <template if:false={attendanceIsOnseit}>{label.CheckInCheckOut_PHOTO}*</template>
                                        </div>
                                        <div style="margin-right: 10px;">
                                            <table>
                                                <tr>
                                                    <template if:true={AndroidModel}>
                                                    <td>
                                                        <lightning-icon icon-name="utility:photo" alternative-text="photo" onclick={handleAndroidPhotoClick}></lightning-icon>
                                                    </td>
                                                    </template>
                                                    <template if:true={iOSModel}>
                                                    <td>
                                                        <label for="fileInput">
                                                            <lightning-icon icon-name="utility:photo" alternative-text="photo"></lightning-icon>
                                                        </label>
                                                        <input id="fileInput" style="display:none;" type="file" accept="image/*" capture="camera" onchange={handlephotoClick} />
                                                    </td>
                                                    </template>
                                                </tr>
                                            </table>
                                        </div>
                                    </div>
                                </div>

                                <template if:true={attendanceShowPhoto}>
                                    <div class="slds-col slds-size_12-of-12 slds-small-size_12-of-12 slds-large-size_6-of-12 slds-p-horizontal_small" style="width:100%;">
                                        <!-- <div style="justify-content: space-between; display: flex;">
                                            <div style="margin-left: 0px;"> -->
                                                <img id="viewPhoto" name="viewPhoto" style="width: 10%;" src={attendancePhotoStream} alt="photo" onclick={handleViewPhotoClick}/>
                                                <br/>
                                            <!-- </div>
                                            <div style="margin-right: 10px;"> -->
                                                <lightning-icon icon-name="utility:delete" alternative-text="delete" onclick={handleDelPhotoClick} size="small"></lightning-icon>
                                            <!-- </div>
                                        </div> -->
                                    </div>
                                </template>
            
                                <hr style="margin-top: 5px; margin-bottom: 5px;">
            
                                <div class="slds-col slds-size_12-of-12 slds-small-size_12-of-12 slds-large-size_6-of-12 slds-p-horizontal_small" style="width:100%;">
                                    {label.CheckInCheckOut_REMARK}
                                    <textarea required="" placeholder={label.CheckInCheckOut_REMARK_INFO} class="slds-textarea" maxlength="100" onchange={handleRemarkInput}></textarea>
                                </div>

                                <hr style="margin-top: 5px; margin-bottom: 5px;">
                                
                                <div class="top_spacing" style="width:100%;">

                                </div>
                                
                                <div class="slds-col slds-size_6-of-12 slds-small-size_6-of-12 slds-large-size_6-of-12 slds-p-horizontal_small" style="width:100%;">
                                    <div class="top_spacing">

                                        <div style="justify-content: space-between; display: flex;">
                                            <div style="justify-content: center; display: flex; align-items: center;">
                                                <strong style="color:grey;">{label.CheckInCheckOut_CHECK_IN_INFO}</strong>
                                            </div>
                                            <div style="margin-right: 0px;">
                                                <span style="color:#1A73E8;" onclick={handleViewList}><strong>{label.CheckInCheckOut_More}</strong></span>
                                            </div>
                                        </div>
                                        
                                        <table class="top_spacing">
                                            <tr>
                                                <td class="td_label">{label.CheckInCheckOut_TYPE}:</td>
                                                <td class="td_value">{checkInType}</td>
                                            </tr>
                                            <tr>
                                                <td class="td_label">{label.CheckInCheckOut_STATUS}:</td>
                                                <td class="td_value">{checkInStatus}</td>
                                            </tr>
                                            <tr>
                                                <td class="td_label">{label.CheckInCheckOut_RECORDED}:</td>
                                                <td class="td_value">{checkInRecorded}</td>
                                            </tr>
                                            <tr>
                                                <td class="td_label">{label.CheckInCheckOut_STORE}:</td>
                                                <td class="td_value">{checkInShopName}</td>
                                            </tr>
                                        </table>
                                    </div>

                                    <div class="top_spacing">
                                        <strong style="color:grey;">{label.CheckInCheckOut_CHECK_OUT_INFO}</strong><br/>
                                        
                                        <table class="top_spacing">
                                            <tr>
                                                <td class="td_label">{label.CheckInCheckOut_TYPE}:</td>
                                                <td class="td_value">{checkOutType}</td>
                                            </tr>
                                            <tr>
                                                <td class="td_label">{label.CheckInCheckOut_STATUS}:</td>
                                                <td class="td_value">{checkOutStatus}</td>
                                            </tr>
                                            <tr>
                                                <td class="td_label">{label.CheckInCheckOut_RECORDED}:</td>
                                                <td class="td_value">{checkOutRecorded}</td>
                                            </tr>
                                            <tr>
                                                <td class="td_label">{label.CheckInCheckOut_STORE}:</td>
                                                <td class="td_value">{checkOutShopName}</td>
                                            </tr>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        </template> 

                        <template if:true={isShiftPage}>
                            <div class="top_spacing" style="width:100%;">

                            </div>

                            <div class="slds-col slds-size_12-of-12 slds-small-size_12-of-12 slds-large-size_6-of-12 slds-p-horizontal_small" style="width:100%;">
                                {label.CheckInCheckOut_STORE}: {shiftStoreName}
                            </div>

                            <div class="top_spacing" style="width:100%;">

                            </div>

                            <div class="slds-col slds-size_12-of-12 slds-small-size_12-of-12 slds-large-size_6-of-12 slds-p-horizontal_small" style="width:100%;"> 
                                <div style="display: inline-block;margin-right:2%;width:70%;">
                                    <lightning-input placeholder={label.CheckInCheckOut_QUERY_STORE} type="search" value={shiftSearchInfo} onchange={handleSearchInput} ></lightning-input>  
                                </div>
                                <div class ="search" style="display: inline-block;vertical-align: bottom;width:28%">
                                    <span style="color:#1A73E8;" onclick={handleSearch}><strong>{label.CheckInCheckOut_QUERY}</strong></span>
                                </div>
                            </div>

                            <div class="slds-grid slds-wrap slds-m-vertical_medium" style="width:100%;margin-top:0px;">
                                <div class="slds-col slds-size_12-of-12 slds-small-size_12-of-12 slds-large-size_6-of-12 slds-p-horizontal_small" style="width:100%;">
                                    <lightning-datatable 
                                        data={shiftSearchStorInfo} 
                                        key-field = "Id" 
                                        column-widths-mode="fixed"
                                        columns={columns} 
                                        min-column-width = "111" 
                                        wrap-text-max-lines = "3"
                                        max-row-selection = "1"
                                        onrowselection={handleItem} > 
                                    </lightning-datatable>
                                </div>

                                <div class="top_spacing" style="width:100%;">

                                </div>

                                <div class="slds-col slds-size_12-of-12 slds-small-size_12-of-12 slds-large-size_6-of-12 slds-p-horizontal_small" style="width:50%; display: flex; justify-content: center; align-items: center;">
                                    <lightning-button variant="brand" label={label.CheckInCheckOut_CANCEL} onclick={handleCancel}></lightning-button>
                                </div>
                                <div class="slds-col slds-size_12-of-12 slds-small-size_12-of-12 slds-large-size_6-of-12 slds-p-horizontal_small" style="width:50%; display: flex; justify-content: center; align-items: center;">
                                    <lightning-button variant="brand" label={label.CheckInCheckOut_CONFIRM} onclick={handleConfirm}></lightning-button>
                                </div>
                            </div>
                        </template>
                    </div>
                </lightning-card>
            </div>
            
        </div>
    </template>
</template>
