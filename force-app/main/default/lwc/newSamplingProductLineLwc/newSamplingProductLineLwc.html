<template>
    <div class="slds-is-relative">
        <!-- Loading -->
        <template if:true={isShowSpinner}>
           <lightning-spinner size="medium" variant="brand"></lightning-spinner>
        </template>
  
        <div class="slds-modal__header" style="padding: 0px;">
            <lightning-card class="slds-color__background_gray-4 pageHeader" title={checkName} icon-name="standard:article">
                <div slot="actions">
                    <template if:true={submit}>
                        <div style="margin-left:5px;display:inline-block;">
                            <lightning-button class="slds-var-p-right_x-small backButton" variant="Neutral" label={label.INSPECTION_REPORT_BACK} onclick={handleBack}>
                            </lightning-button>
                        </div>
                    </template>
                    <template if:false={submit}>
                        <div style="margin-left:5px;display:inline-block;">
                            <lightning-button class="slds-var-p-right_x-small backButton" variant="Neutral" label={label.INSPECTION_REPORT_BACK} onclick={handleBack}>
                            </lightning-button>
                            <lightning-button class="my-brand" variant="brand" label={label.INSPECTION_REPORT_SAVE} onclick={handleSave}>
                            </lightning-button>
                        </div>
                    </template>
                </div>
            </lightning-card>
        </div>

        <lightning-accordion allow-multiple-sections-open>
            <template for:each={productLines} for:item="item">
                <lightning-accordion-section key={item} name="closed" label={item}>
                    <c-new-sampling-inspection-lwc2 
                        record-id={recordId} 
                        inspection-id={inspectionId} 
                        store-id={storeId} 
                        product-line={item} 
                        status={status}
                        unite-laser-t-v={uniteLaserTV}
                        submit={submit}
                        onselect={handleHasEdit}
                        onrefreshdata={handleRefreshData}>
                    </c-new-sampling-Inspection-lwc2>
                </lightning-accordion-section>
            </template>
        </lightning-accordion>
    </div>
    <template if:true={showAlert}>
        <c-custom-multiline-alert-with-icons-lwc
            title={alertTitle}
            message={alertMessage}
            icon-type={iconType}
            onclose={handleAlertClose}
        ></c-custom-multiline-alert-with-icons-lwc>
    </template>
</template>
