<template>
    <lightning-card>
        <h3 style="text-align: center;font-size: 1.5rem;
        font-weight: bold;">
            参展员工提报
        </h3>
        <!--  <hr> -->

        <div>
            <lightning-layout
                style="padding-left: 10px; padding-right: 10px;border-bottom:1px solid #DCDCDC; height:100px;">
                <lightning-layout-item padding="around-small" size="3">
                </lightning-layout-item>
                <lightning-layout-item padding="around-small" size="6">
                    <div class="custom-box slds-p-around_medium" style="padding-top: 0px;padding-left: 12px;">
                        <span>请输入您的LDAP账号(邮箱前缀@之前部分),举例：<span style="color: red;">cuijie3</span>@hisense.com 邮箱中标红部分为LDAP账号</span>
                        <lightning-input type="text" variant="label-hidden" label="请输入您的LDAP账号(邮箱前缀@之前部分)" value={xhNumber} placeholder="请输入LDAP账号"
                            style="padding-top: 0px;padding-left: 0px;" onchange={handleXhNumber}></lightning-input>
                    </div>
                </lightning-layout-item>
                <lightning-layout-item padding="around-small" size="3">
                </lightning-layout-item>
            </lightning-layout>
        </div>
        <template if:true={isShowSpinner}>
            <lightning-spinner size="medium" variant="brand"></lightning-spinner>
        </template>

        <div slot="footer">
            <lightning-button class="slds-m-top_small" label="返回" onclick={handleCancel}></lightning-button>
            &nbsp;
            <lightning-button class="slds-m-top_small" label="下一步" onclick={handleCreated}></lightning-button>
        </div>

    </lightning-card>
</template>
