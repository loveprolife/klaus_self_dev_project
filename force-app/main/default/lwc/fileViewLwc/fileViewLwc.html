<template>
    <article class="slds-card">
        <div class="slds-card__header slds-grid">
            <header class="slds-media slds-media_center slds-has-flexi-truncate">
              <div class="slds-media__figure slds-list_horizontal">
                  <div class="slds-var-p-top_xx-small slds-var-p-right_small">
                      <lightning-icon 
                      icon-name='standard:file' 
                      alternative-text='file' 
                      size='medium' 
                      title='File'
                  ></lightning-icon>
                  </div>
                  <div class="slds-media__body slds-align-middle" >
                      <span class="slds-text-title_bold">Files ({fileInfoListSize})</span>
                  </div>
              </div>
            </header>

            <div>
                <lightning-button-icon 
                    icon-name="utility:refresh" 
                    alternative-text="Refresh"
                    class="slds-m-left_xx-small"
                    title="Refresh"
                    onclick={refreshFileBox}
                    >
                </lightning-button-icon>
            </div>
        </div>
        
        <div class="slds-var-p-left_small slds-var-p-right_small slds-var-p-bottom_large">
            <table class="slds-table slds-table_bordered" style="border: 1px solid rgb(221, 219, 218);">
                <tr>
                    <td class="title">Title</td>
                    <td class="title">Last Modified</td>
                    <td class="title">Size</td>
                    <td class="title">FileType</td>
                    <template if:true={allowDownload}>
                        <td class="title">Action</td>
                    </template>
                </tr>
                <template for:each={fileInfoList} for:item="fileInfo" for:index="index">
                    <tr key='{fileInfo.index}'>
                        <td>
                            <a onclick={showFileDetail} 
                                data-id={fileInfo.ContentDocumentId} 
                                data-type={fileInfo.fileType} 
                                data-version-id={fileInfo.versionId} 
                                data-text={fileInfo.Title} 
                                data-url={fileInfo.ContentDocumentUrl}
                            >
                                <template lwc:if={fileInfo.isMP4}><lightning-icon icon-name='doctype:mp4' alternative-text='mp4' size='medium' title='mp4'></lightning-icon></template>
                                <template lwc:elseif={fileInfo.isEXCEL}><lightning-icon icon-name='doctype:excel' alternative-text='excel' size='medium' title='excel'></lightning-icon></template>
                                <template lwc:elseif={fileInfo.isDOC}><lightning-icon icon-name='doctype:word' alternative-text='word' size='medium' title='word'></lightning-icon></template>
                                <template lwc:elseif={fileInfo.isJPG}><lightning-icon icon-name='doctype:image' alternative-text='image' size='medium' title='image'></lightning-icon></template>
                                <template lwc:elseif={fileInfo.isTEXT}><lightning-icon icon-name='doctype:txt' alternative-text='txt' size='medium' title='txt'></lightning-icon></template>
                                <template lwc:elseif={fileInfo.isPDF}><lightning-icon icon-name='doctype:pdf' alternative-text='pdf' size='medium' title='pdf'></lightning-icon></template>
                                <template lwc:elseif={fileInfo.isCSV}><lightning-icon icon-name='doctype:csv' alternative-text='csv' size='medium' title='csv'></lightning-icon></template>
                                <template lwc:elseif={fileInfo.isPPT}><lightning-icon icon-name='doctype:ppt' alternative-text='ppt' size='medium' title='ppt'></lightning-icon></template>
                                <template lwc:elseif={fileInfo.isPNG}><lightning-icon icon-name='doctype:image' alternative-text='image' size='medium' title='image'></lightning-icon></template>
                                <template lwc:else><lightning-icon icon-name='doctype:unknown' alternative-text='unknown' size='medium' title='unknown'></lightning-icon></template>
                                <span style="margin-left: 6px;">{fileInfo.Title}</span>
                            </a>
                        </td>
                        <td>{fileInfo.LastModifiedDate}</td>
                        <td>{fileInfo.ContentSize}</td>
                        <td>{fileInfo.fileType}</td>
                        <template if:true={allowDownload}>
                            <td class="title">
                                <lightning-button-icon 
                                    icon-name="utility:download"  
                                    alternative-text="Download" 
                                    title="Download"
                                    data-version-id={fileInfo.versionId} 
                                    onclick={handleDownload}
                                ></lightning-button-icon>
                            </td>
                        </template>
                    </tr>
                    
                </template>
            </table>
        </div>
    </article>

    <template if:true={showPicture}>
        <template if:true={isJPG}>
            <c-file-view-jpg-lwc
                content-document-id={contentDocumentId}
                content-document-type={contentDocumentType}
                content-version-id={contentVersionId}
                show-file-download={allowDownload}
                show-file-detail={showDetail}
                oncloseview={closeView}
            ></c-file-view-jpg-lwc>
        </template>

        <template if:true={isDoc}>
            <c-file-view-doc-lwc
                content-document-id={contentDocumentId}
                content-document-type={contentDocumentType}
                content-version-id={contentVersionId}
                show-file-download={allowDownload}
                show-file-detail={showDetail}
                oncloseview={closeView}
            ></c-file-view-doc-lwc>
        </template>

    </template>
</template>
