<template>
    <lightning-card>
        <template if:true={isShowSpinner}>
            <lightning-spinner alternative-text="Loading" size="medium"  variant="brand"></lightning-spinner>
        </template>
        <div class = "slds-modal__header">
            <h2 class = "slds-modal__title slds-text-heading_medium slds-var-p-bottom_small">
                <template if:true={isNew}>New Training Documents Management</template>
                <template if:false={isNew}>Edit {recordName}</template>
            </h2>
        </div>
        <div class="slds-modal__content slds-var-p-around_large" >
            <div class="slds-float_right">
                <span style="color:red">*</span>
                <span> = Required Information</span>
            </div>
            <h3 class="slds-var-p-bottom_large">Information</h3>
            <lightning-record-edit-form object-api-name="Learning_Platform_Management__c" record-id={recordId} onsubmit={handleSaveClick} onsuccess={handleSuccessClick}>
                <div class="slds-grid slds-wrap">
                    <div class="slds-col slds-size_6-of-12 slds-var-p-left_small slds-var-p-right_small">
                        <lightning-input-field field-name="Name" required> </lightning-input-field>
                    </div>
                    <div class="slds-col slds-size_6-of-12 slds-var-p-left_small slds-var-p-right_small">
                        <lightning-input-field field-name="Type__c" required> </lightning-input-field>
                    </div>
                    <!-- <div class="slds-col slds-size_2-of-12 slds-var-p-right_small">
                        <lightning-input 
                            label="附件" 
                            name="fileUploader" 
                            onclick={handleFilesClick} 
                            onchange={handleFilesChange} 
                            type="file" 
                            accept={acceptedType}
                            required
                        ></lightning-input>
                        <template if:true={isNotHaveFile}>
                            <div class="slds-text-color_error">Please upload file</div>
                        </template>
                    </div>
                    
                    <div class="slds-col slds-size_4-of-12 slds-var-m-top_large">
                        <div class="slds-var-p-top_x-small slds-float_left">
                            <template lwc:if={isDoc}><lightning-icon icon-name='doctype:word' alternative-text='word' size='small' title='word'></lightning-icon></template>
                            <template lwc:elseif={isEXCEL}><lightning-icon icon-name='doctype:excel' alternative-text='excel' size='small' title='excel'></lightning-icon></template>
                            <template lwc:elseif={isTEXT}><lightning-icon icon-name='doctype:txt' alternative-text='txt' size='small' title='txt'></lightning-icon></template>
                            <template lwc:elseif={isJPG}><lightning-icon icon-name='doctype:image' alternative-text='image' size='small' title='image'></lightning-icon></template>
                            <template lwc:elseif={isCSV}><lightning-icon icon-name='doctype:csv' alternative-text='csv' size='small' title='csv'></lightning-icon></template>
                            <template lwc:elseif={isPDF}><lightning-icon icon-name='doctype:pdf' alternative-text='pdf' size='small' title='pdf'></lightning-icon></template>
                            <template lwc:elseif={isPPT}><lightning-icon icon-name='doctype:ppt' alternative-text='ppt' size='small' title='ppt'></lightning-icon></template>
                            <template lwc:elseif={isMP4}><lightning-icon icon-name='doctype:mp4' alternative-text='mp4' size='small' title='mp4'></lightning-icon></template>
                            <template lwc:elseif={isUnkown}><lightning-icon icon-name='doctype:unknown' alternative-text='unknown' size='small' title='unknown'></lightning-icon></template>
                        </div>
                        <div class="slds-var-p-top_small slds-var-p-left_xx-small slds-float_left" style="color:rgb(1, 118, 211)">{fileName}</div>
                    </div> -->
                    <template if:true={isNew}>
                        <div class="slds-col slds-size_4-of-12 slds-var-p-left_small slds-var-p-right_small">
                            <div style="position: relative;">
                                <lightning-input-field style="border-color: green;" field-name="Author_Email__c" required onchange={checkAuthorEmail}> </lightning-input-field>
                                <template if:true={isErrorAuthor}>
                                    <div class="triangle"></div>
                                    <div class="box"></div>
                                    <div class="slds-popover slds-popover_tooltip tooltip" role="tooltip">
                                        <div class="slds-popover__body">
                                            <lightning-icon icon-name='standard:first_non_empty' alternative-text='first_non_empty' size='small' title='first_non_empty'></lightning-icon>
                                            <span class="slds-var-p-left_x-small" style="font-size: 14px;">The e-mail doesn't exist in the system</span>
                                        </div>
                                    </div>
                                </template>
                            </div>
                            <template if:true={isErrorAuthor}>
                                <div class="slds-text-color_error slds-var-p-left_x-small">The e-mail doesn't exist in the system.</div>
                            </template>
                        </div>
                        <div class="slds-col slds-size_2-of-12 slds-var-p-left_small slds-var-p-right_small">
                            <lightning-input-field field-name="Author__c" value={author} readonly> </lightning-input-field>
                        </div>
                    </template>
                    <template if:false={isNew}>
                        <div class="slds-col slds-size_6-of-12 slds-var-p-left_small slds-var-p-right_small">
                            <div style="position: relative;">
                                <lightning-input-field style="border-color: green;" field-name="Author_Email__c" required onchange={checkAuthorEmail}> </lightning-input-field>
                                <template if:true={isErrorAuthor}>
                                    <div class="triangle"></div>
                                    <div class="box"></div>
                                    <div class="slds-popover slds-popover_tooltip tooltip" role="tooltip">
                                        <div class="slds-popover__body">
                                            <lightning-icon icon-name='standard:first_non_empty' alternative-text='first_non_empty' size='small' title='first_non_empty'></lightning-icon>
                                            <span class="slds-var-p-left_x-small" style="font-size: 14px;">The e-mail doesn't exist in the system</span>
                                        </div>
                                    </div>
                                </template>
                            </div>
                            <template if:true={isErrorAuthor}>
                                <div class="slds-text-color_error slds-var-p-left_x-small">The e-mail doesn't exist in the system.</div>
                            </template>
                        </div>
                        <div class="slds-col slds-size_6-of-12 slds-var-p-left_small slds-var-p-right_small">
                            <lightning-input-field field-name="Author__c" value={author} readonly> </lightning-input-field>
                        </div>
                    </template>
                    
                    <div class="slds-col slds-size_6-of-12 slds-var-p-left_small slds-var-p-right_small">
                        <lightning-input-field field-name="Validity__c" required> </lightning-input-field>
                    </div>
                    
                    <div class="slds-col slds-size_6-of-12 slds-var-p-left_small slds-var-p-right_small">
                        <lightning-input-field field-name="Sales_Region__c" required> </lightning-input-field>
                    </div>
                    <div class="slds-col slds-size_6-of-12 slds-var-p-left_small slds-var-p-right_small">
                        <lightning-input-field field-name="Person_Type__c" required> </lightning-input-field>
                    </div>

                    <div class="slds-col slds-size_6-of-12 slds-var-p-left_small slds-var-p-right_small">
                        <lightning-input 
                            label="Extra Person" 
                            name="file uploader" 
                            onchange={handleExtraPersonFile} 
                            type="file" 
                            accept=".csv"
                        ></lightning-input>
                        <lightning-pill-container 
                            items={items} 
                            onitemremove={handleItemRemove}
                        ></lightning-pill-container>
                        <template if:true={isErrorExtraPerson}>
                            <div class="slds-text-color_error">{isErrorExtraPersonMessage} don't exist in the system.</div>
                        </template>
                    </div>
                    <!-- <div class="slds-col slds-size_1-of-12 slds-var-m-top_large">
                        <lightning-button label="添加" title="添加" onclick={handleAddPersonClick}></lightning-button>
                    </div> -->
                    <template if:true={isNew}>
                        <div class="slds-col slds-size_3-of-12 slds-var-p-left_small slds-var-p-right_small">
                            <lightning-input-field field-name="Email_Notification__c"> </lightning-input-field>
                        </div>
                    </template>
                    <div class="slds-col slds-size_3-of-12 slds-var-p-left_small slds-var-p-right_small">
                        <lightning-input-field field-name="Allow_Download__c"> </lightning-input-field>
                    </div>
                    <div class="slds-var-m-bottom_large" style="width: 10px;"></div>

                    <div class="slds-col slds-size_12-of-12 modal-footer slds-modal__footer slds-var-m-top_medium slds-align_absolute-center" style="padding-bottom: 2rem;">
                        <lightning-button
                            class="slds-var-m-top_small"
                            label="Cancel"
                            onclick={handleCancelClick}
                            style="padding-right: 1rem;"
                        ></lightning-button>
                        <lightning-button
                            class="slds-var-m-top_small"
                            variant="brand"
                            type="submit"
                            name="Save"
                            label="Save"
                        ></lightning-button>
                    </div>
                </div>
            </lightning-record-edit-form>
        </div>
    </lightning-card>
</template>
