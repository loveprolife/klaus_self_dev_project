<template>
    <!-- Loading -->
    <template if:true={isShowSpinner} >
        <lightning-spinner style={spinnerStyle} size="medium" variant="brand"></lightning-spinner>
    </template>

    <div style={documentHeightStyle}>
        <div data-name="titleDiv" style="width:100%; background:white; padding:10px;">
            <div class="slds-form-element" onmouseleave={toggleResult}  data-source="lookupContainer">      
                <div class="slds-combobox_container slds-has-selection">
                    <!-- <label class="slds-form-element__label" for="combobox-id-1">{lookupLabel}</label> -->
                    <div class="lookupInputContainer slds-combobox slds-dropdown-trigger slds-dropdown-trigger_click" aria-expanded="false" aria-haspopup="listbox" role="combobox"> 
                    <div class="slds-combobox__form-element slds-input-has-icon slds-input-has-icon_left-right" role="none">
                        <div class="searchBoxWrapper slds-show">
                            <!--Lookup Input Field-->
                            <lightning-input                   
                                type="search"
                                data-source="searchInputField"
                                onclick={toggleResult}
                                onchange={handleKeyChange}
                                is-loading={isSearchLoading}
                                value={searchKey}
                                variant="label-hidden"
                                placeholder={label.STORE_MAP_SEARCH_PLACEHOLDER}
                            ></lightning-input>  
                        </div>
                        
                        <!--Lookup Selected record pill container start-->  
                        <div class="pillDiv slds-hide">        
                            <span class="slds-icon_container slds-combobox__input-entity-icon">
                                <lightning-icon icon-name={iconName} size="x-small" alternative-text="icon"></lightning-icon>  
                            </span>
                            <input type="text"
                                    id="combobox-id-1"
                                    value={selectedRecord.Name}       
                                    class="slds-input slds-combobox__input slds-combobox__input-value"
                                    readonly
                                    />
                            <button class="slds-button slds-button_icon slds-input__icon slds-input__icon_right" title="Remove selected option">
                                <lightning-icon icon-name="utility:close" size="x-small" alternative-text="close icon" onclick={handleRemove}></lightning-icon> 
                            </button>
                        </div>  
                    </div>
                    
                    <template if:false={searchKeyIsNull}>
                    <!-- lookup search result part start-->
                    <div style="margin-top:0px" id="listbox-id-5" class="slds-dropdown slds-dropdown_length-with-icon-7 slds-dropdown_fluid" role="listbox">
                        <ul class="slds-listbox slds-listbox_vertical" role="presentation">
                            <template if:false={searchKeyIsNull}>
                            <li role="presentation" class="slds-listbox__item">
                            <div onclick={handelSearchValue} class="slds-media slds-listbox__option slds-listbox__option_entity slds-listbox__option_term slds-has-focus" role="option">
                                <span style="pointer-events: none;" class="slds-media__figure slds-listbox__option-icon" >
                                    <lightning-icon icon-name="utility:search" size="x-small" alternative-text="icon" ></lightning-icon>  
                                </span>
                                <span class="slds-media__body">
                                    <span class="slds-listbox__option-text slds-listbox__option-text_entity">{searchKey}</span>
                                </span>
                            </div>
                            </li>
                            </template>

                            <template for:each={lstResult} for:item="obj">
                            <li data-recid={obj.Id} onclick={handelSelectedRecord} key={obj.Id} role="presentation" class="slds-listbox__item">
                            <div class="slds-media slds-listbox__option slds-listbox__option_entity slds-listbox__option_has-meta" role="option">
                                <span style="pointer-events: none;" class="slds-media__figure slds-listbox__option-icon" >
                                <span class="slds-icon_container" >
                                    <lightning-icon icon-name={iconName} size="small" alternative-text="icon" ></lightning-icon>  
                                </span>
                                </span>
                                <span style="pointer-events: none;" class="slds-media__body" >
                                <span  class="slds-listbox__option-text slds-listbox__option-text_entity">
                                    {obj.Name}&nbsp;({obj.object.Shop_Level__c})&nbsp;-&nbsp;&nbsp;<span style="color: red;">{obj.distanceStr}</span>
                                    <br/>
                                    <span style="font-size: xx-small;color: grey">{obj.GridName}&nbsp;&nbsp;{obj.AccountName}</span>
                                </span>
                                </span>
                            </div>
                            </li>
                            </template>
                            <!--ERROR msg, if there is no records..-->
                            <template if:false={hasRecords}>
                            <li class="slds-listbox__item" style="text-align: center; font-weight: bold;">{label.STORE_MAP_SEARCH_NO_RECORD_MSG}</li>
                            </template>
                        </ul>
                    </div>
                    </template>
                    </div>
                </div>
            </div>
        </div>

        <template if:true={showSearchView}>
            <div style={searchViewHeight}>
                <div class="slds-text-align_left">
                    <!-- Search Results for &apos;{searchKey}&apos;. -->
                    {searchResultsLabel}
                </div>
                <div data-id="queryListDiv" style={searchListHeight}>
                    <template iterator:info={queryList}>
                        <div key={info.value.Id} style="padding: 10px;">
                            <template if:false={info.first}>
                                <hr style="margin-top: 10px;margin-bottom: 10px;"/>
                            </template>
                            <div data-id={info.value.Id} onclick={handelQueryListClick}>
                                <c-store-map-item-lwc object-accessible={objectAccessible} store-info-datas={storeInfoDatas} info={info}></c-store-map-item-lwc>
                            </div>
                        </div>
                    </template>
                    <div class="slds-text-align_right">
                        <span onclick={handelQueryListAddItem} style="color: #1A73E8;padding: 10px;"><strong>More</strong></span>
                    </div>
                </div>
            </div>
        </template>
        <!-- isMobile -->
        <template if:true={isMobile}>
            <div>
                <div style="position:absolute;width:100%;">
                    <template if:false={showSearchView}>
                        <lightning-button 
                                label={label.STORE_MAP_STORE_LIST}
                                size="small"
                                onclick={gotoStoreList}>
                            </lightning-button>
                            <lightning-button 
                                icon-name="utility:refresh"
                                size="small"
                                onclick={refreshPositioning}>
                            </lightning-button>
                        <div class="" style="float: right;">
                            <template if:true={currentLat}>Lat: {currentLat}</template>
                            <br/>
                            <template if:true={currentLong}>Long: {currentLong}</template>
                        </div>
                    </template>
                </div>
                <iframe name='googleMap' src={googleMapVFUrl} width="100%" height={googleMapHeightStyle}></iframe>
                <template if:false={showSearchView}>
                    <div data-name="footerDiv" class="footerDiv">
                        <template if:true={isShowSpinner} >
                            <lightning-spinner size="small" variant="brand"></lightning-spinner>
                        </template>
                        <!-- <div class="slds-text-align_right">
                            <lightning-icon 
                                style="background:white;padding:5px;" 
                                icon-name="utility:refresh" 
                                size="small"
                                onclick={refreshPositioning}>
                            </lightning-icon>
                        </div> -->
                        <lightning-card>
                            <div>
                                <template if:true={hasStoreInfoData}>
                                    <div class="mobileViewBtnDiv up-down" onclick={storeInfoBtnClick}>
                                        <div data-name="storeInfoBtnDiv" style={storeInfoBtnStyle}>
                                            <lightning-icon 
                                            icon-name={storeInfoBtnIcon}
                                            size="xx-small"
                                            ></lightning-icon>
                                        </div>
                                    </div>
                                </template>
                                <template if:true={storeMarketsIsNull}>
                                    <!-- <div style="width: 100%; text-align: center; min-height: 30px;"> -->
                                    <div style={storeInfoViewHeightStyleIsNull}>
                                        <!-- No stores near current location -->
                                        {label.STORE_MAP_NO_STORE}
                                    </div>
                                </template>
                                <template if:false={storeMarketsIsNull}>
                                    <!-- <div style="max-height: 300px; overflow: auto;"> -->
                                    <div class="storeListContainer" style={storeInfoViewHeightStyle}>
                                        <template iterator:info={storeInfoDatas}>
                                            <div class={info.value.Id} key={info.value.Id} style="padding: 10px;">
                                                <template if:false={info.first}>
                                                    <hr style="margin-top: 10px;margin-bottom: 10px;"/>
                                                </template>
                                                <div data-id={info.value.Id} onclick={storeClick2}>
                                                    <c-store-map-item-lwc object-accessible={objectAccessible} store-info-datas={storeInfoDatas} info={info}></c-store-map-item-lwc>
                                                </div>
                                            </div>
                                        </template>
                                    </div>
                                </template>
                            </div>
                        </lightning-card>
                    </div>
                </template>
            </div>
        </template>
        <!-- isPC -->
        <template if:false={isMobile}>
            <div class="slds-box slds-theme_shade" style="padding: 0px;">
                <div class="slds-grid slds-wrap">
                    <div class="slds-col slds-size_4-of-6">
                        <template if:false={showSearchView}>
                            <div style="position:absolute;">
                                <div class="slds-text-align_right">
                                    <lightning-button 
                                        label={label.STORE_MAP_STORE_LIST}
                                        size="small"
                                        onclick={gotoStoreList}>
                                    </lightning-button>
                                    <lightning-button 
                                        icon-name="utility:refresh"
                                        size="small"
                                        onclick={refreshPositioning}>
                                    </lightning-button>
                                </div>
                            </div>
                        </template>
                        <iframe name='googleMap' src={googleMapVFUrl} width="100%" height={googleMapHeightStyle}></iframe>
                    </div>
                    <div class="slds-col slds-size_2-of-6">
                        <template if:false={showSearchView}>
                            <lightning-card>
                                <!-- <template if:true={storeInfoIsOnlyOne}>
                                    <div slot="footer" style="text-align: right;">
                                        <template if:true={onlyOneIsPromoter}>
                                            <lightning-button 
                                                style="margin-left: 10px;"
                                                label={label.STORE_MAP_PROMOTER}
                                                onclick={gotoPromoterViewPage}>
                                            </lightning-button>
                                            <lightning-button 
                                                style="margin-left: 10px;"
                                                label={label.STORE_MAP_MARKET}
                                                onclick={gotoMarketViewPage}>
                                            </lightning-button>
                                            <lightning-button 
                                                style="margin-left: 10px;"
                                                label={label.STORE_MAP_MONTH}
                                                onclick={gotoMonthViewPage}>
                                            </lightning-button>
                                        </template>
                                        <template if:true={onlyOneIsFloorwalker}>
                                            <lightning-button 
                                                style="margin-left: 10px;"
                                                label={label.STORE_MAP_FLOORWALKER}
                                                onclick={gotoFloorwalkerViewPage}>
                                            </lightning-button>
                                        </template>
                                        <lightning-button 
                                            style="margin-left: 10px;"
                                            label={label.STORE_MAP_STORE}
                                            onclick={gotoStoreViewPage}>
                                        </lightning-button>
                                    </div>
                                </template> -->
                                <div>
                                    <template if:true={storeMarketsIsNull}>
                                        <div style="width: 100%; text-align: center; min-height: 30px;">
                                            {label.STORE_MAP_NO_STORE}
                                        </div>
                                    </template>
                                    <template if:false={storeMarketsIsNull}>
                                        <div class="storeListContainer" style="max-height: 600px; overflow: auto;">
                                            <template iterator:info={storeInfoDatas}>
                                                <div class={info.value.Id} key={info.value.Id} style="padding: 10px;">
                                                    <template if:false={info.first}>
                                                        <hr style="margin-top: 10px;margin-bottom: 10px;"/>
                                                    </template>
                                                    <div data-id={info.value.Id} onclick={storeClick}>
                                                        <c-store-map-item-lwc object-accessible={objectAccessible} store-info-datas={storeInfoDatas} info={info}></c-store-map-item-lwc>
                                                    </div>
                                                </div>
                                            </template>
                                        </div>
                                    </template>
                                </div>
                            </lightning-card>
                        </template>
                    </div>
                </div>
            </div>
        </template>
    </div>
</template>
