<template>
    <div class="slds my-container container full-height" style="width: 100%;">
        <template if:true={isShowSpinner}>
            <lightning-spinner alternative-text="Loading" size="medium" variant="brand"></lightning-spinner>
        </template>
        <template if:false={isPc}>
            <lightning-card>
                <span title="" style="color: red;"> {label.Mobiletip} </span>
            </lightning-card>
        </template>
        <!-- 固定页眉 -->
        <template if:true={isPc}>
            <div>
                <div class="headDive" style=" top: 0; background: white; z-index: 1;">
                    <!-- 月计划基础信息 -->
                    <div class="slds-grid slds-var-m-left_xx-small" style="background-color: #f8f8f8;">
                        <!-- <div class="slds-col slds-size_2-of-12 slds-var-p-horizontal_x-small" style="">
                            <lightning-input type="text" label={label.PlanNumber} disabled="true" value={ShopPlanData.Name} style="padding-left: 1px;
                            padding-right: 1px;"></lightning-input>
                        </div> -->
                        <div class="slds-col slds-var-p-horizontal_x-small">
                            <c-searchable-combobox label={label.Floorwalker} value={selectedFloorwalkerName}
                                options={floorwalkers} onchange={floorwalkerChange} required="true">
                            </c-searchable-combobox>
                        </div>

                        <!-- <div class="slds-col slds-size_2-of-12 slds-var-p-horizontal_x-small">
                            <template if:true={showEditInput}>
                                <lightning-combobox name="progress" label={label.PlanYear}
                                    placeholder={label.PickPlanYear} value={ShopPlanData.Inspection_Year__c}
                                    options={yearsOptions} dropdown-alignment="auto" required onchange={yearChange}>
                                </lightning-combobox>
                            </template>

                            <template if:false={showEditInput}>
                                <lightning-input type="text" label={label.PlanYear} disabled="true"
                                    value={ShopPlanData.Inspection_Year__c}></lightning-input>
                            </template>

                        </div>
                        <div class="slds-col slds-size_2-of-12 slds-var-p-horizontal_x-small">
                            <template if:true={showEditInput}>
                                <lightning-combobox name="progress" label={label.PlanMonth}
                                    placeholder={label.PickPlanMonth} value={ShopPlanData.Inspection_Month__c}
                                    options={monthOptions} dropdown-alignment="auto" required
                                    onchange={monthChange}></lightning-combobox>
                            </template>
                            <template if:false={showEditInput}>
                                <lightning-input type="text" label={label.PlanMonth} disabled="true"
                                    value={ShopPlanData.Inspection_Month__c}></lightning-input>
                            </template>
                        </div> -->
                        <!-- Week -->
                        <!-- <div class="slds-col slds-size_1-of-12 slds-var-p-horizontal_x-small">
                            <template if:true={showEditInput}>
                                <lightning-combobox
                                name="progress"
                                label='Week'
                                value={ShopPlanData.week}
                                options={weekOptions} dropdown-alignment="auto" onchange={weekChange}></lightning-combobox>
                            </template>
                            <template if:false={showEditInput}>
                                <lightning-input type="text" label='Week' disabled="true" value={ShopPlanData.week}></lightning-input>
                            </template>
                        </div> -->

                        <!-- Store Name -->
                        <div class="slds-col slds-var-p-horizontal_x-small">
                            <div class="slds-is-relative" onkeyup={handleKeyUp}>
                                <lightning-input type="text" label={label.ShopName} value={storeNameOptionValue}
                                    onchange={storeNameChange}></lightning-input>
                                <div style="position: absolute; right:2px; bottom:7px; cursor: pointer">
                                    <lightning-icon icon-name='utility:search' alternative-text='search' size='x-small'
                                        title='search' onclick={handlerSearchStoreName}>
                                    </lightning-icon>
                                </div>
                            </div>
                        </div>

                        <!-- Store Level -->
                        <div class="slds-col slds-var-p-horizontal_x-small">
                            <lightning-record-edit-form object-api-name="Dictionary__c">
                                <lightning-input-field style="display: none;" field-name="Sales_Region_Picklist__c"
                                    data-field-name="Sales_Region_Picklist__c" value={salesRegion}>
                                </lightning-input-field>
                                <lightning-input-field style="padding: 0;" field-name="Store_Level__c"
                                    data-field-name="Store_Level__c" value={storeLevelOptionValue}
                                    onchange={storeLevelChange}>
                                </lightning-input-field>
                            </lightning-record-edit-form>
                        </div>
                        <!-- 校验渠道搜索框 -->
                        <div class="slds-col slds-var-p-horizontal_x-small">
                            <lightning-combobox name="progress" label={label.Channel_Name} value={customerOptionValue}
                                options={customerFilter} dropdown-alignment="auto" onchange={customerChange}>
                            </lightning-combobox>
                        </div>
                        <!-- 校验网格搜索框 -->
                        <div class="slds-col slds-var-p-horizontal_x-small">
                            <lightning-combobox name="progress" label={label.GridName} value={gridOptionValue}
                                options={griddingFilter} dropdown-alignment="auto" onchange={gridChange}>
                            </lightning-combobox>
                        </div>
                        <!-- 校验城市搜索框 -->
                        <div class="slds-col slds-var-p-horizontal_x-small">
                            <lightning-combobox name="progress" label={label.City} value={cityOptionValue}
                                options={cityFilter} dropdown-alignment="auto" onchange={cityChange}>
                            </lightning-combobox>

                        </div>

                        <div class="slds-col slds-var-p-horizontal_x-small">
                            <div>
                                <label class="slds-form-element__label">
                                    <span>&nbsp;</span>
                                </label>
                            </div>
                            <div>
                                <lightning-button variant="neutral" label={label.Reset} onclick={refresh}
                                    class="slds-var-m-left_small"></lightning-button>
                                <lightning-button variant="neutral" label='Store View' onclick={editView}
                                    icon-name="utility:freeze_column" icon-position="right"
                                    class="slds-var-m-left_small">
                                </lightning-button>
                            </div>
                        </div>

                        <!-- <div class="slds-col slds-size_4-of-12 slds-var-p-horizontal_x-small"></div> -->
                    </div>
                    <!-- 计数区 -->
                    <!-- <template if:true={dayOptions}>
                        <div style="background-color: #f8f8f8;">
                            <div class="slds-grid slds-var-p-top_small slds-var-p-left_small">
                                <div class="slds-var-m-right_large">
                                    {label.Inspection_Task_Planned_Store}&nbsp;
                                    <span
                                        class="slds-text-color_success slds-text-title_bold">{planStoreNum}/{totalStoreNum}</span>
                                </div>
                                <div class="slds-var-m-left_large">
                                    {label.Inspection_Task_Number}&nbsp;
                                    <span
                                        class="slds-text-color_success slds-text-title_bold">{taskCompletedTotal}/{taskTotal}</span>
                                </div>
                                <div class="slds-col_bump-left">
                                    <img src={IconGreen} width="20px">
                                    <span class="slds-var-m-left_xx-small">{label.Inspection_Task_Plan_Visit}</span>
                                </div>
                                <div class="slds-var-m-left_medium">
                                    <img src={IconBlue} width="20px">
                                    <span
                                        class="slds-var-m-left_xx-small">{label.Inspection_Task_Actual_Visit}</span>
                                </div>
                                <div class="slds-var-m-left_medium">
                                    <img src={IconOrange} width="20px">
                                    <span
                                        class="slds-var-m-left_xx-small">{label.Inspection_Task_Unscheduled_Visit}</span>
                                </div>
                                <div class="slds-var-m-left_medium slds-var-m-right_small slds-list_horizontal">
                                    <div class="slds-align_absolute-center"
                                        style="width: 17px; height:17px; background-color: rgb(246 200 200)"></div>
                                    <span class="slds-var-m-left_xx-small">{label.Exceed_Timelimit}</span>
                                </div>
                            </div>
                        </div>
                    </template> -->
                </div>
                <div class="my-content slds-var-p-left_small slds-var-p-top_small">
                    <div class="slds-modal__header" style="padding: 0px; margin-top: 0rem;">
                        <div class="slds-grid slds-nowrap">
                            <div class="slds-col slds-size_1-of-3">
                                <table class="slds-table_bordered highlight-table" style="table-layout:fixed;">
                                    <thead class="my-thead" style="position: sticky; top: 0; background: white;">
                                        <tr>
                                            <th class="slds-border_left slds-border_right slds-border_bottom slds-var-p-left_xx-small"
                                                style="width: 3%; text-align: center; background-color: #f3f2f2">
                                                {label.Order}
                                            </th>

                                            <th class="slds-border_left slds-border_right slds-border_bottom slds-var-p-left_xx-small"
                                                style="width: 10%; text-align: center; padding-top: 0.5rem;padding-bottom: 0.5rem; background-color: #f3f2f2">
                                                {label.Channel_Name}
                                            </th>

                                            <th class="slds-border_left slds-border_right slds-border_bottom slds-var-p-left_xx-small"
                                                style="width: 10%; text-align: center; padding-top: 0.5rem;padding-bottom: 0.5rem; background-color: #f3f2f2">
                                                {label.ShopName}
                                            </th>

                                            <th class="slds-border_left slds-border_right slds-border_bottom slds-var-p-left_xx-small"
                                                style="width: 4%; text-align: center; padding-top: 0.5rem; padding-bottom: 0.5rem; background-color: #f3f2f2">
                                                {label.ShopLevel}
                                            </th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <template for:each={monthplans} for:item="plans" for:index="index">
                                            <tr key={plans.planNum} class="slds-hint-parent slds-list_draggable">
                                                <td class="slds-border_left slds-border_right slds-border_bottom slds-var-p-left_xx-small"
                                                    style="width: 3%; text-align: center;">{plans.planNum}
                                                </td>

                                                <td class="slds-border_left slds-border_right slds-border_bottom slds-var-p-left_xx-small slds-truncate"
                                                    style="padding-top: 0.5rem; padding-bottom: 0.5rem; width: 10%;"
                                                    title={plans.shopOwner}>
                                                    {plans.shopOwner}
                                                </td>

                                                <td class="slds-border_left slds-border_right slds-border_bottom slds-var-p-left_xx-small slds-list__item slds-truncate"
                                                    style="padding-top: 0.5rem; padding-bottom: 0.5rem; width: 10%;"
                                                    draggable="true" ondragstart={handleDragStart}
                                                    data-storeid={plans.shopId} title={plans.shopName}>
                                                    {plans.shopName}
                                                </td>

                                                <td class="slds-border_left slds-border_right slds-border_bottom slds-var-p-left_xx-small"
                                                    style="padding-top: 0.5rem; padding-bottom: 0.5rem; width: 4%; text-align: center;">
                                                    {plans.shopLevel}
                                                </td>
                                            </tr>
                                        </template>
                                    </tbody>
                                </table>
                                <!-- <lightning-card title="用户列表">
                                    <ul class="slds-list_draggable">
                                        <template for:each={users} for:item="user">
                                            <li key={user.Id} class="slds-list__item slds-p-around_small"
                                                draggable="true" data-userid={user.Id}
                                                ondragstart={handleDragStart}>
                                                {user.Name}
                                            </li>
                                        </template>
                                    </ul>
                                </lightning-card> -->
                            </div>
                            <!-- 右侧日历 -->
                            <div class="slds-col slds-size_2-of-3">
                                <div class="my-thead1 slds-var-m-left_small slds-var-m-right_small slds-border_top slds-border_right slds-border_bottom slds-border_left"
                                    ondrop={handleDrop} ondragover={handleDragOver}
                                    style="position: sticky; top: 0; background: white;">
                                    <div
                                        class="slds-grid slds-var-m-left_small slds-var-m-left_small slds-var-m-top_small slds-var-m-bottom_small">
                                        <div class="slds-text-title_bold slds-list_horizontal">
                                            <lightning-button-icon icon-name="utility:chevronleft"
                                                onclick={previousMonth} class="slds-m-right_x-small">
                                            </lightning-button-icon>
                                            <span style="font-size: 1.2rem;">
                                                {currentMonth}
                                            </span>
                                            <lightning-button-icon icon-name="utility:chevronright" onclick={nextMonth}
                                                class="slds-var-m-left_x-small">
                                            </lightning-button-icon>
                                            <lightning-combobox class="slds-var-m-left_x-small" name="progress"
                                                variant="label-hidden" placeholder={label.PlanYear} value={currentYear}
                                                options={yearsOptions} dropdown-alignment="auto" onchange={yearChange}>
                                            </lightning-combobox>
                                        </div>
                                        <div class="slds-grid slds-wrap slds-grid_align-end slds-col_bump-left">
                                            <div class="slds-col slds-size_1-of-3"></div>
                                            <div class="slds-col slds-size_1-of-3 slds-list_horizontal">
                                                <!-- <img src={IconGreen} width="20px"> -->
                                                <div class="rounded-rect rounded-rect-green rounded-rect-size"></div>
                                                <span
                                                    class="slds-var-p-left_xx-small">{label.Inspection_Task_Plan_Visit}</span>
                                                <span
                                                    class="slds-var-p-left_xx-small slds-text-title_bold">{isPlanNumber}</span>
                                            </div>
                                            <div class="slds-col slds-size_1-of-3 slds-list_horizontal">
                                                <!-- <img src={IconBlue} width="20px"> -->
                                                <div class="rounded-rect rounded-rect-blue rounded-rect-size"></div>
                                                <span
                                                    class="slds-var-p-left_xx-small">{label.Inspection_Task_Actual_Visit}</span>
                                                <span
                                                    class="slds-var-p-left_xx-small slds-text-title_bold">{isActualNumber}</span>
                                            </div>
                                            <div
                                                class="slds-col slds-size_1-of-3 slds-list_horizontal slds-var-m-top_x-small">
                                                <!-- <img src={IconOrange} width="20px"> -->
                                                <div class="rounded-rect rounded-rect-orange rounded-rect-size"></div>
                                                <span
                                                    class="slds-var-p-left_xx-small">{label.Inspection_Task_Unscheduled_Visit}</span>
                                                <span
                                                    class="slds-var-p-left_xx-small slds-text-title_bold">{isUnscheduledNumber}</span>
                                            </div>
                                            <div
                                                class="slds-col slds-size_1-of-3 slds-list_horizontal slds-var-m-top_x-small">
                                                <!-- <div class="slds-align_absolute-center"
                                                    style="width: 17px; height:17px; background-color: rgb(246 200 200)">
                                                </div> -->
                                                <div class="rounded-rect rounded-rect-pink rounded-rect-size"></div>
                                                <span class="slds-var-p-left_xx-small">{label.Exceed_Timelimit}</span>
                                                <span
                                                    class="slds-var-p-left_xx-small slds-text-title_bold">{isExceedTimelimitNumber}</span>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="calendar-grid">
                                        <template for:each={weekDays} for:item="day">
                                            <div key={day} class="calendar-header">{day}</div>
                                        </template>
                                        <template for:each={calendarDays} for:item="day" for:index="index">
                                            <div key={day.day} class={day.cssClass} data-date={day.date}
                                                ondrop={handleDayDrop} ondragover={handleDragOver} data-index={index}
                                                onmouseenter={showCanDelete} onmouseleave={hideCanDelete}>
                                                <div>
                                                    <template if:true={day.spinner}>
                                                        <lightning-spinner alternative-text="Loading" size="small"
                                                            variant="brand"></lightning-spinner>
                                                    </template>
                                                </div>
                                                <div class={day.cssClassNumber}>
                                                    {day.day}
                                                </div>
                                                <div class="store-line-css">
                                                    <template if:true={day.taskListTemp}>
                                                        <template for:each={day.taskListTemp} for:item="task">
                                                            <div key={task.shopId} class="slds-is-relative">
                                                                <div class={task.cssClass} title={task.shopName}
                                                                    data-iscandelete={day.isCanDelete}
                                                                    data-taskid={task.taskId} data-shopid={task.shopId}
                                                                    data-shopname={task.shopName}
                                                                    data-taskdate={task.taskDate} data-note={task.note}
                                                                    ondblclick={showTooltipView}>
                                                                    {task.shopName}</div>
                                                                <template if:true={task.isPlan}>
                                                                    <template if:true={day.isCanDelete}>
                                                                        <!-- <lightning-button-icon icon-name="action:close"
                                                                            variant="brand" size="xx-small"
                                                                            data-shopid={task.shopId}
                                                                            data-taskid={task.taskId}
                                                                            style="position: absolute ;right: 6px; top: -1px"
                                                                            onclick={handleDeleteTask}>
                                                                        </lightning-button-icon> -->
                                                                        <template if:true={day.isShowDelete}>
                                                                            <img src={IconClose} width="16px"
                                                                                class="img_close"
                                                                                data-shopid={task.shopId}
                                                                                data-taskid={task.taskId}
                                                                                data-index={index}
                                                                                onclick={handleDeleteTask}>
                                                                        </template>
                                                                    </template>
                                                                </template>
                                                            </div>
                                                        </template>
                                                    </template>
                                                </div>
                                                <template if:true={day.isFoldable}>
                                                    <a class="more-font slds-var-m-left_small" data-taskdate={day.date}
                                                        data-tasklist={day.taskList} data-iscandelete={day.isCanDelete}
                                                        data-index={index} onclick={handlerShowMoreTask}>+
                                                        {day.moreNumber} More</a>
                                                </template>
                                            </div>
                                        </template>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </template>
    </div>

    <!-- 图片预览 -->
    <template if:true={isViewImgOpen}>
        <section role="dialog" tabindex="-1" aria-labelledby="modal-heading-01" aria-modal="true"
            aria-describedby="modal-content-id-1" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container ">
                <div class="slds-modal__header">
                    <h2 class="slds-text-heading--medium">
                        {label.ViewImage}
                    </h2>
                </div>
                <div class="slds-modal__content modalBody menu">
                    <!-- <lightning-formatted-rich-text value={viewImg}></lightning-formatted-rich-text>  -->
                    <div
                        style="border: 1px solid rgb(221, 219, 218);margin-left: 10px;margin-right: 10px;margin-top: 10px;">
                        <lightning-card title={label.Preview} icon-name="utility:image">
                            <img src={viewImg}>
                        </lightning-card>
                    </div>
                </div>
                <div class="modal-footer slds-modal__footer slds-size_1-of-1">
                    <lightning-button label={label.Return} onclick={closeViewModal} class="slds-p-around_x-small">
                    </lightning-button>
                </div>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

    <!-- 查看/编辑图片 -->
    <template if:true={showPhotoPage}>
        <section role="dialog" tabindex="-1" aria-labelledby="modal-heading-01" aria-modal="true"
            aria-describedby="modal-content-id-1" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container ">

                <div class="slds-modal__header">
                    <h2 class="slds-text-heading--medium">
                        {label.ViewImage}
                    </h2>
                </div>

                <div class="slds-modal__content modalBody menu">
                    <div class="slds-scrollable slds-col slds-size_2-of-2 slds-var-p-horizontal_x-small"
                        style="width: 100%;overflow-y: scroll;margin-top: 10px;">
                        <table class="slds-table slds-table_bordered">
                            <tr>
                                <td style="width: 5%;">{label.Order}</td>
                                <td style="width:65%;">{label.Description}</td>
                                <td style="width:30%;">{label.Picture}</td>
                            </tr>
                        </table>
                    </div>
                    <div class="slds-scrollable slds-col slds-size_2-of-2 slds-var-p-horizontal_x-small"
                        style={heightTable}>
                        <table class="slds-table slds-table_bordered">
                            <tbody>
                                <template for:each={sampleImages} for:item="images" for:index="index">
                                    <tr key={images.index}>
                                        <td style="width: 5%;">
                                            {images.index}
                                        </td>

                                        <td style="width: 65%;">
                                            <lightning-textarea max-length="131072" data-record="ReRe__c"
                                                value={images.sampleImages.ReRe__c} disabled></lightning-textarea>
                                        </td>

                                        <td style="width: 30%;">
                                            <img src={images.sampleImages.Sample_Images__c} onclick={viewImag}
                                                name={images.sampleImages.Sample_Images__c} data-record={index}>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </div>
                <div class="modal-footer slds-modal__footer slds-size_1-of-1">
                    <lightning-button slot="action" label={label.Return} onclick={closeviewImgMethod}
                        class="slds-p-around_x-small"></lightning-button>
                </div>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

    <!-- 是否保存确认页面 -->
    <template if:true={showCheckSave}>
        <section role="dialog" tabindex="-1" aria-labelledby="modal-heading-01" aria-modal="true"
            aria-describedby="modal-content-id-1" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container ">
                <template if:true={isShowSpinner}>
                    <lightning-spinner alternative-text="Loading" size="medium" variant="brand"></lightning-spinner>
                </template>
                <div class="slds-modal__header">
                    <h2 class="slds-text-heading--medium">
                        {label.SaveTheChanges}
                    </h2>
                </div>
                <div class="slds-modal__content modalBody menu">
                    <div class="slds-align_absolute-center slds-text-heading_medium" style="height:100px;">
                        {label.IsSaveTheChanges}
                    </div>
                </div>
                <div class="modal-footer slds-modal__footer slds-size_1-of-1">
                    <lightning-button slot="action" label={label.AbortSavingJump} onclick={notSave}
                        class="slds-p-around_x-small"></lightning-button>
                    <lightning-button slot="action" variant="brand" label={label.SavingJump} onclick={saveAndJump}
                        class="slds-p-around_x-small"></lightning-button>
                </div>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

    <!-- 创建Note页面 -->
    <div if:true={showTooltipFlag} class="custom-tooltip" style={modalOpenStyle}>
        <template if:true={isShowNoteSpinner}>
            <lightning-spinner alternative-text="Loading" size="xx-small"></lightning-spinner>
        </template>
        <button title="Close" onclick={closeModal} style="position: absolute; top: 0px; right: 0px; z-index: 99;">
            <lightning-icon icon-name="utility:close" alternative-text="close" size="xx-small"></lightning-icon>
            <span class="slds-assistive-text">Close</span>
        </button>
        <div class="slds-modal__header">
            <h2 class="slds-text-heading_medium">{label.Add_Note}</h2>
        </div>
        <div class="slds-modal__content slds-var-p-around_small">
            <lightning-record-edit-form object-api-name="Inspection_Shop_Task__c" layout-type="Compact">
                <div class="slds-grid slds-grid_vertical" id="modal-content-id-3">
                    <div class="slds-col">
                        <lightning-input-field field-name="Shop__c" data-id="disableData" onchange={handleFiledChange}
                            value={task.Shop__c} disabled> </lightning-input-field>
                    </div>
                    <div class="slds-col">
                        <lightning-input-field field-name="Inspection_Date__c" data-id="disableData"
                            onchange={handleFiledChange} value={task.Inspection_Date__c} disabled>
                        </lightning-input-field>
                    </div>
                    <div class="slds-col">
                        <lightning-input-field field-name="Note__c" data-id="disableData" onchange={handleFiledChange}
                            value={task.Note__c} disabled={showDisable}> </lightning-input-field>
                    </div>
                </div>
            </lightning-record-edit-form>
        </div>
        <template if:true={showButton}>
            <div class="modal-footer slds-modal__footer slds-size_1-of-1">
                <lightning-button variant="brand" label={label.Save} onclick={saveNote} class="slds-p-around_x-small">
                </lightning-button>
            </div>
        </template>
    </div>

    <!-- 点击展开日期所有的task -->
    <div if:true={showMoreTask} class="custom-tooltip" style={moreTaskStyle}>
        <template if:true={isShowMoreTaskSpinner}>
            <lightning-spinner alternative-text="Loading" size="xx-small"></lightning-spinner>
        </template>
        <button title="Close" onclick={closeMoreTaskModal}
            style="position: absolute; top: 0px; right: 0px; z-index: 99;">
            <lightning-icon icon-name="utility:close" alternative-text="close" size="xx-small"></lightning-icon>
            <span class="slds-assistive-text">Close</span>
        </button>
        <div class="slds-modal__header">
            <h2 class="slds-text-title_bold">{moreTaskDate}</h2>
        </div>
        <div class="slds-modal__content slds-var-p-around_small">
            <template for:each={moreTaskList} for:item="task">
                <div key={task.taskAndDate} class="slds-is-relative">
                    <div class={task.cssClass} title={task.shopName} data-iscandelete={moreTaskCanDelete}
                        data-taskid={task.taskId} data-shopid={task.shopId} data-shopname={task.shopName}
                        data-taskdate={task.taskDate} data-note={task.note} ondblclick={showTooltipView}>
                        {task.shopName}</div>
                    <template if:true={task.isPlan}>
                        <template if:true={moreTaskCanDelete}>
                            <img src={IconClose} width="16px" class="img_close" data-shopid={task.shopId}
                                data-taskid={task.taskId} onclick={handleDeleteMoreTask}>
                        </template>
                    </template>
                </div>
            </template>
        </div>
    </div>
</template>
