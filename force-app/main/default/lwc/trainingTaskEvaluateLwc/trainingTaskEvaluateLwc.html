<template>
    <template if:false={isExceedDate}>
        <div style="height: 1080px; background-color:#e6e6e6">
            <div class="title fontSize">培训任务答题</div>
            <div>
                <template if:true={isShowSpinner} >
                    <lightning-spinner class="slds-is-fixed" size="medium" variant="brand"></lightning-spinner>
                </template>
                <div class="star-container" style="background-color: #ffffff;" >
                    <template for:each={surveyList} for:item="survey" for:index="index">
                        <div key={survey.Id} class="slds-border_bottom slds-var-m-left_large slds-var-m-bottom_large">
                            <div class="slds-var-p-top_medium fontSize" style="margin-bottom: 40px">{survey}</div>
                            <c-star-ratings-training
                                read-only-star={isSubmited}
                                number-of-stars=5
                                size="xxlarge"
                                score-size="slds-text-heading_large"
                                show-score='false'
                                space-between="xlarge"
                                data-index={index}
                                onclick={handleRating}
                            ></c-star-ratings-training>
                            <div style="margin-bottom: 20px;"></div>
                        </div>
                    </template>
                </div>
                <div class="star-container slds-dl_horizontal slds-media_center slds-grid_align-center" style="margin-top: 160px; margin-bottom: 160px;">
                    <div style="transform: scale(3);">
                        <template if:true={isCanSave}>
                            <lightning-button
                                variant="brand"
                                label="提交答题"
                                onclick={saveEvaluate}
                                class="my-brand"
                            > </lightning-button>
                        </template>
                        <template if:false={isCanSave}>
                            <lightning-button
                                variant="brand"
                                label="提交答题"
                                disabled
                                class="my-brand"
                            > </lightning-button>
                        </template>
                    </div>
                </div>
            </div>
        </div>
    </template>
    <template if:true={isExceedDate}>
        <div class="star-container slds-dl_horizontal slds-media_center slds-grid_align-center">
            <div class="slds-var-p-top_medium fontSize">
                Qr code is invali
            </div>
        </div>
    </template>
</template>
