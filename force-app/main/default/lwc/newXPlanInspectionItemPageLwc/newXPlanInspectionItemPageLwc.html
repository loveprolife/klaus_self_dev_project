<template>
    <template if:true={spinnerFlag}>
        <lightning-spinner alternative-text="Loading" size="large"></lightning-spinner>
    </template>
    <div class="container full-height">
        <!-- <lightning-card class="slds-color__background_gray-4 pageHeader" title={checkLabel} icon-name="standard:article">
            <div slot="actions">
                <div style="margin-left:5px;display:inline-block;">
                    <lightning-button class="slds-var-p-right_x-small backButton" variant="Neutral" label={label.INSPECTION_REPORT_BACK} onclick={handleBack}>
                    </lightning-button>
                    <template if:true={showSave}>
                        <lightning-button class="my-brand" variant="brand" label={label.INSPECTION_REPORT_SAVE} onclick={handleSave} disabled={disabledSave}>
                        </lightning-button>
                    </template>
                </div>
            </div>
        </lightning-card> -->

        <div class="tree-node">
            <template for:each={treeData} for:item="tree" for:index="index">
                <div key={tree}>
                    <!-- <span>{tree.parent.CheckItem__r.Description__c}</span> -->
                    <div class="slds-grid slds-gutters">
                        <div class="slds-col slds-size_1-of-1">

                            <template if:true={tree.parent.CheckItem__r.Active__c}>
                                <div class="slds-card">

                                    <div class="slds-col" style="text-align: left;">
                                        <!-- <span>{item.CheckItem__r.Description__c}</span> -->
                                        <span style="color: red">*</span>
                                        <template if:true={submit}>
                                            <template if:false={tree.parent.Response__c}>
                                                <span style="color:red">{tree.parent.CheckItem__r.Description__c}</span>
                                            </template>
                                            <template if:true={tree.parent.Response__c}>
                                                <span>{tree.parent.CheckItem__r.Description__c}</span>
                                            </template>
                                        </template>
                                        <template if:false={submit}>
                                            <span>{tree.parent.CheckItem__r.Description__c}</span>
                                        </template>
                                        <template lwc:if={tree.parent.CheckItem__r.HelpText__c}>
                                            <lightning-helptext class="helptext" content={tree.parent.CheckItem__r.HelpText__c} ></lightning-helptext>
                                        </template>
                                    </div>

                                    <!-- Yes/NO -->
                                    <template if:true={tree.parent.yesNo}>

                                        <div class="slds-col slds-var-m-bottom_medium" style="text-align: left;">
                                            <!-- <lightning-combobox
                                                variant="label-hidden"
                                                data-id={item.CheckItem__c}
                                                data-index={index}
                                                placeholder="Select Progress"
                                                options={item.option}
                                                onchange={handleChangeYesAndNo}
                                                value={item.Response__c}
                                                disabled={disabled}>
                                            </lightning-combobox> -->
                                            <lightning-radio-group 
                                                type="button"
                                                variant="label-hidden"
                                                data-id={tree.parent.CheckItem__c}
                                                data-index={index}
                                                placeholder="Select Progress"
                                                options={tree.parent.option}
                                                onchange={handleChangeYesAndNo}
                                                value={tree.parent.Response__c}
                                                disabled={disabled}>
                                            </lightning-radio-group>
                                        </div>
                                        
                                    </template>
                                    
                                    <!-- 文本 -->
                                    <template if:true={tree.parent.text}>
                                        <div class="slds-col slds-var-m-bottom_medium">
                                            <template if:false={tree.parent.CheckItem__r.HasFile__c}>
                                                <lightning-input
                                                    variant="label-hidden"
                                                    data-id={tree.parent.Id}
                                                    data-index={index}
                                                    onblur={handleChangeResponse}
                                                    value={tree.parent.Response__c}
                                                    disabled={disabled}>
                                                </lightning-input>
                                            </template>
                                        </div>
                                    </template>

                                    <!-- 数字 -->
                                    <template if:true={tree.parent.integer}>
                                        <div class="slds-col slds-var-m-bottom_medium">
                                            <lightning-input
                                                variant="label-hidden"
                                                data-id={tree.parent.Id}
                                                data-index={index}
                                                type="number"
                                                message-when-step-mismatch="Please enter an integer"
                                                message-when-bad-input="Please enter an integer"
                                                onblur={handleChangeResponse}
                                                value={tree.parent.Response__c}
                                                disabled={disabled}>
                                            </lightning-input>
                                        </div>
                                    </template>
                                
                                    <!-- 多选 -->
                                    <template if:true={tree.parent.selection}>
                                        <div class="slds-col slds-var-m-bottom_medium">
                                            <div style="display: flex;flex-wrap:wrap;">
                                                <template for:each={tree.parent.option} for:item="selection" for:index="indexItem">
                                                    <lightning-input 
                                                        class="slds-var-m-right_medium"
                                                        data-id="checkbox" 
                                                        data-index={index}
                                                        key={selection.label} 
                                                        type="checkbox" 
                                                        label={selection.value}
                                                        value={selection.value}
                                                        onchange={handleChangeResponse}
                                                        checked={selection.flag}
                                                        disabled={disabled}>
                                                    </lightning-input>
                                                </template>
                                            </div>
                                        </div>
                                    </template>
                                
                                    <!-- 单选 -->
                                    <template if:true={tree.parent.picklist}>
                                        <div class="slds-col slds-var-m-bottom_medium">
                                            <lightning-combobox
                                                variant="label-hidden"
                                                data-id="checkItem"
                                                data-index={index}
                                                placeholder={tree.parent.Response__c}
                                                options={tree.parent.option}
                                                value={tree.parent.Response__c}
                                                onchange={handleChangeResponse}
                                                disabled={disabled}>
                                            </lightning-combobox>
                                        </div>
                                    </template>
                                
                                    <!-- 打分 -->
                                    <template if:true={tree.parent.score}>
                                        <div class="slds-col slds-var-m-bottom_medium">
                                            <lightning-combobox 
                                                variant="label-hidden"
                                                data-id={tree.parent.Id}
                                                data-index={index}
                                                placeholder="Select Progress"
                                                onchange={handleChangeResponse}
                                                value={tree.parent.Response__c}
                                                options={tree.parent.option}
                                                disabled={disabled}>
                                            </lightning-combobox>
                                        </div>
                                    </template>

                                    <!-- 是否有评论 -->
                                    <template if:true={tree.parent.CheckItem__r.HasComment__c}>
                                        <div class="slds-col" style="text-align: left;">
                                            <template if:true={tree.parent.CommentRequired}>
                                                <span style="color: red">*</span>
                                            </template>
                                            <span>
                                                Description
                                            </span>
                                        </div>
                                        <div class="slds-col slds-var-m-bottom_medium">
                                            <lightning-input
                                                variant="label-hidden"
                                                data-id={tree.parent.Id}
                                                data-index={index}
                                                onblur={handleChangeComments}
                                                value={tree.parent.Comments__c}
                                                disabled={disabled}>
                                            </lightning-input>
                                        </div>
                                    </template>

                                    <!-- 上传文件 -->
                                    <template if:true={tree.parent.CheckItem__r.HasFile__c}>
                                        <div class="slds-col" style="text-align: left;">
                                            <template if:true={tree.parent.FileRequired}>
                                                <span style="color: red">*</span>
                                            </template>
                                            <span>{label.Upload_Photo}</span>
                                        </div> 
                                        <div class="slds-col slds-var-m-bottom_medium slds-var-m-left_small">
                                            <c-new-upload-files-x-lwc
                                                record-id={tree.parent.Id}
                                                record-item-id={recordItemId}
                                                disabled-delete={disabled}
                                                disabled-upload={disabled}>
                                            </c-new-upload-files-x-lwc>
                                        </div>
                                    </template>
                                </div>
                            </template>
                        </div>
                    </div>
                    <!-- <template if:true={tree.children}>
                        <template for:each={tree.children} for:item="child" for:index="childIndex">
                            <c-new-inspection-item-note-page-lwc key={child} 
                                                                node={child} 
                                                                submit={submit} 
                                                                response={tree.parent.Response__c}
                                                                disabled={disabled}
                                                                need-refresh={needRefresh}
                                                                parent-index={index}
                                                                child-index={childIndex}
                                                                onselect={handleChangeHasEdit}
                                                                ondata={handleProcessingdata}></c-new-inspection-item-note-page-lwc>
                        </template>   
                    </template> -->
                </div>
            </template>
        </div>
    </div>
</template>
