<template>
    <template if:true={spinnerFlag}>
        <lightning-spinner alternative-text="Loading" size="large"></lightning-spinner>
    </template>
    <template if:true={showAllPage}>
        <lightning-card title="Check Item" icon-name="standard:article">
            <div slot="actions">
                <template if:false={isEditPage}>
                    <div style="margin-left:5px;display:inline-block;">
                        <lightning-button onclick={handleCancel}
                            label={label.INSPECTION_REPORT_BACK}></lightning-button>
                    </div>
                    <div style="margin-left:5px;display:inline-block;">
                        <button class="slds-button slds-button_brand"
                            onclick={handleEdit}>{label.INSPECTION_REPORT_EDIT}</button>
                    </div>
                </template>
                <template if:true={isEditPage}>
                    <div style="margin-left:5px;display:inline-block;">
                        <lightning-button onclick={handleCancel}
                            label={label.INSPECTION_REPORT_BACK}></lightning-button>
                    </div>
                    <div style="margin-left:5px;display:inline-block;">
                        <lightning-button onclick={save} label="Save&New"></lightning-button>
                    </div>
                    <div style="margin-left:5px;display:inline-block;">
                        <button type="button" class="slds-button slds-button_brand"
                            onclick={save}>{label.INSPECTION_REPORT_SAVE}</button>
                    </div>
                </template>
            </div>
        </lightning-card>
        <lightning-card name="basic information">
            <lightning-record-edit-form object-api-name="CheckItem__c" record-type-id={recordTypeId}>
                <lightning-layout multiple-rows style="margin: 20px;">
                    <lightning-layout-item size="12">
                        <!-- Sales Region -->
                        <lightning-input-field data-id="salesRegion" data-field-name="Sales_Region__c"
                            field-name="Sales_Region__c" variant="label-stacked" value={record.Sales_Region__c}
                            onchange={handleChangeSalesRegion} disabled={disabled}>
                            <!-- disabled="true"> -->
                        </lightning-input-field>
                    </lightning-layout-item>
                    <lightning-layout-item size="12">
                        <!-- Inspection Type -->
                        <lightning-input-field data-field-name="Inspection_Type__c" field-name="Inspection_Type__c"
                            variant="label-stacked" value={record.Inspection_Type__c}
                            onchange={handleChangeInspectionType} disabled="true" required>
                        </lightning-input-field>

                    </lightning-layout-item>

                    <lightning-layout-item size="12">
                        <!-- Item Type -->
                        <lightning-input-field data-field-name="Item_Type__c" field-name="Item_Type__c"
                            variant="label-stacked" value={record.Item_Type__c} onchange={handleChangeItemType}
                            disabled={disabled} required>
                        </lightning-input-field>
                    </lightning-layout-item>
                    <lightning-layout-item size="12">
                        <!-- Question Type -->
                        <lightning-input-field data-field-name="Question_Type__c" field-name="Question_Type__c"
                            variant="label-stacked" onchange={handleChanngeQuestionTypeInit} value={record.Question_Type__c}
                            disabled={disabled} required>
                        </lightning-input-field>
                    </lightning-layout-item>
                    <!--Max Int-->
                    <template if:true={isIntegerType}>
                        <lightning-layout-item size="12">
                            <!-- Question Type -->
                            <lightning-input-field data-field-name="Integer_Type_Max__c" field-name="Integer_Type_Max__c"
                                variant="label-stacked" onchange={handleChanngeIntegerTypeInit} value={record.Integer_Type_Max__c}
                                disabled={disabled}>
                            </lightning-input-field>
                        </lightning-layout-item>
                    </template>
                    <template if:true={isObjectType}>
                        <lightning-layout-item size="12">
                            <!-- Question Type -->
                            <lightning-input-field data-field-name="Object_Api_Name__c" field-name="Object_Api_Name__c"
                                variant="label-stacked" onchange={handleObjectApiName} value={record.Object_Api_Name__c}
                                disabled={disabled} required>
                            </lightning-input-field>
                        </lightning-layout-item>
                    </template>

                    <lightning-layout-item size="12">
                        <nav role="navigation" aria-label="Breadcrumbs">
                            <ol class="slds-breadcrumb slds-list_horizontal slds-wrap">
                                <li class="slds-breadcrumb__item">
                                    <label class="slds-form-element__label" for="text-input-id-47">
                                        <abbr class="slds-required" title="required">*
                                        </abbr>{label.Question_Description}</label>
                                    <!-- <a style="color:black"><span
                                            style="color: red;">*</span></a> -->
                                </li>
                                <li class="slds-breadcrumb__item" if:false={disabled}>
                                    <a href="javascript:void(0)" onclick={handleShowQuestionDescriptionPage}>Set
                                        Multiple Languages</a>
                                </li>
                            </ol>
                        </nav>

                        <lightning-input-field data-field-name="Description__c" field-name="Description__c"
                            variant="label-hidden" onchange={handleChangeDescription} value={record.Description__c}
                            disabled={disabled} required>
                        </lightning-input-field>

                    </lightning-layout-item>
                    <lightning-layout-item size="12">
                        <!-- Help Text -->
                        <nav role="navigation" aria-label="Breadcrumbs">
                            <ol class="slds-breadcrumb slds-list_horizontal slds-wrap">
                                <li class="slds-breadcrumb__item">
                                    <label class="slds-form-element__label" for="text-input-id-47">
                                        {label.Help_Text}</label>
                                    <!-- <a style="color:black"></a> -->
                                </li>
                                <li class="slds-breadcrumb__item" if:false={disabled}>
                                    <a href="javascript:void(0)" onclick={handleShowHelpTextPage}>Set Multiple
                                        Languages</a>
                                </li>
                            </ol>
                        </nav>
                        <lightning-input-field data-field-name="HelpText__c" field-name="HelpText__c"
                            value={record.HelpText__c} variant="label-hidden" disabled={disabled}
                            onchange={handleChangeHelpText}>
                        </lightning-input-field>
                    </lightning-layout-item>

                    <!-- Enter Choice -->
                    <lightning-layout-item size="12" if:true={showEnterChoice}>
                        <div class="slds-card">
                            <div class="slds-grid">
                                <div class="slds-col" style="width: 20%;">

                                    <span style="color: red">*</span>
                                    <span class="enterChoice">{label.Enter_Choice}</span>
                                </div>
                                <div class="slds-col">
                                    <lightning-button variant="brand" label="Add Choice" icon-name="utility:add"
                                        class="slds-m-left_x-small" onclick={handleAddChoice}
                                        disabled={disabled}></lightning-button>

                                </div>
                            </div>
                            <!-- <nav role="navigation" aria-label="Breadcrumbs">
                                <ol class="slds-breadcrumb slds-list_horizontal slds-wrap">
                                    <li class="slds-breadcrumb__item">
                                        <label class="slds-form-element__label" for="text-input-id-47">
                                            <abbr class="slds-required" title="required">*
                                            </abbr>{label.Enter_Choice}</label>
                                    </li>
                                    <li class="slds-breadcrumb__item" if:false={disabled}>
                                        <a href="javascript:void(0)" onclick={handleShowEnterChoiceDescriptionPage}>Set
                                            Multiple Languages</a>
                                    </li>
                                    <li>
                                        <div class="slds-col">
                                            <lightning-button variant="brand" label="Add Choice" icon-name="utility:add"
                                                class="slds-m-left_x-small" onclick={handleAddChoice}
                                                disabled={disabled}></lightning-button>
                                        </div>
                                    </li>
                                </ol>
                            </nav> -->

                            <!-- <template for:each={enterChoice} for:item="item" for:index="index">
                                <div class="slds-grid" key={item}>
                                    <div class="slds-col">
                                        <lightning-input data-index={index} value={item} disabled={disabled}
                                            onblur={handleChangeChoice}>
                                        </lightning-input>
                                    </div>
                                    <div class="slds-col" style="margin-top: 20px;">
                                        <lightning-button-icon variant="brand" icon-name="utility:delete"
                                            data-index={index} disabled={disabled}
                                            onclick={handleDelChoice}></lightning-button-icon>
                                    </div>
                                </div>
                            </template> -->
                            <table>
                                <tr>
                                    <td style="text-align: center;">{label.Local}</td>
                                    <td style="text-align: center;">{label.En}</td>
                                    <td style="text-align: center;">{label.Cn}</td>
                                </tr>
                                <template for:each={enterChoice} for:item="item" for:index="index">
                                    <tr key={item}>
                                        <!-- <template for:each={item} for:item="itemData" for:index="indexItem">
                                            <td key={itemData}>
                                                <div class="slds-col">
                                                    <lightning-input 
                                                        data-indexitem={indexItem} 
                                                        data-index={index}
                                                        value={itemData} 
                                                        disabled={disabled}
                                                        onblur={handleChangeChoice}>
                                                    </lightning-input>
                                                </div>
                                            </td>
                                        </template> -->
                                        <td>
                                            <div class="slds-col">
                                                <lightning-input 
                                                    data-index={index}
                                                    data-name='T'
                                                    value={item.T} 
                                                    disabled={disabled}
                                                    onblur={handleChangeChoice}>
                                                </lightning-input>
                                            </div>
                                        </td>
                                        <td>
                                            <div class="slds-col">
                                                <lightning-input 
                                                    data-index={index}
                                                    data-name='EN'
                                                    value={item.EN} 
                                                    disabled={disabled}
                                                    onblur={handleChangeChoice}>
                                                </lightning-input>
                                            </div>
                                        </td>
                                        <td>
                                            <div class="slds-col">
                                                <lightning-input 
                                                    data-index={index}
                                                    data-name='CN'
                                                    value={item.CN} 
                                                    disabled={disabled}
                                                    onblur={handleChangeChoice}>
                                                </lightning-input>
                                            </div>
                                        </td>
                                        <td>
                                            <div class="slds-col" style="margin-top: 20px;">
                                                <lightning-button-icon variant="brand" icon-name="utility:delete"
                                                    data-index={index} disabled={disabled}
                                                    onclick={handleDelChoice}>
                                                </lightning-button-icon>
                                            </div>
                                        </td>
                                    </tr>
                                </template>
                            </table>
                        </div>
                    </lightning-layout-item>
                    <!-- MaximumScore -->
                    <lightning-layout-item size="12" if:true={showMaximumScore}>
                        <lightning-input-field data-field-name="MaximumScore__c" field-name="MaximumScore__c"
                            variant="label-stacked" value={record.MaximumScore__c} disabled={disabled}
                            onchange={handleChangeMaximumScore}>
                        </lightning-input-field>
                    </lightning-layout-item>

                    <!-- wfc 新建的时候上传文件 -->
                    <div class="slds-var-m-top_small">
                        <label class="slds-form-element__label">Upload File</label>
                        <input
                            style="border:hidden; padding:0; margin:0"
                            type="file"
                            multiple
                            accept="image/*"
                            onchange={handleFileUpload}
                            class="slds-input"
                            disabled={disabled}
                            />
                        <!-- 缩略图显示 -->
                        <div class="slds-var-m-top_small">
                            <template for:each={files} for:item="thumbnail">
                                <div class="inline-block-div slds-var-m-right_small" key={thumbnail.key}>
                                    <img src={thumbnail.src} alt="Thumbnail" class="thumbnail" style="display:block"/>
                                    <template if:false={disabled}>
                                        <div>
                                            <lightning-icon 
                                                data-key={thumbnail.key} 
                                                icon-name='utility:close' 
                                                alternative-text='close' 
                                                size='medium' 
                                                title='close' 
                                                onclick={deleteFile}>
                                            </lightning-icon>
                                        </div>
                                    </template>
                                    <span style="color:green">{thumbnail.name}</span>
                                </div>
                            </template>
                        </div>
                    </div>
                    
                    <lightning-layout-item size="12">
                        <!-- Order_Number -->
                        <lightning-input type="number" value={record.OrderNumber__c} label={label.Order_Number}
                            message-when-step-mismatch="Please enter an integer"
                            message-when-bad-input="Please enter an integer" onblur={handleChangeOrderNumber}
                            variant="label-stacked" disabled={disabled} placeholder={orderExist} required>
                        </lightning-input>
                    </lightning-layout-item>
                    <lightning-layout-item size="12" if:true={showStatu}>
                        <lightning-combobox data-field-name="Product_Line__c" fiels-name="Product_Line__c"
                            label={label.Product_Line} variant="label-stacked" value={record.Product_Line__c}
                            options={productLineOptions} onchange={handleChangeProductLine}
                            disabled={disabled}></lightning-combobox>
                        <!-- wfc 产品线 -->
                        <lightning-input-field 
                            style="display: inline-block;" 
                            data-field-name="Product_Line_Pro__c"
                            field-name="Product_Line_Pro__c" 
                            value={record.Product_Line_Pro__c} 
                            onchange={handleChangeProductLinePro}
                            disabled={disabled} 
                            variant="label-stacked"
                            >
                        </lightning-input-field>
                    </lightning-layout-item>

                    <lightning-layout-item size="12" if:true={showStatu}>

                        <!-- <lightning-combobox data-field-name="Channel__c" fiels-name="Channel__c" variant="label-stacked"
                            label={label.Channel} value={record.Channel__c} options={channelOptions}
                            onchange={handleChangeChannel} disabled={disabled}></lightning-combobox> -->
                            Channel
                            <!-- 修改完关联channel item表 -->
                            <c-lookup-lwc 
                                label='Channel'
                                data-field-name="Channel_item__c" 
                                obj-name="Channel_item__c"
                                op={lookupChannelItemFilter} 
                                onlookupupdate={handleChangeChannel}
                                record-id={record.Channel_item__c}
                                read-only={disabled}>
                            </c-lookup-lwc>

                    </lightning-layout-item>
                    <lightning-layout-item size="12">
                        <!-- Active -->
                        <lightning-input-field style="display: inline-block;" data-field-name="Active__c"
                            field-name="Active__c" value={record.Active__c} onchange={handleChangeActive}
                            disabled={disabled} variant="label-stacked">
                        </lightning-input-field>
                    </lightning-layout-item>


                    <!-- </lightning-layout>

                <lightning-layout multiple-rows > -->
                    <lightning-layout-item size="12" if:true={showRelateQuestions}>
                        <!-- Relate to Other Questions -->
                        <lightning-input-field data-field-name="HasRelateQuestions__c"
                            field-name="HasRelateQuestions__c" value={record.HasRelateQuestions__c}
                            variant="label-stacked" disabled={disabled} onchange={handleShowRelateList}>
                        </lightning-input-field>
                    </lightning-layout-item>

                    <lightning-layout-item size="12" if:true={showRelateQuestions}>
                        <!-- 子任务循环标记 wfc -->
                        <template if:true={showRelateList}>
                            <lightning-input-field data-field-name="Is_Loop_Relate_Questions__c"
                                field-name="Is_Loop_Relate_Questions__c" value={record.Is_Loop_Relate_Questions__c}
                                variant="label-stacked" disabled={disabled} onchange={handleIsLoopRelateQuestions}>
                            </lightning-input-field>
                        </template>
                        
                        <!-- <template > -->
                        <lightning-button-icon icon-name="utility:add" disabled={disabled} onclick={handleAddRelate}
                            variant="brand"></lightning-button-icon>

                        <!-- <lightning-button label="+" >
                        </lightning-button> -->

                        <div class="slds-grid" if:true={showRelateList}>
                            <div class="slds-col">
                                <template for:each={relateList} for:item="item" for:index="index">
                                    <div class="slds-grid" key={item}>
                                        <div class="slds-col slds-size_2-of-6 slds-clearfix">
                                            <!-- score类型的子任务 wfc -->
                                            <template if:true={isScoreType}>
                                                <div class="slds-float_left" style="width: 48%;">
                                                    <lightning-input-field
                                                        data-index={index}
                                                        data-field-name="Score_Symbol__c" 
                                                        field-name="Score_Symbol__c"
                                                        name="Score"
                                                        variant="label-stacked" 
                                                        value={item.Score_Symbol__c} 
                                                        disabled={disabled}
                                                        required
                                                        onchange={handleRelate}>
                                                    </lightning-input-field>
                                                </div>
                                                <div class="slds-float_left" style="width: 48%;">
                                                    <lightning-select
                                                        data-index={index}
                                                        data-field-name="Parent_Select__c"
                                                        field-name="Parent_Select__c"
                                                        name="ParentSelect"
                                                        label="Response"
                                                        options={ScoreOptions}
                                                        value={item.Parent_Select__c}
                                                        onchange={handleRelate}
                                                        required 
                                                        disabled={disabled}>
                                                    </lightning-select>
                                                </div>
                                            </template>
                                            <!-- picklist类型的子任务 wfc -->
                                            <template if:true={isPicklistType}>
                                                <lightning-select
                                                    data-index={index}
                                                    data-field-name="Parent_Select__c"
                                                    field-name="Parent_Select__c"
                                                    name="ParentSelect"
                                                    label="Response"
                                                    options={picklistOptions}
                                                    value={item.Parent_Select__c}
                                                    onchange={handleRelate}
                                                    required 
                                                    disabled={disabled}>
                                                </lightning-select>
                                            </template>
                                            <!-- Multiple类型的子任务 wfc -->
                                            <template if:true={isMultipleType}>
                                                <lightning-select
                                                    data-index={index}
                                                    data-field-name="Parent_Select__c"
                                                    field-name="Parent_Select__c"
                                                    name="ParentSelectMultiple"
                                                    label="Response"
                                                    options={picklistOptions}
                                                    value={item.Parent_Select__c}
                                                    onchange={handleRelate}
                                                    required
                                                    multiple
                                                    size="3"
                                                    disabled={disabled}>
                                                </lightning-select>
                                            </template>
                                            <template if:true={isYesNoType}>
                                                <lightning-input-field name="response" data-field-name="Response"
                                                    field-name="Parent_Response__c" data-index={index}
                                                    value={item.Parent_Response__c} disabled={disabled}
                                                    onchange={handleRelate} variant="label-stacked">
                                                </lightning-input-field>
                                            </template>
                                            
                                        </div>
                                        <div class="slds-col slds-size_2-of-6">
                                            <lightning-input-field name="checkItemRelate" data-field-name="Parent__c"
                                                data-index={index} field-name="Parent__c" value={item.Id}
                                                disabled={disabled} onchange={handleRelate} variant="label-stacked">
                                            </lightning-input-field>
                                            <!-- <lightning-combobox
                                                    name="checkItemRelate"
                                                    data-index={index}
                                                    value={item.Check_Item_Relate__c}
                                                    disabled={disabled}
                                                    options={checkItemOptions}
                                                    onchange={handleRelate}>
                                                </lightning-combobox> -->
                                        </div>
                                        <div class="slds-col slds-size_2-of-6" style="margin-top: 20px;">
                                            <lightning-button-icon variant="brand" icon-name="utility:delete"
                                                data-index={index} disabled={disabled}
                                                onclick={handleDelChoiceRelate}></lightning-button-icon>
                                            <!-- <lightning-button label="-" >
                                            </lightning-button> -->
                                        </div>
                                    </div>
                                </template>
                            </div>

                        </div>

                    </lightning-layout-item>

                    
                    <lightning-layout-item size="12" if:true={showUploadFile}>
                        <!-- Upload Photo or File -->
                        <lightning-input-field data-field-name="HasFile__c" field-name="HasFile__c"
                            variant="label-stacked" value={record.HasFile__c} disabled={disabled}
                            onchange={handleShowFileConditionalType}>
                        </lightning-input-field>
                    </lightning-layout-item>
                    <lightning-layout-item size="12" if:true={showUploadFile}>
                        <!--  -->
                        <template if:true={showFileConditionalType}>
                            <div class="slds-grid container">
                                <div class="slds-col" style="width: 30%;">
                                    <template for:each={ConditionalType} for:item="item" for:index="index">
                                        <div class="slds-col slds-list_horizontal slds-var-m-top_x-small" key={item}>
                                            <lightning-input class="conditionalTypeInput" data-id="hasFile"
                                                data-index={index} type="checkbox" label={item.label}
                                                disabled={disabled} onchange={handleConditional}>
                                            </lightning-input>
                                            <lightning-helptext content={item.helptext}></lightning-helptext>
                                        </div>
                                    </template>
                                </div>

                                <!-- Conditional 附加条件-->
                                <div class="slds-col" style="width: 50%;">
                                    <template if:true={showConditionalYesNoInfoHasFile}>
                                        <div>
                                            <fieldset class="slds-form-element">
                                                <span class="slds-radio">
                                                    <input class="conditionalScoreInputFile" type="radio" id="radio-1"
                                                        value="Yes" name="conditionalYesNoRadioHasFile"
                                                        disabled={disabled}
                                                        onclick={handleConditionalYesNoInfoRadioHasFile} />
                                                    <label class="slds-radio__label" for="radio-1">
                                                        <span class="slds-radio_faux conditionalScoreInputFile"></span>
                                                        <span class="slds-form-element__label">Yes</span>
                                                    </label>
                                                </span>
                                                <span class="slds-radio">
                                                    <input type="radio" id="radio-2" value="No"
                                                        name="conditionalYesNoRadioHasFile" disabled={disabled}
                                                        onclick={handleConditionalYesNoInfoRadioHasFile} />
                                                    <label class="slds-radio__label" for="radio-2">
                                                        <span class="slds-radio_faux conditionalScoreInputFile"></span>
                                                        <span class="slds-form-element__label">No</span>
                                                    </label>
                                                </span>
                                            </fieldset>
                                        </div>
                                    </template>
                                    <template if:true={showConditionalScoreInfoHasFile}>
                                        <div class="slds-list_horizontal" style="position: relative; top: 9px">
                                            <lightning-input-field class="conditionalScoreInputFile"
                                                data-field-name="Conditional_Score_Has_File__c"
                                                field-name="Conditional_Score_Has_File__c" variant="label-stacked"
                                                disabled={disabled} value={record.Conditional_Score_Has_File__c}
                                                onchange={handleConditionalScoreInfoHasFile}>
                                            </lightning-input-field>

                                        </div>
                                    </template>
                                </div>
                            </div>
                        </template>
                    </lightning-layout-item>
                    <lightning-layout-item size="12" if:true={showComment}>
                        <!-- Has Comment -->
                        <lightning-input-field data-field-name="HasComment__c" field-name="HasComment__c"
                            variant="label-stacked" value={record.HasComment__c} disabled={disabled}
                            onchange={handleShowCommentConditionalType}>
                        </lightning-input-field>
                    </lightning-layout-item>
                    <lightning-layout-item size="12" if:true={showComment}>
                        <!-- showCommentConditionalType -->
                        <template if:true={showCommentConditionalType}>
                            <div class="slds-grid container">
                                <div class="slds-col" style="width: 30%;">
                                    <template for:each={ConditionalType} for:item="item" for:index="index">
                                        <div class="slds-col slds-list_horizontal slds-var-m-top_x-small" key={item}>
                                            <lightning-input class="conditionalTypeInputHasComment" data-id="hasComment"
                                                data-index={index} type="checkbox" label={item.label}
                                                disabled={disabled} onchange={handleConditional}>
                                            </lightning-input>
                                            <lightning-helptext content={item.helpCommenttext}></lightning-helptext>
                                        </div>
                                    </template>
                                </div>
                                <!-- Conditional 附加条件-->
                                <div class="slds-col" style="width: 50%;">
                                    <template if:true={showConditionalYesNoInfoHasComment}>
                                        <div>
                                            <fieldset class="slds-form-element">
                                                <span class="slds-radio">
                                                    <input class="conditionalScoreInputComment" type="radio"
                                                        id="radio-3" value="Yes" name="conditionalYesNoRadioHasComment"
                                                        disabled={disabled}
                                                        onclick={handleConditionalYesNoInfoRadioHasComment} />
                                                    <label class="slds-radio__label" for="radio-3">
                                                        <span
                                                            class="slds-radio_faux conditionalScoreInputComment"></span>
                                                        <span class="slds-form-element__label">Yes</span>
                                                    </label>
                                                </span>
                                                <span class="slds-radio">
                                                    <input type="radio" id="radio-4" value="No"
                                                        name="conditionalYesNoRadioHasComment" disabled={disabled}
                                                        onclick={handleConditionalYesNoInfoRadioHasComment} />
                                                    <label class="slds-radio__label" for="radio-4">
                                                        <span
                                                            class="slds-radio_faux conditionalScoreInputComment"></span>
                                                        <span class="slds-form-element__label">No</span>
                                                    </label>
                                                </span>
                                            </fieldset>
                                        </div>
                                    </template>
                                    <template if:true={showConditionalScoreInfoHasComment}>
                                        <div class="slds-list_horizontal" style="position: relative; top: 9px">
                                            <div class="slds-var-m-right_xx-small slds-var-m-top_xx-small">
                                                <span style="color: red">*</span>
                                                <span>Score &lt;</span>
                                            </div>
                                            <div>
                                                <lightning-input-field class="conditionalScoreInputComment"
                                                    data-field-name="Conditional_Score_Has_Comment__c"
                                                    field-name="Conditional_Score_Has_Comment__c" variant="label-hidden"
                                                    disabled={disabled} value={record.Conditional_Score_Has_Comment__c}
                                                    onchange={handleConditionalScoreInfoHasComment}>
                                                </lightning-input-field>
                                            </div>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </template>
                    </lightning-layout-item>
                    <template if:true={isProfileName}>
                        <lightning-layout-item size="12">
                            <!-- Is_Store_Rating__c	 -->
                            <lightning-input-field data-field-name="Is_Store_Rating__c" field-name="Is_Store_Rating__c"
                                variant="label-stacked" value={record.Is_Store_Rating__c} disabled={disabled}
                                onchange={handleHasRatingChange}>
                            </lightning-input-field>
                        </lightning-layout-item>
                        <lightning-layout-item size="12" if:true={record.Is_Store_Rating__c}>
                            <template if:true={isYesNoType}>
                                <lightning-combobox data-field-name="Standard_Result__c" fiels-name="Standard_Result__c"
                                    label={label.Standard_Result} variant="label-stacked" value={record.Standard_Result__c}
                                    options={standardOption} onchange={handleChangeStandardResult}
                                    disabled={disabled}>
                                </lightning-combobox>
                            </template>
                            <template if:true={isPicklistType}>
                                <lightning-combobox data-field-name="Standard_Result__c" fiels-name="Standard_Result__c"
                                    label={label.Standard_Result} variant="label-stacked" value={record.Standard_Result__c}
                                    options={standardOption} onchange={handleChangeStandardResult}
                                    disabled={disabled}>
                                </lightning-combobox>
                            </template>
                            <template if:true={isMultipleType}>
                                <lightning-dual-listbox
                                    data-field-name="Standard_Result__c"
                                    field-name="Standard_Result__c"
                                    label={label.Standard_Result}
                                    variant="label-stacked"
                                    value={record.Standard_Result__c}
                                    options={standardOption}
                                    onchange={handleChangeStandardResult}
                                    disabled={disabled}>
                                </lightning-dual-listbox>
                            </template>
                        </lightning-layout-item>
                        <lightning-layout-item size="12">
                            <!-- Has Image AI -->
                            <lightning-input-field data-field-name="Has_Image_AI__c" field-name="Has_Image_AI__c"
                                variant="label-stacked" value={record.Has_Image_AI__c} disabled={disabled}
                                onchange={handleHasImageAIChange}>
                            </lightning-input-field>
                        </lightning-layout-item>
                        <lightning-layout-item size="12" if:true={record.Has_Image_AI__c}>
                            <!-- Image Ai -->
                            <lightning-input-field data-field-name="Image_AI__c" field-name="Image_AI__c"
                                variant="label-stacked" value={record.Image_AI__c} disabled={disabled}
                                onchange={handleImageAIChange}>
                            </lightning-input-field>
                        </lightning-layout-item>
                    </template>
                    
                    <lightning-layout-item size="12" if:true={showTicket}>
                        <!-- Automatically Generate Ticket -->
                        <lightning-input-field data-field-name="Automatic_Generation_Ticket__c"
                            field-name="Automatic_Generation_Ticket__c" variant="label-stacked"
                            value={record.Automatic_Generation_Ticket__c} disabled={disabled}
                            onchange={handleShowTicketConditionalType}>
                        </lightning-input-field>
                    </lightning-layout-item>
                    <lightning-layout-item size="12" if:true={showTicket}>
                        <!-- showTicketConditionalType -->
                        <template if:true={showTicketConditionalType}>
                            <div class="slds-grid container">
                                <div class="slds-col" style="width: 30%;">
                                    <!-- <template for:each={ConditionalType} for:item="item" for:index="index">
                                        <div class="slds-col slds-list_horizontal slds-var-m-top_x-small" key={item}>
                                            <lightning-input 
                                                class="conditionalTypeInputHasTicket"
                                                data-id="hasTicket"
                                                data-index={index}
                                                type="checkbox"
                                                label={item.label}
                                                disabled={disabled}
                                                onchange={handleConditional}>
                                            </lightning-input>
                                            <lightning-helptext content={item.helptext}></lightning-helptext>
                                        </div>
                                    </template> -->
                                    <div class="slds-col slds-list_horizontal slds-var-m-top_x-small">
                                        <lightning-input class="conditionalTypeInputHasTicket" data-id="hasTicket"
                                            data-index=0 type="checkbox" label='Conditional' disabled={disabled}
                                            onchange={handleConditional}>
                                        </lightning-input>
                                        <lightning-helptext content={label.Conditional_Help_Text}></lightning-helptext>
                                    </div>
                                </div>
                                <!-- Conditional 附加条件-->
                                <div class="slds-col" style="width: 50%;">
                                    <template if:true={showConditionalYesNoInfoHasTicket}>
                                        <div>
                                            <fieldset class="slds-form-element">
                                                <span class="slds-radio">
                                                    <input class="conditionalScoreInputTicket" type="radio" id="radio-5"
                                                        value="Yes" name="conditionalYesNoRadioHasTicket"
                                                        disabled={disabled}
                                                        onclick={handleConditionalYesNoInfoRadioHasTicket} />
                                                    <label class="slds-radio__label" for="radio-5">
                                                        <span
                                                            class="slds-radio_faux conditionalScoreInputTicket"></span>
                                                        <span class="slds-form-element__label">Yes</span>
                                                    </label>
                                                </span>
                                                <span class="slds-radio">
                                                    <input type="radio" id="radio-6" value="No"
                                                        name="conditionalYesNoRadioHasTicket" disabled={disabled}
                                                        onclick={handleConditionalYesNoInfoRadioHasTicket} />
                                                    <label class="slds-radio__label" for="radio-6">
                                                        <span
                                                            class="slds-radio_faux conditionalScoreInputTicket"></span>
                                                        <span class="slds-form-element__label">No</span>
                                                    </label>
                                                </span>
                                            </fieldset>
                                        </div>
                                    </template>
                                    <template if:true={showConditionalScoreInfoHasTicket}>
                                        <div class="slds-list_horizontal" style="position: relative; top: 9px">

                                            <lightning-input-field class="conditionalScoreInputTicket"
                                                data-field-name="Conditional_Score_Has_Ticket__c"
                                                field-name="Conditional_Score_Has_Ticket__c" variant="label-stacked"
                                                disabled={disabled} value={record.Conditional_Score_Has_Ticket__c}
                                                onchange={handleConditionalScoreInfoHasTicket}>
                                            </lightning-input-field>

                                        </div>
                                    </template>
                                </div>
                            </div>
                        </template>
                    </lightning-layout-item>
                </lightning-layout>

            </lightning-record-edit-form>
        </lightning-card>
    </template>

    <!-- 问题描述多语言配置页面 -->
    <template if:true={showQuestionDescriptionPage}>
        <div class="slds-is-relative">
            <div class="slds-modal__header">
                <lightning-card class="slds-color__background_gray-4 pageHeader">
                    <c-new-question-description-page-lwc question-description-en={record.Description_EN__c}

                        onselect={handleCloseHelpTextPage}></c-new-help-text-page-lwc>

            </div>

    </template>
