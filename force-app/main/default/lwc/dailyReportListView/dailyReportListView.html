<template>
    <lightning-card title="Daily Report" icon-name="standard:unified_health_score">
        <lightning-button label="New" slot="actions" onclick={handleNewRecordClick}></lightning-button>
        <!-- <p class="slds-p-horizontal_small">Card Body (custom component)</p> -->
        <div slot="footer">
            <!-- 放dataTable数据 -->
            <!-- <lightning-datatable key-field="id" data={data} show-row-number-column row-number-offset={rowOffset}
                hide-checkbox-column columns={columns}>
            </lightning-datatable> -->

            <!-- 数据列表 -->
            <template if:true={data}>
                <template for:each={data} for:item="item">
                    <div key={item.nameUrl} class="report-item slds-p-around_small slds-border_bottom">
                        <p class="report-title">
                            <a href={item.nameUrl} target="_blank">{item.name}</a>
                        </p>
                        <p class="report-store">
                            Store: 
                            <a href={item.ShopUrl} target="_blank">{item.Shop__c}</a>
                        </p>
                        <p class="report-date">
                            *Date: {item.Report_Date__c}
                        </p>
                    </div>
                </template>
            </template>
        </div>
    </lightning-card>
</template>
