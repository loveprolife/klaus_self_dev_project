<template>
    <lightning-card class="slds-color__background_gray-4 pageHeader">
        <template if:false={downLoadFlag}>
            <header class = "slds-modal__header">
                <h2 class = "slds-modal__title slds-hyphenate slds-text-title_bold">
                    {objectLoad} Upload  
                </h2>
            </header>
            
            <template if:false={isdownLoad}>
                <div class="star-container slds-dl_horizontal slds-media_center slds-grid_align-center" >
                    <div>
                        <lightning-input label="" name="file uploader" onclick={handleFilesClick} onchange={handleFilesChange} type="file" accept={acceptedType}></lightning-input>
                    </div>
                </div>
            </template>
            <template if:true={isdownLoad}>
                <div class="slds-grid">
                    <div class="slds-col slds-size_1-of-1 slds-large-size_5-of-12"></div>
                    <!-- <div class="slds-col_bump-left" style="padding-left: 80px;"> -->
                    <div class="slds-col slds-size_1-of-1 slds-large-size_3-of-12" style="padding-left: 50px;">
                        <lightning-input label="" name="file uploader" onclick={handleFilesClick} onchange={handleFilesChange} type="file" accept={acceptedType}></lightning-input>
                    </div>
                    <!-- <div class="slds-col_bump-left" style="padding-top: 1rem;padding-right:20px"> -->
                    <div class="slds-col slds-size_1-of-1 slds-large-size_4-of-12" style="padding-top: 1.4rem;padding-left:30px">
                        <!-- <lightning-button icon-name="utility:arrow_bottom" onclick={downLoadTemplete}></lightning-button> -->
                        <lightning-button label={label.TrainingDownLoad} onclick={downLoadTemplete}></lightning-button>
                    </div>
                </div>
            </template>
            
            <div class="star-container slds-dl_horizontal slds-media_center slds-grid_align-center" >
                <template if:true={isHaveFile}>
                    <div style="padding-top: 2rem;color:green">{fileName}</div>
                </template>
                <template if:false={isHaveFile}>
                    <div style="padding-top: 2rem;color:red">{fileName}</div>
                </template>
            </div>
            <div class="star-container slds-dl_horizontal slds-media_center slds-grid_align-center" >
                <div style="padding-top: 4px;padding-bottom: 2rem;">
                   <lightning-button label={UploadFile} onclick={handleSave} variant="brand"></lightning-button>
                </div>
            </div>
        </template>
        
        <template if:true={downLoadFlag}>
            <header class = "slds-modal__header">
                <h2 class = "slds-modal__title slds-hyphenate slds-text-title_bold">
                    {objectLoad}  
                </h2>
            </header>
            <div class="star-container slds-dl_horizontal slds-media_center slds-grid_align-center" >
                <div style="padding-top: 30px;padding-bottom: 2rem;">
                    <lightning-button label='DownLoad' onclick={handleFilesDownLoad} variant="brand"></lightning-button>
                </div>
            </div>
        </template>

        <template if:true={showLoadingSpinner}>
            <lightning-spinner alternative-text="Uploading now"></lightning-spinner>
        </template>
        <div class="modal-footer slds-modal__footer">
            <lightning-button
                variant="brand-outline"
                label="Back"
                onclick={back}
                class="slds-m-left_x-small"
            > </lightning-button>
        </div>
    </lightning-card>
</template>
