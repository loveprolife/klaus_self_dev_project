<template>
    <article class="slds-card slds-template__container">
        <template if:true={isShowSpinner}>
            <lightning-spinner alternative-text="Loading" size="medium"  variant="brand"></lightning-spinner>
        </template>
        <div class="slds-card__header slds-grid">
          <header class="slds-media slds-media_center slds-has-flexi-truncate">
            <div class="slds-media__figure slds-list_horizontal">
                <div class="slds-var-p-top_xx-small slds-var-p-right_small">
                    <lightning-icon 
                    icon-name='standard:work_step_template' 
                    alternative-text='work_step_template' 
                    size='medium' 
                    title='Learning Platform'
                ></lightning-icon>
                </div>
                <div class="slds-media__body slds-align-middle" >
                    <span>Learning Platform</span>
                    <span class="slds-page-header__title">All</span>
                </div>
            </div>
          </header>
        </div>

        <div class="slds-card__body">
            <lightning-record-edit-form object-api-name="Learning_Platform_Management__c">
                <div class="slds-grid slds-wrap">
                    <div class="slds-col slds-size_2-of-8 slds-var-p-left_medium lgc-bg">
                        <lightning-input-field field-name="Name" value={title} onchange={handleName}> </lightning-input-field>
                    </div>
                    <div class="slds-col slds-size_2-of-8 slds-var-p-left_medium lgc-bg">
                        <lightning-input-field field-name="Type__c" value={type} onchange={handleType}> </lightning-input-field>
                    </div>
                    <div class="slds-col slds-size_2-of-8 slds-var-p-left_medium lgc-bg">
                        <lightning-input-field field-name="Author__c" value={author} onchange={handleAuthor}> </lightning-input-field>
                    </div>
                    <div class="slds-col slds-size_2-of-8 slds-var-p-left_medium lgc-bg"></div>

                    <div class="slds-col slds-size_2-of-8 slds-var-p-left_medium lgc-bg">
                        <lightning-input class="slds-var-p-left_xx-small slds-var-p-right_xx-small" type="date" name="startDate" label="Upload Time(Start)" value={startDate} onchange={handleStartDate}></lightning-input>
                        <template if:true={isShowStartError}>
                            <div class="slds-text-color_error slds-var-p-left_x-small">The start time must be less than the end time</div>
                        </template>
                    </div>
                    <div class="slds-col slds-size_2-of-8 slds-var-p-left_medium lgc-bg">
                        <lightning-input class="slds-var-p-left_xx-small slds-var-p-right_xx-small" type="date" name="endDate" label="Upload Time(End)" value={endDate} onchange={handleEndDate}></lightning-input>
                        <template if:true={isShowEndError}>
                            <div class="slds-text-color_error slds-var-p-left_x-small">The end time must be greater than the start time</div>
                        </template>
                    </div>
                    <div class="slds-col slds-size_2-of-8 slds-var-p-left_medium lgc-bg">
                        <div class="slds-var-p-left_xx-small slds-var-p-right_xx-small">
                            <lightning-select
                                name="allowDownload"
                                label="Allow Download"
                                value={allowDownload}
                                options={optionsAllowDownload}
                                onchange={handleAllowDownload}
                            ></lightning-select>
                        </div>
                    </div>
                    <div class="slds-col slds-size_1-of-8 slds-var-p-left_large lgc-bg">
                        <div class="slds-var-p-top_large slds-var-p-left_large slds-var-p-right_large">
                            <lightning-button
                            class=""
                            label="Clear"
                            stretch
                            onclick={handleClear}
                            ></lightning-button>
                        </div>
                    </div>
                    <div class="slds-col slds-size_1-of-8 lgc-bg">
                        <div class="slds-var-p-top_large slds-var-p-left_medium slds-var-p-right_large">
                            <lightning-button
                                class=""
                                variant="brand"
                                onclick={handleSearch}
                                label="Search"
                                stretch
                            ></lightning-button>
                        </div>
                    </div>
                </div>
            </lightning-record-edit-form>

            
            <div class="slds-var-p-around_large">
                <table class="slds-table slds-table_cell-buffer slds-table_bordered slds-table_col-bordered" role="grid">
                    <thead>
                        <tr class="slds-line-height_reset">
                            <th class="" scope="col">
                                <div class="slds-truncate slds-align_absolute-center" title="Title">Title</div>
                            </th>
                            <th class="" scope="col">
                                <div class="slds-truncate slds-align_absolute-center" title="Type">Type</div>
                            </th>
                            <th class="" scope="col">
                                <div class="slds-truncate slds-align_absolute-center" title="Author">Author</div>
                            </th>
                            <th class="" scope="col">
                                <div class="slds-truncate slds-align_absolute-center" title="Upload Date">Upload Date</div>
                            </th>
                            <th class="" scope="col">
                                <div class="slds-truncate slds-align_absolute-center" title="Action">Action</div>
                            </th>
                        </tr>
                    </thead>
                    <template if:true={isHaveData}>
                        <tbody>
                            <template for:each={data} for:item=item for:index="index">
                                <tr class="slds-hint-parent" key={item.index}>
                                    <td data-label="Title">
                                        <div class="slds-truncate slds-align_absolute-center">
                                            <a data-id={item.Id} onclick={learningPlatformView}>{item.Name}</a>
                                        </div>
                                    </td>
                                    <td data-label="Account Name">
                                        <div class="slds-truncate slds-align_absolute-center">{item.Type__c}</div>
                                    </td>
                                    <td data-label="Account Name">
                                        <div class="slds-truncate slds-align_absolute-center">{item.Author__c}</div>
                                    </td>
                                    <td data-label="Account Name">
                                        <div class="slds-truncate slds-align_absolute-center">{item.Upload_Date__c}</div>
                                    </td>
                                    <td data-label="Account Name">
                                        <div class="slds-truncate slds-align_absolute-center">
                                            <a data-id={item.Id} onclick={learningPlatformView}>查看</a>
                                        </div>
                                    </td>
                                </tr>
                            </template>
                        </tbody>
                    </template>
                </table>

                <template if:true={isHaveTips}>
                    <div class="slds-text-align_center slds-var-m-top_large" style="padding-top: 10rem">No item to display.</div>
                </template>
            </div>
        </div>
    </article>
</template>
