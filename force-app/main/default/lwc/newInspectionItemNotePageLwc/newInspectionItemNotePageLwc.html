<template>
    <div class="tree-node slds-text-align_left ">
        <template if:true={showPage}>
            <div class="slds-grid slds-gutters">
                <div class="slds-col slds-size_1-of-1">

                    <!-- YYL 移除掉初始化后Active为false不展示的逻辑 -->
                    <!-- <template if:true={node.parent.CheckItem__r.Active__c}> -->
                        <div class="slds-card">

                            <div class="slds-col" style="text-align: left;">
                                <!-- <span>{item.CheckItem__r.Description__c}</span> -->
                                <template if:true={fieldRed}>
                                    <!-- <span style="color: red">*</span>
                                    <span>{node.parent.CheckItem__r.Description__c}</span> -->
                                    <template lwc:if={inputFull}>
                                        <span style="color: red">*</span>
                                        <span>{node.parent.CheckItem__r.Description__c}</span>
                                    </template>
                                    <template lwc:else>
                                        <span style="color: red">*</span>
                                        <span style="color:red">{node.parent.CheckItem__r.Description__c}</span>
                                    </template>
                                </template>
                                <template if:false={fieldRed}>
                                    <span style="color: red">*</span>
                                    <span>{node.parent.CheckItem__r.Description__c}</span>
                                </template>
                                <template lwc:if={node.parent.CheckItem__r.HelpText__c}>
                                    <lightning-helptext class="helptext" content={node.parent.CheckItem__r.HelpText__c} ></lightning-helptext>
                                 </template>
                            </div>

                            <!-- YYL 必填示例图 20250303-->
                            <template if:true={node.parent.isImgList}>
                                <div class="slds-col" style="text-align: left;">
                                    <span style="text-align: left;">{label.Sample_Image}</span>
                                    <div class="slds-var-m-top_small" style="text-align: left;">
                                        <template for:each={node.imgList} for:item="picture">
                                            <div class="inline-block-div slds-var-m-right_small" key={picture.contentDocumentId}>
                                                <img src={picture.downloadUrl} alt="Thumbnail" class="thumbnail" style="display:block;width:10%;height:10%"
                                                    data-id={picture.contentDocumentId} onclick={preview}/>
                                            </div>
                                        </template>
                                    </div>
                                </div>
                            </template>

                            <!-- Yes/NO -->
                            <template if:true={node.parent.yesNo}>

                                <div class="slds-col" style="text-align: left;">
                                    <lightning-radio-group 
                                        type="button"
                                        variant="label-hidden"
                                        data-id={node.parent.CheckItem__c}
                                        data-index={index}
                                        placeholder="Select Progress"
                                        options={node.parent.option}
                                        onchange={handleChangeRelateHistory}
                                        value={node.parent.Response__c}
                                        disabled={disabled}>
                                    </lightning-radio-group>
                                </div>
                                
                            </template>
                            
                            <!-- 文本 -->                       
                            <!-- <template if:true={node.parent.text}>
                                <div class="slds-col">
                                    <lightning-input
                                        variant="label-hidden"
                                        data-id={node.parent.Id}
                                        data-index={index}
                                        onblur={handleChangeResponse}
                                        value={node.parent.Response__c}
                                        maxlength="255"
                                        disabled={disabled}>
                                    </lightning-input>
                                </div>
                            </template> -->

                            <template if:true={node.parent.text}>
                                <div class="slds-col slds-var-m-bottom_medium input-wrapper">
                                    <lightning-input
                                        variant="label-hidden"
                                        data-id={node.parent.Id}
                                        data-index={index}
                                        onchange={handleChangeResponse}
                                        value={node.parent.Response__c}
                                        disabled={disabled}
                                        class={node._inputClass}>
                                    </lightning-input>
                                </div>
                                <template if:true={node._rowError}>
                                    <lightning-layout>
                                        <lightning-layout-item class="slds-var-p-horizontal_small">
                                            <div class="slds-form-element__help slds-text-color_error">
                                                {label.Inspection_Max_Text}
                                            </div>
                                        </lightning-layout-item>
                                    </lightning-layout>
                                </template>
                            </template>
                        
                            <!-- 数字 -->
                            <template if:true={node.parent.integer}>
                                <div class="slds-col">
                                    <lightning-input
                                        variant="label-hidden"
                                        data-id={node.parent.Id}
                                        data-index={index}
                                        type="number"
                                        message-when-step-mismatch="Please enter an integer"
                                        message-when-bad-input="Please enter an integer"
                                        onchange={handleChangeResponse}
                                        value={node.parent.Response__c}
                                        disabled={disabled}
                                        class={node._inputClass}>
                                    </lightning-input>
                                </div>
                                <template if:true={node._rowError}>
                                    <lightning-layout>
                                        <lightning-layout-item class="slds-var-p-horizontal_small">
                                            <div class="slds-form-element__help slds-text-color_error">
                                                {node.IntegerMaxTips}
                                            </div>
                                        </lightning-layout-item>
                                    </lightning-layout>
                                </template>
                            </template>
                        
                            <!-- 多选 -->
                            <template if:true={node.parent.selection}>
                                <div class="slds-col">
                                    <div style="display: flex;flex-wrap:wrap;">
                                        <template for:each={node.parent.option} for:item="selection" for:index="indexItem">
                                            <lightning-input 
                                                class="slds-var-m-right_medium"
                                                data-id="checkbox" 
                                                data-index={index}
                                                key={selection.label} 
                                                type="checkbox" 
                                                label={selection.value}
                                                value={selection.value}
                                                onchange={handleChangeRelateHistory}
                                                checked={selection.flag}
                                                disabled={disabled}>
                                            </lightning-input>
                                        </template>
                                    </div>
                                </div>
                            </template>
                        
                            <!-- 单选 -->
                            <template if:true={node.parent.picklist}>
                                <div class="slds-col">
                                    <lightning-combobox
                                        variant="label-hidden"
                                        data-id="checkItem"
                                        data-index={index}
                                        placeholder={node.parent.Response__c}
                                        options={node.parent.option}
                                        value={node.parent.Response__c}
                                        onchange={handleChangeRelateHistory}
                                        disabled={disabled}>
                                    </lightning-combobox>
                                </div>
                            </template>
                        
                            <!-- 打分 -->
                            <template if:true={node.parent.score}>
                                <div class="slds-col">
                                    <lightning-combobox 
                                        variant="label-hidden"
                                        data-id={node.parent.Id}
                                        data-index={index}
                                        placeholder="Select Progress"
                                        onchange={handleChangeRelateHistory}
                                        value={node.parent.Response__c}
                                        options={node.parent.option}
                                        disabled={disabled}>
                                    </lightning-combobox>
                                </div>
                            </template>

                            <template if:true={showProductLine}>
                                <div class="slds-col">
                                    <lightning-combobox
                                        label="Product Line"
                                        value={node.parent.Product_Line__c}
                                        placeholder="Select Product Line"
                                        options={productLineOptions.data}
                                        onchange={handleChangeProductLine}
                                        variant="label-hidden">
                                    </lightning-combobox>
                                </div>
                            </template>
                            <!-- YYL Object类型 20250304 -->
                            <template if:true={node.parent.object}>
                                <template if:true={isAustralia}>
                                    <div class="slds-col">
                                        <c-lookup-lwc
                                            name="onProductLine"
                                            data-field-name={node.parent.CheckItem__r.Object_Api_Name__c}
                                            obj-name={node.parent.CheckItem__r.Object_Api_Name__c}
                                            op={lookupFilter} 
                                            data-recordid={index} 
                                            record-id={node.parent.Response__c}
                                            onlookupupdate={handleChangeProductOption}
                                            read-only={disabled}>
                                        </c-lookup-lwc>
                                    </div>
                                </template>
                                <template if:false={isAustralia}>
                                    <div class="slds-col">
                                        <lightning-record-edit-form object-api-name="CheckItem__c">
                                            <lightning-input-field 
                                                field-name={node.parent.CheckItem__r.Object_Api_Name__c} 
                                                data-field-name={node.parent.CheckItem__r.Object_Api_Name__c}
                                                variant="label-hidden"
                                                data-id={node.parent.Id}
                                                data-index={index}
                                                onchange={handleChangeResponse}
                                                value={node.parent.Response__c}
                                                disabled={disabled}>
                                            </lightning-input-field>
                                        </lightning-record-edit-form>
                                    </div>
                                </template>    
                            </template>

                            <!-- YYL 数字类型 20250304 -->
                            <template if:true={node.parent.number}>
                                <div class="slds-col">
                                    <lightning-input
                                        variant="label-hidden"
                                        data-id={node.parent.Id}
                                        data-index={index}
                                        type="number"
                                        message-when-step-mismatch="Please enter an integer"
                                        message-when-bad-input="Please enter an integer"
                                        step="0.01"
                                        onblur={handleChangeResponse}
                                        value={node.parent.Response__c}
                                        disabled={disabled}>
                                    </lightning-input>
                                </div>
                            </template>
                            
                            <!-- YYL 邮箱类型 20250304 -->
                            <template if:true={node.parent.email}>
                                <div class="slds-col">
                                    <lightning-input
                                        variant="label-hidden"
                                        data-id={node.parent.Id}
                                        data-index={index}
                                        type="email"
                                        message-when-step-mismatch="Please enter an email"
                                        message-when-bad-input="Please enter an email"
                                        onblur={handleChangeResponse}
                                        value={node.parent.Response__c}
                                        disabled={disabled}>
                                    </lightning-input>
                                </div>
                            </template>

                            <!-- TJP Date类型 20250916 -->
                            <template if:true={node.parent.date}>
                                <div class="slds-col">
                                    <lightning-input
                                        variant="label-hidden"
                                        data-id={node.parent.Id}
                                        data-index={index}
                                        type="date"
                                        message-when-step-mismatch="Please enter an date"
                                        message-when-bad-input="Please enter an date"
                                        onblur={handleChangeResponse}
                                        value={node.parent.Response__c}
                                        disabled={disabled}>
                                    </lightning-input>
                                </div>
                            </template>

                            <!-- 是否有评论 -->
                            <template if:true={node.parent.CheckItem__r.HasComment__c}>
                                <div class="slds-col" style="text-align: left;">
                                    <template if:true={CommentRequired}>
                                        <span style="color: red">*</span>
                                    </template>
                                    <span>
                                        Description
                                    </span>
                                </div>
                                <div class="slds-col">
                                    <lightning-input
                                        variant="label-hidden"
                                        data-id={node.parent.Id}
                                        data-index={index}
                                        onblur={handleChangeComments}
                                        value={node.parent.Comments__c}
                                        disabled={disabled}>
                                    </lightning-input>
                                </div>
                            </template>

                            <!-- 上传文件 -->
                            <template if:true={node.parent.CheckItem__r.HasFile__c}>
                                <div class="slds-col" style="text-align: left;">
                                    <template if:true={FileRequired}>
                                        <span style="color: red">*</span>
                                    </template>
                                    <span>Upload Photo</span>
                                </div> 
                                <div class="slds-col">
                                    <c-upload-files3-lwc
                                        record-id={node.parent.Id}
                                        record-item-id={node.parent.Inspection_Product_Item__c}
                                        disabled-delete={disabled}
                                        disabled-upload={disabled}
                                        compress-flag=true
                                        ondeletepicture={handleDeletePicture}
                                        onactionevent={handleActionThree}>
                                    </c-upload-files3-lwc>
                                </div>
                            </template>
                        </div>
                    <!-- </template> -->
                </div>
            </div>
            <template if:true={node.children}>
                <template for:each={node.children} for:item="child" for:index="childIndex">
                    <template for:each={child} for:item="childItem" for:index="childIndexItem">
                        <c-new-inspection-item-note-page-lwc key={childItem.id} 
                                                         node={childItem} 
                                                         submit={submit} 
                                                         response={node.parent.Response__c}
                                                         disabled={disabled}
                                                         parent-index={parentIndex}
                                                         child-index={childIndex}
                                                         child-index-item={childIndex}
                                                         onselect={handleChangeHasEdit}
                                                         ondata={handleProcessingChilddata}></c-new-inspection-item-note-page-lwc>
                    </template> 
                </template>
            </template>
        </template>
        <!-- <template for:each={node} for:item="tree" for:index="index">
            <div key={tree}>
                
            </div>
        </template> -->
    </div>
</template>
