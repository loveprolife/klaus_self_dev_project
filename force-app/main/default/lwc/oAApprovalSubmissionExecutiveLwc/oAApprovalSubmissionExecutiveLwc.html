<template>
    <lightning-card>
        <h3 style="text-align: center;font-size: 1.5rem; 
        font-weight: bold;">
            总办审批
        </h3>
        <!--  <hr> -->

        <div>
            <lightning-layout
                style="padding-left: 10px; padding-right: 10px;border-bottom:1px solid #DCDCDC;">
                <lightning-layout-item padding="around-small" size="3">
                </lightning-layout-item>
                    <lightning-layout-item padding="around-small" size="6">
            		<lightning-input label="一级审批人" name="oneApp" type="text" onchange={changeData}   placeholder="请输入LDAP账号，一般为邮箱@之前的部分"></lightning-input>
	                <lightning-select label="二级审批人(分管领导)" name="twoApp" onchange={changeData} options={approverList} ></lightning-select>
                    <div style="padding-top: 10px; padding-bottom:10px; height: 230px;">
                    <lightning-datatable aria-label=""
                                key-field="Id"
                                data={datas}
                                show-row-number-column
                                hide-checkbox-column 
                                columns={columns}>


                        </lightning-datatable>
                    </div>
	            </lightning-layout-item>




                <lightning-layout-item padding="around-small" size="3">
                </lightning-layout-item>
            </lightning-layout>
        </div>
        <template if:true={isShowSpinner}>
            <lightning-spinner size="medium" variant="brand"></lightning-spinner>
        </template>

        <div slot="footer">
            <lightning-button class="slds-m-top_small" label="取消" onclick={cancel}></lightning-button>
            &nbsp;
            <lightning-button class="slds-m-top_small" label="确定" onclick={saveData}></lightning-button>
        </div>

    </lightning-card>
</template>
