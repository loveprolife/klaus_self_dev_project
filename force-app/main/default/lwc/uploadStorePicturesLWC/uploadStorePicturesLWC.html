<template>
	<template if:true={isShowSpinner} >
        <lightning-spinner size="medium" variant="brand"></lightning-spinner>
     </template>
     
		<div class="slds-is-relative">
			<div class="slds-modal__header" style="padding: 0px;">
	            <lightning-card title={Store_Pic_Head}
	            icon-name="standard:article">
		        </lightning-card>
	        </div>
	        <template if:true={isShowEditViewCus}>
	        <div class="slds-modal__content slds-scrollable_y">
	        	<br>
	        		 <div style="margin-left:20%;"> {Store_Pic_Tip}</div>
	        		 <br>
	        	<div style="margin-left:30%;">

	        		<template if:true={isDelShow}>
		        		<div style="margin-left:10px;" >
		        			<img src={imageUrl} onclick={preview} alt=""/>
			        	</div>
			        	<div style="margin-left:5px;display:inline-block;">
			        		<lightning-button variant="brand" label="delete" onclick={deleteClick}></lightning-button>
			        	</div>
		        	</template>
		        	
		        	<div style="margin-left:10px;display:inline-block;">
		        		<lightning-button variant="brand" label="cancel" onclick={cancelClick}></lightning-button>
		        	</div>
		        	<div style="margin-left:5px;display:inline-block;">
		        		<lightning-file-upload
			                variant="label-hidden"
			                name="fileUploader"
			                record-id={attachId}
			                accept={acceptedFormats}
			                onuploadfinished={handleUploadFinished}
			                multiple
			            ></lightning-file-upload>
		        	</div>
	        	</div>
	        </div>
	        </template>	
	        <template if:false={isShowEditViewCus}>
	        		<div class="slds-modal__content slds-scrollable_y">
	        			<br><br>
	        			<div style="margin-left:48%;margin-bottom: 20px; display:inline-block;">
		        		<lightning-button variant="brand" label="cancel" onclick={cancelClick}></lightning-button>
		        		</div>
		        		<br><br>
	        		</div>

	        </template>
		</div>
	
	<!-- <template if:false={isShowEditViewCus}>
		 <lightning-card>
		 	<div></div>
		 </lightning-card>
	</template> -->
</template>
