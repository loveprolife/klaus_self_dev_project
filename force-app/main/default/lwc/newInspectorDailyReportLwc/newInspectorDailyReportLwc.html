            <div class="slds-modal__content slds-scrollable_y" style={styleContent}>
               <lightning-card>
                  <div style="padding-left: 10px; padding-right: 10px;">
                     <table
                        class="slds-table slds-table_bordered slds-table_fixed-layout slds-resizable marketInsightTable"
                        style="width: 100%;">
                        <tr>
                           <td colspan="2">
                              <div style="text-align:center;">
                                 <strong>{checklistProductline}</strong><br />
                                 <strong>{checklistProject}</strong>
                              </div>
                           </td>
                        </tr>
                        <template lwc:if={isShowTotalScore}>
                           <tr>
                              <td>
                                 {dailyInspectionReportInfo.Total_Score__c}:
                                 {checkListCountScore.checklistTotalScore}/{checkListCountScore.checklistTotalScoreMax}
                              </td>
                              <td>
                                 {dailyInspectionReportInfo.Average_Score__c}:
                                 {checkListCountScore.checklistAverageScore}/{checkListCountScore.checklistAverageScoreMax}
                              </td>
                           </tr>
                        </template>
                        <template for:each={selectedProject} for:item="item" for:index="index">
                           <tr key={item.Id}>
                              <td colspan="2">
                                 <div style="white-space:pre-wrap;">
                                    <span>{item.index}.{item.CheckItem__r.Description__c}</span>
                                    <template lwc:if={item.CheckItem__r.HelpText__c}>
                                       <lightning-helptext class="slds-m-left--xxx-small"
                                          content={item.CheckItem__r.HelpText__c}></lightning-helptext>
                                    </template>
                                 </div>
                                 <template if:true={item.isButtonOption}>
                                    <div class="slds-button-group" role="group" style="width: 100%;padding: 10px;">
                                       <template if:true={isFieldReadOnly}>
                                          <template for:each={item.styles} for:item="btn" for:index="btnIndex">
                                             <button class="slds-button slds-button_brand" key={btn.buttonNumber}
                                                data-index={index} data-number={btn.buttonNumber} style={btn.style}
                                                disabled>{btn.buttonNumber}</button>
                                          </template>
                                       </template>
                                       <template if:false={isFieldReadOnly}>
                                          <template for:each={item.styles} for:item="btn" for:index="btnIndex">
                                             <button class="slds-button slds-button_brand" key={btn.buttonNumber}
                                                data-index={index} data-number={btn.buttonNumber} style={btn.style}
                                                onclick={groupButtonClick}>{btn.buttonNumber}</button>
                                          </template>
                                       </template>
                                    </div>
                                 </template>
                                 <template if:true={item.isCheckbox}>
                                    <div class="slds-button-group" role="group" style="width: 100%;padding: 10px;">
                                       <template if:true={isFieldReadOnly}>
                                          <button class="slds-button slds-button_brand" data-index={index}
                                             data-type="yes" style={item.styleYes} disabled>Yes</button>
                                          <button class="slds-button slds-button_brand" data-index={index}
                                             data-type="no" style={item.styleNo} disabled>No</button>
                                       </template>
                                       <template if:false={isFieldReadOnly}>
                                          <button class="slds-button slds-button_brand" data-index={index}
                                             data-type="yes" style={item.styleYes}
                                             onclick={handleCheckChange}>Yes</button>
                                          <button class="slds-button slds-button_brand" data-index={index}
                                             data-type="no" style={item.styleNo} onclick={handleCheckChange}>No</button>
                                       </template>
                                    </div>
                                 </template>
                                 <!-- is Text 选择 HasComment__c，true是必填，false是非必填 wfc -->
                                 <template if:true={item.isText}>
                                    <div>
                                       <template if:true={item.CheckItem__r.HasComment__c}>
                                          <span style="color: red">*</span>
                                       </template>
                                       {checkResultInfo.Comments__c}
                                       <br />
                                       <template if:false={isEditPage}>
                                          &nbsp;&nbsp;{item.Comments__c}
                                       </template>
                                       <template if:true={isEditPage}>
                                          <textarea data-index={index} rows="1" required=""
                                             placeholder={label.CheckInCheckOut_REMARK_INFO} class="slds-textarea"
                                             maxlength="500" onchange={commentChange} value={item.Comments__c}
                                             readonly={isFieldReadOnly}>{item.Comments__c}
                                          </textarea>
                                       </template>
                                    </div>
                                 </template>
                                 <template if:false={item.isText}>
                                    <template if:true={item.CheckItem__r.HasComment__c}>
                                       <div>
                                          <template if:true={item.commentMust}>
                                             <span style="color: red">*</span>
                                          </template>
                                          {checkResultInfo.Comments__c}
                                          <br />
                                          <template if:false={isEditPage}>
                                             &nbsp;&nbsp;{item.Comments__c}
                                          </template>
                                          <template if:true={isEditPage}>
                                             <textarea data-index={index} rows="1" required=""
                                                placeholder={label.CheckInCheckOut_REMARK_INFO} class="slds-textarea"
                                                maxlength="500" onchange={commentChange} value={item.Comments__c}
                                                readonly={isFieldReadOnly}>{item.Comments__c}
                                             </textarea>
                                          </template>
                                       </div>
                                    </template>
                                 </template>
                                 <template if:true={item.CheckItem__r.HasFile__c}>
                                    <!-- 示例图片 -->
                                    <template if:true={item.CheckItem__r.Has_Sample_Pictures__c}>
                                       <table>
                                          <tr>
                                             <td style="width: 33%;">
                                                {label.Sample_picture}
                                             </td>
                                             <td>
                                                <c-upload-files2-lwc parent-id={record.Id}
                                                   css-style="width:50px; height:50px; cursor:pointer;"
                                                   data-index={index} record-id={item.CheckItem__r.Id} col=5
                                                   disabled-delete=true disabled-upload=true>
                                                </c-upload-files2-lwc>
                                             </td>
                                          </tr>
                                       </table>
                                    </template>
                                    <table style="margin-top: 10px;">
                                       <tr>
                                          <td style="width: 33%;">
                                             <template if:true={item.fileMust}>
                                                <span style="color: red">*</span>
                                             </template>
                                             {label.INSPECTION_REPORT_ATTACHMENT}
                                          </td>
                                          <td>
                                             <c-upload-files2-lwc parent-id={record.Id} data-index={index}
                                                record-id={item.Id} disabled-delete={isFieldReadOnly}
                                                disabled-upload={isFieldReadOnly}>
                                             </c-upload-files2-lwc>
                                          </td>
                                       </tr>
                                    </table>
                                 </template>
                                 <hr style="margin-top: 5px; margin-bottom: 5px;" />
                              </td>
                           </tr>
                        </template>
                     </table>
                  </div>
               </lightning-card>
            </div>
         </template>
      </div>
   </template>
   <!-- Added By Sunny Start -->
   <template if:true={showCheckItemIssues}>
      <div class="slds-is-relative">
         <div class="slds-modal__header" style={IssueStyle}>
            <lightning-card class="slds-color__background_gray-4 pageHeader">
               <div style="justify-content: space-between; display: flex;">
                  <div style="justify-content: center; display: flex; align-items: center;">
                     <a style="margin-right: 15px;">
                        <lightning-icon variant="success" icon-name="utility:chevronleft"
                           onclick={handleCloseItemIssues}></lightning-icon><span class="slds-assistive-text"></span>
                     </a>
                  </div>
               </div>
               <!-- Deloitte Yin Mingjie 20231112 start --><!-- HistoricalInspectionReport  -->
               <c-historical-inspection-report-lwc owner-id={userId} report-date={record.Report_Date__c}
                  store-id={record.Store__c}></c-historical-inspection-report-lwc>
               <!-- Deloitte Yin Mingjie 20231112 end -->
            </lightning-card>
         </div>
      </div>
   </template>
   <!-- Added By Sunny End -->
   <template if:true={openLocationPage}>
       <c-google-map-location
           onselect={handleHasEdit}
           ongoback={handleCloseLocation}
       ></c-google-map-location>
   </template>
</template>
