<template>
    <lightning-card>
        <div class="slds-var-p-bottom_large slds-border_bottom slds-var-p-left_large">
            <lightning-icon icon-name='standard:file' alternative-text='file' size='small' title='file'></lightning-icon>
            <span class="slds-var-p-left_small" style="font-weight: bolder;font-size:medium">Files ({fileInfoListSize})</span>
            <div class="slds-float_right slds-var-p-right_small">
                <lightning-file-upload
                    name="fileUploader"
                    accept={acceptedFormats}
                    record-id={recordId}
                    class="uploadFilesLwc-upload"
                    variant="label-hidden"
                    multiple
                    onuploadfinished={handleUploadFinished}
                >
                </lightning-file-upload>
            </div>
        </div>
        <div class="slds-var-p-top_medium slds-var-p-left_medium">
            <template for:each={pictureList} for:item="picture" for:index="index">
                <span key={picture.Id}>
                    <img class="slds-var-p-left_large slds-var-p-bottom_large" style="width: 30%;" src={picture.src} data-id={picture.id} data-show={picture.show} alt="" onclick={handleViewPhotoClick}/>
                </span>
            </template>
        </div>
    </lightning-card>
    <!-- 图标保存完弹出新增或者替换选项 -->
    <template if:true={showNewOrAdd}>
        <div>
            <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open dialog">
                <div class="slds-modal__container">
                    <!-- Modal/Popup Header -->
                    <div class="slds-modal__header">
                        <h2 class="slds-text-heading_medium">Additional Information</h2>
                    </div>
                    <!-- Modal/Popup Body -->
                    <div class="slds-modal__content slds-var-p-around_large">
                        <!-- 在这里添加您需要的输入字段 -->
                        <lightning-record-edit-form object-api-name="Sample_Display_Confirm__c" layout-type="Compact">
                            <lightning-input-field
                                class="slds-var-m-top_small"
                                field-name="Add_or_Replace__c" 
                                data-field-name="Add_or_Replace__c"
                                onchange={handleAddReplaceChange}
                                required>
                            </lightning-input-field>
                            <template if:true={showReplaceModel}>
                                <lightning-input-field 
                                    class="slds-var-m-top_small"
                                    field-name="Replace_Model__c" 
                                    data-field-name="Replace_Model__c"
                                    onchange={handleReplaceModelChange}
                                    required>
                                </lightning-input-field>
                            </template>
                        </lightning-record-edit-form>
                    </div>
                    <!-- Modal/Popup Footer -->
                    <div class="slds-modal__footer">
                        <div style="text-align: center;">
                            <lightning-button variant="brand" label="Save" onclick={handleAddReplaceSave}></lightning-button>
                        </div>
                    </div>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </div>
    </template>

    <template if:true={showPicture}>
        <section style="z-index: 9998;" role="dialog" tabindex="-1" aria-labelledby="modal-heading-01" aria-modal="true" aria-describedby="modal-content-id-1" class="slds-modal slds-fade-in-open forceContentModalPreviewPlayer">
            <div role="document">
                <!-- 顶部 -->
                <div class="toolbar top fadeOut forceContentPreviewPlayerTopToolbar">
                    <div class="slds-grid slds-grid_align-spread preview-top-toolbar">
                        <!-- 中间按钮 -->
                        <div class="file-preview-title"></div>
                        <div class="file-preview-buttons slds-align_absolute-center">
                            <template if:true={status}>
                                <div class="forceContentPreviewerAction">
                                    <div class="slds-truncate">
                                        
                                        <!-- <lightning-button 
                                            variant="Base" 
                                            label="View File Details" 
                                            title="View File Details" 
                                            icon-name="utility:info" 
                                            class="slds-var-m-left_x-small my-button"
                                            onclick={handleViewPicture}>
                                        </lightning-button> -->
                                    </div>
                                </div>
                                <div class="forceContentPreviewerAction">
                                    <div class="slds-truncate">
                                        <!-- <lightning-button 
                                            variant="Base" 
                                            label="Delete" 
                                            title="Delete" 
                                            icon-name="utility:delete" 
                                            class="slds-var-m-left_x-small my-button"
                                            onclick={handleDeletePicture}>
                                        </lightning-button> -->
                                    </div>
                                </div>
                            </template>
                        </div>
                        <div class="file-preview-close slds-var-m-left_large">
                            <div class="forceContentPreviewerAction">
                                <div class="slds-truncate">
                                    <lightning-button 
                                        variant="Base" 
                                        label="" 
                                        title="" 
                                        icon-name="utility:close" 
                                        class="my-button"
                                        onclick={handleClosePicture}>
                                    </lightning-button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- 图片 --> 
                <div class="preview">
                    <div class="thumbnail forceContentThumbnailPreview">
                        <div class="loaded page tall">
                            <img src={shopPictureSrc} alt="" class="pageImg">
                        </div>
                    </div>
                </div>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
