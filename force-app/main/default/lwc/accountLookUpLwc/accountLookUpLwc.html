<template>
    <div class="slds-form-element slds-var-p-left_xx-small slds-var-p-right_xx-small" onmouseleave={toggleResult}  data-source="lookupContainer">      
        <div class="slds-combobox_container slds-has-selection">
          <template if:true={showLabel}>
            <label class="slds-form-element__label" for="combobox-id-1">
              <template if:true={isRequired}><span class="slds-text-color_error slds-var-p-right_xxx-small">*</span></template>
              {label}</label>
          </template>
          <div class="lookupInputContainer slds-combobox slds-dropdown-trigger slds-dropdown-trigger_click" aria-expanded="false" aria-haspopup="listbox" role="combobox"> 
           <div class="slds-combobox__form-element slds-input-has-icon slds-input-has-icon_left-right" role="none">
              <div class="searchBoxWrapper slds-show">
                <!--Lookup Input Field-->
                <lightning-input                   
                   type="search"
                   data-source="searchInputField"
                   onclick={toggleResult}
                   onchange={handleKeyChange}
                   is-loading={isSearchLoading}
                   value={searchKey}
                   variant="label-hidden"
                   placeholder={placeholder}
                   read-only={readOnly}
                   required={isRequired}
               ></lightning-input>  
              </div>
              
            <!--Lookup Selected record pill container start-->  
            <div class="pillDiv slds-hide">        
              <span class="slds-icon_container slds-combobox__input-entity-icon">
                <lightning-icon icon-name={iconName} size="x-small" alternative-text="icon"></lightning-icon>  
              </span>
              <input type="text"
                     id="combobox-id-1"
                     value={selectedRecord.displayName}       
                     class="slds-input slds-combobox__input slds-combobox__input-value"
                     style={displayStyle}
                     readonly
                     />
              <template if:false={readOnly}>
                <button type="button" class="slds-button slds-button_icon slds-input__icon slds-input__icon_right" title="Remove selected option">
                  <lightning-icon icon-name="utility:close" size="x-small" alternative-text="close icon" onclick={handleRemove}></lightning-icon> 
                 </button>
              </template>
            </div>  
            </div>
        
            <template if:false={readOnly}>
              <!-- lookup search result part start-->
              <div style={drpDwnStl} id="listbox-id-5" class="slds-dropdown slds-dropdown_length-with-icon-7 slds-dropdown_fluid" role="listbox">
                <ul class="slds-listbox slds-listbox_vertical" role="presentation">
                  <template for:each={lstResult} for:item="obj">
                  <li key={obj.Id} role="presentation" class="slds-listbox__item">
                    <div data-recid={obj.Id} onclick={handelSelectedRecord} class="slds-media slds-listbox__option slds-listbox__option_entity slds-listbox__option_has-meta" role="option"
                      onmouseenter={handleMouseEnter} onmouseleave={handleMouseLeave}>
                      <span style="pointer-events: none;" class="slds-media__figure slds-listbox__option-icon slds-var-p-bottom_xx-small" >
                        <span class="slds-icon_container" >
                            <lightning-icon icon-name={iconName} size="small" alternative-text="icon" ></lightning-icon>  
                        </span>
                      </span>
                      <template if:true={obj.haveShowField}>
                        <span style="pointer-events: none;" class="slds-media__body" >
                          <span class="slds-listbox__option-text slds-listbox__option-text_entity">{obj.displayName}</span>
                          <span class="slds-listbox__option-text slds-listbox__option-text_entity">{obj.showField}</span>
                        </span>
                      </template>
                      <template if:false={obj.haveShowField}>
                        <span style="pointer-events: none; margin-top:0.5rem;" class="slds-media__body" >
                          <span class="slds-listbox__option-text slds-listbox__option-text_entity">{obj.displayName}</span>
                        </span>
                      </template>
                    </div>
                  </li>
                  </template>
                  <!--ERROR msg, if there is no records..-->
                  <template if:false={hasRecords}>
                    <li class="slds-listbox__item" style="text-align: center; font-weight: bold;">{noRecordTips}</li>
                  </template>
                </ul>
              </div>
            </template>
            
          </div>
        </div>
      </div>
  </template>
