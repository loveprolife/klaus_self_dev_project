<template>

    <div data-id="maincontent" class="slds-is-relative">
        <template if:true={isShowSpinner}>
            <lightning-spinner size="medium" variant="brand"></lightning-spinner>
        </template>
        <!-- <c-modal-lwc data-id="product selection" static-mode=true title="" show-ok=true show-close=true
            hidden-close-icon=false onok={handleOk}>
            <h1>{label.PromoterDailyReport_DeleteReminder}</h1>
        </c-modal-lwc> -->
        <template for:each={intelligenceList} for:item="intelligenceItem" for:index="index">
            <lightning-record-edit-form object-api-name="Shop_Retail_Detail__c" key={intelligenceItem.index}>
                <table class="productPriceTable" cellspacing="0">
                    <tbody>
                        <!--确定每一列宽度，不显示-->
                        <tr>
                            <td style="width:80px;border:0px;"></td>
                            <template for:each={intelligenceItem.Item} for:item="item" for:index="idx">
                                <td key={item.idx} style="width:110px;border:0px;">
                                </td>
                            </template>
                            <td></td>
                        </tr>
                        <!--第一行操作-->
                        <tr>
                            <td class="head">
                                {label.PromoterDailyReport_NUMBER}{intelligenceItem.number}
                            </td>
                            <template for:each={intelligenceItem.Item} for:item="item" for:index="idx">
                                <template if:true={item.isShow}>
                                    <td key={item.idx} class="hisenseProduct">
                                        <template if:true={item.isFirst}>
                                            <div>
                                                <label class="slds-form-element__label">
                                                    <template if:true={intelligenceItem.IsActive}>
                                                        <span style="font-size: 10px;">
                                                            {label.PromoterDailyReport_DISPLAY_COMPETITIVE}
                                                        </span>
                                                    </template>
                                                    <template if:false={intelligenceItem.IsActive}>
                                                        <span style="font-size: 10px;">
                                                            {label.PromoterDailyReport_HIDE_COMPETITIVE}
                                                        </span>
                                                    </template>
                                                </label>
                                            </div>
                                            <lightning-input data-id={index} class="slds-checkbox_toggle slds-grid"
                                                name="IsActive" type="toggle" checked message-toggle-active=""
                                                variant="label-hidden" message-toggle-inactive=""
                                                onchange={handleToggle} value={intelligenceItem.IsActive}>
                                            </lightning-input>
                                        </template>
                                    </td>
                                </template>
                            </template>
                            <td></td>
                        </tr>

                        <!-- Brand -->
                        <tr>
                            <td class="head"><span style="color:red">*</span>
                                {fields.Brands__c}
                            </td>
                            <template for:each={intelligenceItem.Item} for:item="item" for:index="idx">
                                <template if:true={item.isShow}>
                                    <td key={item.idx} class="hisenseProduct">
                                        <template if:true={item.isFirst}>
                                            <c-lookup-lwc data-field-name="Brands__c" field-name="Brands__c"
                                                obj-name="Brand__c" op={brandLookupFilter} data-id={idx}
                                                data-tableindex={index} record-id={item.Brands__c}
                                                onlookupupdate={handleChangeIntelligenceOption}
                                                read-only="true"></c-lookup-lwc>

                                        </template>
                                        <template if:false={item.isFirst}>
                                            <c-lookup-lwc data-field-name="Brands__c" field-name="Brands__c"
                                                obj-name="Brand__c" op={brandLookupFilter} data-id={idx}
                                                data-tableindex={index} record-id={item.Brands__c}
                                                onlookupupdate={handleChangeIntelligenceOption}
                                                read-only={viewMode}></c-lookup-lwc>
                                        </template>
                                    </td>
                                </template>
                            </template>
                            <td></td>
                        </tr>

                        <!-- Product -->
                        <tr>
                            <td class="head"><span style="color:red">*</span>
                                {fields.Product__c}
                            </td>
                            <template for:each={intelligenceItem.Item} for:item="item" for:index="idx">
                                <template if:true={item.isShow}>
                                    <td key={item.idx} class="hisenseProduct">
                                        <template if:true={item.isFirst}>
                                            <c-lookup-lwc data-field-name="Product__c" obj-name="Product__c"
                                                op={productLookupFilter} data-id={idx} data-tableindex={index}
                                                onlookupupdate={handleChangeIntelligenceOption}
                                                record-id={item.Product__c} disabled={viewMode}>
                                            </c-lookup-lwc>
                                        </template>
                                        <template if:false={item.isFirst}>
                                            <lightning-input-field field-name="ProductInformation__c"
                                                variant="label-hidden" data-id={idx} value={item.ProductInformation__c}
                                                data-field-name-id="ProductInformation__c"
                                                onchange={handleHisenseProductInputChange} data-tableindex={index}
                                                required disabled={viewMode}>
                                            </lightning-input-field>
                                        </template>
                                    </td>
                                </template>
                            </template>
                            <td></td>
                        </tr>

                        <!-- new product -->
                        <template lwc:if={isShowNewProduct}>
                            <tr>
                                <td class="head">
                                    <span style="color:red">*</span>
                                    {label.PromoterDailyReport_NEW_PRODUCT}
                                    <lightning-helptext class="slds-m-left--xxx-small"
                                        content={label.PromoterDailyReport_NEW_PRODUCT_HELP_TEXT}>
                                    </lightning-helptext>
                                </td>
                                <template for:each={intelligenceItem.Item} for:item="item" for:index="idx">
                                    <template if:true={item.isShow}>
                                        <td key={item.idx} class="hisenseProduct">
                                            <template lwc:if={viewMode}>
                                                <lightning-input variant="label-hidden" value={item.NewProduct__c}
                                                    data-field-name-id="NewProduct__c" disabled="true" required>
                                                </lightning-input>
                                            </template>
                                            <template lwc:else>
                                                <lightning-input-field field-name="NewProduct__c"
                                                    data-field-name-id="NewProduct__c" data-field-name="NewProduct__c"
                                                    variant="label-hidden" data-id={idx} value={item.NewProduct__c}
                                                    onchange={handleHisenseProductInputChange} data-tableindex={index}
                                                    required>
                                                </lightning-input-field>
                                            </template>
                                        </td>
                                    </template>
                                </template>
                                <td></td>
                            </tr>
                        </template>

                        <template if:false={isChile}>
                            <!-- Price -->
                            <tr>
                                <td class="head">
                                    {fields.Price__c}
                                </td>
                                <template for:each={intelligenceItem.Item} for:item="item" for:index="idx">
                                    <template if:true={item.isShow}>
                                        <td key={item.idx} class="hisenseProduct">
                                            <lightning-input-field field-name="Price__c" variant="label-hidden"
                                                data-id={idx} value={item.Price__c} data-field-name-id="Price__c"
                                                onchange={handleHisenseProductInputChange} data-tableindex={index}
                                                disabled={viewMode}>
                                            </lightning-input-field>
                                        </td>
                                    </template>
                                </template>
                                <td></td>
                            </tr>
                            <!-- discount -->
                            <tr>
                                <td class="head">
                                    {label.PromoterDailyReport_OFF}
                                    <lightning-helptext class="slds-m-left--xxx-small"
                                        content={label.PromoterDailyReport_OFF_HELP_TEXT}></lightning-helptext>
                                </td>
                                <template for:each={intelligenceItem.Item} for:item="item" for:index="idx">
                                    <template if:true={item.isShow}>
                                        <td key={item.idx} class="hisenseProduct">
                                            <lightning-input-field field-name="Discount__c" variant="label-hidden"
                                                data-id={idx} value={item.Discount__c} data-field-name-id="Discount__c"
                                                onchange={handleHisenseProductInputChange} data-tableindex={index}
                                                disabled={viewMode}>
                                            </lightning-input-field>
                                        </td>
                                    </template>
                                </template>
                                <td></td>
                            </tr>
                            <!--折扣金额-->
                            <tr>
                                <td class="head">
                                    {label.PromoterDailyReport_VALUE_OFF}
                                </td>
                                <template for:each={intelligenceItem.Item} for:item="item" for:index="idx">
                                    <template if:true={item.isShow}>
                                        <td key={item.idx} class="hisenseProduct">
                                            <lightning-input-field field-name="DiscountPrice__c" variant="label-hidden"
                                                data-id={idx} value={item.DiscountPrice__c}
                                                data-field-name-id="DiscountPrice__c"
                                                onchange={handleHisenseProductInputChange} data-tableindex={index}
                                                disabled={viewMode}>
                                            </lightning-input-field>
                                        </td>
                                    </template>
                                </template>
                                <td></td>
                            </tr>
                        </template>

                        <!-- added by Sunny [2023-9-23] -->
                        <template if:true={isChile}>
                            <!-- White Price -->
                            <tr>
                                <td class="head">
                                    {fields.WhitePrice__c}
                                </td>
                                <template for:each={intelligenceItem.Item} for:item="item" for:index="idx">
                                    <td key={item.idx} class="hisenseProduct">
                                        <template if:true={item.hasWhitePrice}>
                                            <lightning-input-field field-name="WhitePrice__c" variant="label-hidden"
                                                data-id={idx} value={item.WhitePrice__c}
                                                data-field-name-id="WhitePrice__c"
                                                onchange={handleHisenseProductInputChange} data-tableindex={index}
                                                disabled="true">
                                            </lightning-input-field>
                                        </template>
                                        <template if:false={item.hasWhitePrice}>
                                            <lightning-formatted-text value='-' readonly="true">
                                            </lightning-formatted-text>
                                        </template>
                                    </td>
                                </template>
                            </tr>

                            <!-- Debit Price -->
                            <tr>
                                <td class="head">
                                    {fields.DebitPrice__c}
                                </td>
                                <template for:each={intelligenceItem.Item} for:item="item" for:index="idx">
                                    <td key={item.idx} class="hisenseProduct">
                                        <lightning-input-field field-name="DebitPrice__c" variant="label-hidden"
                                            data-id={idx} value={item.DebitPrice__c} data-field-name-id="DebitPrice__c"
                                            onchange={handleHisenseProductInputChange} data-tableindex={index}
                                            disabled={viewMode}></lightning-input-field>
                                    </td>
                                </template>
                            </tr>

                            <!-- Crebit Price -->
                            <tr>
                                <td class="head">
                                    {fields.CrebitPrice__c}
                                </td>
                                <template for:each={intelligenceItem.Item} for:item="item" for:index="idx">
                                    <td key={item.idx} class="hisenseProduct">
                                        <lightning-input-field field-name="CrebitPrice__c" variant="label-hidden"
                                            data-id={idx} value={item.CrebitPrice__c}
                                            data-field-name-id="CrebitPrice__c"
                                            onchange={handleHisenseProductInputChange} data-tableindex={index}
                                            disabled={viewMode}>
                                        </lightning-input-field>
                                    </td>
                                </template>
                            </tr>
                        </template>

                        <!-- Commission -->
                        <tr>
                            <td class="head">
                                {fields.Commission__c}
                            </td>
                            <template for:each={intelligenceItem.Item} for:item="item" for:index="idx">
                                <template if:true={item.isShow}>
                                    <td key={item.idx} class="hisenseProduct">
                                        <lightning-input-field field-name="Commission__c" variant="label-hidden"
                                            data-id={idx} value={item.Commission__c} data-field-name-id="Commission__c"
                                            onchange={handleHisenseProductInputChange} data-tableindex={index}
                                            disabled={viewMode}>
                                        </lightning-input-field>
                                    </td>
                                </template>
                            </template>
                            <td></td>
                        </tr>
                        <!-- Campaign type -->
                        <template lwc:if={isShowCampTypeAndDes}>
                            <tr>
                                <td class="head">
                                    {label.PromoterDailyReport_CAMP_TYPE}
                                </td>
                                <template for:each={intelligenceItem.Item} for:item="item" for:index="idx">
                                    <template if:true={item.isShow}>
                                        <td key={item.idx} class="hisenseProduct">
                                            <lightning-input-field field-name="CampaignType__c" variant="label-hidden"
                                                data-id={idx} value={item.CampaignType__c}
                                                data-field-name-id="CampaignType__c"
                                                onchange={handleHisenseProductInputChange} data-tableindex={index}
                                                disabled={viewMode}>
                                            </lightning-input-field>
                                        </td>
                                    </template>
                                </template>
                                <td></td>
                            </tr>
                            <!-- Campaign des -->
                            <tr>
                                <td class="head">
                                    {label.PromoterDailyReport_CAMP_DES}
                                </td>
                                <template for:each={intelligenceItem.Item} for:item="item" for:index="idx">
                                    <template if:true={item.isShow}>
                                        <td key={item.idx} class="hisenseProduct">
                                            <lightning-input-field field-name="CampaignDescription__c"
                                                variant="label-hidden" data-id={idx} value={item.CampaignDescription__c}
                                                data-field-name-id="CampaignDescription__c"
                                                onchange={handleHisenseProductInputChange} data-tableindex={index}
                                                disabled={viewMode}>
                                            </lightning-input-field>
                                        </td>
                                    </template>
                                </template>
                                <td></td>
                            </tr>
                        </template>
                        <!-- Attachment -->
                        <tr>
                            <td class="head">
                                {label.PromoterDailyReport_ATTACHMENT}
                            </td>
                            <template for:each={intelligenceItem.Item} for:item="item" for:index="idx">
                                <template if:true={item.isShow}>
                                    <td key={item.idx} class="hisenseProduct">
                                        <c-upload-files-lwc style="min-width: 100px;" parent-id={recordId}
                                            data-recordid={index} data-itemid={idx} data-type='intelligence'
                                            record-id={item.Id} onselectfiles={handleSelectFiles}
                                            disabled-delete={viewMode} disabled-upload={viewMode}>
                                        </c-upload-files-lwc>
                                    </td>
                                </template>
                            </template>
                            <td></td>
                        </tr>
                        <!-- Action -->
                        <template if:false={viewMode}>
                            <tr>
                                <td class="head">
                                    {label.PromoterDailyReport_ITEM_ACTION}
                                </td>
                                <template for:each={intelligenceItem.Item} for:item="item" for:index="idx">
                                    <template if:true={item.isShow}>
                                        <td key={item.idx} class="hisenseProduct">
                                            <div
                                                class="slds-col slds-size_12-of-12 slds-small-size_12-of-12 slds-large-size_12-of-12 slds-p-horizontal_small">
                                                <template if:false={item.isFirst}>
                                                    <div class="delIcon">
                                                        <a style="float: left;">
                                                            <lightning-icon variant="success" icon-name="utility:dash"
                                                                size="x-small" title="" data-id={idx}
                                                                data-tableindex={index} onclick={deleteHisenseProduct}>
                                                            </lightning-icon>
                                                            <span class="slds-assistive-text"></span>
                                                        </a>
                                                    </div>
                                                </template>
                                                <div class="delIcon">
                                                    <a style="float: right;margin-left: 3rem;">
                                                        <lightning-icon variant="success" icon-name="utility:add"
                                                            size="x-small" title="" data-id={idx}
                                                            data-tableindex={index} onclick={addHisenseProduct}>
                                                        </lightning-icon>
                                                        <span class="slds-assistive-text"></span>
                                                    </a>
                                                </div>
                                            </div>
                                        </td>
                                    </template>
                                </template>
                                <td></td>
                            </tr>

                            <tr>
                                <td class="head">
                                    {label.PromoterDailyReport_ACTIONS}
                                </td>
                                <template for:each={intelligenceItem.Item} for:item="item" for:index="idx">
                                    <template if:true={item.isShow}>
                                        <td key={item.idx} class="hisenseProduct">
                                            <template if:true={item.isFirst}>
                                                <div class="delIcon">
                                                    <a style="float: left;">
                                                        <lightning-icon variant="success" icon-name="utility:dash"
                                                            size="x-small" title="" data-id={index}
                                                            onclick={deleteIntelligenceRow}>
                                                        </lightning-icon>
                                                        <span class="slds-assistive-text"></span>
                                                    </a>
                                                    <a style="float: right;margin-left: 3rem;">
                                                        <lightning-icon variant="success" icon-name="utility:add"
                                                            size="x-small" title="" onclick={itemAddHandler}>
                                                        </lightning-icon>
                                                        <span class="slds-assistive-text"></span>
                                                    </a>
                                                </div>
                                            </template>
                                        </td>
                                    </template>
                                </template>
                                <td></td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </lightning-record-edit-form>
        </template>
    </div>



</template>
