<template>
    <div class="slds-card slds-card_boundary slds-grid slds-grid_vertical forceListViewManager">
        <div class="slds-page-header--object-home slds-page-header_joined slds-page-header slds-shrink-none test-headerRegion forceListViewManagerHeader" data-aura-class="forceListViewManagerHeader">
            <div class="slds-grid" >
                <div class="slds-col slds-has-flexi-truncate firstHeaderRow" >
                    <div class="slds-media slds-no-space slds-grow" >
                        
                        <div class="highlights-icon-container slds-avatar slds-var-m-right_small icon" style="background-color: #FF5D2D">
                            <img src="/img/icon/t4v35/standard/approval_120.png" alt="">
                        </div></records-highlights-icon>
                        <div class="slds-media__body slds-align-middle" >

                            <div class="slds-breadcrumb slds-list_horizontal slds-wrap">
                                <div class="slds-breadcrumb__item slds-line-height_reset">
                                    <span class="slds-var-p-right_x-small">Approval Requests</span>
                                </div>
                            </div>
                        
                            <div data-target-selection-name="50e27b43761f49d99bf31a503ed4e21a" class="slds-truncate" >
                                <div class="slds-page-header__name slds-text-color_default forceListViewPicker" data-aura-class="forceListViewPicker">
                                    <div class="slds-page-header__name-title" >
                                        <h1 >
                                            <span aria-hidden="true" class="slds-assistive-text" >
                                                Approval Requests
                                            </span>
                                            <span class="triggerLinkText selectedListView slds-page-header__title uiOutputText" data-aura-class="uiOutputText">
                                                Items to Approve
                                            </span>
                                        </h1>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="slds-media__body slds-align-middle" >
                            <div class="slds-page-header__control approval-action">
                                <template if:false={isMobile}>
                                    <lightning-button-group>
                                        <lightning-button variant="Neutral" label="Approve" onclick={handleApprove}></lightning-button>
                                        <lightning-button variant="Neutral" label="Reject" onclick={handleReject}></lightning-button>
                                        <lightning-button variant="Neutral" label="Reassign" onclick={handleReassign}></lightning-button>
                                        <!-- <lightning-button variant="Test" label="Test" onclick={handleTest}></lightning-button> -->
                                    </lightning-button-group>
                                </template>
                                <template if:true={isMobile}>
                                    <lightning-button-menu alternative-text="Show menu" menu-alignment="auto">
                                        <lightning-menu-item variant="Approve" label="Approve" onclick={handleApprove}></lightning-menu-item>
                                        <lightning-menu-item value="Reject" label="Reject" onclick={handleReject}></lightning-menu-item>
                                        <lightning-menu-item value="Reassign" label="Reassign" onclick={handleReassign}></lightning-menu-item>
                                    </lightning-button-menu>
                                </template>
                            </div>
                        </div>
                    </div>
                    <div class="slds-col slds-no-flex slds-grid slds-align-top slds-var-p-bottom_xx-small test-lvmForceActionsContainer" >

                    </div>
                </div>
            </div>

            <div class="slds-grid ">
                <div class="slds-col slds-align-bottom">
                    <p class="slds-text-body_small">
                        <span>{detailsInfo} </span>
                        <span>{updatedInfo} </span>
                        
                    </p>
                </div>
                <div class="slds-col slds-no-flex slds-grid slds-align-bottom">
                    <lightning-button-icon 
                        class="slds-var-m-right_xx-small"
                        icon-name="utility:refresh"  
                        alternative-text="Refresh" 
                        title="Refresh" 
                        slot="actions"
                        onclick={handleRefreshClick}
                    ><label>Refresh</label></lightning-button-icon>
                    <template if:true={isShowFilters}>
                        <lightning-button-icon 
                        class="slds-var-m-right_xx-small"
                        icon-name="utility:filterList"  
                        alternative-text="Show filters" 
                        title="Show filters" 
                        slot="actions"
                        onclick={handleShowFiltersClick}
                        variant="brand"
                    ></lightning-button-icon>
                    </template>
                    <template if:false={isShowFilters}>
                        <lightning-button-icon
                        class="slds-var-m-right_xx-small"
                        icon-name="utility:filterList"  
                        alternative-text="Show filters" 
                        title="Show filters" 
                        slot="actions"
                        onclick={handleShowFiltersClick}
                        variant="border-filled"
                    ></lightning-button-icon>
                    </template>
                </div>
            </div>
        </div>

        <div class="slds-grid listDisplays safari-workaround-anchor">
            <div class="slds-grid listViewContainer safari-workaround">
                <div class="slds-col slds-no-space forceListViewManagerPrimaryDisplayManager">
                    <template if:true={isShowSpinner} >
                        <lightning-spinner size="medium" variant="brand"></lightning-spinner>
                    </template>
                    <c-custom-data-types
                        class = "slds-var-m-bottom_large"
                        key-field="id"
                        data={approvalData}
                        show-row-number-column
                        columns={columns}
                        onrowselection={handleChange}
                        default-sort-direction={defaultSortDirection}
                        sorted-direction={sortDirection}
                        sorted-by={sortedBy}
                        onsort={onHandleSort}
                        errors={rowErrorShow}
                        onrowaction={handleRowAction}
                        enable-infinite-loading={enabelInfiniteLoading}
                        onloadmore={loadMoreData}
                    >
                    </c-custom-data-types>
                </div>
                <template if:true={isShowFilters}>
                    <div class="slds-grid slds-no-flex forceListViewManagerSecondaryDisplayManager">
                        <div class="slds-panel slds-size_medium slds-panel_docked slds-panel_docked-right slds-grid slds-grid_vertical forceFilterPanel">
                            <div class="slds-panel__header panelHeader">
                                <h2 class="slds-panel__header-title slds-text-heading_small slds-truncate" data-aura-rendered-by="1000:0">
                                    Filters
                                </h2>
                                <button type="button" class="slds-button slds-button_icon slds-panel__close slds-button_icon-bare" onclick={handleCloseFilters}>
                                    <lightning-icon icon-name="utility:close" alternative-text="Close Filters" size='xx-small' title="Close Filters"></lightning-icon>
                                </button>
                            </div>
                            <div class="slds-col slds-scrollable_y">
                                <div class="slds-panel__body panelBody">
                                    <div aria-live="assertive"></div>
                                    <h3 class="lockedFieldCriteriaLabel">
                                        Locked Filters
                                        <lightning-helptext icon-name="utility:lock" content="This list view can’t be filtered."></lightning-helptext>
                                    </h3>
                                    <ol>
                                        <li style="margin-bottom: 12px;">
                                            <div class="isLocked forceFilterPanelScope">
                                                <div>
                                                    <span class="filterLabel">Filter by Owner&nbsp;</span>
                                                    <span class="currentScopeLabel">requests assigned to me and my queues</span>
                                                </div>
                                            </div>
                                        </li>
                                    </ol>

                                    <h3 class="lockedFieldCriteriaLabel">
                                        Matching all of these filters
                                    </h3>
                                    <ol>
                                        <li style="margin-bottom: 12px;">
                                            <div class="isLocked forceFilterPanelScope">
                                                <div>
                                                    <lightning-dual-listbox name="type"
                                                        label="Type"
                                                        source-label="Available"
                                                        selected-label="Selected"
                                                        disable-reordering="true"
                                                        options={optionsType}
                                                        value={valueOldType}
                                                        onchange={handleChangeType}>
                                                    </lightning-dual-listbox>
                                                    <!-- <div class="filterLabel">Type</div>
                                                    <div class="filterLabel">equals</div>
                                                    <div class="filterLabel">
                                                        <lightning-combobox
                                                            style="margin: 0;"
                                                            name="type"
                                                            value={valueOldType}
                                                            placeholder="Select Progress"
                                                            variant = 'label-hidden'
                                                            options={optionsType}
                                                            onchange={handleChangeType}
                                                            >
                                                        </lightning-combobox>
                                                    </div> -->
                                                </div>
                                            </div>
                                        </li>
                                    </ol>
                                    <div class="slds-grid slds-col slds-grid_align-end">
                                        <lightning-button
                                            variant="Brand" 
                                            label="Apply" 
                                            title="Apply" 
                                            onclick={handleSaveType} 
                                            class="slds-var-m-left_x-small">
                                        </lightning-button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </div>
    </div>

    <!-- 审批弹出框 -->
    <template if:true={isShowDisplay}>
        <section role="dialog" tabindex="-1" aria-labelledby="modal-heading-01" aria-modal="true" aria-describedby="modal-content-id-1" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <!-- Loading 范围 -->
                <div class="slds-is-relative">
                    <template if:true={isShowSpinnerDialog}>
                        <lightning-spinner alternative-text="Loading" size="medium"  variant="brand"></lightning-spinner>
                    </template>
                    <header class = "slds-modal__header">
                        <h2 class = "slds-modal__title slds-hyphenate slds-text-title_bold">
                            {title}
                        </h2>
                    </header>
                    <div class="slds-modal__content slds-var-p-around_medium">
                        <template if:true={isShowComments}>
                            <lightning-textarea 
                                style="margin: 10px 20px 10px 20px" 
                                max-length="131072" 
                                label="Comments" 
                                name="input1" 
                                onchange={commentsDataChange} >
                            </lightning-textarea>
                        </template>
                        <template if:true={isShowUser}>
                            <div style="margin: 10px 20px 10px 20px">
                                <lightning-record-edit-form object-api-name="Account" density="Compact">
                                    <div style="margin-bottom: 2px">
                                        <span style="color:red">*</span>
                                        <span>Reassign To</span>
                                    </div>
                                    <lightning-input-field
                                        class="slds-has-focus"
                                        field-name='Hisense_ASM__c' 
                                        variant="label-hidden" 
                                        required
                                        onchange={handleUserChange}
                                        >
                                    </lightning-input-field>
                                </lightning-record-edit-form>
                            </div>
                        </template>

                    </div>
                    <div class="modal-footer slds-modal__footer">
                        <lightning-button
                            variant="brand-outline"
                            label='Cancle'
                            onclick={cancel}
                            class="slds-var-m-left_x-small"
                        > </lightning-button>
                        <template if:true={buttonLabelUsable}>
                            <lightning-button
                                    variant="brand"
                                    label={buttonLabel}
                                    onclick={submit}
                                    class="slds-var-m-left_x-small"
                            ></lightning-button>
                        </template>
                        <template if:false={buttonLabelUsable}>
                            <lightning-button
                                    variant="brand"
                                    label={buttonLabel}
                                    class="slds-var-m-left_x-small"
                                    disabled
                            ></lightning-button>
                        </template>
                    </div>
                </div>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
    
</template>
