<template>
    <div class="slds my-container" style="width: 100%;">
        <template if:false={isPc}>
            <lightning-card>
                <span title="" style="color: red;"> {label.Mobiletip} </span>
            </lightning-card>
        </template>
        <!-- 固定页眉 -->
        <div> 
            <template if:true={dayOptions}>
                <div class="slds-scrollable slds-col slds-size_1-of-1" style="width: 100%;overflow-y: scroll;" >
                    <table class="slds-table_bordered" style="table-layout:fixed;">
                        <thead>
                            <tr>
                                <th style="width: 3%;">
                                    {label.Order}
                                </th>
                                <th style="width: 10%;padding-top: 0.5rem;padding-bottom: 0.5rem;">
                                    {label.AccountName}
                                </th>
                                <th style="width: 10%;padding-top: 0.5rem;padding-bottom: 0.5rem;">
                                    {label.ShopName}
                                </th>
                                <!-- <th style="width: 4%;padding-top: 0.5rem;padding-bottom: 0.5rem;">
                                    {label.ShopLevel}
                                </th> -->
                                <template for:each={dayOptions} for:item="day">
                                    <template if:false={day.isWeekend}>
                                        <th style="width: 2%;border-left: 1.5px solid;text-align: center;border-color: rgb(217, 219, 221);" key={day.value}>
                                            <div style="font-size: 10px;">
                                                {day.label}
                                            </div>
                                            <div style="font-size: 10px;">
                                                {day.week}
                                            </div>
                                        </th>
                                    </template>
                                    <template if:true={day.isWeekend}>
                                        <th style="width: 2%;text-align: center;border-left: 1.5px solid;border-color: rgb(217, 219, 221);background-color: rgb(217 219 221 / 48%);" key={day.value}>
                                            <div style="font-size: 10px;">
                                                {day.label}
                                            </div>
                                            <div style="font-size: 10px;">
                                                {day.week}
                                            </div>
                                        </th>
                                    </template>
                                </template>
                                <th style="width: 6%;border-left: 1.5px solid;border-color: rgb(217, 219, 221);">
                                    <div style="font-size: 10px;">
                                        {label.PlannedQuantity}
                                    </div>
                                    <div style="font-size: 10px;">
                                        〇
                                    </div>
                                </th>
                                <th style="width: 5%;border-left: 1.5px solid;border-color: rgb(217, 219, 221);">
                                    <div style="font-size: 10px;">
                                        {label.ActualQuantity}
                                    </div>
                                    <div style="font-size: 10px;">
                                        ●/▲
                                    </div>
                                </th>
                            </tr>
                        </thead>
                    </table>
                </div>
            </template>
        </div>
        <div class="my-content" style="overflow-y: scroll;">
            <div class="my-body">
                <div style="margin-top: 0rem;">
                    <template if:false={showDuplecation}>
                        <template if:true={ShopPlanData}>
                            <!-- 月计划基础信息 -->
                            <div class="slds-grid" >
                                <template if:true={ShopPlanData.Name}>
                                    <div class="slds-col slds-size_1-of-6 slds-p-horizontal_x-small" style="">
                                        <lightning-input type="text" label={label.PlanNumber} disabled="true" value={ShopPlanData.Name}></lightning-input>
                                    </div>
                                </template>
                                <div class="slds-col slds-size_1-of-6 slds-p-horizontal_x-small">
                                    <template if:true={canSelectFloorwalker}>
                                        <!-- <lightning-combobox
                                        name="progress"
                                        label={label.Floorwalker}
                                        placeholder={label.Floorwalker}
                                        value={ownerName}
                                        options={floorwalkers} dropdown-alignment="auto" required onchange={floorwalkerChange}></lightning-combobox> -->
                                        <div id="box" class={boxClass} aria-expanded="true" aria-haspopup="listbox" role="combobox">
                                            <lightning-input label={label.Floorwalker} type="search" id="input" value={searchTerm}
                                                            onblur={onBlur} onchange={onChange} autocomplete="off" 
                                                            placeholder={searchPlaceholder}>
                                            </lightning-input>
                                        </div>

                                        <template if:true={showSelectList}>
                                            <div class="slds-is-relative">
                                                <div id="listbox-id-1" class="slds-dropdown slds-dropdown_length-with-icon-7 slds-dropdown_fluid" role="listbox">
                                                    <ul class="slds-listbox slds-listbox_vertical" role="presentation">
                                                        <template for:each={floorwalkerRecords} for:item="record">
                                                            <li key={record.userId} onclick={onSelect} data-id={record.userId} role="presentation" data-name={record.userName}>
                                                                <span class="slds-lookup__item-action slds-lookup__item-action--label" role="option">
                                                                    <span class="slds-truncate">{record.userName}</span>
                                                                </span>
                                                            </li>
                                                        </template>
                                                    </ul>
                                                </div>
                                            </div>
                                        </template>
                                    </template>
                                    <template if:false={canSelectFloorwalker}>
                                        <lightning-input type="text" label={label.Floorwalker} disabled="true" value={ownerName}></lightning-input>
                                    </template>
                                </div>
                                
                                <div class="slds-col slds-size_1-of-6 slds-p-horizontal_x-small">
                                    <template if:true={showEditInput}>
                                        <lightning-combobox
                                        name="progress"
                                        label={label.PlanYear}
                                        placeholder={label.PickPlanYear}
                                        value={ShopPlanData.Inspection_Year__c}
                                        options={yearsOptions} dropdown-alignment="auto" required onchange={yearChange}></lightning-combobox>
                                    </template>
                
                                    <template if:false={showEditInput}>
                                        <lightning-input type="text" label={label.PlanYear} disabled="true" value={ShopPlanData.Inspection_Year__c}></lightning-input>
                                    </template>
                
                                </div>
                                <div class="slds-col slds-size_1-of-6 slds-p-horizontal_x-small">
                                    <template if:true={showEditInput}>
                                        <lightning-combobox
                                        name="progress"
                                        label={label.PlanMonth}
                                        placeholder={label.PickPlanMonth}
                                        value={ShopPlanData.Inspection_Month__c}
                                        options={monthOptions} dropdown-alignment="auto" required onchange={monthChange}></lightning-combobox>
                                    </template>
                                    <template if:false={showEditInput}>
                                        <lightning-input type="text" label={label.PlanMonth} disabled="true" value={ShopPlanData.Inspection_Month__c}></lightning-input>
                                    </template>
                                </div>
                                <div class="slds-col slds-size_1-of-6 slds-p-horizontal_x-small">
                
                                    <div>
                                        <label class="slds-form-element__label">
                                        <span>&nbsp;</span>
                                        </label>
                                    </div>
                                    <lightning-button variant="neutral" label={label.Return} onclick={cancel} slot="actions"></lightning-button>
                                    <template if:true={showSaveButton}>
                                        <lightning-button variant="brand" label={label.Save} onclick={savePlan}  slot="actions"></lightning-button>
                                    </template>
                                </div>
                                <template if:true={dayOptions}>
                                    <div class="slds-col slds-size_1-of-6 slds-p-horizontal_x-small">
                                        <!-- <p class="slds-m-around_small">
                                            {label.PlanDetail}
                                        </p> -->
                                        <!-- <div style="float:left;">
                                            <lightning-button label="星期视图" title="Non-primary action" onclick={handleClick} class="slds-m-left_x-small"></lightning-button>
                                            <lightning-button variant="brand" label="整月视图" title="Non-primary action" onclick={handleClick} class="slds-m-left_x-small"></lightning-button>
                                        </div> -->
                                        <div>
                                            <label class="slds-form-element__label">
                                            <span>&nbsp;</span>
                                            </label>
                                        </div>
                                        <div style="float:right;">
                                            <div style="display: inline-block;margin-right:15px;">
                                                <p class="slds-text-title slds-truncate">{label.PlannedQuantitySum}</p>
                                                <p class="slds-text-title slds-truncate">{plannedQuantitySum}</p>
                                            </div>
                                            <div style="display: inline-block;margin-right:15px;">
                                                <p class="slds-text-title slds-truncate">{label.ActualQuantitySum}</p>
                                                <p class="slds-text-title slds-truncate">{actualQuantitySum}</p>
                                            </div>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </template>
                        <template if:true={dayOptions}>
                            <div class="slds-scrollable slds-col slds-size_1-of-1" style="width: 100%;">
                                <table class="slds-table_bordered" style="table-layout:fixed;">
                                    <tbody>
                                        <template for:each={monthplans} for:item="plans">
                                            <tr key={plans.planNum} class="slds-hint-parent">
                                                <td style="width: 3%;">{plans.planNum}</td>
                                                <td class="slds-cell-wrap" style="padding-top: 0.5rem;padding-bottom: 0.5rem;width: 10%;">
                                                    {plans.shopOwner}
                                                </td>
                                                <td class="slds-cell-wrap" style="padding-top: 0.5rem;padding-bottom: 0.5rem;width: 10%;">
                                                    
                                                    {plans.shopName}
                                                </td>
                                                <!-- <td class="slds-cell-wrap" style="padding-top: 0.5rem;padding-bottom: 0.5rem;width: 4%;">
                                                    
                                                    {plans.shopLevel}
                                                </td> -->
                                                
                                                <template for:each={plans.dayOptions} for:item="day">
                                                    <template if:false={day.isWeekend}>
                                                        <td style="border-left: 1.5px solid;border-color: rgb(217, 219, 221);width: 2%;text-align: center;" name={day.taskAndDate} key={day.index} onclick={createInspectionShopTask}>
                                                            {day.status1}
                                                        </td>
                                                    </template>
                                                    <template if:true={day.isWeekend}>
                                                        <td style="border-left: 1.5px solid;border-color: rgb(217, 219, 221);width: 2%;text-align: center; background-color: rgb(217 219 221 / 48%);" name={day.taskAndDate} key={day.index} onclick={createInspectionShopTask}>
                                                            {day.status1}
                                                        </td>
                                                    </template>
                                                </template>
                                                <td style="width: 6%;border-left: 1.5px solid;border-color: rgb(217, 219, 221);">
                                                    {plans.plannedQuantity}
                                                </td>
                                                <td style="width: 5%;border-left: 1.5px solid;border-color: rgb(217, 219, 221);">
                                                    {plans.actualQuantity}
                                                </td>
                                            </tr>
                                        </template>
                                    </tbody>    
                                </table>
                            </div>
                        </template>
                    </template>

                    <!-- 创建任务页面 -->
                    <template if:true={isModalOpen}>
                        <section role="dialog" tabindex="-1" aria-labelledby="modal-heading-01" aria-modal="true" aria-describedby="modal-content-id-1" class="slds-modal slds-fade-in-open">
                            <div class="slds-modal__container">
                                <div class="slds-modal__header">
                                    <h2 class="slds-text-heading--medium">
                                        {label.TaskTitile}
                                    </h2>
                                </div>
                                <div class="slds-modal__content modalBody menu">
                                    <lightning-record-edit-form object-api-name="Inspection_Shop_Task__c" layout-type="Compact">
                                        <div class=" slds-grid slds-wrap" id="modal-content-id-1" style="margin-top: 1rem">
                                            <!-- <div class="slds-col slds-size_12-of-12 slds-small-size_12-of-12 slds-large-size_6-of-12 slds-p-horizontal_small" >
                                                <lightning-input-field field-name="Inspection_Plan__c" disabled value={recordId} data-id="disableData"> </lightning-input-field>   
                                            </div>  -->
                                            <div class="slds-col slds-size_12-of-12 slds-small-size_12-of-12 slds-large-size_6-of-12 slds-p-horizontal_small">
                                                <lightning-input-field field-name="Shop__c" data-id="disableData" onchange={handleFiledChange} value={task.Shop__c} disabled> </lightning-input-field>   
                                            </div> 
                                            <div class="slds-col slds-size_12-of-12 slds-small-size_12-of-12 slds-large-size_6-of-12 slds-p-horizontal_small">
                                                <lightning-input-field field-name="Inspection_Date__c" data-id="disableData" onchange={handleFiledChange} value={task.Inspection_Date__c} disabled> </lightning-input-field>   
                                            </div>
                                            <div class="slds-col slds-size_12-of-12 slds-small-size_12-of-12 slds-large-size_6-of-12 slds-p-horizontal_small">
                                                <lightning-input-field field-name="Status__c" data-id="disableData" onchange={handleFiledChange} value={task.Status__c} disabled> </lightning-input-field>   
                                            </div> 
                                            <template if:true={showDisable}>
                                            
                                                <!-- <div class="slds-col slds-size_12-of-12 slds-small-size_12-of-12 slds-large-size_6-of-12 slds-p-horizontal_small">
                                                    <lightning-input-field field-name="Result__c" value={task.Result__c} onchange={handleFiledChange} disabled> </lightning-input-field>   
                                                </div>  -->
                                                <div class="slds-col slds-size_12-of-12 slds-small-size_12-of-12 slds-large-size_6-of-12 slds-p-horizontal_small">
                                                    <lightning-input-field field-name="Inspection_Target__c" disabled value={task.Inspection_Target__c} onchange={handleFiledChange}> </lightning-input-field>   
                                                </div> 
            
                                                <div class="slds-col slds-size_12-of-12 slds-small-size_12-of-12 slds-large-size_6-of-12 slds-p-horizontal_small">
                                                    <lightning-input-field field-name="Inspection_Plan_Commnets__c" value={task.Inspection_Plan_Commnets__c} disabled onchange={handleFiledChange}> </lightning-input-field>   
                                                </div> 
                                                <!-- <div class="slds-col slds-size_12-of-12 slds-small-size_12-of-12 slds-large-size_6-of-12 slds-p-horizontal_small">
                                                    <lightning-input-field field-name="Remark__c" value={task.Remark__c} disabled onchange={handleFiledChange}> </lightning-input-field>   
                                                </div> -->  
                                            </template>
                                            <template if:false={showDisable}>
                                                <!-- <div class="slds-col slds-size_12-of-12 slds-small-size_12-of-12 slds-large-size_6-of-12 slds-p-horizontal_small">
                                                    <lightning-input-field field-name="Result__c" value={task.Result__c} onchange={handleFiledChange}> </lightning-input-field>   
                                                </div>  -->
                                                <div class="slds-col slds-size_12-of-12 slds-small-size_12-of-12 slds-large-size_6-of-12 slds-p-horizontal_small">
                                                    <lightning-input-field value={task.Inspection_Target__c} field-name="Inspection_Target__c" onchange={handleFiledChange}> </lightning-input-field>   
                                                </div> 
            
                                                <div class="slds-col slds-size_12-of-12 slds-small-size_12-of-12 slds-large-size_6-of-12 slds-p-horizontal_small">
                                                    <lightning-input-field value={task.Inspection_Plan_Commnets__c} field-name="Inspection_Plan_Commnets__c" onchange={handleFiledChange}> </lightning-input-field>   
                                                </div> 
                                                <!-- <div class="slds-col slds-size_12-of-12 slds-small-size_12-of-12 slds-large-size_6-of-12 slds-p-horizontal_small">
                                                    <lightning-input-field value={task.Remark__c} field-name="Remark__c" onchange={handleFiledChange}> </lightning-input-field>   
                                                </div>  -->
                                                <!-- <lightning-button
                                                    class="slds-m-top_small"
                                                    variant="brand"
                                                    type="submit"
                                                    name="update"
                                                    label="Update"
                                                ></lightning-button>   -->
                                            </template>
                                        </div>
                                    </lightning-record-edit-form>
            
                                    <template if:true={showDetail}>
                                        <template if:true={report}>
                                            <h3 class="slds-section__title slds-theme_shade" style="width: 100%;margin:12px;">
                                                <span class="slds-truncate slds-p-horizontal_small" title="Section Title">
                                                    {label.ReportDetail}
                                                </span>
                                            </h3>
                                            <div class="slds-col slds-size_1-of-1 slds-p-horizontal_x-small">
                                                <lightning-accordion allow-multiple-sections-open="true" active-section-name="A">
                                                        
                                                    <lightning-accordion-section name="A" label={report.ShopName} >
                                                        <div class="slds-col slds-size_2-of-2 slds-m-horizontal_small slds-m-bottom_small">
                                                            <p class="slds-m-around_small" style="font-weight: bold;text-decoration: underline;color: rgb(0, 161, 224);">
                                                                {label.RegularVisit}
                                                            </p>
                                                            <div class="slds-p-around_medium slds-grid slds-wrap" >
                                                                <div class="slds-col slds-size_1-of-2 slds-p-horizontal_x-small">
                                                                    <lightning-combobox
                                                                        name="productCatalogConfirm"
                                                                        label={label.ProductCatalogConfirm}
                                                                        placeholder={label.Pick}
                                                                        value={report.productCatalogConfirm}
                                                                        options={catalogOptions} dropdown-alignment="auto" disabled></lightning-combobox>        
                                                                </div>
                                                                <div class="slds-col slds-size_1-of-2 slds-p-horizontal_x-small">
                                                                    <lightning-combobox
                                                                        name="storeMaintain"
                                                                        label={label.StoreMaintain}
                                                                        placeholder={label.Pick}
                                                                        value={report.storeMaintain}
                                                                        options={storeMaintainOptions} dropdown-alignment="auto" disabled 
                                                                        ></lightning-combobox>        
                                                                </div>
                                                            </div>
            
                                                            <p class="slds-m-around_small" style="font-weight: bold;text-decoration: underline;color: rgb(0, 161, 224);">
                                                                {label.IntelligenceGathering}
                                                            </p>
                                                            <div class="slds-p-around_medium slds-grid slds-wrap" >
                                                                <div class="slds-col slds-size_1-of-2 slds-p-horizontal_x-small">
                                                                    <lightning-textarea max-length="131072" label={label.CorporateInformation} value={report.corporateInformation} name="corporateInformation" disabled></lightning-textarea>
                                                                </div>
                                                                <div class="slds-col slds-size_1-of-2 slds-p-horizontal_x-small">
                                                                    <lightning-textarea max-length="131072" label={label.StoreInformation} value={report.storeInformation} name="storeInformation" disabled></lightning-textarea>
                                                                </div>
                                                                <div class="slds-col slds-size_1-of-2 slds-p-horizontal_x-small">
                                                                    <lightning-textarea max-length="131072" label={label.CompetitiveInformation} value={report.competitiveInformation} name="competitiveInformation" disabled></lightning-textarea>
                                                                </div>
                                                            </div>
                                                            <p class="slds-m-around_small" style="font-weight: bold;text-decoration: underline;color: rgb(0, 161, 224);">
                                                                {label.SamplingInspection}
                                                            </p>
                                                            
                                                            <table class="slds-table slds-table_bordered" style="width: 100%;">
                                                                <tr>
                                                                    <td style="width: 5%">{label.Order}</td>
                                                                    <td style="width: 10%">{label.PlacementStatus}</td>
                                                                    <!-- <td style="width: 15%">出样标准编号</td> -->
                                                                    <td style="width: 20%">{label.Product}</td>
                                                                    <td style="width: 20%">{label.ProductSeries}</td>
                                                                    <!-- <td style="width: 15%">标签价格</td> -->
                                                                    <!-- <td style="width: 10%">point(%)</td> -->
                                                                    <td style="width: 25%">{label.ReRe}</td>
                                                                    <td style="width: 15%">{label.SampleImages}</td>
                                                                    <td style="width: 5%;">{label.GraphicalCounter}</td>
                                                                </tr>
            
                                                                <template for:each={cxjls} for:item="cxjl" for:index="index">
                                                                    <tr key={cxjl.xl} class="slds-hint-parent">
                                                                        <td style="width: 5%">
                                                                            {cxjl.Index}
                                                                        </td>
                                                                        <td style="width: 10%">
                                                                            {cxjl.PlacementStatus}
                                                                        </td>
                                                                        <!-- <td style="width: 15%">
                                                                            {cxjl.SamplingStandardName}
                                                                        </td> -->
                                                                        <td class="slds-cell-wrap" style="width: 20%">
                                                                            {cxjl.ProductName}
                                                                        </td>
                                                                        <td class="slds-cell-wrap" style="width: 20%">
                                                                            {cxjl.series}
                                                                        </td>
                                                                        <!-- <td class="slds-cell-wrap" style="width: 15%">
                                                                            {cxjl.TagPrice}
                                                                        </td>
                                                                        <td class="slds-cell-wrap" style="width: 10%">
                                                                            {cxjl.Point}
                                                                        </td> -->
                                                                        <td class="slds-cell-wrap" style="width: 25%">
                                                                            {cxjl.ReRe}
                                                                        </td>
                                                                        <td class="slds-cell-wrap" style="width: 15%">
                                                                            <lightning-button variant="brand" label={label.ViewImage} onclick={viewImgMethod} style="margin-left: 10px;
                                                                                                    margin-top: 10px;" data-record={index}>
                                                                                                </lightning-button>
                                                                        </td>
                                                                        <td style="width: 5%;">{cxjl.imageNum}</td>
                                                                    </tr>
                                                                </template>
                                                            </table>
                                                        </div>
                                                    </lightning-accordion-section>
                                                        
                                                </lightning-accordion>
            
                                            </div>
                                        </template>
                                    </template>
                                </div>
                                <div class="modal-footer slds-modal__footer slds-size_1-of-1">
                                    <div class="">
                                        <lightning-button label={label.Return} onclick={closeModal} class="slds-p-around_x-small"></lightning-button>
                                        <template if:true={showButton}>
                                            <lightning-button variant="brand" label={label.Confirm} onclick={confirmData} class="slds-p-around_x-small"></lightning-button>
                                            <template if:true={showDeleteButton}>
                                                <lightning-button variant="brand" label={label.Delete} onclick={deleteData} class="slds-p-around_x-small"></lightning-button>
                                            </template>
                                        </template>
                                    </div>
                                </div>
                            </div>
                        </section>
                        <div class="slds-backdrop slds-backdrop_open"></div>
                    </template>
            
                    <!-- 图片预览 -->
                    <template if:true={isViewImgOpen}>
                        <section role="dialog" tabindex="-1" aria-labelledby="modal-heading-01" aria-modal="true" aria-describedby="modal-content-id-1" class="slds-modal slds-fade-in-open">
                            <div class="slds-modal__container ">
                                <div class="slds-modal__header">
                                    <h2 class="slds-text-heading--medium">
                                        {label.ViewImage}
                                    </h2>
                                </div>
                                <div class="slds-modal__content modalBody menu">
                                        <!-- <lightning-formatted-rich-text value={viewImg}></lightning-formatted-rich-text>  -->
                                        <div style="border: 1px solid rgb(221, 219, 218);margin-left: 10px;margin-right: 10px;margin-top: 10px;">
                                        <lightning-card title={label.Preview} icon-name="utility:image">
                                            <img src={viewImg}> 
                                        </lightning-card>
                                    </div>
                                </div>
                                <div class="modal-footer slds-modal__footer slds-size_1-of-1">
                                    <div class="">
                                        <lightning-button label={label.Return} onclick={closeViewModal} class="slds-p-around_x-small"></lightning-button>
                                    </div>
                                </div>
                            </div>
                        </section>
                        <div class="slds-backdrop slds-backdrop_open"></div>
                    </template>
            
                    <!-- 查看/编辑图片 -->
                    <template if:true={showPhotoPage}>
                        <section role="dialog" tabindex="-1" aria-labelledby="modal-heading-01" aria-modal="true" aria-describedby="modal-content-id-1" class="slds-modal slds-fade-in-open">
                            <div class="slds-modal__container ">
                                
                                <div class="slds-modal__header">
                                    <h2 class="slds-text-heading--medium">
                                        {label.ViewImage}
                                    </h2>
                                </div>
            
                                <div class="slds-modal__content modalBody menu">
                                    <div class="slds-scrollable slds-col slds-size_2-of-2 slds-p-horizontal_x-small" style="width: 100%;overflow-y: scroll;margin-top: 10px;">
                                        <table class="slds-table slds-table_bordered">
                                            <tr>
                                                <td style="width: 5%;">{label.Order}</td>
                                                <td style="width:65%;">{label.Description}</td>
                                                <td style="width:30%;">{label.Picture}</td>
                                            </tr>
                                        </table>
                                    </div>    
                                    <div class="slds-scrollable slds-col slds-size_2-of-2 slds-p-horizontal_x-small" style={heightTable}>
                                        <table class="slds-table slds-table_bordered">
                                            <tbody>
                                            <template for:each={sampleImages} for:item="images" for:index="index">
                                                <tr key={images.index}>
                                                    <td style="width: 5%;">
                                                        {images.index}    
                                                    </td>
            
                                                    <td style="width: 65%;">
                                                        <lightning-textarea max-length="131072" data-record="ReRe__c" value={images.sampleImages.ReRe__c} disabled></lightning-textarea>  
                                                    </td>
            
                                                    <td style="width: 30%;">
                                                        <img src={images.sampleImages.Sample_Images__c} onclick={viewImag} name={images.sampleImages.Sample_Images__c} data-record={index}>  
                                                    </td>
                                                </tr>
                                            </template>
                                            </tbody>
                                        </table>
                                    </div>    
                                </div>
                                <div class="modal-footer slds-modal__footer slds-size_1-of-1">
                                    <div class="">
                                        <lightning-button label={label.Return} onclick={closeviewImgMethod} class="slds-p-around_x-small"></lightning-button>
                                    </div>
                                </div>
                            </div>
                        </section>
                        <div class="slds-backdrop slds-backdrop_open"></div>
                    </template>
            
                    <!-- 是否保存确认页面 -->
                    <template if:true={showCheckSave}>
                        <section role="dialog" tabindex="-1" aria-labelledby="modal-heading-01" aria-modal="true" aria-describedby="modal-content-id-1" class="slds-modal slds-fade-in-open">
                            <div class="slds-modal__container ">
                                <template if:true={isShowSpinner} >
                                    <lightning-spinner size="medium" variant="brand"></lightning-spinner>
                                </template>
                                <div class="slds-modal__header">
                                    <h2 class="slds-text-heading--medium">
                                        {label.SaveTheChanges}
                                    </h2>
                                </div>
                                <div class="slds-modal__content modalBody menu">
                                    <div class="slds-align_absolute-center slds-text-heading_medium" style="height:100px;">
                                        {label.IsSaveTheChanges}
                                    </div>   
                                </div>
                                <div class="modal-footer slds-modal__footer slds-size_1-of-1">
                                    <div class="">
                                        <lightning-button label={label.AbortSavingJump} onclick={notSave} class="slds-p-around_x-small"></lightning-button>
                                        <!-- <template if:true={photo}> -->
                                            <lightning-button variant="brand" label={label.SavingJump} onclick={saveAndJump} class="slds-p-around_x-small"></lightning-button>
                                        <!-- </template> -->
                                    </div>
                                </div>
                            </div>
                        </section>
                        <div class="slds-backdrop slds-backdrop_open"></div>
                    </template>
                </div>
            </div>
        </div>
    </div>
</template>
