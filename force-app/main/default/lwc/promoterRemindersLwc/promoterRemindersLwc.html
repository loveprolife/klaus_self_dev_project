<template>

  <template if:true={isShowSpinner}>
    <lightning-spinner size="medium" variant="brand"></lightning-spinner>
  </template>

  <!-- TodoList -->
  <template if:true={showToDoList}>
    <article class="slds-card">
      <div class="slds-card__header slds-grid">
        <header class="slds-media slds-media_center slds-has-flexi-truncate">
          <div class="slds-media__figure">
            <lightning-icon icon-name="action:description" alternative-text="description" title="description"
              size="x-small"></lightning-icon>
          </div>
          <div class="slds-media__body">
            <h2 class="slds-card__header-title">
              <span>{label.PromoterHomePage_ToDoList}：</span>
            </h2>
          </div>
        </header>
      </div>
      <table>
        <!-- Check In -->
        <template if:true={needCheckIn}>
          <tr>
            <td style="padding-left: 16px;">
              <!-- <span>Check In</span> -->
              <lightning-button variant="base" label="Check In" title="Non-primary action" data-id=" "
                data-name="newCheckInCheckOutLWC" data-type="" data-report-date="" onclick={handleButtonClick}
                class="slds-m-left_x-small">
              </lightning-button>
            </td>
          </tr>
        </template>
        <!-- Store List -->
        <!-- <template for:each={reports} for:item="item" for:index="index">
          <tr key={item.storeId}>
            <td style="padding-left: 16px;">
              <lightning-button variant="base" label={item.storeName} title="Non-primary action" data-id={item.storeId}
                data-name="newPromoterDailyReportLwc" onclick={handleButtonClick} class="slds-m-left_x-small">
              </lightning-button>
            </td>
          </tr>
        </template> -->
        <!-- Check Out -->
        <template if:true={needCheckOut}>
          <tr>
            <td style="padding-left: 16px;">
              <!-- <span>Check Out</span> -->
              <lightning-button variant="base" label="Check Out" title="Non-primary action" data-id=" "
                data-name="newCheckInCheckOutLWC" data-type="" data-report-date="" onclick={handleButtonClick}
                class="slds-m-left_x-small">
              </lightning-button>
            </td>
          </tr>
        </template>
      </table>

    </article>
  </template>

  <!-- Daily Report -->
  <template if:true={noReport}>
    <article class="slds-card">
      <div class="slds-card__header slds-grid">
        <header class="slds-media slds-media_center slds-has-flexi-truncate">
          <div class="slds-media__figure">
            <lightning-icon icon-name="custom:custom11" title="custom11" size="small"></lightning-icon>
          </div>
          <div class="slds-media__body">
            <h2 class="slds-card__header-title">
              <span>{label.PromoterHomePage_DailyReport}</span>
            </h2>
          </div>
        </header>
      </div>

      <table>
        <template for:each={reportList} for:item="item" for:index="index">
          <tr key={item.index}>
            <td style="padding-left: 16px;">
              <p>{item.storeName}</p>
            </td>
            <td style="width: auto; padding: 0; margin: 0; min-width:50px;text-align:center;">
              <p>{item.storeDateFormat}</p>
            </td>
            <td style="padding-right: 16px; text-align:right;">
              <lightning-button variant="base" label={item.status} title="Non-primary action" data-id={item.storeId}
                data-name="newPromoterDailyReportLwc" data-report-date={item.storeDate} data-type=""
                onclick={handleButtonClick} class="slds-m-left_x-small">
              </lightning-button>
            </td>
          </tr>
        </template>
        <tr>
          <td style="padding: 16px; text-align:right" colspan="3">
            <a data-name="Promoter_Daily_Report__c" data-type="object" data-id="" data-report-date=""
              onclick={handleButtonClick}>
              <span style="font-size: medium;"> {label.CheckInCheckOut_More} </span>
              <lightning-icon variant="success" icon-name="utility:chevronright" size="x-small" title="more">
              </lightning-icon>
              <span class="slds-assistive-text"></span>
            </a>
          </td>
        </tr>
      </table>

    </article>
  </template>

        <tr>

            <!-- <lightning-button variant="base" label="more" title="Non-primary action" data-id=" "

            </lightning-button> -->
            <a data-name="Market__c" data-type="object" data-id="" data-report-date="" onclick={handleButtonClick}>
