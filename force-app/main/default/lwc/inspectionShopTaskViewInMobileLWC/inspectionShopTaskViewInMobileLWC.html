<template>
    <div class="">
        <template if:true={isShowSpinner} >
            <lightning-spinner size="medium" variant="brand"></lightning-spinner>
        </template>
        <template if:false={isHomePage}>
            <div class="slds-modal__header">
                <lightning-layout >
                    <lightning-layout-item size="9" padding="around-small">
                        <h1 class="slds-text-heading--medium" style="text-align: left;font-size: 22px;font-weight: bold;">
                            {label.TaskTitile}
                        </h1>
                    </lightning-layout-item>
                    <lightning-layout-item size="3" padding="around-small" style="text-align: right;">
                        <lightning-button variant="brand" label={label.PromoterDailyReport_NEW} onclick={newRecord} class="slds-p-around_x-small"></lightning-button>
                    </lightning-layout-item>
                </lightning-layout>
            </div>
        </template>
        <template if:true={isHomePage}>
            <div class="slds-is-relative"> 
                <div class="slds-card" >
                    <article class="slds-card custom-header">
                        <div class="slds-grid slds-page-header forceRelatedListCardHeader">
                            <div class="slds-page-header__row">
                                <div class="slds-page-header__col-title">
                                    <header class="slds-media slds-media--center slds-has-flexi-truncate">
                                        <div class="slds-media__figure stencil slds-avatar slds-avatar_small" aria-hidden="true">
                                            <lightning-icon icon-name="custom:custom10" size="medium" class="title-icon">
                                            </lightning-icon>
                                        </div>
                                        <div class="slds-media__body">
                                            <h2 class="slds-card__header-title">
                                                <span class="slds-truncate slds-m-right--xx-small">
                                                    {label.TaskTitile}
                                                </span>
                                            </h2>
                                        </div>
                                    </header>
                                </div>
                            </div>
                        </div>
                    </article>
              </div>
        </div>
        </template>
        <div class="slds-modal__content modalBody menu slds-size_1-of-1" style="height: 100%;">
            <template if:false={isHomePage}>
                <template if:true={isToday}>
                    <lightning-input type="checkbox" label={label.TodayTask} onchange={todayTask} value={isToday} style="text-align: left;margin-left:10px" checked ></lightning-input>
                </template>
                
                <template if:false={isToday}>
                    <table class="slds-table_bordered" style="table-layout:fixed;overflow-y: scroll;">
                        <tbody>
                            <tr>
                                <td style="width: 30%;height:20px;font-size: 12px;">
                                    <lightning-input type="checkbox" label={label.TodayTask} onchange={todayTask} value={isToday} style="text-align: left;margin-left:10px"  ></lightning-input>
                                </td>
                                <td style="width: 70%;height:20px;font-size: 12px;" colspan="2">
                                    <div style="background-color: white;padding: 5px;">
                                        <lightning-combobox
                                            name="progress"
                                            label={statusLabel}
                                            value={selectedStatus}
                                            options={statusOptions} dropdown-alignment="auto" onchange={dataChange}>
                                        </lightning-combobox>
                                    </div>
                                </td>
                            </tr>
                            <tr>
                                <td style="width: 30%;height:20px;font-size: 12px;">
                                    <div style="background-color: white;padding: 5px;">
                                        <lightning-combobox
                                            name="progress"
                                            label={label.PlanYear}
                                            placeholder={label.PickPlanYear}
                                            value={selectedYear}
                                            disabled={isToday}
                                            options={yearsOptions} dropdown-alignment="auto" onchange={yearChange}>
                                        </lightning-combobox>
                                    </div>
                                </td>
                                <td style="width: 30%;height:20px;font-size: 12px;">
                                    <div style="background-color: white;padding: 5px;">
                                        <template lwc:if={allDate}>
                                            <lightning-combobox
                                                name="progress"
                                                label={label.PlanMonth}
                                                placeholder={label.PickPlanMonth}
                                                value={selectedMonth}
                                                disabled={isToday}
                                                options={monthOptions} dropdown-alignment="auto" onchange={monthChange}>
                                            </lightning-combobox>
                                        </template>
                                    </div>
                                </td>
                                <td style="width: 30%;height:20px;font-size: 12px;">
                                    <div style="background-color: white;padding: 5px;">
                                        <template lwc:if={allDate}>
                                            <template lwc:if={allDay}>
                                                <lightning-combobox
                                                    name="progress"
                                                    label={label.PlanDay}
                                                    placeholder={label.PickPlanDay}
                                                    value={selectedDay}
                                                    disabled={isToday}
                                                    options={dayOptions} dropdown-alignment="auto" onchange={dayChange}>
                                                </lightning-combobox>
                                            </template>
                                        </template>
                                    </div>
                                </td>
                            </tr>
                            <tr>
                                <!-- <template lwc:if={countryGridOption}> -->
                                    <td style="width: 100%;height:20px;font-size: 12px;">
                                        <div style="background-color: white;padding: 5px;">
                                            <lightning-combobox
                                                name="countryId"
                                                data-type="search"
                                                label={label.Country}
                                                value={countryId}
                                                options={countryGridOption} 
                                                dropdown-alignment="auto" 
                                                onchange={optionChange}>
                                            </lightning-combobox>
                                        </div>
                                    </td>
                                <!-- </template> -->
                                
                                <!-- <template lwc:if={regionGridOption}> -->
                                    <td style="width: 100%;height:20px;font-size: 12px;">
                                        <div style="background-color: white;padding: 5px;">
                                            <lightning-combobox
                                                name="regionId"
                                                data-type="search"
                                                label={label.Region}
                                                value={regionId}
                                                options={regionGridOption} 
                                                dropdown-alignment="auto" 
                                                onchange={optionChange}>
                                            </lightning-combobox>
                                        </div>
                                    </td>
                                <!-- </template> -->
                                
                                <!-- <template lwc:if={provinceGridOption}> -->
                                    <td style="width: 100%;height:20px;font-size: 12px;">
                                        <div style="background-color: white;padding: 5px;">
                                            <lightning-combobox
                                                name="provinceId"
                                                data-type="search"
                                                label={label.Province}
                                                value={provinceId}
                                                options={provinceGridOption} 
                                                dropdown-alignment="auto" 
                                                onchange={optionChange}>
                                            </lightning-combobox>
                                        </div>
                                    </td>
                                <!-- </template> -->
                                
                            </tr>
                            <tr>
                                <!-- <template lwc:if={cityGridOption}> -->
                                    <td style="width: 100%;height:20px;font-size: 12px;">
                                        <div style="background-color: white;padding: 5px;">
                                            <lightning-combobox
                                                name="cityId"
                                                data-type="search"
                                                label={label.City}
                                                value={cityId}
                                                options={cityGridOption} 
                                                dropdown-alignment="auto" 
                                                onchange={optionChange}>
                                            </lightning-combobox>
                                        </div>
                                    </td>
                                <!-- </template> -->
                                
                                <!-- <template lwc:if={districtGridOption}> -->
                                    <td style="width: 100%;height:20px;font-size: 12px;">
                                        <div style="background-color: white;padding: 5px;">
                                            <lightning-combobox
                                                name="districtId"
                                                data-type="search"
                                                label={label.District}
                                                value={districtId}
                                                options={districtGridOption} 
                                                dropdown-alignment="auto" 
                                                onchange={optionChange}>
                                            </lightning-combobox>
                                        </div>
                                    </td>
                                <!-- </template> -->
                                <td style="width: 100%;height:20px;font-size: 12px;">
                                    <div style="background-color: white;padding: 5px;">
                                        <lightning-combobox
                                            name="searchChannel"
                                            label={channelLabel}
                                            value={selectedChannelId}
                                            disabled={isToday}
                                            options={channelOptions} 
                                            dropdown-alignment="auto" 
                                            onchange={channelChange}>
                                        </lightning-combobox>
                                    </div>
                                </td>
                            </tr>
                            <tr>
                                <td style="width: 100%;height:20px;font-size: 12px;" colspan="2">
                                    <div style="background-color: white;padding: 5px;">
                                        <lightning-combobox
                                            name="progress"
                                            label={shopLabel}
                                            value={selectedShopId}
                                            disabled={isToday}
                                            options={shopOptions} dropdown-alignment="auto" onchange={shopChange}>
                                        </lightning-combobox>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </template>
                
            </template>
            <div class="slds-align_absolute-center slds-text-heading_medium" style="width:100%;min-height: 130px;">
                <template lwc:if={taskList}>
                    <table class="slds-table_bordered" style="table-layout:fixed;overflow-y: scroll;">
                        <tbody>
                            <template for:each={taskList} for:item="item">
                                <tr data-id={item.Id} data-shop-id={item.Shop__c} key={item.Id} class="slds-hint-parent" style="height: 20px;">
                                    <template if:true={item.flag}>
                                        <td style="font-size: 20px;height: 80px;padding-left: 20px;padding-top: 10px;padding-bottom: 10px;width:100%;" colspan="2"></td>
                                    </template>

                                    <template if:false={item.flag}>
                                        <td style="font-size: 16px;height: 80px;padding-left: 20px;padding-top: 10px;padding-bottom: 10px;width:auto"  onclick={showRecordDetailpage}><a style="font-weight: bold;">{item.Name}</a>
                                            <div style="font-size: 13px;"><div style="font-weight: bold;display:inline;">{inspectionDateLabel}:</div>&nbsp;{item.Inspection_Date__c}</div>
                                            <div style="font-size: 13px;"><div style="font-weight: bold;display:inline;">{shopLabel}:</div>&nbsp;{item.Shop__r.Name}</div>
                                            <template if:true={item.Note__c}>
                                                <div style="font-size: 13px;"><div style="font-weight: bold;display:inline;">{noteLabel}:</div>&nbsp;{item.Note__c}</div>
                                            </template>
                                            <div style="font-size: 13px;"><div style="font-weight: bold;display:inline;">{statusLabel}:</div>&nbsp;{item.Status__c}&nbsp;&nbsp;&nbsp;
                                                <div style="font-weight: bold;display:inline;">{ownerLabel}:</div>
                                                &nbsp;{item.Inspection_Plan__r.Owner.Name}
                                            </div>
                                        </td>
                                        <td style="width: auto;font-size: 10px;">
                                            <template if:false={item.Daily_Inspection_Report__c}>
                                                <template lwc:if={isToday}>
                                                    <lightning-button label={label.Daily_Report_Navigation_Label} onclick={goToDailyReport} data-name={item.Shop__r.Sales_Region__c} style="float: right;margin-right: 15px;" variant="brand"></lightning-button>
                                                </template>
                                            </template>
                                        </td>
                                    </template>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </template>
            </div>   
        </div>
        <!-- <div class="modal-footer slds-modal__footer slds-size_1-of-1">
            <div class="">
                <lightning-button variant="brand" label='New' onclick={newRecord} class="slds-p-around_x-small"></lightning-button>
            </div>
        </div> -->
        <!-- 创建任务页面 -->
        <template lwc:if={isModalOpen}>
            <section role="dialog" tabindex="-1" aria-labelledby="modal-heading-01" aria-modal="true" aria-describedby="modal-content-id-1" class="slds-modal slds-fade-in-open">
                <div class="slds-modal__container" style="padding: 0;">
                    <div class="slds-modal__header">
                        <h2 class="slds-text-heading--medium">
                            {label.TaskTitile}
                        </h2>
                    </div>
                    <div class="slds-modal__content modalBody menu">
                        <lightning-record-edit-form object-api-name="Inspection_Shop_Task__c" layout-type="Compact">
                            <div class=" slds-grid slds-wrap" id="modal-content-id-1" style="margin-top: 1rem">
                                <div style="display: flex; align-items: flex-end;" class="slds-col slds-size_12-of-12 slds-small-size_12-of-12 slds-large-size_6-of-12 slds-p-horizontal_small">
                                    <!-- <lightning-input-field field-name="Shop__c" onchange={handleFiledChange} value={task.Shop__c} data-id="disableData" > </lightning-input-field>    -->
                                    <c-store-lookup-lwc 
                                        show-label=true
                                        label={shopLabel}
                                        search-key={selectedNewTaskShopLabel}
                                        name="onShop"
                                        obj-name="Shop__c" 
                                        op={shopLookupFilter} 
                                        onlookupupdate={newTaskShopChange}>
                                    </c-store-lookup-lwc >
                                    <lightning-button-icon
                                        style="margin-left: 0.5rem;"
                                        name="new"
                                        icon-name="utility:search"
                                        alternative-text="Search Store"
                                        onclick={handleSearchClick}>
                                    </lightning-button-icon>
                                    <!-- <lightning-combobox
                                        name="progress"
                                        label={shopLabel}
                                        value={selectedNewTaskShopId}
                                        options={shopOptions2} dropdown-alignment="auto" onchange={newTaskShopChange}>
                                    </lightning-combobox> -->
                                </div> 
                                <div class="slds-col slds-size_12-of-12 slds-small-size_12-of-12 slds-large-size_6-of-12 slds-p-horizontal_small">
                                    <!-- <lightning-input-field field-name="Inspection_Date__c" onchange={handleFiledChange} value={task.Inspection_Date__c} data-id="disableData" > </lightning-input-field>    -->
                                    <lightning-input label={inspectionDateLabel} required type="date" field-name="Inspection_Date__c" onchange={newTaskDateChange} value={task.Inspection_Date__c} data-id="disableData" > </lightning-input>   
                                </div>
                                <!-- <template if:true={isShowProductLine}>
                                    <div class="slds-col slds-size_12-of-12 slds-small-size_12-of-12 slds-large-size_6-of-12 slds-p-horizontal_small">
                                        <lightning-input-field field-name="Product_Line__c" onchange={handleFiledChange} value={task.Product_Line__c} data-id="disableData"> </lightning-input-field>   
                                    </div>
                                </template> -->
                                <div class="slds-col slds-size_12-of-12 slds-small-size_12-of-12 slds-large-size_6-of-12 slds-p-horizontal_small">
                                    <lightning-input-field field-name="Status__c" onchange={handleFiledChange} value={task.Status__c} data-id="disableData" disabled> </lightning-input-field>   
                                </div> 
                                <div class="slds-col slds-size_12-of-12 slds-small-size_12-of-12 slds-large-size_6-of-12 slds-p-horizontal_small">
                                    <lightning-input-field field-name="Inspection_Target__c" onchange={handleFiledChange}  value={task.Inspection_Target__c}> </lightning-input-field>   
                                </div> 
                                <div class="slds-col slds-size_12-of-12 slds-small-size_12-of-12 slds-large-size_6-of-12 slds-p-horizontal_small">
                                    <lightning-input-field field-name="Inspection_Plan_Commnets__c" onchange={handleFiledChange} value={task.Inspection_Plan_Commnets__c}> </lightning-input-field>   
                                </div> 
                                <div class="slds-col slds-size_12-of-12 slds-small-size_12-of-12 slds-large-size_6-of-12 slds-p-horizontal_small">
                                    <lightning-input-field field-name="OwnerId" onchange={handleFiledChange} value={ownerId} disabled ={isManager}> </lightning-input-field>   
                                </div> 
                            </div>
                        </lightning-record-edit-form>
                    </div>
                    <div class="modal-footer slds-modal__footer slds-size_1-of-1">
                        <div class="">
                            <lightning-button label={label.Confirm} onclick={confirmData} class="slds-p-around_x-small" variant="brand"></lightning-button>
                            <lightning-button label={label.Return} onclick={closeModal} class="slds-p-around_x-small"></lightning-button>
                        </div>
                    </div>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>

        <!-- 筛选门店页面 -->
        <template lwc:if={isSearchStore}>
            <section role="dialog" tabindex="-1" aria-labelledby="modal-heading-01" aria-modal="true" aria-describedby="modal-content-id-1" class="slds-modal slds-fade-in-open">
                <div class="slds-modal__container" style="padding: 0;">
                    <div class="slds-modal__header">
                        <h2 class="slds-text-heading--medium">
                            {label.Search_Store}
                        </h2>
                    </div>
                    <div class="slds-modal__content modalBody menu">
                        <lightning-record-edit-form object-api-name="Inspection_Shop_Task__c" layout-type="Compact">
                            <div class=" slds-grid slds-wrap" style="margin-top: 1rem">
                                <template lwc:if={countryGridOption}>
                                    <div class="slds-col slds-size_12-of-12 slds-small-size_12-of-12 slds-large-size_6-of-12 slds-p-horizontal_small">
                                        <lightning-combobox
                                            name="countryId"
                                            label={label.Country}
                                            value={countryId}
                                            options={countryGridOption} dropdown-alignment="auto" onchange={optionChange}>
                                        </lightning-combobox>
                                    </div>
                                </template>
                                <template lwc:if={regionGridOption}>
                                    <div class="slds-col slds-size_12-of-12 slds-small-size_12-of-12 slds-large-size_6-of-12 slds-p-horizontal_small">
                                        <lightning-combobox
                                            name="regionId"
                                            value={regionId}
                                            label={label.Region}
                                            options={regionGridOption} dropdown-alignment="auto" onchange={optionChange}>
                                        </lightning-combobox>
                                    </div>
                                </template>
                                <template lwc:if={provinceGridOption}>
                                    <div class="slds-col slds-size_12-of-12 slds-small-size_12-of-12 slds-large-size_6-of-12 slds-p-horizontal_small">
                                        <lightning-combobox
                                            name="provinceId"
                                            label={label.Province}
                                            value={provinceId}
                                            options={provinceGridOption} dropdown-alignment="auto" onchange={optionChange}>
                                        </lightning-combobox>
                                    </div>
                                </template>
                                <template lwc:if={cityGridOption}>
                                    <div class="slds-col slds-size_12-of-12 slds-small-size_12-of-12 slds-large-size_6-of-12 slds-p-horizontal_small">
                                        <lightning-combobox
                                            name="cityId"
                                            label={label.City}
                                            value={cityId}
                                            options={cityGridOption} dropdown-alignment="auto" onchange={optionChange}>
                                        </lightning-combobox>
                                    </div>
                                </template>
                                <template lwc:if={districtGridOption}>
                                    <div class="slds-col slds-size_12-of-12 slds-small-size_12-of-12 slds-large-size_6-of-12 slds-p-horizontal_small">
                                        <lightning-combobox
                                            name="districtId"
                                            label={label.District}
                                            value={districtId}
                                            options={districtGridOption} dropdown-alignment="auto" onchange={optionChange}>
                                        </lightning-combobox>
                                    </div>
                                </template>
                                <div class="slds-col slds-size_12-of-12 slds-small-size_12-of-12 slds-large-size_6-of-12 slds-p-horizontal_small">
                                    <lightning-combobox
                                        label={channelLabel}
                                        value={selectedChannelId}
                                        options={channelOptions} dropdown-alignment="auto" onchange={channelChange}>
                                    </lightning-combobox>
                                </div>
                                <div class="slds-col slds-size_12-of-12 slds-small-size_12-of-12 slds-large-size_6-of-12 slds-p-horizontal_small">
                                    <lightning-combobox
                                        label={shopLabel}
                                        options={shopOptions} 
                                        dropdown-alignment="auto" 
                                        onchange={shopSearchChange}>
                                    </lightning-combobox>
                                </div> 
                            </div>
                        </lightning-record-edit-form>
                    </div>
                    <div class="modal-footer slds-modal__footer slds-size_1-of-1">
                        <div class="">
                            <lightning-button label={label.Confirm} onclick={confirmSelectShop} class="slds-p-around_x-small" variant="brand"></lightning-button>
                            <lightning-button label={label.Return} onclick={closeSelectShop} class="slds-p-around_x-small"></lightning-button>
                        </div>
                    </div>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>

        <!-- 日期选择 -->
        <template lwc:if={isDateOpen}>
            <section role="dialog" tabindex="-1" aria-labelledby="modal-heading-01" aria-modal="true" aria-describedby="modal-content-id-1" class="slds-modal slds-fade-in-open">
                <template if:true={isShowSpinner} >
                    <lightning-spinner size="medium" variant="brand"></lightning-spinner>
                </template>
                <div class="slds-modal__container">
                    <!-- <div class="slds-col slds-size_1-of-2 slds-p-horizontal_x-small"></div> -->
                    <div class="slds-modal__header">Choose Date</div>
                    <div style="background-color: white;padding: 10px;">
                        <lightning-combobox
                            name="progress"
                            label={label.PlanYear}
                            placeholder={label.PickPlanYear}
                            value={selectedYear}
                            options={yearsOptions} dropdown-alignment="auto" required onchange={yearChange}>
                        </lightning-combobox>
                        <template lwc:if={allDate}>
                            <lightning-combobox
                                name="progress"
                                label={label.PlanMonth}
                                placeholder={label.PickPlanMonth}
                                value={selectedMonth}
                                options={monthOptions} dropdown-alignment="auto" required onchange={dataChange}>
                            </lightning-combobox>
                        </template>
                        
                    </div>
                    <div class="modal-footer slds-modal__footer slds-size_1-of-1">
                        <div class="">
                            <lightning-button label={label.Confirm} onclick={confirmDate} class="slds-p-around_x-small" variant="brand"></lightning-button>
                            <lightning-button label={label.Return} onclick={closeModal} class="slds-p-around_x-small"></lightning-button>
                        </div>
                    </div>
                </div>
                
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>
        <!-- 门店选择 -->
        <template lwc:if={isShopOpen}>
            <section role="dialog" tabindex="-1" aria-labelledby="modal-heading-01" aria-modal="true" aria-describedby="modal-content-id-1" class="slds-modal slds-fade-in-open">
                <template if:true={isShowSpinner} >
                    <lightning-spinner size="medium" variant="brand"></lightning-spinner>
                </template>
                <div class="slds-modal__container">
                    <div class="slds-modal__header">Choose Shop</div>
                    <div style="background-color: white;padding: 10px;">
                        <lightning-combobox
                            name="progress"
                            label='门店选择'
                            placeholder='请选择门店'
                            value={selectedShopId}
                            options={shopOptions} dropdown-alignment="auto" required onchange={dataChange}>
                        </lightning-combobox>
                    </div>
                    <div class="modal-footer slds-modal__footer slds-size_1-of-1">
                        <div class="">
                            <lightning-button label={label.Confirm} onclick={confirmShop} class="slds-p-around_x-small" variant="brand"></lightning-button>
                            <lightning-button label={label.Return} onclick={closeModal} class="slds-p-around_x-small"></lightning-button>
                        </div>
                    </div>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>
        <!-- 状态选择 -->
        <template lwc:if={isStatusOpen}>
            <section role="dialog" tabindex="-1" aria-labelledby="modal-heading-01" aria-modal="true" aria-describedby="modal-content-id-1" class="slds-modal slds-fade-in-open">
                <template if:true={isShowSpinner} >
                    <lightning-spinner size="medium" variant="brand"></lightning-spinner>
                </template>
                <div class="slds-modal__container">
                    <div class="slds-modal__header">Choose Status</div>
                    <div style="background-color: white;padding: 10px;">
                        <lightning-combobox
                            name="progress"
                            label='状态选择'
                            placeholder='请选择状态'
                            value={selectedStatus}
                            options={statusOptions} dropdown-alignment="auto" required onchange={dataChange}>
                        </lightning-combobox>
                    </div>
                    <div class="modal-footer slds-modal__footer slds-size_1-of-1">
                        <div class="">
                            <lightning-button label={label.Confirm} onclick={confirmStatus} class="slds-p-around_x-small" variant="brand"></lightning-button>
                            <lightning-button label={label.Return} onclick={closeModal} class="slds-p-around_x-small"></lightning-button>
                        </div>
                    </div>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>
        <!-- 所有人选择 -->
        <template lwc:if={isOwnerOpen}>
            <section role="dialog" tabindex="-1" aria-labelledby="modal-heading-01" aria-modal="true" aria-describedby="modal-content-id-1" class="slds-modal slds-fade-in-open">
                <template if:true={isShowSpinner} >
                    <lightning-spinner size="medium" variant="brand"></lightning-spinner>
                </template>
                <div class="slds-modal__container">
                    <div class="slds-modal__header">Choose Owner</div>
                    <div style="background-color: white;padding: 10px;">
                        <lightning-combobox
                            name="progress"
                            label='所有人选择'
                            placeholder='请选择所有人'
                            value={selectedOwner}
                            options={ownerOptions} dropdown-alignment="auto" required onchange={dataChange}>
                        </lightning-combobox>
                    </div>
                    <div class="modal-footer slds-modal__footer slds-size_1-of-1">
                        <div class="">
                            <lightning-button label={label.Confirm} onclick={confirmOwner} class="slds-p-around_x-small" variant="brand"></lightning-button>
                            <lightning-button label={label.Return} onclick={closeModal} class="slds-p-around_x-small"></lightning-button>
                        </div>
                    </div>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>
    </div>
</template>
