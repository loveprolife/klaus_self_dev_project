<template>
    <lightning-spinner alternative-text="Loading" size="medium" if:true={isShowSpinner}></lightning-spinner>
    <lightning-card>
        <!-- <lightning-modal-header label="Customer Unique Identifier Validation"></lightning-modal-header> -->
        <lightning-modal-header style="text-align: center;font-size: 1.5rem;
        font-weight: bold;" label={Label_DupliCheckTitle}></lightning-modal-header>
        <lightning-card style="\{style}">
            <template if:false={isSubCustomerFlag}>
                <template if:true={isRegularCustomer}>
                    <div class="inputCard-input-body">
                        <div class="slds-m-around_medium input__container">
                            <div class="input-container">
                                <lightning-input 
                                    label={Label_CountryRegion} 
                                    value={searchValue} 
                                    onchange={handleSearchInput} 
                                    placeholder="Start typing a country"
                                    type="text"
                                    required>
                                </lightning-input>
                        
                                <!-- 动态候选项下拉列表 -->
                                <template if:true={filteredCountries.length}>
                                    <ul class="dropdown-list">
                                        <template for:each={filteredCountries} for:item="country">
                                            <li key={country.value} 
                                                onclick={handleCountrySelect} 
                                                data-value={country.value}>
                                                {country.label}
                                            </li>
                                        </template>
                                    </ul>
                                </template>
                            </div>
                            <!-- <lightning-combobox
                                name="country"
                                label="国家"
                                value={country}
                                placeholder="Select an option"
                                onchange={handleCountryChange}
                                options={picklistOptions}>
                            </lightning-combobox> -->
                            <!-- <lightning-input class="input-content" label="国家" value={country} onchange={handleCountryChange} required></lightning-input> -->
                        </div>
                    </div>
                    <template if:true={isRegularCustomer}>
                        <div class="inputCard-input-body">
                            <div class="slds-m-around_medium input__container">
                                <lightning-combobox
                                    name="ID_Type"
                                    label={Label_TypeID}
                                    value={idType}
                                    placeholder="Select an ID type"
                                    class="input-container"
                                    onchange={handleIdTypeChange}
                                    options={idTypeList}
                                    required >
                                </lightning-combobox>
                                <!-- <lightning-input class="input-content" label="ID Type" value={idType} onchange={handleIdTypeChange} required></lightning-input> -->
                            </div>
                        </div>
                        <div class="inputCard-input-body">
                            <div class="slds-m-around_medium input__container">
                                <lightning-input class="input-content" label={Label_RegNoStaffNo} value={registrationNumber} onchange={handleRegistrationChange} required></lightning-input>
                            </div>
                        </div>
                    </template>
                    <div class="inputCard-message-body">
                        <div class="slds-m-around_medium">
                            <template if:true={account}>
                                <template if:true={account.Id}>
                                    <p>{customerFoundInSF}<a href={accountLink} target="_blank">{account.Name}</a></p>
                                </template>
                                <!-- <template if:false={account.Id}>
                                    <p>{customerFoundInMDG}</p>
                                </template> -->
                            </template>
                            <template if:true={errorMessage}>
                                <p class="slds-text-color_error">{errorMessage}</p>
                            </template>
                        </div>
                    </div>
                </template>
            </template>
            <!-- 分户页面 (wfc:2025-01-24) -->
            <template if:true={isSubCustomerFlag}>
                <div class="inputCard-input-body">
                    <lightning-record-edit-form object-api-name="Account">
                        <!-- 分户主户 -->
                        <lightning-input-field 
                            field-name="ParentCustomerOfSubAcc__c" 
                            value={parentCustomerOfSubAcc} 
                            onchange={handleParentCustomerOfSubAccChange}
                            required> 
                        </lightning-input-field>
                        <!-- 分户类型 -->
                        <lightning-input-field 
                            field-name="Sub_account_type__c" 
                            value={subAccountType} 
                            onchange={handleSubAccountTypeChange}
                            required> 
                        </lightning-input-field>
                        <!-- 分户原因 -->
                        <lightning-input-field 
                            field-name="Reasons_for_customer_segmentation__c" 
                            value={reasonsCustomerSegmentation} 
                            onchange={handleReasonsCustomerSegmentationChange}
                            required> 
                        </lightning-input-field>
                        <!-- 分户信贷规则 -->
                        <template if:false={isHaveCreditManagement}>
                            <lightning-input-field 
                                field-name="Credit_Management__c" 
                                value={creditManagement} 
                                onchange={handleCreditManagementChange}
                                required> 
                            </lightning-input-field>
                        </template>
                    </lightning-record-edit-form>
                </div>
            </template>
            <!-- 分户页面 end -->
        </lightning-card>
        <div slot="footer">
            <lightning-button class="slds-m-top_small" label={label.Button_Back} onclick={handleCancel}></lightning-button>
            &nbsp;
            <lightning-button class="slds-m-top_small" label={label.Button_Next} variant="brand" onclick={handleNext}></lightning-button>
        </div>
    </lightning-card>
    <lightning-modal-footer>
    </lightning-modal-footer>
</template>
