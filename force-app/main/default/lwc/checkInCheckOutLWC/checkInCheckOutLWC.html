<template>
    <div>
        <lightning-card class="slds-color__background_gray-4 pageHeader" title={label.CheckInCheckOut_Title} icon-name="standard:article">
            <div slot="actions">
                <div>
                    <div style="margin-left:5px;display:inline-block;">
                        <template if:true={isCheckIn}>
                            <lightning-button variant="brand" label={label.CheckInCheckOut_CHECK_IN} disabled></lightning-button>
                        </template>
                        <template if:false={isCheckIn}>
                            <lightning-button variant="brand" label={label.CheckInCheckOut_CHECK_IN} onclick={handleCheckIn} ></lightning-button>
                        </template>
                    </div>
                    <div style="margin-left:5px;display:inline-block;">
                        <template if:true={isCheckOut}>
                            <lightning-button variant="brand" label={label.CheckInCheckOut_CHECK_OUT} disabled></lightning-button>
                        </template>
                        <template if:false={isCheckOut}>
                            <lightning-button variant="brand" label={label.CheckInCheckOut_CHECK_OUT} onclick={handleCheckOut}></lightning-button>
                        </template>
                    </div>
                    
                </div>
            </div>


        </lightning-card>
        <div  style="margin-bottom: 15px;" ></div>
        <lightning-card>
            <div class="slds-modal__content" style="padding-top:0px;">
                <template if:true={isShowSpinner}>
                    <lightning-spinner alternative-text="Loading" size="medium"  variant="brand"></lightning-spinner>
                </template>    
                <div class="slds-grid slds-wrap slds-m-vertical_medium" style="width:100%;margin-top:0px;">
                    <div class="slds-col slds-size_6-of-12 slds-small-size_6-of-12 slds-large-size_6-of-12 slds-p-horizontal_small">
                        {label.CheckInCheckOut_CHECK_DATE}：{thisDay} <br/>
                        {label.CheckInCheckOut_CHECK_IN_STATUS}：{checkInStatusLabel}
                    </div>
                    <div class="slds-col slds-size_6-of-12 slds-small-size_6-of-12 slds-large-size_6-of-12 slds-p-horizontal_small">
                        <div class ="search" style="display: inline-block;vertical-align: bottom;padding-top:2%;">
                            <button type="button" class="slds-button slds-button_brand" onclick={toPromoterAttendanceDetail}>追加打刻申请</button>
                        </div>
                    </div>
                    <!--
                    <div class="slds-col slds-size_12-of-12 slds-small-size_12-of-12 slds-large-size_12-of-12 slds-p-horizontal_small">
                        {label.CheckInCheckOut_Title}
                    </div>
                    -->
                    <div class="slds-col slds-size_12-of-12 slds-small-size_12-of-12 slds-large-size_6-of-12 slds-p-horizontal_small">
                        {label.CheckInCheckOut_DEVICE}：{device} <br/>

                        <div>
                            {label.CheckInCheckOut_GEOLOCATION}：
                            <lightning-input variant="label-hidden" type="text" value={position} readonly></lightning-input>
                        </div>
                        <div>
                            {label.CheckInCheckOut_CURRENT_ADDR}：
                            <lightning-input variant="label-hidden" type="text" value={addressStr} readonly></lightning-input>
                        </div>
                    </div>
                    <div class="slds-col slds-size_12-of-12 slds-small-size_12-of-12 slds-large-size_6-of-12 slds-p-horizontal_small">
                        
                    </div>
                    <div class="slds-col slds-size_12-of-12 slds-small-size_12-of-12 slds-large-size_6-of-12 slds-p-horizontal_small">
                        <div class ="search" style="display: inline-block;vertical-align: bottom;padding-top:2%;">
                            <button type="button" class="slds-button slds-button_brand" onclick={getHighAccuracyPosition}>{label.CheckInCheckOut_LOCATION}</button>
                        </div>
                    </div>
                    <div class="slds-col slds-size_12-of-12 slds-small-size_12-of-12 slds-large-size_6-of-12 slds-p-horizontal_small">
                        
                    </div>
                  <!-- <template if:false={isPromoter}>--> 
                        <div class="slds-col slds-size_12-of-12 slds-small-size_12-of-12 slds-large-size_6-of-12 slds-p-horizontal_small"> 
                            <div style="display: inline-block;margin-right:2%;width:70%;">
                            <lightning-input label={label.CheckInCheckOut_QUERY_STORE} type="search" value={searchInfo} onchange={handleSearchInput} ></lightning-input>  
                            </div>
                            <div class ="search" style="display: inline-block;vertical-align: bottom;width:28%">
                                <button type="button" class="slds-button slds-button_brand" onclick={handleSearch}>{label.CheckInCheckOut_QUERY}</button>
                            </div>
                        </div>
                   <!--  </template> -->

                </div>
                <div style="width: 100%;overflow-x: scroll;">
                    <template if:true={isRefresh}>
                        <lightning-datatable data={datas} key-field = "Id" column-widths-mode="fixed"
                        columns={columns} min-column-width = "111" wrap-text-max-lines="3"
                        onrowselection={handleChange} max-row-selection = "1" > 
                        </lightning-datatable>
                    </template>
                    <template if:false={isRefresh}>
                        <lightning-datatable data={datas} key-field = "Id" column-widths-mode="fixed"
                        columns={columns} min-column-width = "111" wrap-text-max-lines="3"
                        onrowselection={handleChange} max-row-selection = "1" > 
                        </lightning-datatable>
                    </template>
     
                </div>
            </div>
        </lightning-card>
    </div>
</template>
