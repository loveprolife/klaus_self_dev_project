<template>
    <!-- <section role="dialog" tabindex="-1" aria-labelledby="modal-heading-01" aria-modal="true" aria-describedby="modal-content-id-1" class="slds-modal slds-fade-in-open">
        <div class="slds-modal__container"> -->
    <template if:true={isShowSpinner}>
        <lightning-spinner size="medium" variant="brand"></lightning-spinner>
    </template>
    <div>
        <template if:true={isShowDetail}>
            <header class = "slds-modal__header">                  
                <h1 class = "slds-modal__title slds-hyphenate slds-text-title_bold font-size: inherit">
                    {title}
                </h1>
            </header>
            <lightning-record-edit-form object-api-name={objectApiName} density="auto">
                <div class = "slds-modal__content slds-p-around_medium">
                    <h3 class="slds-section__title">
                        <div style="background: #f3f2f2;width: 100%;text-align: left;color: currentColor;font-size: inherit; padding: 0.5rem; border-radius: 5px">
                            <span class="slds-truncate" title="Section Title">{label.LEAV_Theme}</span>
                        </div>
                    </h3>
                    <lightning-input-field data-field-name-id = "Name" field-name="Name" name="name" value={recordDetail.name} onchange={changeValue} required></lightning-input-field>
        
                    <h3 class="slds-section__title">
                        <div style="background: #f3f2f2;width: 100%;text-align: left;color: currentColor;font-size: inherit; padding: 0.5rem; border-radius: 5px">
                            <span class="slds-truncate" title="Section Title">{label.LEAV_MESSAGE}</span>
                        </div>
                    </h3>
                    <lightning-input-field data-field-name-id = "Message__c" field-name="Message__c" name="message" value={recordDetail.message} onchange={changeValue} required></lightning-input-field>
        
                    <h3 class="slds-section__title">
                        <div style="background: #f3f2f2;width: 100%;text-align: left;color: currentColor;font-size: inherit; padding: 0.5rem; border-radius: 5px">
                            <span class="slds-truncate" title="Section Title">{label.LEAV_ATTRIBUTE}</span>
                        </div>
                    </h3>
                    <lightning-input-field data-field-name-id = "IsActive__c" field-name="IsActive__c"  name="isActive" value={recordDetail.isActive} onchange={changeValue} required></lightning-input-field>
                    <lightning-input-field data-field-name-id = "priority__c" field-name="priority__c" name="priority" value={recordDetail.priority} onchange={changeValue} required></lightning-input-field>
                    <lightning-input-field data-field-name-id = "Department__c" field-name="Department__c" name="department" value={recordDetail.department} onchange={changeValue}></lightning-input-field>
                    <lightning-input-field data-field-name-id = "Account_Text__c" field-name="Account_Text__c" name="accountText" value={recordDetail.accountText} onchange={changeValue}></lightning-input-field>
                </div>
            </lightning-record-edit-form>
        </template>
    </div>

    <footer class="slds-modal__footer">
        <button class="slds-button slds-button_neutral" onclick={cancel} title="Cancel">{label.Cancle}</button>
        <button class="slds-button slds-button_brand" onclick={save} title="OK">{label.Save}</button>
    </footer>
        <!-- </div>
        
    </section> -->
    
</template>
