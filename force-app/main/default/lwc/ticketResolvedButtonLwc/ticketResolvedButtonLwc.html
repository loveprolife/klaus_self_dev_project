<template>

    <div class="slds-is-relative">
        <div class="slds-modal__header">
            <h2 class="slds-text-heading_medium">ticket resolved</h2>
        </div>
        <div class="slds-modal__content slds-p-around_medium">
            <p>{message}</p>
        </div>
        <div class="slds-modal__footer">
            <lightning-button label="cancel" title="Non-primary action" onclick={cancel} class="slds-m-left_x-small">
            </lightning-button>
            <template if:true={notResolved}>
                <lightning-button variant="brand" label="yes" title="Primary action" onclick={yes}
                    class="slds-m-left_x-small"></lightning-button>
            </template>
        </div>

    </div>


</template>
