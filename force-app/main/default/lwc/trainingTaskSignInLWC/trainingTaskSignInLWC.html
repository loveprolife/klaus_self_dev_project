<template>
    <template if:true={showPage}>
        <template if:true={isShowSpinner} >
            <lightning-spinner size="medium" variant="brand"></lightning-spinner>
        </template>
        <lightning-card title="Sign In" icon-name='custom:custom83'>
            <div style="background: white;padding-left: 16px;border-radius: 6px;">
                <div>
                    <span>{label.Training_Date}：</span><!--培训日期-->
                    {trainingTaskTime}
                </div>

                <div>
                    <span>{label.Current_Time}：</span><!--当前时间-->
                    {nowDate}
                </div>
                <template if:false={isCanSignIn}>
                    <template lwc:if={isHaveSignIn}>
                        <div style="color:rgb(187, 52, 52)">{label.Signed_In}</div><!--已签到！-->
                    </template>
                    <template lwc:else>
                        <div style="color:rgb(187, 52, 52)">{label.No_Sign_In}</div><!--当前时间未在培训签到范围内！-->
                    </template>
                </template>

                <div class="modal-footer slds-modal__footer" style="margin-top: 40px;">
                    <lightning-button
                        variant="brand-outline"
                        label="Cancel"
                        onclick={cancel}
                        class="slds-m-left_x-small"
                    > </lightning-button>
                    <template lwc:if={isCanSignIn}>
                        <lightning-button
                            variant="brand"
                            label="Sign In"
                            icon-name="utility:check"
                            onclick={signIn}
                            class="slds-m-left_x-small"
                        ></lightning-button>
                    </template>
                    <template lwc:else>
                        <lightning-button
                            variant="brand"
                            label="Sign In"
                            icon-name="utility:close"
                            class="slds-m-left_x-small"
                            disabled
                        ></lightning-button>
                    </template>
                </div>
            </div>
        </lightning-card>
    </template>
</template>
