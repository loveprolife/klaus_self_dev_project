<!-- googleMapComponent.html -->
<template>
    <template if:true={isModalOpen}>
        <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
            <template if:true={isShowSpinner}>
                <lightning-spinner alternative-text="Uploading now"></lightning-spinner>
            </template>
            <div class="slds-modal__container">
                <!-- Modal/Popup Header -->
                <div class="slds-modal__header">
                    <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
                            title="Close" onclick={closeModal}>
                        <lightning-icon icon-name="utility:close" alternative-text="close" size="small"></lightning-icon>
                        <span class="slds-assistive-text">Close</span>
                    </button>
                    <h2 class="slds-text-heading_medium">New Store</h2>
                </div>

                <!-- Modal/Popup Body -->
                <div class="slds-modal__content slds-var-p-left_large slds-var-p-right_large slds-var-p-bottom_large slds-var-p-top_small">
                    <div class="slds-float_right">
                        <span style="color: red">*</span>
                        = Required Information
                    </div>
                    
                    <lightning-record-edit-form class="slds-var-m-top_small" object-api-name="Shop__c" layout-type="Comfy" record-id={record.Id}>
                        <template if:true={record.Id}>
                            <lightning-input-field
                                class="slds-var-m-top_small"
                                field-name="Name"
                                data-field-name="Name" 
                                value={record.Name}
                                disabled
                                >
                            </lightning-input-field>
                        </template>
                        <lightning-input-field
                            class="slds-var-m-top_small"
                            field-name="Sales_Region__c"
                            data-field-name="Sales_Region__c" 
                            onchange={handleChange}
                            value={record.Sales_Region__c}
                            required
                            >
                        </lightning-input-field>
                        <lightning-input-field
                            class="slds-var-m-top_small"
                            field-name="Name"
                            data-field-name="Name" 
                            onchange={handleChange}
                            value={record.Name}
                            required
                            >
                        </lightning-input-field>
                        <lightning-input-field
                            class="slds-var-m-top_small"
                            field-name="Account__c"
                            data-field-name="Account__c" 
                            onchange={handleChange}
                            value={record.Account__c}
                            required
                            >
                        </lightning-input-field>
                        <lightning-input-field
                            class="slds-var-m-top_small"
                            field-name="Grid__c"
                            data-field-name="Grid__c" 
                            onchange={handleChange}
                            value={record.Grid__c}
                            required
                            >
                        </lightning-input-field>
                        <lightning-input-field
                            class="slds-var-m-top_small"
                            field-name="State_Province__c"
                            data-field-name="State_Province__c" 
                            value={record.State_Province__c}
                            onchange={handleChange}
                            >
                        </lightning-input-field>
                        <lightning-input-field
                            class="slds-var-m-top_small"
                            field-name="City__c"
                            data-field-name="City__c" 
                            value={record.City__c}
                            onchange={handleChange}
                            >
                        </lightning-input-field>
                        <lightning-input-field
                            class="slds-var-m-top_small"
                            field-name="Address1__c"
                            data-field-name="Address1__c" 
                            value={storeAddress}
                            onchange={handleChange}
                            required
                            >
                        </lightning-input-field>
                        <template if:true={isJapan}>
                            <lightning-input-field
                                class="slds-var-m-top_small"
                                field-name="Shop_Level__c"
                                data-field-name="Shop_Level__c" 
                                onchange={handleChange}
                                value={record.Shop_Level__c}
                                >
                            </lightning-input-field>
                        </template>
                    </lightning-record-edit-form>
                   
                </div>
                <!-- Modal/Popup Footer -->
                <div class="slds-modal__footer">
                    <div style="text-align: center;">
                        <lightning-button class="slds-var-p-right_medium" label="Cancel" onclick={closeModal}></lightning-button>
                        <lightning-button class="slds-var-p-right_medium" label="Save & New" onclick={handleSaveAndNew}></lightning-button>
                        <lightning-button variant="brand" label="Save" onclick={handleSave}></lightning-button>
                    </div>
                </div>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
   <iframe id="vfFrame" src={googleMapUrl} style="overflow: hidden; width:100%" width="100%" height="100%" allow="geolocation" onload={handleIframeLoad}></iframe>
</template>
