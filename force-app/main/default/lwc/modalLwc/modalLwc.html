<template>
    <template if:true={openStatus}>
        <div class={modalClass} style={modalHeight}>
            <div class="slds-modal__container" style={containerStyle}>
                <!------HEADER Section-->
                <template lwc:if={displayCloseIcon}>
                    <lightning-button-icon icon-name="utility:close" alternative-text="Close this window" size="large"
                        variant="bare-inverse" onclick={handleClose} class="slds-modal__close">
                    </lightning-button-icon>
                </template>
                <template if:true={title}>
                    <div class="slds-modal__header">
                        <h2>{title}</h2>
                    </div>
                </template>
                <!------Body Section-->
                <div class="slds-modal__content slds-p-around_medium">
                    <slot></slot>
                </div>
                <!------Footer Section-->
                <template lwc:if={hasFooter}>
                    <div class="slds-modal__footer">
                        <template if:false={hideClose}>

                            <!-- <lightning-button label={closeLabel} onclick={handleClose}>
                            </lightning-button> -->

                            <button class="slds-button slds-button_neutral" label={closeLabel} onclick={handleClose}
                                style={mobileButton}> {label.INSPECTION_REPORT_MSG_Cancel}
                            </button>


                        </template>
                        <template if:false={hideOk}>

                            <!-- <lightning-button label={okLabel} variant="brand" onclick={handleOk}
                                class="slds-m-left_x-small">
                            </lightning-button> -->

                            <button class="slds-button slds-button_brand" label={okLabel} variant="brand"
                                onclick={handleOk} style={mobileButton}> {label.INSPECTION_REPORT_MSG_Ok}
                            </button>


                        </template>
                    </div>
                </template>
            </div>
        </div>
    </template>
</template>
