<template>
    <template if:true={spinnerFlag}>
        <lightning-spinner alternative-text="Loading" size="large"></lightning-spinner>
    </template>
    <div class="container full-height">
        <lightning-card class="slds-color__background_gray-4 pageHeader" title="Competitive Intelligence" icon-name="standard:article">
            <span style="font-weight: bold;font-size:16px">{checkLabel}</span>
            <div slot="actions">
                <div style="margin-left:5px;display:inline-block;">
                    <!-- <button class="slds-button slds-button_brand" onclick={handleSave}>{label.INSPECTION_REPORT_SAVE}</button> -->
                    <lightning-button class="slds-var-p-right_x-small backButton" variant="Neutral" label={label.INSPECTION_REPORT_BACK} onclick={handleBack}>
                    </lightning-button>
                    <template if:true={showSave}>
                        <lightning-button class="my-brand" variant="brand" label={label.INSPECTION_REPORT_SAVE} onclick={handleSave}>
                        </lightning-button>
                    </template>
                </div>
            </div>
        </lightning-card>
        <div style="text-align: left;">
            <!-- Report Information -->
            <template if:true={showPage}>
                <div class="slds-grid slds-gutters">
                    <div class="slds-col slds-size_1-of-1">
                        <div class="slds-modal__content slds-scrollable_y" style={styleContent}>
                            <div class="slds-var-p-top_small" style="padding-left: 10px; padding-right: 10px;">
                                <lightning-record-edit-form object-api-name="Competitive_Intelligence__c">
                                    
                                    <!-- Competitors_Models -->
                                    <div class="slds-col">
                                        <span style="color:red">*</span>
                                        <template if:true={submit}>
                                            <template if:false={modelFlag}>
                                                <span style="color:red">{label.Competitors_Models}</span>
                                            </template>
                                            <template if:true={modelFlag}>
                                                <span>{label.Competitors_Models}</span>
                                            </template>
                                        </template>

                                        <template if:false={submit}>
                                            <span>{label.Competitors_Models}</span>
                                        </template>

                                    </div>
                                    <div class="slds-col">
                                        <table style="margin-bottom: 15px;margin-top: 10px;">
                                            <tr>
                                                <!-- <td colspan="2" style="width: 15%;text-align:center;"> -->
                                                <td colspan="2" style="width: 1%;">
                                                </td>
                                                <td colspan="2" style="width: 10%;">
                                                    <span style="padding-left: 13px;color:#808080">Brand</span>
                                                </td>
                                                <td colspan="2" style="width: 10%;">
                                                    <span style="padding-left: 25px;color:#808080">Model</span>
                                                </td>
                                                <td colspan="2" style="width: 10%;">
                                                    <span style="padding-left: 25px;color:#808080">Price</span>
                                                </td>
                                            </tr>
                                            <template for:each={competitorsModelsInfo} for:item="item" for:index="index">
                                                <tr key={item.id}>
                                                    <td colspan="2">
                                                        <span style="padding-left: 13px;color:#808080">No.{item.order}</span>
                                                    </td>
                                                    <td colspan="2" style="width: 8%;">
                                                        <lightning-record-edit-form object-api-name="Competitive_Intelligence_Brand__c">
                                                            <!-- 新增根据产品线筛选品牌 20241128 YYL -->
                                                            <lightning-input-field 
                                                                data-index={index}
                                                                name="brandNameB"
                                                                style="width:100px;display:none;padding-left: 10px;" 
                                                                data-field-name="Product_Line__c" 
                                                                field-name="Product_Line__c"
                                                                value={productLine} 
                                                                variant="label-hidden">
                                                            </lightning-input-field>
                                                            <!-- Brand Name -->
                                                            <lightning-input-field 
                                                                data-index={index}
                                                                name="model"
                                                                style="width:100px;display:inline-block;padding-left: 10px;" 
                                                                data-field-name="Brand__c" 
                                                                field-name="Brand__c" 
                                                                variant="label-hidden"
                                                                value={item.Brand__c}
                                                                onchange={handleChangeModelAndBrand}
                                                                disabled={disabled}>
                                                            </lightning-input-field>
                                                        </lightning-record-edit-form>
                                                    </td>
                                                    <td colspan="2">
                                                        <lightning-record-edit-form object-api-name="Competitive_Intelligence_Brand__c">
                                                            <!-- Model -->
                                                            <lightning-input-field 
                                                                data-index={index}
                                                                style="width:100px;display:inline-block;padding-left: 10px;" 
                                                                data-field-name="Model__c" 
                                                                field-name="Model__c" 
                                                                variant="label-hidden"
                                                                value={item.Model__c}
                                                                onchange={handleChangeModel}
                                                                disabled={disabled}>
                                                            </lightning-input-field>
                                                        </lightning-record-edit-form>
                                                    </td>
                                                    <td colspan="2">
                                                        <!-- Price -->
                                                        <lightning-input 
                                                            data-index={index}
                                                            style="width:100px;display:inline-block;padding-left: 10px;" 
                                                            data-field-name="Price__c" 
                                                            field-name="Price__c" 
                                                            variant="label-hidden"
                                                            value={item.Price__c}
                                                            onchange={handleChangePrice}
                                                            formatter="currency"
                                                            placeholder={currency}
                                                            type="number"
                                                            message-when-step-mismatch="Please enter an integer"
                                                            message-when-bad-input="Please enter an integer"
                                                            step="0.01"
                                                            disabled={disabled}>
                                                        </lightning-input>
                                                    </td>
                                                </tr>
                                            </template>
                                        </table>
                                    </div>

                                    <!-- Performing_Brands -->
                                    <div class="slds-col">
                                        <span style="color:red">*</span>
                                        <template if:true={submit}>
                                            <template if:false={brandFlag}>
                                                <span style="color:red">{label.Performing_Brands}</span>
                                            </template>
                                            <template if:true={brandFlag}>
                                                <span>{label.Performing_Brands}</span>
                                            </template>
                                        </template>

                                        <template if:false={submit}>
                                            <span>{label.Performing_Brands}</span>
                                        </template>

                                    </div>
                                    <div class="slds-col">
                                        <table style="margin-bottom: 15px;margin-top: 5px;">
                                            <tr>
                                                <td colspan="2" style="width: 0.2%;">
                                                </td>
                                                <td colspan="2" style="width: 10%;">
                                                    <span style="padding-left: 10px;color:#808080">Brand</span>
                                                </td>
                                                <!-- <td colspan="2" style="width: 10%;">
                                                </td>
                                                <td colspan="2" style="width: 10%;">
                                                </td> -->
                                            </tr>
                                            <template for:each={performingBrandsInfo} for:item="item" for:index="index">
                                                <tr key={item.id}>
                                                    <td colspan="2">
                                                        <span style="padding-left: 13px;color:#808080">No.{item.order}</span>
                                                    </td>
                                                    <td colspan="2" style="width: 8%;">
                                                        <lightning-record-edit-form object-api-name="Competitive_Intelligence_Brand__c">
                                                            <!-- 新增根据产品线筛选品牌 20241128 YYL -->
                                                            <lightning-input-field 
                                                                data-index={index}
                                                                name="brandNameB"
                                                                style="width:100px;display:none;padding-left: 10px;" 
                                                                data-field-name="Product_Line__c" 
                                                                field-name="Product_Line__c"
                                                                value={productLine} 
                                                                variant="label-hidden">
                                                            </lightning-input-field>
                                                            <!-- Brand Name -->
                                                            <lightning-input-field 
                                                                data-index={index}
                                                                name="brand"
                                                                style="width:100px;display:inline-block;padding-left: 10px;" 
                                                                data-field-name="Brand__c" 
                                                                field-name="Brand__c" 
                                                                variant="label-hidden"
                                                                value={item.Brand__c}
                                                                onchange={handleChangeModelAndBrand}
                                                                disabled={disabled}>
                                                            </lightning-input-field>
                                                        </lightning-record-edit-form>
                                                    </td>
                                                </tr>
                                            </template>
                                        </table>
                                    </div>

                                    <!-- Competitor_Activities -->
                                    <div class="slds-col">
                                        <span style="color:red">*</span>
                                        <template if:true={submit}>
                                            <template if:false={competitionIntelligenceInfo.Competitor_Activities__c}>
                                                <span style="color:red">{label.Competitor_Activities}</span>
                                            </template>
                                            <template if:true={competitionIntelligenceInfo.Competitor_Activities__c}>
                                                <span>{label.Competitor_Activities}</span>
                                            </template>
                                        </template>
                                        <template if:false={submit}>
                                            <span>{label.Competitor_Activities}</span>
                                        </template>

                                    </div>
                                    <div class="slds-col">
                                        <div style="margin-bottom: 15px">
                                            <lightning-input-field 
                                                data-field-name="Competitor_Activities__c" 
                                                field-name="Competitor_Activities__c" 
                                                variant="label-hidden"
                                                value={competitionIntelligenceInfo.Competitor_Activities__c}
                                                onchange={handleChangeCompetitor}
                                                disabled={disabled}>
                                            </lightning-input-field>
                                        </div>
                                    </div>

                                    <!-- Image_Upload -->
                                    <div class="slds-col">
                                        <span style="color:red">*</span>
                                        <template if:true={submit}>
                                            <template if:false={photosCompetitive}>
                                                <span style="color:red">{label.Image_Upload}</span>
                                            </template>
                                            <template if:true={photosCompetitive}>
                                                <span>{label.Image_Upload}</span>
                                            </template>
                                        </template>
                                        <template if:false={submit}>
                                            <span>{label.Image_Upload}</span>
                                        </template>

                                    </div>
                                    <div class="slds-col">
                                        <div style="margin-bottom: 15px">
                                            <c-new-upload-files-lwc
                                                record-id={competitionIntelligenceInfo.Id}
                                                record-item-id={recordId}
                                                disabled-delete={disabled}
                                                disabled-upload={disabled}>
                                            </c-new-upload-files-lwc>
                                        </div>
                                    </div>
                                </lightning-record-edit-form>
                            </div>
                        </div>
                    </div>
                </div>
            </template>
        </div>
    </div>
</template>
