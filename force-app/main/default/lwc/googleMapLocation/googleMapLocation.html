<template>
    <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
        <!-- <template if:true={isShowSpinner}>
            <lightning-spinner alternative-text="Uploading now"></lightning-spinner>
        </template> -->
        <div class="slds-modal__container custom-modal-container">
            <!-- Modal/Popup Header -->
            <div class="slds-modal__header">
                <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
                        title="Close" onclick={closeModal}>
                    <lightning-icon icon-name="utility:close" alternative-text="close" size="small"></lightning-icon>
                    <!-- <span class="slds-assistive-text">Close</span> -->
                </button>
            </div>
            <!-- Modal/Popup Body -->
            <!-- <div class="slds-modal__content slds-var-p-left_none slds-var-p-right_none slds-var-p-bottom_none slds-var-p-top_none"> -->
            <!-- </div> -->
             <div class="slds-modal__content custom-modal-content">
                <iframe id="vfFrame" src={googleMapUrl} class="custom-iframe" allow="geolocation" onload={handleIframeLoad}></iframe>
             </div>
        </div>
    </section>
    <div class="slds-backdrop slds-backdrop_open"></div>
</template>
