<template>
    <div class="divView">
        <lightning-card title={accountTitle} icon-name={accountIconName}>
            <template if:true={isShowSpinner}>
                <lightning-spinner alternative-text="Loading" size="medium" variant="brand" style="z-index: 99;"></lightning-spinner>
            </template>
            <template if:true={isCanUndoChanges}>
                <template if:false={isCurrentModifier}>
                    <lightning-button variant="base" label={currentModifier} slot="actions" class="slds-var-m-left_x-small"></lightning-button>
                </template>
            </template>
            <!-- Cancel-->
            <template if:true={isNew}>
                <lightning-button label="Cancel" slot="actions" class="slds-var-m-left_x-small" onclick={handleCancelAccount}></lightning-button>
            </template>
            <!-- Changes Info -->
            <template if:true={isHaveRecordId}>
                <lightning-button label="Changes Info" onclick={handleChangesInfoView} slot="actions" class="slds-var-m-left_x-small"></lightning-button>
            </template>
            <!-- Undo Changes -->
            <template if:false={isSubmitted}>
                <template if:true={isShowUndoChanges}>
                    <lightning-button label="Undo Changes" onclick={handleUndoChangesView} slot="actions" class="slds-var-m-left_x-small"></lightning-button>
                </template>
            </template>
            <!-- Legal Report -->
            <template if:false={isCustomerAddress}>
                <lightning-button label="Legal Report" onclick={handleLegalReportView} slot="actions" class="slds-var-m-left_x-small"></lightning-button>
            </template>
            <!-- Save -->
            <lightning-button label="Save" onclick={handleSaveAccountView} slot="actions" class="slds-var-m-left_x-small"></lightning-button>
            <!-- Submit -->
            <template if:false={isSubmitted}>
                <template if:false={isApproved}>
                    <template if:false={isCustomerAddress}>
                        <lightning-button label="Submit" onclick={handleSubmitAccountView} variant="brand" slot="actions" class="slds-var-m-left_x-small"></lightning-button>
                    </template>
                </template>
            </template>
            <!-- Sync To SAP -->
            <template if:true={isCustomerAddress}>
                <lightning-button label="Sync To SAP" onclick={handleSyncToSAP} variant="brand" slot="actions" class="slds-var-m-left_x-small"></lightning-button>
            </template>
            <template if:false={isCustomerAddress}>
                <template if:true={isShowSyncToSapButton}>
                    <lightning-button label="Sync To SAP" onclick={handleSyncToSAP} variant="brand" slot="actions" class="slds-var-m-left_x-small"></lightning-button>
                </template>
            </template>
            <lightning-accordion class="example-accordion" allow-multiple-sections-open  onsectiontoggle={handleSectionToggle} active-section-name={activeSections}>
                <div class="slds-var-m-around_small"></div>
                <!-- 客户主信息 -->
                <lightning-accordion-section name="A" label="Account Information" class="accordion">
                    <lightning-record-edit-form object-api-name="Account" class="account_view_from" record-type-id={recordTypeId} record-id={recordId}>
                        <lightning-messages></lightning-messages> 
                        <div class="slds-text-title_bold slds-var-p-left_xx-small">
                            <!-- 基本信息 -->
                            {label.Customer_Basic_Information}
                        </div>
                        <div class="slds-grid slds-wrap">
                            <template if:false={isCustomerAddress}>
                                <div class="slds-col slds-size_1-of-2 slds-var-p-right_small">
                                    <lightning-input-field field-name="Approval_Status__c" disabled value={accountRecord.Approval_Status__c}></lightning-input-field>
                                </div>
                                <div class="slds-col slds-size_1-of-2 slds-var-p-right_small"></div>
                            </template>
                            
                            <div class="slds-col slds-size_1-of-2 slds-var-p-right_small">
                                <lightning-input-field field-name="MDG_Customer_Code__c" disabled value={accountRecord.MDG_Customer_Code__c}></lightning-input-field>
                            </div>
                            <div class="slds-col slds-size_1-of-2 slds-var-p-right_small">
                                <lightning-input-field field-name="SAP_Customer_Code__c" disabled value={accountRecord.SAP_Customer_Code__c}></lightning-input-field>
                            </div>
                            
                            <!-- 分户特殊的字段 -->
                            <template if:true={isSubAccount}>
                                <div class="slds-col slds-size_1-of-2 slds-var-p-right_small">
                                    <lightning-input-field field-name="ParentCustomerOfSubAcc__c" required onchange={handleAccountFieldChange} value={accountRecord.ParentCustomerOfSubAcc__c}></lightning-input-field>
                                </div>
                                <div class="slds-col slds-size_1-of-2 slds-var-p-right_small">
                                    <lightning-input-field field-name="Credit_Management__c" required onchange={handleAccountFieldChange} disabled={isHaveCreditManagement} value={accountRecord.Credit_Management__c}></lightning-input-field>
                                </div>

                                <div class="slds-col slds-size_1-of-2 slds-var-p-right_small">
                                    <lightning-input-field field-name="Sub_account_type__c" required onchange={handleAccountFieldChange} value={accountRecord.Sub_account_type__c}></lightning-input-field>
                                </div>
                                <div class="slds-col slds-size_1-of-2 slds-var-p-right_small">
                                    <lightning-input-field field-name="Reasons_for_customer_segmentation__c" required onchange={handleAccountFieldChange} value={accountRecord.Reasons_for_customer_segmentation__c}></lightning-input-field>
                                </div>  
                            </template>
                            <!-- ————————————— -->

                            <!-- 地址类客户特殊的字段 -->
                                <template if:true={isCustomerAddress}>
                                    <div class="slds-col slds-size_1-of-2 slds-var-p-right_small">
                                        <lightning-input-field field-name="Sold_to__c" required onchange={handleAccountFieldChange} value={accountRecord.Sold_to__c}></lightning-input-field>
                                    </div>
                                    <!-- <div class="slds-col slds-size_1-of-2 slds-var-p-right_small">
                                        <lightning-input-field field-name="Customer_Address_Type__c" onchange={handleAccountFieldChange} value={accountRecord.Customer_Address_Type__c}></lightning-input-field>
                                    </div> -->
                                    <div class="slds-col slds-size_1-of-2 slds-var-p-right_small">
                                        <lightning-input-field field-name="Approval_Status__c" disabled value={accountRecord.Approval_Status__c}></lightning-input-field>
                                    </div>
                                </template>
                            <!-- —————————————————— -->

                            <div class="slds-col slds-size_1-of-2 slds-var-p-right_small">
                                <lightning-input-field field-name="Customer_Name_Local_Language__c" required onchange={handleAccountFieldChange} value={accountRecord.Customer_Name_Local_Language__c}></lightning-input-field>
                            </div>
                            <div class="slds-col slds-size_1-of-2 slds-var-p-right_small">
                                <lightning-input-field field-name="Customer_Name_Local_Language_2__c" onchange={handleAccountFieldChange} value={accountRecord.Customer_Name_Local_Language_2__c}></lightning-input-field>
                            </div>

                            <div class="slds-col slds-size_1-of-2 slds-var-p-right_small">
                                <lightning-input-field field-name="Customer_Name_1__c" onchange={handleAccountFieldChange} value={accountRecord.Customer_Name_1__c}></lightning-input-field>
                            </div>
                            <div class="slds-col slds-size_1-of-2 slds-var-p-right_small">
                                <lightning-input-field field-name="Customer_Name_2__c" onchange={handleAccountFieldChange} value={accountRecord.Customer_Name_2__c}></lightning-input-field>
                            </div>

                            <div class="slds-col slds-size_1-of-2 slds-var-p-right_small">
                                <lightning-input-field field-name="Account_Short_Name__c" required onchange={handleAccountFieldChange} value={accountRecord.Account_Short_Name__c}></lightning-input-field>
                            </div>
                            
                            <div class="slds-col slds-size_1-of-2 slds-var-p-right_small">
                                <lightning-input-field field-name="Guarantor_Country_Code__c" disabled={isVerification} onchange={handleAccountFieldChange} required value={accountRecord.Guarantor_Country_Code__c}></lightning-input-field>
                            </div>
                            <div class="slds-col slds-size_1-of-2 slds-var-p-right_small">
                                <lightning-input-field field-name="Language__c" required={isRequired} onchange={handleAccountFieldChange} value={accountRecord.Language__c}></lightning-input-field>
                            </div>
                        </div>
                        <div class="line"></div>
                        <template if:true={isShowRegistrationInformation}>
                            <!-- 注册信息 -->
                            <!-- <div class="slds-text-title_bold slds-var-p-left_xx-small">
                                {label.Customer_Registration_Information}
                            </div> -->

                                <div class="slds-col slds-size_1-of-2 slds-var-p-right_small">
                                    <!-- 注册信息 -->
                                    <div class="slds-text-title_bold slds-var-p-left_xx-small">{label.Customer_Registration_Information}</div>
                                </div>
                                <div class="slds-col slds-size_1-of-2 slds-var-p-right_small">
                                    <template if:false={isVerification}>
                                        <lightning-button 
                                            class="slds-var-p-left_xx-small" 
                                            label="Verification" 
                                            title="Verification"
                                            icon-name={verificationIconName}
                                            icon-position="right"
                                            onclick={handleVerificationClick}
                                            ></lightning-button>
                                    </template>
                                </div>

                                <div class="slds-col slds-size_1-of-2 slds-var-p-right_small">
                                    <lightning-input-field field-name="ID_Type__c" onchange={handleAccountFieldChange} disabled={isVerification} value={accountRecord.ID_Type__c}></lightning-input-field>
                                </div>
                                <div class="slds-col slds-size_1-of-2 slds-var-p-right_small">
                                    <lightning-input-field field-name="Company_Registration_Number__c" required disabled={isVerification} onchange={handleAccountFieldChange} value={accountRecord.Company_Registration_Number__c}></lightning-input-field>
                                </div>
                            </div>
                            <div class="line"></div>
                        </template>
                        <div class="slds-text-title_bold slds-var-p-left_xx-small">
                            <template if:true={isCustomerAddress}>
                                <!-- 地址信息 -->
                                {label.Customer_Address_Information_ShipTo}
                            </template>
                            <template if:false={isCustomerAddress}>
                                <!-- 地址信息 -->
                                {label.Customer_Address_Information}
                            </template>
                        </div>
                        <div class="slds-grid slds-wrap">
                            <!-- 中国地址信息 -->
                            <template if:true={showChinaAddressFlag}>
                                <div class="slds-col slds-size_1-of-2 slds-var-p-right_small AccountProvince AccountCountry">
                                    <!-- <lightning-input-field field-name="Province_State__c" required onchange={handleAccountFieldChange}></lightning-input-field> -->
                                    <c-account-look-up-lwc
                                        class="AccountLookUp"
                                        label={accountLabelInfo.provinceStateLabel} 
                                        record-id={accountRecord.Province_State__c}
                                        show-label=true
                                        data-field-name="Province_State__c" 
                                        obj-name="Country_State__c"
                                        is-required=true
                                        op={lookupFilter} 
                                        onlookupupdate={lookUpChangeProvinceStateHandler}
                                    >
                                    </c-account-look-up-lwc>
                                </div>
                                <div class="slds-col slds-size_1-of-2 slds-var-p-right_small AccountCity AccountCountry">
                                    <!-- <lightning-input-field field-name="City_CN__c" required onchange={handleAccountFieldChange}></lightning-input-field> -->
                                    <c-account-look-up-lwc
                                        class="AccountLookUp"
                                        label={accountLabelInfo.cityCNLabel} 
                                        record-id={accountRecord.City_CN__c}
                                        show-label=true
                                        data-field-name="City_CN__c" 
                                        obj-name="Country_State__c"
                                        is-required=true
                                        op={lookupFilter} 
                                        onlookupupdate={lookUpChangeProvinceStateHandler}
                                    >
                                    </c-account-look-up-lwc>
                                </div>

                                <div class="slds-col slds-size_1-of-2 slds-var-p-right_small AccountDistrict AccountCountry">

                                    <c-account-look-up-lwc
                                        class="AccountLookUp"
                                        label={accountLabelInfo.districtCNLabel} 
                                        record-id={accountRecord.District_CN__c}
                                        show-label=true
                                        data-field-name="District_CN__c" 
                                        obj-name="Country_State__c"
                                        is-required=true
                                        op={lookupFilter} 
                                        onlookupupdate={lookUpChangeProvinceStateHandler}
                                    >
                                    </c-account-look-up-lwc>
                                </div>
                                <div class="slds-col slds-size_1-of-2 slds-var-p-right_small AccountTownship AccountCountry">
                                    <!-- <lightning-input-field field-name="Township_CN__c" required onchange={handleAccountFieldChange}></lightning-input-field> -->
                                    <c-account-look-up-lwc
                                        class="AccountLookUp"
                                        label={accountLabelInfo.townshipCNLabel} 
                                        record-id={accountRecord.Township_CN__c}
                                        show-label=true
                                        data-field-name="Township_CN__c" 
                                        obj-name="Country_State__c"
                                        is-required=true
                                        op={lookupFilter} 
                                        onlookupupdate={lookUpChangeProvinceStateHandler}
                                    >
                                    </c-account-look-up-lwc>
                                </div>
                            </template>
                            <!-- 其他国家地区地址信息 -->
                            <template if:true={showOtherAddressFlag}>
                                <div class="slds-col slds-size_1-of-2 slds-var-p-right_small AccountProvince AccountCountry">
                                    <!-- <lightning-input-field field-name="Province_State__c" required onchange={handleAccountFieldChange}></lightning-input-field> -->
                                    <c-account-look-up-lwc
                                        class="AccountLookUp"
                                        label={accountLabelInfo.provinceStateLabel} 
                                        record-id={accountRecord.Province_State__c}
                                        show-label=true
                                        data-field-name="Province_State__c" 
                                        obj-name="Country_State__c"
                                        is-required=true
                                        op={lookupFilter} 
                                        onlookupupdate={lookUpChangeProvinceStateHandler}
                                    >
                                    </c-account-look-up-lwc>
                                </div>
                                <div class="slds-col slds-size_1-of-2 slds-var-p-right_small">
                                    <lightning-input-field field-name="City__c" required={isRequired} onchange={handleAccountFieldChange}  value={accountRecord.City__c}></lightning-input-field>
                                </div>

                                <div class="slds-col slds-size_1-of-2 slds-var-p-right_small">
                                    <lightning-input-field field-name="District__c" onchange={handleAccountFieldChange} value={accountRecord.District__c}></lightning-input-field>
                                </div>
                                <div class="slds-col slds-size_1-of-2 slds-var-p-right_small">
                                    <lightning-input-field field-name="Town__c" onchange={handleAccountFieldChange} value={accountRecord.Town__c}></lightning-input-field>
                                </div>
                            </template>
                            <div class="slds-col slds-size_1-of-2 slds-var-p-right_small">
                                <lightning-input-field field-name="Street_2__c" required onchange={handleAccountFieldChange} value={accountRecord.Street_2__c}></lightning-input-field>
                            </div>
                            <div class="slds-col slds-size_1-of-2 slds-var-p-right_small">
                                <lightning-input-field field-name="Street_3__c" onchange={handleAccountFieldChange} value={accountRecord.Street_3__c}></lightning-input-field>
                            </div>
                            
                            <div class="slds-col slds-size_1-of-2 slds-var-p-right_small">
                                <lightning-input-field field-name="Street_4__c" onchange={handleAccountFieldChange}  value={accountRecord.Street_4__c}></lightning-input-field>
                            </div>
                            <div class="slds-col slds-size_1-of-2 slds-var-p-right_small">
                                <lightning-input-field field-name="Street_5__c" onchange={handleAccountFieldChange}  value={accountRecord.Street_5__c}></lightning-input-field>
                            </div>

                            <div class="slds-col slds-size_1-of-2 slds-var-p-right_small">
                                <lightning-input-field field-name="Phone" onchange={handleAccountFieldChange} value={accountRecord.Phone}></lightning-input-field>
                            </div>
                            <div class="slds-col slds-size_1-of-2 slds-var-p-right_small">
                                <lightning-input-field field-name="Postal_Code__c" onchange={handleAccountFieldChange} value={accountRecord.Postal_Code__c}></lightning-input-field>
                            </div>

                            <template if:true={isCustomerAddress}>
                                <div class="slds-col slds-size_1-of-2 slds-var-p-right_small">
                                    <lightning-input-field field-name="Fax" onchange={handleAccountFieldChange} value={accountRecord.Fax}></lightning-input-field>
                                </div>
                            </template>

                            <div class="slds-col slds-size_1-of-2 slds-var-p-right_small">
                                <div class="slds-is-relative slds-var-m-left_xx-small slds-var-m-right_xx-small emailAddress" >
                                    <lightning-input type="text" label="Email address" required={isThailand} value={emailAddress} onchange={handleEmailAddressChange}></lightning-input>
                                    <div style="position: absolute; right:0 ; top:1.5rem">
                                        <lightning-button class="my-button slds-float_right" label="Confirm" title="Confirm" onclick={handleAddAddressClick}></lightning-button>
                                    </div>
                                </div>
                                <template if:true={isErrorEmailAddress}>
                                    <div class="slds-text-color_error slds-var-m-left_xx-small">{errorEmailMessage}</div>
                                </template>

                                <template for:each={addressItems} for:item="pill" for:index="index">
                                    <lightning-pill
                                        class="slds-var-p-right_xxx-small slds-var-p-left_xxx-small"
                                        key={pill.name} 
                                        label={pill.label}
                                        data-index={index}
                                        draggable="true"
                                        ondragstart={handleDragStart}
                                        ondragover={handleDragOver}
                                        ondrop={handleDrop}
                                        data-name={pill.name}
                                        ondblclick={handleItemClick}
                                        onremove={handleItemRemove}>
                                        <lightning-icon icon-name="standard:email_chatter" alternative-text="Email"></lightning-icon>
                                    </lightning-pill>
                                </template>
                            </div>
                        </div>
                        <div class="line"></div>
                        <div class="slds-text-title_bold slds-var-p-left_xx-small">

                                <lightning-input-field field-name="Search_Term2__c" onchange={handleAccountFieldChange} value={accountRecord.Search_Term2__c}></lightning-input-field>

                                    <!-- <lightning-input-field field-name="Province_State__c" required onchange={handleAccountFieldChange}></lightning-input-field> -->
                                    <c-account-look-up-lwc
                                        class="AccountLookUp"
                                        label={accountLabelInfo.Unified_Customer_Group__c} 
                                        record-id={accountRecord.Unified_Customer_Group__c}
                                        show-label=true
                                        data-field-name="Unified_Customer_Group__c" 
                                        obj-name="PickList__c"
                                        is-required=true
                                        op={lookupFilter} 
                                        onlookupupdate={lookUpChangeUnifiedCustomerGroupHandler}
                                    >
                                    </c-account-look-up-lwc>
                                </div>
                            </template>
                            <template lwc:else>

                                        <lightning-input-field field-name="Customer_Management_Name__c" required={isRequired} onchange={handleAccountFieldChange} value={accountRecord.Customer_Management_Name__c}></lightning-input-field>
                                        <div style="position: absolute; right:0.3rem ; top:1.5rem">
                                            <lightning-button class="my-button slds-float_right" label="New" title="New" onclick={addCustomerManagementName}></lightning-button>
                                        </div>
                                    </div>
                                </div>
                            </template>
                            
                            <div class="slds-col slds-size_1-of-2 slds-var-p-right_small">
                                <lightning-input-field field-name="Overseas_customer_level__c" onchange={handleAccountFieldChange} value={accountRecord.Overseas_customer_level__c}></lightning-input-field>
                            </div>

                            <div class="slds-col slds-size_1-of-2 slds-var-p-right_small">
                                <lightning-input-field field-name="Client_Type__c" required={isRequired} onchange={handleAccountFieldChange} value={accountRecord.Client_Type__c}></lightning-input-field>
                            </div>
                            <div class="slds-col slds-size_1-of-2 slds-var-p-right_small">
                                <lightning-input-field field-name="E_commerce_Customer_Label__c" required={isRequired} onchange={handleAccountFieldChange} value={accountRecord.E_commerce_Customer_Label__c}></lightning-input-field>
                            </div>
                            
                            <!-- <div class="slds-col slds-size_1-of-2 slds-var-p-right_small">
                                <lightning-input-field field-name="Sales_Region__c" onchange={handleAccountFieldChange} value={accountRecord.Sales_Region__c} required></lightning-input-field>
                            </div> -->

                            <div class="slds-col slds-size_1-of-2 slds-var-p-right_small">
                                <lightning-input-field field-name="Channel_Customer_Categories__c" required={isRequired} onchange={handleAccountFieldChange} value={accountRecord.Channel_Customer_Categories__c}></lightning-input-field>
                            </div>

                            <div class="slds-col slds-size_1-of-2 slds-var-p-right_small">
                                <lightning-input-field field-name="Attribute2__c" onchange={handleAccountFieldChange} value={accountRecord.Attribute2__c}></lightning-input-field>
                            </div>

                            <div class="slds-col slds-size_1-of-2 slds-var-p-right_small">
                                <lightning-input-field field-name="Channel_Customer_Subcategories__c" required={isRequired} onchange={handleAccountFieldChange} value={accountRecord.Channel_Customer_Subcategories__c}></lightning-input-field>
                            </div>
                            
                            <div class="slds-col slds-size_1-of-2 slds-var-p-right_small">
                                <lightning-input-field field-name="Customer_Price_Level__c" onchange={handleAccountFieldChange} value={accountRecord.Customer_Price_Level__c}></lightning-input-field>
                            </div>
                            
                            <div class="slds-col slds-size_1-of-2 slds-var-p-right_small">
                                <lightning-input-field field-name="Global_Location_Number__c" onchange={handleAccountFieldChange} value={accountRecord.Global_Location_Number__c}></lightning-input-field>
                            </div>
                            <div class="slds-col slds-size_1-of-2 slds-var-p-right_small">

                        <lightning-icon icon-name="utility:close" alternative-text="close" size="small"></lightning-icon>
                        <span class="slds-assistive-text">Close</span>
                    </button>
                    <h2 class="slds-text-heading_medium">Score Sheet</h2>
                </div>

                <div class="slds-modal__content slds-var-p-around_medium">
                    <div class="slds-float_right">
                        <span class="slds-text-color_error">*</span>
                        <span> = Required Information</span>
                    </div>
                    <div class="slds-text-heading_small slds-var-p-bottom_large">Information</div>
                    <lightning-record-edit-form object-api-name="Score_Sheet__c" class="score_view_from"  record-id={scoreSheetViewRecord.Id}>
                        <lightning-messages></lightning-messages> 
                        <div class="slds-grid slds-wrap slds-var-m-left_small">
                            <div class="slds-col slds-size_1-of-2 slds-var-p-right_small">
                                <lightning-input-field field-name="Product_Line__c" data-field-name="Product_Line__c" value={scoreSheetViewRecord.Product_Line__c} disabled></lightning-input-field>
                            </div>
                            <div class="slds-col slds-size_1-of-2 slds-var-p-right_small">
                                <lightning-input-field field-name="Evaluated_Score__c" data-field-name="Evaluated_Score__c" value={scoreSheetViewRecord.Evaluated_Score__c} disabled></lightning-input-field>
                            </div>

                            <template lwc:if={scoreSheetPageAgency}>
                                <div class="slds-col slds-size_1-of-1 slds-var-p-right_small">
                                    <lightning-input-field field-name="Customer_credit_rating__c" data-field-name="Customer_credit_rating__c" value={scoreSheetViewRecord.Customer_credit_rating__c} required onchange={handleScoreSheetViewFieldChange}></lightning-input-field>
                                </div>
                                <div class="slds-col slds-size_1-of-1 slds-var-p-right_small">
                                    <lightning-input-field field-name="Cooperation_product_lineup__c" data-field-name="Cooperation_product_lineup__c" value={scoreSheetViewRecord.Cooperation_product_lineup__c} required onchange={handleScoreSheetViewFieldChange}></lightning-input-field>
                                </div>
                                <div class="slds-col slds-size_1-of-1 slds-var-p-right_small">
                                    <lightning-input-field field-name="Industry_ranking_brand__c" data-field-name="Industry_ranking_brand__c" value={scoreSheetViewRecord.Industry_ranking_brand__c} required onchange={handleScoreSheetViewFieldChange}></lightning-input-field>
                                </div>
                                <div class="slds-col slds-size_1-of-1 slds-var-p-right_small">
                                    <lightning-input-field field-name="Hisense_brand_recognition__c" data-field-name="Hisense_brand_recognition__c" value={scoreSheetViewRecord.Hisense_brand_recognition__c} required onchange={handleScoreSheetViewFieldChange}></lightning-input-field>
                                </div>
                                <div class="slds-col slds-size_1-of-1 slds-var-p-right_small">
                                    <lightning-input-field field-name="Willingness_to_cooperate_with_Hisense_A__c" data-field-name="Willingness_to_cooperate_with_Hisense_A__c" value={scoreSheetViewRecord.Willingness_to_cooperate_with_Hisense_A__c} required onchange={handleScoreSheetViewFieldChange}></lightning-input-field>
                                </div>
                                <div class="slds-col slds-size_1-of-1 slds-var-p-right_small">
                                    <lightning-input-field field-name="Willingness_to_cooperate_with_Hisense_B__c" data-field-name="Willingness_to_cooperate_with_Hisense_B__c" value={scoreSheetViewRecord.Willingness_to_cooperate_with_Hisense_B__c} required onchange={handleScoreSheetViewFieldChange}></lightning-input-field>
                                </div>
                                <div class="slds-col slds-size_1-of-1 slds-var-p-right_small">
                                    <lightning-input-field field-name="Willingness_to_cooperate_with_Hisense_C__c" data-field-name="Willingness_to_cooperate_with_Hisense_C__c" value={scoreSheetViewRecord.Willingness_to_cooperate_with_Hisense_C__c} required onchange={handleScoreSheetViewFieldChange}></lightning-input-field>
                                </div>
                            </template>

                            <template lwc:if={scoreSheetPageOEM}>
                                <div class="slds-col slds-size_1-of-1 slds-var-p-right_small">
                                    <lightning-input-field field-name="Customer_credit_rating_OEM__c" data-field-name="Customer_credit_rating_OEM__c" value={scoreSheetViewRecord.Customer_credit_rating_OEM__c} required onchange={handleScoreSheetViewFieldChange}></lightning-input-field>
                                </div>
                                <div class="slds-col slds-size_1-of-1 slds-var-p-right_small">
                                    <lightning-input-field field-name="Industry_ranking_OEM__c" data-field-name="Industry_ranking_OEM__c" value={scoreSheetViewRecord.Industry_ranking_OEM__c} required onchange={handleScoreSheetViewFieldChange}></lightning-input-field>
                                </div>
                                <div class="slds-col slds-size_1-of-1 slds-var-p-right_small">
                                    <lightning-input-field field-name="Petential_development_capacity__c" data-field-name="Petential_development_capacity__c" value={scoreSheetViewRecord.Petential_development_capacity__c} required onchange={handleScoreSheetViewFieldChange}></lightning-input-field>
                                </div>
                                <div class="slds-col slds-size_1-of-1 slds-var-p-right_small">
                                    <lightning-input-field field-name="Cooperation_product_lineup_OEM__c" data-field-name="Cooperation_product_lineup_OEM__c" value={scoreSheetViewRecord.Cooperation_product_lineup_OEM__c} required onchange={handleScoreSheetViewFieldChange}></lightning-input-field>
                                </div>
                            </template>
                            <template lwc:if={scoreSheetPageOversea}>
                                <div class="slds-col slds-size_1-of-1 slds-var-p-right_small">
                                    <lightning-input-field field-name="Industry_ranking_new__c" data-field-name="Industry_ranking_new__c" value={scoreSheetViewRecord.Industry_ranking_new__c} required onchange={handleScoreSheetViewFieldChange}></lightning-input-field>
                                </div>
                                <div class="slds-col slds-size_1-of-1 slds-var-p-right_small">
                                    <lightning-input-field field-name="Customer_credit_rating_new__c" data-field-name="Customer_credit_rating_new__c" value={scoreSheetViewRecord.Customer_credit_rating_new__c} required onchange={handleScoreSheetViewFieldChange}></lightning-input-field>
                                </div>
                                <div class="slds-col slds-size_1-of-1 slds-var-p-right_small">
                                    <lightning-input-field field-name="Hisense_brand_recognition_new__c" data-field-name="Hisense_brand_recognition_new__c" value={scoreSheetViewRecord.Hisense_brand_recognition_new__c} required onchange={handleScoreSheetViewFieldChange}></lightning-input-field>
                                </div>
                                <div class="slds-col slds-size_1-of-1 slds-var-p-right_small">
                                    <lightning-input-field field-name="Cooperation_product_lineup_new__c" data-field-name="Cooperation_product_lineup_new__c" value={scoreSheetViewRecord.Cooperation_product_lineup_new__c} required onchange={handleScoreSheetViewFieldChange}></lightning-input-field>
                                </div>
                                <div class="slds-col slds-size_1-of-1 slds-var-p-right_small">
                                    <lightning-input-field field-name="Customer_profitability_new__c" data-field-name="Customer_profitability_new__c" value={scoreSheetViewRecord.Customer_profitability_new__c} required onchange={handleScoreSheetViewFieldChange}></lightning-input-field>
                                </div>
                                <div class="slds-col slds-size_1-of-1 slds-var-p-right_small">
                                    <lightning-input-field field-name="Petential_development_capacity_new__c" data-field-name="Petential_development_capacity_new__c" value={scoreSheetViewRecord.Petential_development_capacity_new__c} required onchange={handleScoreSheetViewFieldChange}></lightning-input-field>
                                </div>
                                <div class="slds-col slds-size_1-of-1 slds-var-p-right_small">
                                    <lightning-input-field field-name="Cooperated_product_line_new__c" data-field-name="Cooperated_product_line_new__c" value={scoreSheetViewRecord.Cooperated_product_line_new__c} required onchange={handleScoreSheetViewFieldChange}></lightning-input-field>
                                </div>
                            </template>
                        </div>
                    </lightning-record-edit-form>
                </div>
                <div class="modal-footer slds-modal__footer">
                    <div style="text-align: center;">
                        <lightning-button class="slds-var-p-right_medium" label="Cancel" onclick={closeScoreSheetView}></lightning-button>
                        <lightning-button variant="brand" label="Save" onclick={handleSaveScoreSheetView}></lightning-button>
                    </div>
                </div>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

    <!-- 点击提交按钮，提交信息弹出框 -->
    <template if:true={isShowSubmitView}>
        <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <c-submit-approval-l-w-c
                    record-id={recordId}
                    onclosemodal={closeSubmitView}
                    onsubmitsuccess={submitSuccess}
                >
                </c-submit-approval-l-w-c>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

    <!-- 点击Changes Info按钮，查看修改的内容信息 -->
    <template if:true={isShowChangesInfoView}>
        <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
            <c-new-account-changes-info-lwc
                record-id={recordId}
                is-sub=true
                onclosemodal={closeChangesInfoView}
            ></c-new-account-changes-info-lwc>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

    <!-- 点击Legal Report按钮，上传法务报告 -->
    <template if:true={isShowLegalReportView}>
        <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
            <c-legal-report-account
                record-id={recordId}
                onclosemodal={closeLegalReportView}
            ></c-legal-report-account>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

    <!-- 点击Email，弹出修改页面 -->
    <template if:true={isShowEmailEditView}>
        <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <!-- Loading 范围 -->
                <template if:true={isShowSpinnerDialog}>
                    <lightning-spinner alternative-text="Loading" size="medium"  variant="brand"></lightning-spinner>
                </template>
                <!-- Modal/Popup Header -->
                <div class="slds-modal__header">
                    <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
                            title="Close" onclick={handleCloseEmailEditView}>
                        <lightning-icon icon-name="utility:close" alternative-text="close" size="small"></lightning-icon>
                        <span class="slds-assistive-text">Close</span>
                    </button>
                    <h2 class="slds-text-heading_medium">Edit Email</h2>
                </div>

                <div class="slds-modal__content slds-var-p-around_medium">
                    <lightning-input class="editEmail" type="email" variant="label-hidden" value={editEmail}></lightning-input>
                </div>
                <div class="modal-footer slds-modal__footer">
                    <div style="text-align: center;">
                        <lightning-button class="slds-var-p-right_medium" label="Cancel" onclick={handleCloseEmailEditView}></lightning-button>
                        <lightning-button variant="brand" label="Save" onclick={handleSaveEmailEditView}></lightning-button>
                    </div>
                </div>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

</template>
