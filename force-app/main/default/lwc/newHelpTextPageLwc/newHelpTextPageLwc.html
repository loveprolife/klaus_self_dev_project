<template>
    <lightning-card class="slds-color__background_gray-4 pageHeader" title='Help Text (Multiple language)'>
        <div slot="actions">
            <div style="margin-left:5px;display:inline-block;">
                <lightning-button onclick={handleShowAllPage} label={label.INSPECTION_REPORT_BACK}></lightning-button>
            </div>
            <div style="margin-left:5px;display:inline-block;">
                <button type="button" class="slds-button slds-button_brand" onclick={handleSave}>{label.Save}</button>
            </div>
         </div>
    </lightning-card>
    <lightning-card>
        <lightning-record-edit-form object-api-name="CheckItem__c">
            <div class="slds-grid slds-gutters">
                <div class="slds-col slds-size_2-of-3">

                    <!-- HelpTextCN -->
                    <div class="slds-card">
                        <div class="slds-col" style="text-align: left;">
                            <lightning-input-field 
                                data-field-name="HelpTextCN__c"
                                field-name="HelpTextCN__c"
                                onchange={handleChangeHelpTextCn}>    
                            </lightning-input-field>
                        </div>
                    </div>

                    <!-- HelpTextEN -->
                    <div class="slds-card">
                        <div class="slds-col" style="text-align: left;">
                            <lightning-input-field 
                                data-field-name="HelpTextEN__c"
                                field-name="HelpTextEN__c"
                                onchange={handleChangeHelpTextEn}>    
                            </lightning-input-field>
                        </div>
                    </div>
                </div>
            </div>
        </lightning-record-edit-form>
    </lightning-card>
</template>
