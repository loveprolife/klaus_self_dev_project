<template>

    <div class="slds-is-relative">
        <!-- <template if:true={isShowSpinner}>
            <lightning-spinner size="medium" variant="brand"></lightning-spinner>
        </template> -->

        <div class="slds-modal__header" style="text-align:left; background-color:rgb(243 243 243);position:relative;">
            <div style="padding-right:12px; display: inline-block;">
                <lightning-icon icon-name="custom:custom11" title="custom11" size="small"></lightning-icon>
            </div>
            <div style="text-align: center;display: inline-block; height: 26px;line-height: 26px;">
                <h2 class="slds-card__header-title">{label.Check_List_Preview}</h2>
            </div>

        </div>
        <lightning-layout>
            <lightning-layout-item flexibility='auto' size="12">
                <div class="slds-scrollable_x" style="text-align: center;overflow: auto; width: 100%;">
                    <table class="slds-table slds-table_bordered slds-table_fixed-layout slds-resizable">
                        <thead>
                            <tr>
                                <th style="width: 5%;">No.</th>
                                <!-- <th style="width: 10%;">Product Line</th> -->
                                <th style="width: 30%;">project</th>
                                <th style="width: 65%;">Description</th>
                            </tr>
                        </thead>
                        <tbody>
                            <template for:each={recordList} for:item="item" for:index="index">
                                <tr key={item.Id}>
                                    <!-- No. -->
                                    <td style="white-space:nowrap; overflow:hidden; text-overflow: ellipsis;">
                                        <span>{item.index}</span>
                                    </td>
                                    <!-- Product Line -->
                                    <!-- <td style="white-space:nowrap; overflow:hidden; text-overflow: ellipsis;">
                                        <span>{item.Product_Line__c}</span>
                                    </td> -->
                                    <!-- project -->
                                    <td style="white-space:nowrap; overflow:hidden; text-overflow: ellipsis;">
                                        <span>{item.Project__c}</span>
                                    </td>
                                    <!-- Description -->
                                    <td style="white-space:nowrap; overflow:hidden; text-overflow: ellipsis;"
                                        target="_blank">
                                        <!-- <a style="white-space:nowrap; overflow:hidden; text-overflow: ellipsis;">
                                            <lightning-formatted-rich-text value={item.Description__c}
                                                data-index={index} onclick={handleClick}>
                                            </lightning-formatted-rich-text>
                                        </a> -->
                                        <a href={item.href} data-record-id={item.id} target="_blank"
                                            style="white-space:nowrap; overflow:hidden; text-overflow: ellipsis;">
                                            {item.Description__c}
                                        </a>
                                    </td>
                                </tr>
                            </template>
                            <template if:true={isEmpty}>
                                <tr style="margin: 10px 0px; text-align:center; width: 100%;">
                                    <td style="text-align:center;" colspan="3">No items to display.</td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>

            </lightning-layout-item>
        </lightning-layout>
    </div>
</template>
