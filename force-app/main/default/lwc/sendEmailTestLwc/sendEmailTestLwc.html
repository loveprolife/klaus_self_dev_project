<template>
    <lightning-card title="Room and Email Input">
        <div class="slds-m-around_medium">
            <lightning-input
                label="Room ID"
                value={roomId}
                onchange={handleRoomIdChange}
                class="slds-m-bottom_small">
            </lightning-input>
            
            <lightning-input
                label="Email Template"
                value={template}
                onchange={handleEmailChange}
                class="slds-m-bottom_small">
            </lightning-input>
            
            <lightning-button
                variant="brand"
                label="Submit"
                onclick={handleSubmit}>
            </lightning-button>
        </div>
    </lightning-card>
</template>
