<template>

    <div class="slds-is-relative">
        <!-- 页面加载中 -->
        <template if:true={isShowSpinner}>
            <lightning-spinner size="medium" variant="brand"></lightning-spinner>
        </template>

        <!-- 页面错误信息 -->
        <template if:true={hasError}>
            <div style="margin: auto;"
                class="slds-text-heading_small slds-text-color_error slds-text-align_left slds-m-top_medium slds-m-left_medium">
                <p>{errorMsgArray}</p>
            </div>
        </template>

        <template if:false={isEditShow}>
            <lightning-modal-body>
                <div style="width: 600px; margin: auto;">
                    <lightning-input label="姓名" type="text" name="userName" onchange={changeData} required>
                    </lightning-input>
                    <lightning-input label="邮箱" type="text"  name="userEmail" onchange={changeData} required>
                    </lightning-input>
                    <!-- <lightning-input label="展会名称" type="text" required name="exhibitionName" onchange={changeData}></lightning-input> -->
                    <span>请输入中文姓名和邮箱</span>
                    <br />
                    <lightning-button label="确认" onclick={selExhibitionArr}></lightning-button>
                    <br />
                </div>
            </lightning-modal-body>
        </template>

        <template if:true={isEditShow}>
            <!-- <lightning-modal-header label="New Internal Registration"></lightning-modal-header> -->
            <lightning-modal-body>
                <div style="width: 600px; margin: auto;">
                    <!-- <lightning-record-edit-form object-api-name="Exhibition_Arrangement__c" density="Compact">
                        <lightning-messages></lightning-messages> -->

                        <lightning-input label="展会名称" type="text" value={exhibitionName} disabled>
                        </lightning-input>

                        <!-- 是否需要填写航班信息 -->
                        <lightning-input label="无航班信息" type="checkbox" name="Is_Not_Flight__c"
                            data-field-name="Is_Not_Flight__c" value={recordInfo.Is_Not_Flight__c}
                            checked={recordInfo.Is_Not_Flight__c} onchange={handleChange}
                            disabled={isOverLastRegistrationDate}>
                        </lightning-input>

                        <template if:false={recordInfo.Is_Not_Flight__c}>
                            <lightning-input label="出发航班号" type="text" name="Inbound_Flight_No__c"
                                data-field-name="Inbound_Flight_No__c" value={recordInfo.Inbound_Flight_No__c}
                                onchange={handleChange} read-only={isOverLastRegistrationDate} required>
                            </lightning-input>

                            <lightning-input label="出发航班时间" type="date" name="Arrival_Date__c"
                                data-field-name="Arrival_Date__c" value={recordInfo.Arrival_Date__c}
                                onchange={handleChange} read-only={isOverLastRegistrationDate} required>
                            </lightning-input>

                            <lightning-input label="返回航班号" type="text" name="Return_Flight_No__c"
                                data-field-name="Return_Flight_No__c" value={recordInfo.Return_Flight_No__c}
                                onchange={handleChange} read-only={isOverLastRegistrationDate} required>
                            </lightning-input>

                            <lightning-input label="返回航班时间" type="date" name="Return_Date__c"
                                data-field-name="Return_Date__c" value={recordInfo.Return_Date__c}
                                onchange={handleChange} read-only={isOverLastRegistrationDate} required>
                            </lightning-input>
                        </template>

                        <!-- <lightning-input label="酒店名称" type="text" required name="HotelName" onchange={changeData}></lightning-input> -->
                        <!-- 酒店信息 -->
                        <lightning-input label="自定酒店无需行程安排" type="checkbox" name="Designated_Hotel__c"
                            data-field-name="Designated_Hotel__c" value={recordInfo.Designated_Hotel__c}
                            checked={recordInfo.Designated_Hotel__c} onchange={handleChange}
                            disabled={isOverLastRegistrationDate}>
                        </lightning-input>

                        <template if:false={recordInfo.Designated_Hotel__c}>
                            <lightning-combobox label="酒店名称" name="Exhibition_Hotel__c" field-name="Exhibition_Hotel__c"
                                options={options} onchange={handleChange} placeholder={initHotelName}
                                value={recordInfo.Exhibition_Hotel__c} read-only={isOverLastRegistrationDate} required>
                            </lightning-combobox>

                            <lightning-input label="酒店入住时间" type="date" name="Hotel_Start_Date__c"
                                data-field-name="Hotel_Start_Date__c" value={recordInfo.Hotel_Start_Date__c}
                                onchange={handleChange} read-only={isOverLastRegistrationDate} required>
                            </lightning-input>

                            <lightning-input label="酒店离开时间" type="date" name="Hotel_End_Date__c"
                                data-field-name="Hotel_End_Date__c" value={recordInfo.Hotel_End_Date__c}
                                onchange={handleChange} read-only={isOverLastRegistrationDate} required>
                            </lightning-input>
                        </template>

                        <!-- 新增报名时填写的个人信息、区组信息;参会日程信息，默认全程参展，可手动取消部分日期，后续通过此标识判断员工是否在现场，是否匹配参展客户接待任务 -->
                        <!-- Presence Information -->
                        <span>参会日程</span>
                        <lightning-dual-listbox variant="label-hidden" name="PresenceDate__c"
                            data-field-name="PresenceDate__c" source-label="可选日期" selected-label="在场日期"
                            options={presenceOptions} value={presenceValue} onchange={handleChange}
                            disabled={isOverLastRegistrationDate}>
                        </lightning-dual-listbox>
                        <!-- Product Line -->
                        <!-- <span>产品线</span>
                        <lightning-input-field variant="label-hidden" field-name="Product_Line__c"
                            data-field-name="Product_Line__c" value={recordInfo.Product_Line__c} onchange={handleChange}
                            disabled={isOverLastRegistrationDate}>
                        </lightning-input-field> -->
                        <!-- Country -->
                        <!-- <span>国家</span>
                        <lightning-input-field variant="label-hidden" field-name="Counry__c" data-field-name="Counry__c"
                            value={recordInfo.Counry__c} onchange={handleChange} disabled={isOverLastRegistrationDate}>
                        </lightning-input-field> -->
                        <!-- Brand -->
                        <!-- <span>品牌</span>
                        <lightning-input-field variant="label-hidden" field-name="Brand__c" data-field-name="Brand__c"
                            value={recordInfo.Brand__c} onchange={handleChange} disabled={isOverLastRegistrationDate}>
                        </lightning-input-field> -->
                    <!-- </lightning-record-edit-form> -->

                    <!-- 车辆安排信息 -->
                    <br />
                    <span>无需车辆安排</span>
                    <lightning-input label="无需车辆安排" type="checkbox" name="Is_Not_Need_Vehicle__c"
                        data-field-name="Is_Not_Need_Vehicle__c" value={recordInfo.Is_Not_Need_Vehicle__c}
                        checked={recordInfo.Is_Not_Need_Vehicle__c} onchange={handleChange}
                        disabled={isOverLastRegistrationDate}>
                    </lightning-input>

                    <template if:false={recordInfo.Is_Not_Need_Vehicle__c}>
                        <hr>
                        分配车辆信息
                        <template if:false={isOverLastRegistrationDate}>
                            <lightning-button label="增加" onclick={addOne}></lightning-button>
                            <div>
                                可填报多条信息,司机、车牌号、上车地点、发车时间为行政组安排反馈结果，有反馈结果的车辆信息无法再次进行编辑！
                                <br />
                                实际发车与否将根据最终乘车人数决定，人数必须达到最低人数要求，请留意后续安排信息。
                                <br />
                            </div>
                        </template>
                        <c-modal-lwc data-id="product selection" static-mode=true title="" show-ok=true show-close=true
                            hidden-close-icon=false onok={handleOk}>
                            <div style="margin-left:45%;">
                                <!-- <h3>车辆分配信息</h3> -->
                                <h3>车辆用车信息</h3>
                            </div>
                            <div style="height: 200px; margin-left: 5%; margin-right: 5%; ">
                                <lightning-record-edit-form object-api-name={objectApiName}
                                    onsuccess={handleRecordCreated}>
                                    <lightning-layout>
                                        <lightning-layout-item padding="around-small" size="5">
                                            <!-- <lightning-combobox style="width: 150px;" label="车辆类型"  required name="carType" options={caroptions} onchange={handleCarType} value={Hotel_Name__c}></lightning-combobox> -->
                                            <lightning-input-field field-name={CAR_TYPE} value={carType}
                                                onchange={handleCarType} required></lightning-input-field>
                                        </lightning-layout-item>
                                        <lightning-layout-item padding="around-small" size="1">
                                        </lightning-layout-item>
                                        <lightning-layout-item style="width: 200px;" padding="around-small" size="6">
                                            <!-- <lightning-input  label="用车时间" type="date" required name="carDate" onchange={handleCarDate}></lightning-input> -->
                                            <lightning-input-field field-name={CAR_DATE} value={carDate}
                                                onchange={handleCarDate} required></lightning-input-field>
                                        </lightning-layout-item>
                                    </lightning-layout>
                                </lightning-record-edit-form>
                                <template if:true={isBookError}>
                                    <div class="slds-text-heading_small slds-text-color_error">
                                        <p>{errorBook}</p>
                                    </div>
                                </template>
                            </div>
                        </c-modal-lwc>
                        <div style="height: 260px;" class="vehicleTable">
                            <lightning-datatable aria-label="" key-field="Id" data={datas} onsave={handleRowsSave}
                                show-row-number-column hide-checkbox-column onrowaction={handleRowAction}
                                columns={columns}>
                            </lightning-datatable>
                        </div>
                    </template>
                </div>
            </lightning-modal-body>

            <lightning-modal-footer>
                <div style="width: 600px; margin: auto; text-align: center;">
                    <!-- Save Button -->
                    <template if:false={isOverLastRegistrationDate}>
                        <lightning-button variant="brand" label="保存" title="Primary action" onclick={saveExhibitionArr}
                            class="slds-m-left_x-small"></lightning-button>
                    </template>
                </div>
            </lightning-modal-footer>
        </template>

    </div>

</template>
