<template>
    <div class="slds-box" style="border: 0px; padding: 0px;">
        <template if:true={isShowSpinner}>
            <lightning-spinner size="medium" variant="brand"></lightning-spinner>
        </template>
        <div class="slds-grid slds-wrap items-wraper">
            <template for:each={records} for:item="record" for:index="index">
                <template lwc:if={record.isImage}>
                    <div class={colClass} key={record.Id}>
                        <!-- <div class={imgContainerClass} style="margin-top: 7px;position:relative;"> -->
                            <template if:false={record.isSuccess}>
                                <div class={record.spinnerClass} alt={customLabel.SpinnerAlt} onclick={handleSpinner} style={record.spinnerStyle}>
                                </div>
                            </template>
                            <div style="display: none;">{record.base64}</div>
                            <img src={record.src} alt={customLabel.SpinnerAlt}  onload={handleLoad} onerror={handleError}
                                style={record.style} data-id={record.ContentDocumentId} data-index={index}
                                onclick={preview} />
                            
                            <template if:true={sizeOpen}>
                                <br/>
                                {record.size}
                            </template> 
                        <!-- </div> -->
                        <!-- <div class="slds-col slds-large-size_1-of-12 slds-medium-size_1-of-12 slds-size_1-of-12"
                            key={record.Id} style="margin-bottom: 20px;">
                            <template if:false={disabledDelete}>
                                <lightning-icon variant="success" icon-name="utility:close"
                                    size="x-small" title="" data-index={index} data-t={record.Id}
                                    onclick={handleDeleteFile}>
                                </lightning-icon>
                            </template>
                        </div> -->
                    </div>
                    
                </template>
                <template lwc:else>
                    <div class={colClass} key={record.Id}>
                        <!-- <div class={imgContainerClass} style="margin-bottom: 20px;position:relative;"> -->
                            <template if:false={record.isSuccess}>
                                <div alt={customLabel.SpinnerAlt} onclick={handleSpinner} style={record.spinnerStyle}></div>
                            </template>
                            <div class="slds-file slds-file_card slds-has-title">
                                <figure>
                                    <figcaption class="slds-file__title slds-file__title_card">
                                        <div class="slds-media slds-media_small slds-media_center">
                                            <div class="slds-media__figure slds-line-height_reset">
                                                <lightning-icon icon-name={record.iconName} size="x-small"
                                                    alternative-text="icon"></lightning-icon>
                                            </div>
                                            <div class="slds-media__body">
                                                <span class="slds-file__text slds-truncate"
                                                    title={record.Title}>{record.Title}</span>
                                            </div>
                                        </div>
                                    </figcaption>
                                    <span class="slds-file__crop" data-id={record.ContentDocumentId} data-index={index}
                                        onclick={preview}>
                                        <span class="slds-file__icon slds-icon_container" title="image">
                                            <lightning-icon icon-name={record.iconName} size="x-large"
                                                alternative-text="icon"></lightning-icon>
                                        </span>
                                    </span>
                                </figure>
                            </div>
                        <!-- </div> -->
                        <!-- <div class="slds-col slds-large-size_1-of-12 slds-medium-size_1-of-12 slds-size_1-of-12"
                            key={record.Id} style="margin-bottom: 20px;">
                            <template if:false={disabledDelete}>
                                <lightning-icon variant="success" icon-name="utility:close" size="x-small" title=""
                                    data-id={record.ContentDocumentId} data-index={index} onclick={handleDeleteFile}>
                                </lightning-icon>
                            </template>
                        </div> -->
                    </div>
                    
                </template>
            </template>
        </div>
        <template if:false={disabledUpload}>
            <div class="slds-grid slds-wrap">
                <div class="">
                    <template lwc:if={isBigFile}>
                        <lightning-file-upload
                            class="uploadFilesLwc-upload"
                            variant="label-hidden"
                            name="fileUploader"
                            record-id={attachId}
                            onuploadfinished={handleUploadFinished}
                        ></lightning-file-upload>
                    </template>
                    <template lwc:else>
                        <!-- <lightning-input type="file" label="" class="uploadFilesLwc-upload" variant="label-hidden"
                            name="fileUploader" onchange={handleFileChanged} multiple></lightning-input> -->
                        <div style="display:inline-block;margin-left: 0px;">
                            <div class="slds-form-element">
                                <div class="slds-form-element__control">
                                    <div class="slds-file-selector slds-file-selector_files">
                                    <div class="slds-file-selector__dropzone">
                                        <input type="file"  class="slds-file-selector__input slds-assistive-text"  onchange={handleFileChanged}  id="file-upload-input-107" aria-labelledby="file-selector-primary-label-105 file-selector-secondary-label106"/>
                                        <label class="slds-file-selector__body" for="file-upload-input-107" id="file-selector-secondary-label106">
                                            <span class="slds-file-selector__button slds-button slds-button_neutral">
                                                <lightning-icon icon-name='utility:upload' class="my-icon" alternative-text='upload' size='xx-small' title='upload'></lightning-icon>&nbsp;Upload File
                                            </span>
                                        </label>
                                    </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </template>
                    
                </div>
                <template lwc:if={showBigFileCheck}>
                    <div class="">
                        <lightning-input type="checkbox" label="Big File" checked={isBigFile} onchange={handleCheck}></lightning-input>
                    </div>
                </template>
            </div>
        </template>
        <!-- <c-modal-lwc hide-close-icon=true onok={handleOk} onclose={handleClose}>
            Are you sure delete the attachment?
        </c-modal-lwc> -->
    </div>
    <c-create-file-item-lwc is-specified="true" oncompletedfiles={handleCacheComplete}></c-create-file-item-lwc>
</template>
